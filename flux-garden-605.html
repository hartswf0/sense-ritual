<script>
console.log('🌊 FLUX GARDEN — Organic Flow Fields Loading...');

// ==============================================================================
// CONFIGURATION SURFACE (SINGLE SOURCE OF TRUTH)
// ==============================================================================
const config = {
  gridSize: 8,
  cellSize: 50,
  automata: {
    enabledDefault: false, // Cellular Automata default state
    updateEveryNFrames: 8,  // CA logic update frequency
    decayLimit: 120,       // Frames before stable cell decays
    propagationChance: 0.3, // Chance for a cell to adopt neighbor type
    popDuration: 30        // Frames for pop animation
  },
  motion: {
    breatheScaleMax: 0.03, // Max additional scale for breathing (e.g., 0.03 means 3%)
    breathePeriodFrames: 180, // Period for breathing animation (e.g., 180 frames = 3 seconds at 60fps)
    popScaleMax: 0.15,     // Max additional scale for pop animation (e.g., 0.15 means 1.15x)
    popDurationMs: 250,    // Duration of pop animation in ms
    flowStrength: 5,       // Strength of Perlin flow field displacement
    flowNoiseFreq: 0.05,   // Base frequency for Perlin noise
    flowSpeed: 0.001,      // Speed of Perlin noise evolution
    respectReducedMotion: true // Disable complex motion if user prefers
  },
  hints: {
    idleFirstMs: 4000,     // Delay before first hint appears
    idleEscalateMs: 8000,  // Delay before hint adds wiggle
    cooldownMs: 6000,      // Cooldown after an action before hints reappear
    glowAlpha: 0.3,        // Max alpha for hint glow
    wigglePx: 4,           // Max displacement for hint wiggle
    wiggleFreqHz: 1.5,     // Frequency of hint wiggle
    minMatchCells: 3       // Minimum cells for a hint to trigger (e.g., standard 3-in-a-row)
  },
  input: {
    hitMinPx: 44,          // Minimum interactive hit area (CSS pixels)
    slopPx: 8,             // Pointer drag/tap drift tolerance (not fully implemented with click listener)
    invalidSnapMs: 150     // Duration of swap-back animation (visual effect, not implemented in this version)
  },
  toggles: {
    hapticsDefault: false, // Haptics default state
    audioDefault: true     // Audio default state
  },
  audio: {
    bgVolumeMax: 0.3,      // Max volume for background videos
    hintSilent: true       // Hints should not make sound
  },
  videoCells: {
    segmentsPerType: 4,    // Number of time segments per video file
    segmentLengthSec: 10,  // Duration of each video segment
    assignMode: "deterministic", // "deterministic" or "random"
    assignFormula: "(r * config.gridSize + c) % config.videoCells.segmentsPerType", // Formula for deterministic assignment
    driftPctPerSec: 0.002  // Small drift for mosaic sampling (0.2% per second)
  },
  timeline: {
    clipDurationDefaultSec: 5, // Default duration for clips in EDL export
    halfSilenceRule: true // Apply mute every other clip
  }
};

// ==============================================================================
// TYPE CATALOG
// ==============================================================================
// Each type now includes segment information and a unicode symbol (for potential future display)
const TYPE_SOURCES = {
  0: {file: 'MEDIA/video_0443d3f46b1f433597e8d9d89469cad8.mp4', title: 'Blush', color: '#FFD3D3', symbol: '❀', shape: 'circle'},
  1: {file: 'MEDIA/video_06ac4003fedc438588cf48eb594c8f22.mp4', title: 'Sky', color: '#D4E7FF', symbol: '☁', shape: 'square'},
  2: {file: 'MEDIA/video_0e770098e193417596602ae22ae3ab30.mp4', title: 'Cream', color: '#FFF5D4', symbol: '★', shape: 'triangle'},
  3: {file: 'MEDIA/video_0eb7d2bceba7433ba17f37bbfc2a5007.mp4', title: 'Mint', color: '#D4F4DD', symbol: '🌿', shape: 'hexagon'},
  4: {file: 'MEDIA/video_14c639e88a2c4718aee990049945815c.mp4', title: 'Peach', color: '#FFE4D4', symbol: '🔶', shape: 'diamond'},
  5: {file: 'MEDIA/video_219ff5b76d874686bcfecbe4d10f5c83.mp4', title: 'Lavender', color: '#E8D4FF', symbol: '💜', shape: 'pentagon'},
  6: {file: 'MEDIA/video_27b3377368254f1babcfb96a0c47859a.mp4', title: 'Sage', color: '#D9EAD3', symbol: '✨', shape: 'star'},
  7: {file: 'MEDIA/video_29245c98b1904304bdaa5513eb2ddc76.mp4', title: 'Apricot', color: '#FFE0CC', symbol: '🍑', shape: 'roundsquare'},
  8: {file: 'MEDIA/video_3250a9cf85244759a18a4db13c37d174.mp4', title: 'Rose', color: '#FFD4E5', symbol: '🌹', shape: 'octagon'},
  9: {file: 'MEDIA/video_37ed60eedd054e2aaa8bb1448f65d760.mp4', title: 'Sand', color: '#F4E8D4', symbol: '➕', shape: 'cross'}
};

const TYPE_SEGMENTS = {}; // Populated by initTypeSegments

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const game = {
  grid: [],
  selected: null,
  score: 0,
  moves: 30,
  sequence: [],
  busy: false,
  sounds: { match: null, swap: null, win: null, error: null },
  audioEnabled: config.toggles.audioDefault,
  hapticsEnabled: config.toggles.hapticsDefault,
  automataEnabled: config.toggles.automataDefault,
  autoPlay: true, // Auto-play sequence after match
  typeSegmentVideos: {}, // Stores actual <video> elements
  segmentUsage: {}, // Tracks usage for coherent sequences (not per-cell anymore, but for new clip selection)
  collectedTypes: new Set(),
  typePlaybackTime: {}, // Not used as videos loop independently
  automataFrame: 0,
  flowField: [],
  flowTime: 0,
  clearFlash: [], // Not used as per prompt: "No flashing/pulsing except on clear events"
  autoClear: true, // Auto-clear matches (procedural film mode)
  paused: false, // Pause auto-generation
  currentCollectedVideo: null, // Full video playing behind shapes

  // Hint system variables
  lastInputTime: Date.now(),
  lastHintTime: 0,
  hintCell: null, // {r, c} of the cell to hint
  hintWiggleOffset: {x: 0, y: 0}
};

// CELLULAR AUTOMATA STATES
const CELL_STATES = {
  STABLE: 'stable',
  MATCHING: 'matching', // Cell identified as part of a match
  BURSTING: 'bursting', // Cell exploding/popping
  DECAYING: 'decaying', // Cell fading out naturally
  MERGING: 'merging'   // Not implemented, but kept for concept
};

// Init type-segment videos: create looping videos for each type×segment pair
function initTypeSegments() {
  const segmentCount = config.videoCells.segmentsPerType;
  const segmentLength = config.videoCells.segmentLengthSec;

  for (let t = 0; t < 10; t++) {
    TYPE_SEGMENTS[t] = [];
    game.segmentUsage[t] = 0; // Reset usage counter for coherent selection
    for (let s = 0; s < segmentCount; s++) {
      const start = s * segmentLength;
      const end = start + segmentLength;
      TYPE_SEGMENTS[t].push({
        index: s,
        start,
        end,
        title: `${TYPE_SOURCES[t].title} ${s+1}`,
        file: TYPE_SOURCES[t].file
      });
      
      const key = `${t}_${s}`;
      const v = document.createElement('video');
      v.src = TYPE_SOURCES[t].file;
      v.muted = true;
      v.playsinline = true;
      v.loop = false; // We'll handle looping manually per segment
      v.preload = 'auto';
      v.crossOrigin = 'anonymous';
      
      // Start playing when metadata loads
      v.addEventListener('loadedmetadata', () => {
        try {
          // Ensure currentTime is within bounds, especially for short videos
          const actualStart = Math.min(start, v.duration - 0.1);
          v.currentTime = Math.max(0, actualStart);
          v.play().catch(e => console.warn('Video autoplay blocked for segment:', key, e));
        } catch(e) {
          console.error('Error setting currentTime or playing video for segment:', key, e);
        }
      });
      
      // Loop within segment range
      v.addEventListener('timeupdate', () => {
        if (!v.paused && v.currentTime >= end) {
          try {
            v.currentTime = start;
          } catch(e) {}
        }
      });
      
      // Auto-retry playing if it stops unexpectedly
      v.addEventListener('pause', () => {
        setTimeout(() => {
          if (v.paused && v.readyState >= 2) {
            v.play().catch(()=>{});
          }
        }, 100);
      });
      
      v.load(); // Trigger load
      game.typeSegmentVideos[key] = v;
    }
  }
  console.log('✓ Type-segment videos created:', Object.keys(game.typeSegmentVideos).length);
  
  // Try to play all videos after a short delay
  setTimeout(() => {
    Object.values(game.typeSegmentVideos).forEach(v => {
      if (v.paused && v.readyState >= 2) {
        v.play().catch(()=>{});
      }
    });
    console.log('✓ Videos playback initiated');
  }, 500);
}

// Helper: map grid cell to segment index (deterministic variety)
function segmentIndexForCell(r, c) {
  // Use the formula from config for deterministic assignment
  return eval(config.videoCells.assignFormula); // eval is used for simple math formulas from config
}

// Helper: get next unused segment for a type (for coherent sequences)
function nextSegmentForType(type) {
  if (!game.segmentUsage[type]) game.segmentUsage[type] = 0;
  const segIdx = game.segmentUsage[type] % config.videoCells.segmentsPerType;
  game.segmentUsage[type]++; // Increment for next time
  return segIdx;
}

// PERLIN NOISE - Simple 2D Perlin for organic flow
function perlin2D(x, y) {
  // Simplified Perlin - use sin waves for organic feel
  const freq = config.motion.flowNoiseFreq;
  const speed = config.motion.flowSpeed;
  return (
    Math.sin(x * freq + game.flowTime * speed) * Math.cos(y * freq) * 0.5 +
    Math.sin(x * freq * 2 - game.flowTime * speed * 2) * Math.sin(y * freq * 2) * 0.3 +
    Math.cos(x * freq * 1.5 + y * freq * 1.5 + game.flowTime * speed * 1.5) * 0.2
  );
}

// Initialize flow field
function initFlowField() {
  game.flowField = [];
  for (let r = 0; r < config.gridSize; r++) {
    game.flowField[r] = [];
    for (let c = 0; c < config.gridSize; c++) {
      game.flowField[r][c] = {dx: 0, dy: 0};
    }
  }
}

// Update flow field with Perlin noise
function updateFlowField() {
  for (let r = 0; r < config.gridSize; r++) {
    for (let c = 0; c < config.gridSize; c++) {
      const angle = perlin2D(c * 10, r * 10) * Math.PI * 2;
      game.flowField[r][c] = {
        dx: Math.cos(angle) * config.motion.flowStrength,
        dy: Math.sin(angle) * config.motion.flowStrength
      };
    }
  }
}

// SHAPE RENDERING - Draw distinct geometric shapes
function drawShape(ctx, x, y, size, type, color, scale = 1, rotation = 0) {
  const cx = x + config.cellSize / 2;
  const cy = y + config.cellSize / 2;
  const r = size * 0.4 * scale; // Adjust radius by scale
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.beginPath();
  
  switch (TYPE_SOURCES[type].shape) {
    case 'circle':
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      break;
    case 'square':
      ctx.rect(-r, -r, r * 2, r * 2);
      break;
    case 'triangle':
      ctx.moveTo(0, -r);
      ctx.lineTo(r * 0.866, r * 0.5);
      ctx.lineTo(-r * 0.866, r * 0.5);
      ctx.closePath();
      break;
    case 'hexagon':
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'diamond':
      ctx.moveTo(0, -r);
      ctx.lineTo(r, 0);
      ctx.lineTo(0, r);
      ctx.lineTo(-r, 0);
      ctx.closePath();
      break;
    case 'pentagon':
      for (let i = 0; i < 5; i++) {
        const a = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'star':
      for (let i = 0; i < 10; i++) {
        const a = (Math.PI * 2 / 10) * i - Math.PI / 2;
        const rad = i % 2 === 0 ? r : r * 0.5;
        const px = Math.cos(a) * rad;
        const py = Math.sin(a) * rad;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'roundsquare':
      const rr = r * 0.3;
      ctx.moveTo(-r + rr, -r);
      ctx.arcTo(r, -r, r, r, rr);
      ctx.arcTo(r, r, -r, r, rr);
      ctx.arcTo(-r, r, -r, -r, rr);
      ctx.arcTo(-r, -r, r, -r, rr);
      ctx.closePath();
      break;
    case 'octagon':
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI / 4) * i;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'cross':
      const w = r * 0.4;
      ctx.rect(-w, -r, w * 2, r * 2);
      ctx.rect(-r, -w, r * 2, w * 2);
      break;
    default:
      ctx.arc(0, 0, r, 0, Math.PI * 2);
  }
  ctx.restore(); // Restore translation and rotation
}

// CELLULAR AUTOMATA FUNCTIONS

// Create a cell object
function createCell(type, r, c) {
  return {
    type,
    state: CELL_STATES.STABLE,
    timer: 0,
    brightness: 0.5, // Not actively used but part of CA concept
    lastChange: 0,
    breathePhase: Math.random() * Math.PI * 2, // Random breathing offset
    popScale: 0, // For pop animation
    segmentIdx: segmentIndexForCell(r, c) // Assign segment on creation
  };
}

// Get Moore neighborhood (8 surrounding cells)
function getNeighbors(r, c) {
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr;
      const nc = c + dc;
      if (nr >= 0 && nr < config.gridSize && nc >= 0 && nc < config.gridSize) {
        neighbors.push({r: nr, c: nc, cell: game.grid[nr][nc]});
      }
    }
  }
  return neighbors;
}

// Calculate similarity between two cells (0-1) - simplified for CA
function cellSimilarity(cell1, cell2) {
  if (!cell1 || !cell2) return 0;
  return cell1.type === cell2.type ? 0.9 : 0.1; // Simple type similarity
}

// Apply cellular automata rules to all cells
function applyAutomataRules() {
  if (!game.automataEnabled) return; // Only apply if enabled
  
  const newStates = [];
  for (let r = 0; r < config.gridSize; r++) {
    newStates[r] = [];
    for (let c = 0; c < config.gridSize; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      const newCellState = {...cell}; // Start with current cell state
      newCellState.timer++;
      
      const neighbors = getNeighbors(r, c);
      const similarNeighbors = neighbors.filter(n => cellSimilarity(cell, n.cell) > 0.8);
      
      switch (cell.state) {
        case CELL_STATES.STABLE:
          // RULE 1: PROPAGATION - adopt majority neighbor type
          if (Math.random() < config.automata.propagationChance) {
            const typeCounts = {};
            neighbors.forEach(n => {
              typeCounts[n.cell.type] = (typeCounts[n.cell.type] || 0) + 1;
            });
            let dominantType = -1;
            let maxCount = 0;
            for (const typeStr in typeCounts) {
              const type = parseInt(typeStr);
              if (typeCounts[type] > maxCount) {
                maxCount = typeCounts[type];
                dominantType = type;
              }
            }
            if (dominantType !== cell.type && maxCount >= 4) { // Needs sufficient majority
              newCellState.type = dominantType;
              newCellState.timer = 0; // Reset timer on type change
            }
          }
          // RULE 2: DECAY - inactive cells fade
          else if (cell.timer > config.automata.decayLimit) {
            newCellState.state = CELL_STATES.DECAYING;
            newCellState.timer = 0;
          }
          break;
        case CELL_STATES.DECAYING:
          // Reset decaying cells after animation completes
          if (cell.timer > config.automata.popDuration) { // Reuse popDuration for decay animation length
            newCellState.type = randomCandyType();
            newCellState.segmentIdx = segmentIndexForCell(r, c);
            newCellState.state = CELL_STATES.STABLE;
            newCellState.timer = 0;
          }
          break;
        case CELL_STATES.MATCHING: // Should only be entered by game logic, not CA rules
        case CELL_STATES.BURSTING: // Should only be entered by game logic
          // Handled externally or will transition to STABLE after pop animation
          if (cell.timer > config.automata.popDuration) {
            newCellState.type = randomCandyType();
            newCellState.segmentIdx = segmentIndexForCell(r, c);
            newCellState.state = CELL_STATES.STABLE;
            newCellState.timer = 0;
          }
          break;
      }
      newStates[r][c] = newCellState;
    }
  }
  game.grid = newStates;
}

// ✅ SOUND SYSTEM - Web Audio API
function initSounds() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  
  game.sounds.match = () => {
    if (!game.audioEnabled) return;
    playTone(audioContext, 523.25, 0.1); // C5
  };
  
  game.sounds.swap = () => {
    if (!game.audioEnabled) return;
    playTone(audioContext, 392, 0.05); // G4
  };
  
  game.sounds.win = () => {
    if (!game.audioEnabled) return;
    playTone(audioContext, 523.25, 0.1);
    setTimeout(() => playTone(audioContext, 659.25, 0.1), 100);
    setTimeout(() => playTone(audioContext, 783.99, 0.2), 200);
  };
  
  game.sounds.error = () => {
    if (!game.audioEnabled) return;
    playTone(audioContext, 200, 0.1);
  };
  
  console.log('🔊 Sound system initialized');
}

function playTone(ctx, frequency, duration) {
  const oscillator = ctx.createOscillator();
  const gainNode = ctx.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(ctx.destination);
  
  oscillator.frequency.value = frequency;
  oscillator.type = 'sine';
  
  gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
  
  oscillator.start(ctx.currentTime);
  oscillator.stop(ctx.currentTime + duration);
}

// ✅ HAPTIC FEEDBACK
function haptic(pattern) {
  if (game.hapticsEnabled && navigator.vibrate) {
    if (config.motion.respectReducedMotion && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      // Skip haptics if user prefers reduced motion (can be too intense)
      return;
    }
    navigator.vibrate(pattern);
  }
}

function resize() {
  const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 600);
  canvas.width = config.gridSize * config.cellSize;
  canvas.height = config.gridSize * config.cellSize;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
}

function createGrid() {
  game.grid = [];
  for (let r = 0; r < config.gridSize; r++) {
    game.grid[r] = [];
    for (let c = 0; c < config.gridSize; c++) {
      game.grid[r][c] = createCell(randomCandyType(), r, c);
    }
  }
  
  // Remove initial matches
  let matchesFound = true;
  while (matchesFound) {
    matchesFound = false;
    findMatches().forEach(({r, c}) => {
      game.grid[r][c] = createCell(randomCandyType(), r, c);
      matchesFound = true;
    });
  }
  
  console.log('✓ Living grid created - cells are now autonomous agents');
}

function randomCandyType() {
  return Math.floor(Math.random() * 10);
}

function draw() {
  // Check for reduced motion preference
  const reduceMotion = config.motion.respectReducedMotion && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // Auto-clear matches if not paused
  if (!game.paused && !game.busy && game.autoClear) {
    const matches = findMatches();
    if (matches.length > 0) {
      processMatches(matches);
    }
  }
  
  // Update flow time and field
  game.flowTime++;
  if (game.automataFrame % 10 === 0 && !reduceMotion) {
    updateFlowField();
  }
  
  // Apply automata rules periodically (only if not paused)
  game.automataFrame++;
  if (!game.paused && game.automataFrame % config.automata.updateEveryNFrames === 0) {
    applyAutomataRules();
  }

  // Hint system update
  if (!game.paused && !game.busy && Date.now() - game.lastInputTime > config.hints.idleFirstMs && Date.now() - game.lastHintTime > config.hints.cooldownMs) {
      game.hintCell = findBestHint();
      if (game.hintCell) {
          game.lastHintTime = Date.now(); // Reset hint timer if a hint is found
      }
  } else if (Date.now() - game.lastInputTime < config.hints.idleFirstMs) {
      game.hintCell = null; // Clear hint if recent input
  }
  
  // Soft gradient background
  const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grad.addColorStop(0, '#1a1a1a');
  grad.addColorStop(1, '#0f0f0f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw cells with organic shapes
  for (let r = 0; r < config.gridSize; r++) {
    for (let c = 0; c < config.gridSize; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      // Apply flow field displacement
      const flow = game.flowField[r][c];
      const xBase = c * config.cellSize;
      const yBase = r * config.cellSize;
      const xOffset = reduceMotion ? 0 : flow.dx;
      const yOffset = reduceMotion ? 0 : flow.dy;

      // Organic breathing scale
      let breatheScale = 1;
      if (!reduceMotion) {
        const breatheProgress = (game.flowTime + cell.breathePhase) / config.motion.breathePeriodFrames;
        breatheScale = 1 + Math.sin(breatheProgress * Math.PI * 2) * config.motion.breatheScaleMax;
      }
      
      const x = xBase + xOffset;
      const y = yBase + yOffset;

      // Get video for mosaic sampling
      const key = `${cell.type}_${cell.segmentIdx}`;
      const video = game.typeSegmentVideos[key];
      
      ctx.save();
      
      // Satisfying POP animation on BURSTING
      if (cell.state === CELL_STATES.BURSTING) {
        const progress = cell.timer / config.automata.popDuration;
        const popScale = 1 + Math.sin(Math.min(1, progress) * Math.PI) * config.motion.popScaleMax;
        const alpha = 1 - progress;
        
        ctx.globalAlpha = alpha;
        ctx.translate(x + config.cellSize/2, y + config.cellSize/2);
        ctx.scale(popScale, popScale);
        ctx.translate(-(x + config.cellSize/2), -(y + config.cellSize/2));
      }
      
      // Draw shape-clipped video
      if (video && video.readyState >= 2) {
        ctx.save();
        
        // Apply breathing scale
        ctx.translate(x + config.cellSize/2, y + config.cellSize/2);
        ctx.scale(breatheScale, breatheScale);
        ctx.translate(-(x + config.cellSize/2), -(y + config.cellSize/2));
        
        // Create shape path for clipping
        drawShape(ctx, x, y, config.cellSize, cell.type);
        ctx.clip();
        
        // Calculate spatial sample region with drift
        const vw = video.videoWidth || 1920;
        const vh = video.videoHeight || 1080;
        const cellW = vw / config.gridSize;
        const cellH = vh / config.gridSize;
        let sx = c * cellW;
        let sy = r * cellH;

        if (!reduceMotion) {
          const driftAmountX = (config.flowTime * config.videoCells.driftPctPerSec * vw) % vw;
          const driftAmountY = (config.flowTime * config.videoCells.driftPctPctPerSec * vh) % vh;
          sx = (sx + driftAmountX) % vw;
          sy = (sy + driftAmountY) % vh;
        }
        
        // Draw video region
        ctx.drawImage(
          video,
          sx, sy, cellW, cellH,
          x + 4, y + 4, config.cellSize - 8, config.cellSize - 8
        );
        
        ctx.restore();
      }
      
      // GLASSMORPHIC shape overlay with breathing
      ctx.save();
      ctx.translate(x + config.cellSize/2, y + config.cellSize/2);
      ctx.scale(breatheScale, breatheScale);
      ctx.translate(-(x + config.cellSize/2), -(y + config.cellSize/2));
      
      drawShape(ctx, x, y, config.cellSize, cell.type);
      
      // Frosted glass effect: white with low opacity
      const cx = x + config.cellSize / 2;
      const cy = y + config.cellSize / 2;
      const rad = config.cellSize * 0.4;
      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
      
      // QUIET cells: dim overlay more significantly
      let overlayOpacity = 0.3; // Default for active cells
      if (cell.state === CELL_STATES.STABLE) {
        overlayOpacity = 0.5; // More prominent overlay for quiet cells
      }
      
      gradient.addColorStop(0, `rgba(255, 255, 255, ${overlayOpacity})`);
      gradient.addColorStop(1, TYPE_SOURCES[cell.type].color + '20');
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Subtle pastel tint stroke with soft glow
      ctx.strokeStyle = TYPE_SOURCES[cell.type].color + 'A0';
      ctx.lineWidth = 2;
      ctx.shadowBlur = 6;
      ctx.shadowColor = TYPE_SOURCES[cell.type].color + '60';
      ctx.stroke();
      ctx.shadowBlur = 0;
      
      ctx.restore();
      
      // Selection indicator - inviting pulse
      if (game.selected && game.selected.r === r && game.selected.c === c) {
        const pulse = Math.sin(game.flowTime * 0.01) * 0.5 + 0.5;
        ctx.save();
        ctx.translate(x + config.cellSize/2, y + config.cellSize/2);
        ctx.scale(1.1 + pulse * 0.05, 1.1 + pulse * 0.05); // Smaller pulse
        ctx.translate(-(x + config.cellSize/2), -(y + config.cellSize/2));
        
        drawShape(ctx, x, y, config.cellSize, cell.type);
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 + pulse * 0.4})`;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffffff';
        ctx.stroke();
        ctx.restore();
      }
      
      // Hint for potential matches - gentle nudge
      if (game.hintCell && game.hintCell.r === r && game.hintCell.c === c) {
        const hintPulse = Math.sin(game.flowTime * (config.hints.wiggleFreqHz * Math.PI / 30)) * 0.5 + 0.5;
        ctx.save();

        // Apply gentle wiggle if idle duration is long enough
        let hintX = x, hintY = y;
        if (Date.now() - game.lastInputTime > config.hints.idleEscalateMs && !reduceMotion) {
            const wigglePhase = (game.flowTime * config.hints.wiggleFreqHz / 60) * Math.PI * 2;
            hintX += Math.sin(wigglePhase) * config.hints.wigglePx;
            hintY += Math.cos(wigglePhase) * config.hints.wigglePx; // Different phase for Y for circular wiggle
        }

        drawShape(ctx, hintX, hintY, config.cellSize, cell.type);
        ctx.strokeStyle = `rgba(255, 255, 100, ${config.hints.glowAlpha + hintPulse * (config.hints.glowAlpha / 2)})`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(255, 255, 100, 0.5)';
        ctx.stroke();
        ctx.restore();
      }
      
      ctx.restore();
    }
  }
  
  requestAnimationFrame(draw);
}

// Global variable to track the initial pointer down position for slop tolerance
let initialPointerPos = { x: 0, y: 0 };
let isPointerDown = false;

function handlePointerDown(e) {
  if (e.pointerType === 'touch' || e.pointerType === 'pen') {
    initialPointerPos = { x: e.clientX, y: e.clientY };
    isPointerDown = true;
  }
  // For mouse, we can just treat it as a direct click
}

function handlePointerMove(e) {
  if (isPointerDown) {
    const dx = Math.abs(e.clientX - initialPointerPos.x);
    const dy = Math.abs(e.clientY - initialPointerPos.y);
    if (dx > config.input.slopPx || dy > config.input.slopPx) {
      // User dragged beyond slop, treat as drag, not a simple tap
      isPointerDown = false; // Prevent it from triggering handleClick on pointerup
    }
  }
}

function handlePointerUp(e) {
  game.lastInputTime = Date.now(); // Reset hint timer on any input
  game.hintCell = null; // Clear hint instantly
  
  if (isPointerDown || e.pointerType === 'mouse') { // If it's a tap (within slop) or a mouse click
    handleClick(e);
  }
  isPointerDown = false;
}

function handleClick(e) {
  if (game.busy) return;
  
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const col = Math.floor((x / rect.width) * config.gridSize);
  const row = Math.floor((y / rect.height) * config.gridSize);
  
  // Bounds check
  if (row < 0 || row >= config.gridSize || col < 0 || col >= config.gridSize) return;
  if (!game.grid[row] || !game.grid[row][col]) return;
  
  console.log('👆 Click:', row, col);
  
  if (!game.selected) {
    game.selected = {r: row, c: col};
    const cell = game.grid[row][col];
    console.log('✓ Selected:', row, col, '- type:', cell.type, 'state:', cell.state);
    haptic(15); // Pattern: 15ms
    game.sounds.swap();
    
    // Update video preview
    const seg = TYPE_SEGMENTS[cell.type][cell.segmentIdx];
    document.getElementById('previewVideo').src = seg.file;
    document.getElementById('previewVideo').currentTime = seg.start;
    document.getElementById('previewVideo').play().catch(()=>{});
    document.getElementById('videoLabel').textContent = seg.title;
  } else {
    const {r: r1, c: c1} = game.selected;
    const r2 = row, c2 = col;
    
    // Check if adjacent
    const adjacent = Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    
    if (adjacent) {
      console.log('🔄 Swapping:', [r1,c1], 'with', [r2,c2]);
      haptic(30); // Pattern: 30ms
      trySwap(r1, c1, r2, c2);
    } else {
      console.log('❌ Not adjacent, or re-selected same cell');
      game.sounds.error();
      haptic([10, 50, 10]); // Pattern: 10ms on, 50ms off, 10ms on
    }
    
    game.selected = null;
  }
}

function handleKeyDown(e) {
  if (game.busy) return;
  game.lastInputTime = Date.now();
  game.hintCell = null; // Clear hint on keyboard input

  let targetR = game.selected ? game.selected.r : Math.floor(config.gridSize / 2);
  let targetC = game.selected ? game.selected.c : Math.floor(config.gridSize / 2);

  const move = (dr, dc) => {
    targetR = Math.max(0, Math.min(config.gridSize - 1, targetR + dr));
    targetC = Math.max(0, Math.min(config.gridSize - 1, targetC + dc));
    game.selected = { r: targetR, c: targetC };
    haptic(10);
  };

  switch (e.key) {
    case 'ArrowUp':
    case 'w': move(-1, 0); e.preventDefault(); break;
    case 'ArrowDown':
    case 's': move(1, 0); e.preventDefault(); break;
    case 'ArrowLeft':
    case 'a': move(0, -1); e.preventDefault(); break;
    case 'ArrowRight':
    case 'd': move(0, 1); e.preventDefault(); break;
    case 'Enter':
    case ' ':
      if (game.selected) {
        // Simulate a click on the selected cell
        const tempEvent = {
          clientX: (game.selected.c + 0.5) * canvas.width / config.gridSize + canvas.getBoundingClientRect().left,
          clientY: (game.selected.r + 0.5) * canvas.height / config.gridSize + canvas.getBoundingClientRect().top
        };
        handleClick(tempEvent);
        game.selected = null; // Clear selection after attempted action
      }
      e.preventDefault();
      break;
  }
}

// Find a good hint cell
function findBestHint() {
  let bestMatch = [];
  let hintCell = null;

  // Iterate over all cells
  for (let r = 0; r < config.gridSize; r++) {
    for (let c = 0; c < config.gridSize; c++) {
      // Check adjacent cells for a potential swap
      const directions = [[0, 1], [1, 0]]; // Only check right and down to avoid duplicates
      for (const [dr, dc] of directions) {
        const nr = r + dr;
        const nc = c + dc;

        if (nr >= 0 && nr < config.gridSize && nc >= 0 && nc < config.gridSize) {
          // Simulate swap
          [game.grid[r][c], game.grid[nr][nc]] = [game.grid[nr][nc], game.grid[r][c]];
          const matches = findMatches();
          // Swap back
          [game.grid[r][c], game.grid[nr][nc]] = [game.grid[nr][nc], game.grid[r][c]];

          if (matches.length >= config.hints.minMatchCells) {
            // Prioritize more matches. If equal, prefer earlier cell (r,c)
            if (matches.length > bestMatch.length) {
              bestMatch = matches;
              hintCell = {r, c}; // Hint the initial cell of the swap
            } else if (matches.length === bestMatch.length) {
                // Heuristic: If equal matches, prefer the swap that involves a lower-index cell
                if (!hintCell || r < hintCell.r || (r === hintCell.r && c < hintCell.c)) {
                    hintCell = {r, c};
                }
            }
          }
        }
      }
    }
  }
  return hintCell;
}

function trySwap(r1, c1, r2, c2) {
  // Ensure we're not busy with another action
  if (game.busy) return;
  game.busy = true;
  game.lastInputTime = Date.now(); // Reset hint timer on action
  game.hintCell = null; // Clear hint instantly
  
  // Swap visually (instant for now, could be animated)
  [game.grid[r1][c1], game.grid[r2][c2]] = [game.grid[r2][c2], game.grid[r1][c1]];
  
  // Check for matches
  const matches = findMatches();
  
  if (matches.length === 0) {
    // No match - swap back (animated revert could go here)
    console.log('↩️ No match - reverting');
    setTimeout(() => { // Small delay to show invalid swap before reverting
      [game.grid[r1][c1], game.grid[r2][c2]] = [game.grid[r2][c2], game.grid[r1][c1]];
      game.sounds.error();
      haptic([10, 50, 10]); // Error haptic
      game.busy = false;
    }, config.input.invalidSnapMs);
    return;
  }
  
  console.log('✓ Match found:', matches.length, 'cells');
  game.sounds.match();
  haptic(50); // Match haptic
  game.moves--;
  document.getElementById('moves').textContent = game.moves;
  
  processMatches(matches);
}

function findMatches() {
  const matches = [];
  const checked = new Set();
  
  // Horizontal
  for (let r = 0; r < config.gridSize; r++) {
    for (let c = 0; c < config.gridSize - 2; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      if (game.grid[r][c+1] && game.grid[r][c+2] &&
          game.grid[r][c+1].type === cell.type && game.grid[r][c+2].type === cell.type) {
        for (let i = 0; i < 3; i++) {
          const key = `${r},${c+i}`;
          if (!checked.has(key)) {
            matches.push({r, c: c+i});
            checked.add(key);
          }
        }
      }
    }
  }
  
  // Vertical
  for (let c = 0; c < config.gridSize; c++) {
    for (let r = 0; r < config.gridSize - 2; r++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      if (game.grid[r+1][c] && game.grid[r+2][c] &&
          game.grid[r+1][c].type === cell.type && game.grid[r+2][c].type === cell.type) {
        for (let i = 0; i < 3; i++) {
          const key = `${r+i},${c}`;
          if (!checked.has(key)) {
            matches.push({r: r+i, c});
            checked.add(key);
          }
        }
      }
    }
  }
  
  return matches;
}

function processMatches(matches) {
  // game.busy is already set to true in trySwap, or implicitly true during cascades
  
  // Collect unique types from matched cells
  const matchedTypes = new Set();
  matches.forEach(({r, c}) => {
    const cell = game.grid[r][c];
    if (cell) {
      matchedTypes.add(cell.type);
      game.grid[r][c].state = CELL_STATES.BURSTING; // Set state to bursting
      game.grid[r][c].timer = 0; // Reset timer for pop animation
    }
    game.score += 10;
  });
  
  // Wait for pop animation to finish before clearing cells
  setTimeout(() => {
    // Clear the cells and add to sequence
    let lastCollectedSeg = null;
    matchedTypes.forEach(type => {
      const segIdx = nextSegmentForType(type);
      const seg = TYPE_SEGMENTS[type][segIdx];
      const newClip = {
        title: seg.title,
        file: seg.file,
        start: seg.start,
        end: seg.end,
        locked: true, // Clips are locked by default
        muted: config.timeline.halfSilenceRule ? (game.sequence.length % 2 === 0) : false // Half-silence rule
      };
      game.sequence.push(newClip);
      lastCollectedSeg = seg;
      
      // BEAT COLLECTION: Collect beat for each match
      if(typeof BeatCollectionSystem !== 'undefined'){
        const beatIndex = BeatCollectionSystem.collectedBeats.length;
        if(beatIndex < SAVE_THE_CAT_BEATS.length){
          const beat = SAVE_THE_CAT_BEATS[beatIndex];
          BeatCollectionSystem.collect({
            beatNumber: beat.number,
            beatName: beat.name,
            syntagma: beat.suggestedSyntagma,
            clips: [{
              type: type,
              title: newClip.title,
              file: newClip.file,
              start: newClip.start,
              end: newClip.end,
              locked: newClip.locked,
              muted: newClip.muted
            }],
            metadata: {
              matchType: type,
              matchCount: matches.length,
              flowTime: game.flowTime,
              score: game.score
            }
          });
        }
      }
    });

    // Actually remove the cells after pop animation
    matches.forEach(({r, c}) => {
        game.grid[r][c] = null;
    });
    
    // Play collected video FULLSCREEN behind all shapes (glassmorphic)
    if (lastCollectedSeg) {
      playCollectedVideoFullscreen(lastCollectedSeg);
    }
    
    document.getElementById('score').textContent = game.score;
    document.getElementById('clips').textContent = game.sequence.length;
    
    updateTimeline();
    maybeAutoPlaySequence();
    
    // Drop and refill
    setTimeout(() => {
      dropCandies();
      refillGrid();
      
      // Check for cascades
      const newMatches = findMatches();
      if (newMatches.length > 0) {
        console.log('🔁 Cascade:', newMatches.length, 'matches');
        haptic(50); // Cascade haptic
        processMatches(newMatches); // Recursively process cascades
      } else {
        game.busy = false;
        checkGameOver();
      }
    }, 150); // Short delay after refill to allow visual update before next checks

  }, config.automata.popDurationMs); // Wait for bursting animation
  
  console.log('💥 Processed matches:', matches.length, '- Score:', game.score);
}

function dropCandies() {
  for (let c = 0; c < config.gridSize; c++) {
    let writePos = config.gridSize - 1;
    for (let r = config.gridSize - 1; r >= 0; r--) {
      if (game.grid[r][c]) {
        if (writePos !== r) {
          game.grid[writePos][c] = game.grid[r][c];
          game.grid[r][c] = null;
        }
        writePos--;
      }
    }
  }
}

function refillGrid() {
  for (let r = 0; r < config.gridSize; r++) {
    for (let c = 0; c < config.gridSize; c++) {
      if (!game.grid[r][c]) {
        game.grid[r][c] = createCell(randomCandyType(), r, c);
      }
    }
  }
}

function updateTimeline() {
  const panel = document.getElementById('timelinePanel');
  const clipList = document.getElementById('clipList');
  const wrap = document.getElementById('sequencePlayerWrap');
  
  clipList.innerHTML = '';
  
  if (game.sequence.length === 0) {
    wrap.style.display = 'none';
    return;
  }

  game.sequence.forEach((clipData, i) => {
    const clip = document.createElement('div');
    clip.className = `clip-item ${clipData.locked ? 'locked' : ''} ${clipData.muted ? 'muted' : ''}`;
    
    const vid = document.createElement('video');
    vid.src = clipData.file;
    vid.muted = true;
    vid.playsinline = true;
    vid.preload = 'metadata'; // Only load metadata for thumbnail
    vid.currentTime = clipData.start; // Set to start time for thumbnail
    vid.load(); // Load the metadata
    
    const label = document.createElement('div');
    label.className = 'clip-label';
    label.textContent = `${i + 1}. ${clipData.title}`;
    
    clip.appendChild(vid);
    clip.appendChild(label);

    // Toggle locked state on click
    clip.onclick = () => {
      clipData.locked = !clipData.locked;
      clip.classList.toggle('locked', clipData.locked);
      // Optional: toggle mute as well if unlocked
      // if (!clipData.locked && config.timeline.halfSilenceRule) {
      //   clipData.muted = !clipData.muted;
      //   clip.classList.toggle('muted', clipData.muted);
      // }
      haptic(10);
      game.sounds.swap();
      console.log(`Clip ${i+1} ${clipData.locked ? 'locked' : 'unlocked'}`);
    };
    clipList.appendChild(clip);
  });
  
  if (game.sequence.length > 0) {
    panel.classList.add('active');
    wrap.style.display = 'block';
  }
}

// Sequence Player
function startSequencePlayback() {
  const unlockedClips = game.sequence.filter(c => !c.locked);
  if (unlockedClips.length === 0) {
    alert('No unlocked clips in sequence to play! Tap clips in the timeline to unlock them.');
    return;
  }
  
  const player = document.getElementById('sequencePlayer');
  const label = document.getElementById('sequencePlayerLabel');
  
  document.getElementById('timelinePanel').classList.add('active');
  document.getElementById('sequencePlayerWrap').style.display = 'block';
  
  let idx = 0;
  const playIdx = (i) => {
    const v = unlockedClips[i];
    if (!v) {
        label.textContent = "No Unlocked Clips";
        player.pause();
        player.src = '';
        return;
    }
    player.src = v.file;
    label.textContent = `${i+1}. ${v.title}`;
    player.muted = v.muted; // Apply mute rule to player
    const start = v.start ?? 0;
    const end = v.end ?? null;

    player.onloadedmetadata = () => {
      try { player.currentTime = start; } catch(e) {}
      player.play().catch(()=>{});
    };
    
    if (end != null) {
      player.ontimeupdate = () => {
        if (player.currentTime >= end) {
          player.ontimeupdate = null;
          idx = (idx + 1) % unlockedClips.length;
          playIdx(idx);
        }
      };
    } else {
      player.ontimeupdate = null;
    }
  };
  player.onended = () => { idx = (idx + 1) % unlockedClips.length; playIdx(idx); };
  playIdx(idx);
}

function playSingleInPlayer(v) {
  const player = document.getElementById('sequencePlayer');
  const label = document.getElementById('sequencePlayerLabel');
  player.src = v.file;
  label.textContent = v.title;
  player.muted = v.muted; // Apply mute rule
  const start = v.start ?? 0;
  const end = v.end ?? null;
  player.onloadedmetadata = () => {
    try { player.currentTime = start; } catch(e) {}
    player.play().catch(()=>{});
  };
  if (end != null) {
    player.ontimeupdate = () => {
      if (player.currentTime >= end) {
        try { player.currentTime = start; } catch(e) {} // Loop single clip
      }
    };
  } else {
    player.ontimeupdate = null;
  }
}

function playCollectedVideoFullscreen(segment) {
  const layer = document.getElementById('collectedVideoLayer');
  const video = document.getElementById('collectedVideo');
  
  if (!layer || !video) {
    console.warn('Collected video layer not found');
    return;
  }
  
  video.src = segment.file;
  video.muted = false; // Allow audio for collected videos
  video.volume = config.audio.bgVolumeMax; // Subtle background audio
  
  layer.classList.add('active');
  
  video.onloadedmetadata = () => {
    try {
      video.currentTime = segment.start || 0;
      video.play().catch(e => {
        console.warn('Fullscreen video play blocked, retrying muted:', e);
        video.muted = true; // Retry muted
        video.play().catch(()=>{});
      });
    } catch(e) {
      console.error('Video seek error:', e);
    }
  };
  
  video.ontimeupdate = () => {
    if (segment.end && video.currentTime >= segment.end) {
      try {
        video.currentTime = segment.start || 0;
        if (video.paused) video.play().catch(()=>{});
      } catch(e) {}
    }
  };
  
  video.onpause = () => {
    setTimeout(() => {
      if (video.paused && layer.classList.contains('active')) {
        video.play().catch(()=>{});
      }
    }, 100);
  };
  
  video.load();
  game.currentCollectedVideo = segment;
  
  console.log('🎬 Playing fullscreen:', segment.title);
}

function exportEDL() {
  if (game.sequence.length === 0) {
    alert('No clips in sequence!');
    return;
  }
  
  let edl = 'TITLE: Flux Garden Sequence\n\n';
  let recordIn = 0;
  
  game.sequence.forEach((v, i) => {
    const duration = config.timeline.clipDurationDefaultSec;
    const recordOut = recordIn + duration;
    
    edl += `${String(i + 1).padStart(3, '0')}  001      V     C        `;
    edl += `${formatTimecode(v.start)} ${formatTimecode(v.start + duration)} `; // Source In/Out
    edl += `${formatTimecode(recordIn)} ${formatTimecode(recordOut)}\n`;        // Record In/Out
    edl += `* FROM CLIP: ${v.title}\n`;
    edl += `* SOURCE FILE: ${v.file}\n`;
    if (v.locked) edl += `* STATUS: LOCKED\n`;
    if (v.muted) edl += `* AUDIO: MUTED (Half-Silence Rule)\n`;
    edl += `\n`;
    
    recordIn = recordOut;
  });
  
  downloadFile('flux_garden_sequence.edl', edl);
  console.log('✓ EDL exported');
  game.sounds.match();
  haptic(30);
  document.getElementById('exportMenu').classList.remove('show');
}

function formatTimecode(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  const f = 0; // Assuming 0 frames for simplicity, EDL typically uses 24 or 30 fps
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}:${String(f).padStart(2, '0')}`;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}
