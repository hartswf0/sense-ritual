<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fragment — Swipe · Collect · Chat</title>
  <meta name="theme-color" content="#000000" />
  <style>
    /* ——— RESET / BASICS ——— */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Helvetica Neue', Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { background: #f5f5f5; color: #000; touch-action: none; user-select: none; }

    :root{
      --ink:#000; --paper:#f5f5f5; --card:#fff; --line:#000; --muted:#888; --accent:#111; --good:#2ECC71; --warn:#F1C40F; --bad:#E74C3C; --info:#3498DB;
      --radius:12px; --gap:12px; --tap:12px; --shadow:0 12px 48px rgba(0,0,0,.15);
    }

    .game { display: grid; grid-template-columns: auto 1fr auto; grid-template-rows: 1fr; height: 100vh; position: relative; }

    /* ——— ALLEY MENU ——— */
    .alley-menu { position: fixed; left: 0; top: 50%; transform: translateY(-50%); width: 48px; background: var(--ink); border-right: 2px solid var(--line); z-index: 900; display: flex; flex-direction: column; height: auto; border-radius: 0 var(--radius) var(--radius) 0; overflow: hidden; }
    .alley-btn { flex: 1; border: none; background: transparent; cursor: pointer; display: grid; place-items:center; font-size: 18px; color: var(--paper); transition: all .15s; border-bottom: 1px solid rgba(255,255,255,.12); padding: 12px 0; }
    .alley-btn:last-child { border-bottom: none; }
    .alley-btn:active { background: #222; transform: scale(.95); }
    .alley-btn.active{ background:#000; }

    /* ——— CARD STACK ——— */
    .card-stack { grid-column: 1 / span 3; display: grid; place-items: center; padding: 32px; background: var(--paper); overflow: hidden; position: relative; }

    .card { position: absolute; width: 100%; max-width: 520px; height: 72vh; background: var(--card); border: 3px solid var(--line); cursor: grab; transition: transform .25s ease, opacity .25s ease; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); border-radius: var(--radius); }
    .card.swiping { transition: none; cursor: grabbing; }

    .card-header { padding: 24px; font-weight: 900; font-size: 18px; line-height: 1.2; color: #fff; min-height: 96px; display: flex; flex-direction: column; justify-content: center; letter-spacing: -.25px; }
    .card-category { font-size: 10px; text-transform: uppercase; opacity: .85; margin-bottom: 8px; letter-spacing: 2px; font-weight: 800; }

    .card-body { padding: 18px; background: var(--paper); color: var(--ink); overflow-y: auto; flex: 1; font-size: 14px; line-height: 1.55; }
    .card-desc { margin-bottom: 10px; color: #333; font-weight: 500; }
    .card-quote { font-style: italic; font-size: 12px; padding: 12px; background: #fff; border-left: 4px solid var(--ink); margin: 12px 0; color: #555; }
    .card-tags { font-size: 10px; color: #999; margin-top: 10px; padding-top: 10px; border-top: 2px solid #eee; letter-spacing: .5px; }
    .card-time { font-size: 11px; color: #666; margin-top: 8px; font-weight: 700; letter-spacing: .5px; }

    .inline-player { aspect-ratio: 16 / 9; border: 2px solid var(--ink); width: 100%; background: #000; margin: 10px 0 0; border-radius: 8px; overflow: hidden; }
    .inline-player iframe{ width:100%; height:100%; border:0 }

    .card-controls { padding: 12px 16px; border-top: 2px solid var(--ink); background: var(--paper); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .control-btn { padding: 10px; background: var(--ink); color: var(--paper); border: 2px solid var(--ink); font-weight: 800; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: all .15s; border-radius: 8px; }
    .control-btn.ghost{ background: var(--paper); color: var(--ink); }
    .control-btn:active { background: var(--paper); color: var(--ink); }

    /* ——— SWIPE FEEDBACK ——— */
    .swipe-flash { position: fixed; pointer-events: none; z-index: 25; }
    .swipe-flash.accept { animation: flashAccept .45s ease-out; }
    .swipe-flash.reject { animation: flashReject .45s ease-out; }
    .swipe-flash.info { animation: flashInfo .45s ease-out; }
    @keyframes flashAccept { 0%{inset:0; background: rgba(46,204,113,.28)} 100%{inset:-20px; background: rgba(46,204,113,0)} }
    @keyframes flashReject { 0%{inset:0; background: rgba(231,76,60,.28)} 100%{inset:-20px; background: rgba(231,76,60,0)} }
    @keyframes flashInfo   { 0%{inset:0; background: rgba(52,152,219,.28)} 100%{inset:-20px; background: rgba(52,152,219,0)} }
    @keyframes flashPredict{ 0%{inset:0; background: rgba(241,196,15,.28)} 100%{inset:-20px; background: rgba(241,196,15,0)} }

    .swipe-guide { position: absolute; display: flex; gap: 2px; font-weight: 900; font-size: 12px; text-transform: uppercase; opacity: 0; letter-spacing: 1px; pointer-events: none; z-index: 5; transition: opacity .15s; }
    .swipe-guide.right { top: 50%; right: 40px; transform: translateY(-50%); }
    .swipe-guide.left  { top: 50%; left:  40px; transform: translateY(-50%); }
    .swipe-guide.up    { top: 60px; left: 50%; transform: translateX(-50%); }
    .swipe-guide.down  { bottom: 110px; left: 50%; transform: translateX(-50%); }

    /* ——— COLLECTION PANEL (SNAP GRID & REORDER) ——— */
    .collection-panel { position: fixed; right: 0; top: 0; width: 0; height: 100vh; background: var(--paper); border-left: 3px solid var(--ink); z-index: 800; overflow: hidden; transition: width .25s ease; display: grid; grid-template-rows: auto 1fr; }
    .collection-panel.open { width: 460px; }

    .collection-header { padding: 18px; border-bottom: 3px solid var(--ink); background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: space-between; }
    .collection-title { font-weight: 900; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    .collection-count { font-size: 18px; font-weight: 900; }
    .collection-view-toggle { display: flex; gap: 6px; }
    .toggle-btn { width: 32px; height: 32px; background: var(--paper); border: 2px solid var(--paper); cursor: pointer; display: grid; place-items:center; font-weight: 900; color: var(--ink); transition: all .15s; border-radius: 6px; }
    .toggle-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

    .collection-content { position: relative; overflow: hidden; }
    .list-view, .grid-view { position: absolute; inset: 0; padding: 12px; overflow: auto; }

    /* LIST (drag-to-reorder) */
    .list-item { background: var(--card); border: 2px solid var(--ink); padding: 12px; display: grid; grid-template-columns: 60px 1fr auto; gap: 12px; align-items: center; border-radius: 8px; }
    .list-item + .list-item{ margin-top: 10px; }
    .list-item.dragging{ opacity:.65; outline: 3px dashed var(--ink); }
    .list-item-preview { width: 60px; height: 60px; background: var(--ink); border: 2px solid var(--ink); display: grid; place-items: center; color: var(--paper); font-weight: 900; border-radius: 6px; }
    .list-item-info { display: grid; gap:4px }
    .list-item-title { font-weight: 700; font-size: 12px; letter-spacing: .25px; }
    .list-item-meta { font-size: 10px; opacity: .7; letter-spacing: .5px; }
    .list-item-actions { display: grid; gap: 6px; }
    .list-action-btn { padding: 8px 10px; background: var(--ink); color: var(--paper); border: 2px solid var(--ink); font-size: 10px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; border-radius: 6px; }
    .list-action-btn.ghost{ background: var(--paper); color: var(--ink); }

    .chat-decision-status {
        display: inline-block;
        font-size: 8px;
        font-weight: 900;
        padding: 2px 5px;
        margin-left: 6px;
        border-radius: 4px;
        background: var(--muted);
        color: var(--paper);
        vertical-align: middle;
    }
    .chat-decision-status.JOINED { background: var(--good); }
    .chat-decision-status.UNMATCHED { background: var(--bad); }

    /* GRID (snap + reorder) */
    .grid-view { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; align-content: start; }
    .grid-item { background: var(--card); border: 2px solid var(--ink); aspect-ratio: 1; display: grid; grid-template-rows: 1fr auto; position: relative; overflow: hidden; border-radius: 10px; }
    .grid-item.dragging { z-index: 2; transform: scale(1.04); box-shadow: var(--shadow); }
    .grid-item-visual { display: grid; place-items:center; font-size: 28px; font-weight: 900; color: var(--paper); }
    .grid-item-chip { padding: 6px 8px; border-top: 2px solid var(--ink); display: grid; gap: 2px; background: var(--paper); }
    .grid-item-number { font-size: 10px; font-weight: 900; letter-spacing: 1px; }
    .grid-item-name { font-size: 9px; opacity: .8; letter-spacing: .4px; line-height: 1.2; }
    .grid-placeholder { border: 2px dashed var(--ink); border-radius: 10px; }
    .grid-item-remove { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: var(--paper); border: 2px solid var(--ink); display: grid; place-items:center; cursor: pointer; font-weight: 900; font-size: 12px; border-radius: 6px; }

    /* ——— CHAT PANEL (DIAMOND) ——— */
    .chat-panel { position: fixed; left: 48px; top: 0; bottom: 0; width: 0; border-right: 3px solid var(--ink); background: var(--paper); z-index: 850; overflow: hidden; transition: width .25s ease; display: grid; grid-template-rows: auto 1fr auto; }
    .chat-panel.open{ width: 420px; }
    .chat-header{ background: var(--ink); color: var(--paper); padding: 16px 14px; border-bottom:3px solid var(--ink); display:flex; align-items:center; justify-content:space-between }
    .chat-title{ font-weight:900; letter-spacing:2px; font-size:12px; text-transform:uppercase }
    .chat-thread{ overflow: auto; padding: 12px; display: grid; gap: 8px; }
    .chat-bubble{ background: var(--card); border:2px solid var(--ink); padding:10px; border-radius: 8px; font-size: 13px; line-height:1.45 }
    .chat-bubble.me{ background:#000; color:#fff }
    .chat-input { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 12px; border-top:3px solid var(--ink); background: var(--paper); }
    .chat-input input, .chat-input button{ font-family: inherit; }
    .chat-input input{ padding: 10px; border:2px solid var(--ink); background: var(--card); border-radius:8px; }
    .chat-input button{ padding: 10px 12px; border:2px solid var(--ink); background: var(--ink); color:var(--paper); font-weight:800; border-radius:8px; }

    .chat-mini-profile{ padding:10px 12px; border-bottom:2px solid var(--ink); background:var(--paper); font-size:11px }

    /* ——— SETTINGS PANEL ——— */
    .settings-panel { position: fixed; right: 460px; top: 0; bottom: 0; width: 0; border-left: 3px solid var(--ink); background: var(--paper); z-index: 820; overflow: hidden; transition: width .25s ease; display: grid; grid-template-rows: auto 1fr; }
    .settings-panel.open { width: 360px; }
    .settings-header { background: var(--ink); color: var(--paper); padding: 16px; border-bottom:3px solid var(--ink); font-weight:900; letter-spacing:2px; text-transform:uppercase }
    .settings-body { padding: 12px; overflow: auto; display: grid; gap: 12px; }
    .settings-card{ background: var(--card); border:2px solid var(--ink); border-radius: 8px; padding: 12px; display: grid; gap:8px }
    .settings-card label{ font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase }
    .settings-card input[type="password"]{ width:100%; padding:10px; border:2px solid var(--ink); border-radius: 8px; background:var(--paper) }
    .settings-card button{ padding:8px 10px; border:2px solid var(--ink); background:var(--ink); color:var(--paper); font-weight:800; border-radius: 8px; }
    .settings-note{ font-size: 11px; color:#333 }

    /* ——— PROMPT LAB PANEL ——— */
    .prompt-lab-panel { position: fixed; left: 48px; top: 0; bottom: 0; width: 0; border-right: 3px solid var(--ink); background: var(--paper); z-index: 860; overflow: hidden; transition: width .25s ease; display: grid; grid-template-rows: auto 1fr; }
    .prompt-lab-panel.open { width: 420px; }
    .prompt-lab-header { background: var(--ink); color: var(--paper); padding: 16px; border-bottom:3px solid var(--ink); font-weight:900; letter-spacing:2px; text-transform:uppercase }
    .prompt-lab-body { padding: 12px; overflow-y: auto; display: grid; gap: 12px; }
    .prompt-lab-card { background: var(--card); border:2px solid var(--ink); border-radius: 8px; padding: 12px; display: grid; gap:8px; }
    .prompt-lab-card label { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    .prompt-lab-card textarea { width: 100%; min-height: 100px; padding: 10px; border: 2px solid var(--ink); border-radius: 8px; background: var(--paper); font-family: monospace; font-size: 12px; resize: vertical; }
    .prompt-output { border: 1px dashed var(--ink); padding: 10px; background: #eee; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; border-radius: 8px; min-height: 80px; }
    .prompt-lab-actions { display: flex; gap: 8px; }

    /* ——— COMPLETE OVERLAY ——— */
    .overlay { position: fixed; inset: 0; background: rgba(245,245,245,.98); display: none; flex-direction: column; z-index: 700; border: 3px solid var(--ink); }
    .overlay.active { display: flex; }
    .complete-screen { text-align: center; padding: 40px 24px; display: grid; place-content:center; gap: 24px; }
    .complete-title { font-size: 34px; font-weight: 900; letter-spacing: -.5px; }
    .complete-stats { display: flex; gap: 48px; justify-content:center }
    .complete-stat { display: grid; place-items:center }
    .complete-stat-value { font-size: 44px; font-weight: 900; }
    .complete-stat-label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 6px; letter-spacing: 1px; }
    .complete-actions { display: flex; gap: 10px; justify-content:center }
    .complete-btn { padding: 12px 18px; background: var(--ink); color: var(--paper); border: 3px solid var(--ink); font-size: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border-radius: 10px; }

    /* ——— RESPONSIVE ——— */
    @media (max-width: 840px){
      .collection-panel.open{ width: 100vw }
      .chat-panel.open{ width: 78vw }
      .settings-panel.open{ width: 72vw }
      .prompt-lab-panel.open{ width: 72vw; left: 48px; } /* Ensure it doesn't overlap Alley Menu */
      .grid-view{ grid-template-columns: repeat(3, 1fr) }
      .card{ max-width: 92vw; height: 68vh }
    }
  </style>
</head>
<body>
  <div class="game">
    <!-- Alley Menu -->
    <div class="alley-menu">
      <button class="alley-btn" id="chatBtn" title="Chat / Matches">◊</button>
      <button class="alley-btn" id="collectionBtn" title="Collection">⊞</button>
      <button class="alley-btn" id="promptLabBtn" title="Prompt Lab">∞</button>
      <button class="alley-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>

    <!-- Card Stack -->
    <div class="card-stack" id="cardStack"></div>

    <!-- Chat Panel (Diamond) -->
    <aside class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <div class="chat-title">Matches</div>
        <div style="font-weight:900">◊</div>
      </div>
      <div class="chat-mini-profile" id="chatProfile">No fragment selected.</div>
      <div class="chat-thread" id="chatThread"></div>
      <div class="chat-input">
        <input id="chatInput" placeholder="Say something persuasive…" />
        <button id="chatSend">Send</button>
      </div>
    </aside>

    <!-- Collection Panel (Snap Grid + Reorder) -->
    <aside class="collection-panel" id="collectionPanel">
      <div class="collection-header">
        <div>
          <div class="collection-title">Collection</div>
          <div class="collection-count" id="collectionCount" style="font-size:12px;margin-top:4px;opacity:.75">0</div>
        </div>
        <div class="collection-view-toggle">
          <button class="toggle-btn active" id="toggleList" title="List">≡</button>
          <button class="toggle-btn" id="toggleGrid" title="Grid">⊞</button>
        </div>
      </div>
      <div class="collection-content">
        <div class="list-view" id="listView"></div>
        <div class="grid-view" id="gridView" style="display:none"></div>
      </div>
    </aside>

    <!-- Prompt Lab Panel -->
    <aside class="prompt-lab-panel" id="promptLabPanel">
      <div class="prompt-lab-header">Prompt Lab</div>
      <div class="prompt-lab-body">
        <div class="prompt-lab-card">
          <label for="promptSeedInput">System Prompt Override (or empty for dynamic fragment persona)</label>
          <textarea id="promptSeedInput" placeholder="Enter a custom system prompt to override the default. This allows testing different AI personas/instructions."></textarea>
          <div class="prompt-lab-actions">
            <button id="generatePromptBtn">Generate & Preview Prompt</button>
            <button id="savePromptBtn" disabled style="opacity:.5" title="Saving prompt variants not yet implemented.">Save Variant (Soon)</button>
          </div>
        </div>
        <div class="prompt-lab-card">
          <label>Generated System Prompt (for current fragment or seed)</label>
          <div class="prompt-output" id="generatedPromptDisplay"></div>
        </div>
      </div>
    </aside>

    <!-- Settings Panel -->
    <aside class="settings-panel" id="settingsPanel">
      <div class="settings-header">Settings</div>
      <div class="settings-body">
        <div class="settings-card">
          <label for="apiKey">OpenAI API Key (stored locally)</label>
          <input type="password" id="apiKey" placeholder="sk-…" />
          <button id="saveKey">Save</button>
          <div class="settings-note">We never transmit your key anywhere except directly to OpenAI from your browser. Saved in <code>localStorage</code>. Leave blank to run in offline/sim mode.</div>
        </div>
        <div class="settings-card">
          <label>Export</label>
          <button id="exportEDLBtn">Export EDL</button>
          <button id="exportJSONBtn">Export JSON</button>
        </div>
      </div>
    </aside>

    <!-- Complete Overlay -->
    <div class="overlay" id="completeOverlay">
      <div class="complete-screen">
        <div class="complete-title">Sequence Complete</div>
        <div class="complete-stats">
          <div class="complete-stat">
            <div class="complete-stat-value" id="finalCount">12</div>
            <div class="complete-stat-label">Fragments</div>
          </div>
          <div class="complete-stat">
            <div class="complete-stat-value" id="finalCoherence">85</div>
            <div class="complete-stat-label">Coherence</div>
          </div>
        </div>
        <div class="complete-actions">
          <button class="complete-btn" id="playAgainBtn">Begin Again</button>
          <button class="complete-btn" id="exportFinalBtn">Export</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ————————————————————————————————————————————
    // DATA / CONSTANTS
    // ————————————————————————————————————————————

    // In-memory raw concepts data
    const rawConcepts = [
      { id: 'fom-exhibition-1950s', title: 'Family of Man (Exhibition)', category: 'Media Apparatus', desc: 'A new way of seeing the world, an alternative to the horrors of Nazism and communism.', color: '#C8E6C9', tags: ['Bayer', '1950s', 'Humanism', 'Propaganda', 'Individualism'], quote: 'We are all one world. And at the center of that world is the individual self.', start: 27, end: 53 },
      { id: 'bayer-individual-self', title: 'Individual Self (Central)', category: 'Core Concept', desc: 'At the center of that world is the individual self, making their own story out of photographs.', color: '#AED581', tags: ['Bayer', 'Agency', 'Self-determination'], quote: 'The individual would make their own story out of the photographs.', start: 67, end: 78 }, 
      { id: 'bayer-utopian-vision', title: 'Utopian Vision (Bayer)', category: 'Theory', desc: 'Self selecting and arranging fragments into their own story to withstand tyranny.', color: '#9CCC65', tags: ['Bayer', 'Idealism', 'Resistance'], quote: 'It was a utopian vision of the self selecting and arranging the fragments of images into their own story and so becoming strong enough to withstand tyranny.', start: 91, end: 97 }, 
      { id: 'afeni-harsh-reality', title: 'Harsh Reality (Afeni)', category: 'Systemic Critique', desc: 'The harsh reality of the power that controlled their lives, concealed by an unreal fairy land.', color: '#EF5350', tags: ['Afeni', 'Power', 'Truth', 'Illusion', 'Systemic'], quote: 'What Afeni taught him was that the world most Americans lived in, both white and black, was an unreal fairyland, that concealed the harsh reality of the power that controlled their lives.', start: 183, end: 190 }, 
      { id: 'afeni-fairyland-conceal', title: 'Unreal Fairyland (Afeni)', category: 'Systemic Critique', desc: 'The world most Americans lived in, both white and black, that concealed the harsh reality of power.', color: '#FFCDD2', tags: ['Afeni', 'Illusion', 'Societal Narrative', 'Control'], quote: "We're not being taught to deal with the world as it is. We're being taught to deal with this fairyland, which we're not even living in anymore.", start: 197, end: 204 }, 
      { id: 'tupac-grand-stories', title: 'Grand Stories (Tupac)', category: 'Core Concept', desc: 'Believed deeply in their power to move people and to inspire them to change the world.', color: '#F44336', tags: ['Tupac', 'Revolution', 'Collective Action'], quote: 'He believed deeply in the idea of self-expression. But he was also one of the few in the 1980s who still believed in the power of grand stories to move people and to inspire them to change the world.', start: 143, end: 148 }, 
      { id: 'civil-rights-promises-broken', title: 'Civil Rights Promises (Broken)', category: 'Systemic Event', desc: 'The idealism of black politics fell away and communities divided into gangs that then turned on each other.', color: '#BDBDBD', tags: ['History', 'Disillusionment', 'Social Decay'], quote: 'By the 1980s, it was clear that the promises of the civil rights movement had not been kept in America and the idealism of black politics fell away and the communities divided into gangs that then turned on each other.', start: 244, end: 251 }, 
      { id: 'society-boom-q', title: 'Societal "Boom" (Repression)', category: 'Systemic Control', desc: 'Society will let you go as far as you want, but as soon as you start asking too many questions, "boom".', color: '#616161', tags: ['Repression', 'Control', 'Censorship'], quote: "Well, society is like that. They'll let you go as far as you want, but as soon as you start asking too many questions and you're ready to change, boom.", start: 230, end: 237 }, 
      { id: 'crack-epidemic-afeni-fall', title: "Crack Epidemic (Afeni's Fall)", category: 'Systemic Event', desc: 'Crack swept through black communities, and Afeni Shakur finally gave up, becoming addicted.', color: '#424242', tags: ['Social Crisis', 'Vulnerability', 'Systemic Impact'], quote: 'Then crack swept through the black communities of America and the famous Shakur finally gave up. She became addicted to crack. Tupac found itself alone.', start: 291, end: 300 }, 
      { id: 'tupac-thug-life-authenticity', title: 'Thug Life (Authenticity)', category: 'Culture/Identity', desc: 'Tupac tried to become more and more part of that world to prove his authenticity, accused of intensifying violence.', color: '#FF7043', tags: ['Tupac', 'Identity', 'Violence', 'Critique'], quote: 'In response, Tupac tried to become more and more part of that world to prove his authenticity. But then the black radicals accused him of getting lost in the character he had created.', start: 971, end: 992 }, 
      { id: 'mass-incarceration-clinton', title: 'Mass Incarceration (Clinton)', category: 'Systemic Control', desc: 'President Clinton brought in tough new crime rules, imprisoning hundreds of thousands of young black men.', color: '#78909C', tags: ['Clinton', 'Injustice', 'Control', 'Politics'], quote: 'Hundreds of thousands of young black men were now imprisoned with no hope of parole, even for minor offenses.', start: 1070, end: 1078 }, 
      { id: 'cultural-fairy-tale-tupac', title: 'Culture as Fairy Tale (Tupac)', category: 'Systemic Critique', desc: 'By moving radical politics into culture, Tupac helped keep anger and dissent sealed off from real politics and power.', color: '#90CAF9', tags: ['Media', 'Illusion', 'Politics', 'Dissent'], quote: 'By moving radical politics into the world of culture, Tupac Shakur had also become part of the fairy tale world because he helped keep the anger and the dissent sealed off from the real world of politics and power.', start: 1099, end: 1113 }, 
      { id: 'saudi-dream-corrupt', title: 'Saudi Dream Society (Corrupt)', category: 'Systemic Critique', desc: 'Billions of dollars from the West created a dreamlike society run by an elite, but also deeply corrupt.', color: '#FFD54F', tags: ['Saudi', 'Wealth', 'Corruption', 'Illusion'], quote: 'This vast wave of money had created a dreamlike society run by an elite where no one paid any tax.', start: 379, end: 384 }, 
      { id: 'zubaydah-diary-fragments', title: "Zubaydah's Diary (Fragments)", category: 'Personal Apparatus', desc: 'A vast collage of memories and feelings, written after shrapnel pierced his skull, leaving his world in fragments.', color: '#BCAAA4', tags: ['Trauma', 'Memory', 'Fragmentation', 'Identity'], quote: 'Then his memories from the past began to come back but in a mass of fragments. Nothing linked them. They made no sense.', start: 1166, end: 1172 }, 
      { id: 'jihad-disintegration-factions', title: 'Jihad Disintegration', category: 'Systemic Event', desc: 'The whole organization of Jihad was disintegrating into rival factions; all ideas of solidarity and collective action had gone.', color: '#90A4AE', tags: ['Disillusionment', 'Conflict', 'Revolution'], start: 1237, end: 1248 }, 
      { id: 'zubaydah-perpetual-now', title: 'Perpetual Now (Zubaydah)', category: 'Emotional State', desc: 'His identity had disintegrated into random memories, trapped in a perpetual now, no way of moving forward.', color: '#424242', tags: ['Existential', 'Fragmentation', 'Nihilism'], quote: 'He wrote how it was as though time had stopped. He was trapped in a perpetual now, haunted by fragments of memory, with no way of moving forward into the future.', start: 1313, end: 1320 }, 
      { id: 'cia-enhanced-interrogation', title: 'CIA Enhanced Interrogation', category: 'Systemic Control', desc: 'Used waterboarding 83 times, smashing, and freezing to reduce Abu Zubaydah to a state of "learned helplessness".', color: '#B71C1C', tags: ['Torture', 'Power', 'Control', 'Psychology', 'Systemic'], quote: 'They would use it to reduce Abu Zubeda back to a state of learned helplessness. They called it enhanced interrogation.', start: 2604, end: 2616 }, 
      { id: 'cia-godzilla-fear', title: 'CIA & Godzilla (Fear Wave)', category: 'Systemic Impact', desc: "Disconnected memories from Zubaydah's brain, including from films like Godzilla, spread fear across America.", color: '#795548', tags: ['Media', 'Propaganda', 'Fear', 'Systemic'], quote: 'Desperate for the torture to stop, Zuba just spewed out all the disconnected memories inside his brain... many of them drawn from the films he had watched, including Godzilla.', start: 2664, end: 2675 }, 
      { id: 'chaos-theory-unpredictable', title: 'Chaos Theory', category: 'Scientific Theory', desc: 'One tiny change in equations could have massive catastrophic consequences which they could never have predicted.', color: '#42A5F5', tags: ['Science', 'Complexity', 'Prediction', 'Limits of Control'], quote: 'One tiny change in their equations could have massive catastrophic consequences which they could never have predicted. It was called chaos theory.', start: 664, end: 669 }, 
      { id: 'complexity-theory-patterns', title: 'Complexity Theory', category: 'Scientific Theory', desc: 'Computers could be used to see hidden underlying patterns and make the chaos manageable (Murray Gell-Mann).', color: '#2196F3', tags: ['Science', 'Patterns', 'Management', 'Control'], quote: 'But in the 1990s... computers could be used to see hidden underlying patterns and make the chaos manageable. This new idea was called complexity theory.', start: 738, end: 751 }, 
      { id: 'gell-mann-underlying-patterns', title: 'Gell-Mann: Underlying Patterns', category: 'Core Concept', desc: 'Believed there were underlying patterns at every level of the universe: particles, thought, societies, languages.', color: '#1976D2', tags: ['Gell-Mann', 'Universal', 'Structure', 'Order'], quote: 'He believed that there were underlying patterns at every level of the universe. Not just in the particles, but in the way people think, in the structure of human societies, and even in the languages they spoke.', start: 766, end: 779 }, 
      { id: 'gazzaniga-multiple-selves', title: 'Gazzaniga: Multiple Selves', category: 'Psychological Theory', desc: 'Inside brains, human beings have all kinds of different selves; conscious mind makes up stories for illusion of control.', color: '#FFB74D', tags: ['Neuroscience', 'Psychology', 'Identity', 'Illusion'], quote: 'Gazanaga argued that really there were multiple selves inside the human brain. Each one taking control at different moments. Normally that is hidden because the one self that is conscious constantly makes up stories to explain what all the other selves are doing.', start: 1450, end: 1478 }, 
      { id: 'hinton-neural-networks', title: 'Hinton: Neural Networks (AI)', category: 'Technological Apparatus', desc: 'AI learns from mass data, looks for connections/patterns, completely ignores all human stories and meaning.', color: '#00BCD4', tags: ['AI', 'Data', 'Pattern Recognition', 'Algorithms'], quote: "Hinton's neural networks were a kind of intelligence that completely ignored all stories.", start: 3595, end: 3606 }, 
      { id: 'hinton-vector-world-myth', title: 'Vector World (AI Mythology)', category: 'Core Concept', desc: 'The world is too complicated for us as human beings to understand, but nothing is too complicated for the machines and data.', color: '#0097A7', tags: ['AI', 'Mythology', 'Control', 'Dehumanization'], quote: 'He called it vector world. It expressed what was becoming one of the most powerful mythologies of our age... that the world is too complicated for us as human beings to understand. But nothing is too complicated for the machines and the data.', start: 3628, end: 3652 }, 
      { id: 'google-mission-idealism', title: 'Google (Early Mission)', category: 'Organizational Idealism', desc: "To make the world's information accessible and useful, providing instant access to any information anybody ever wants.", color: '#8BC34A', tags: ['Google', 'Information', 'Idealism', 'Technology'], quote: 'At Google, our mission is to make the world\'s information accessible and useful... My hope is to provide instant access to any information anybody ever wants in the future.', start: 1739, end: 1770 }, 
      { id: 'dot-com-burst-money-power', title: 'Dot-Com Bust (Money Power)', category: 'Economic Event', desc: 'The crash meant Google met the power of money, which was going to reshape their aims completely by venture capitalists.', color: '#BCAAA4', tags: ['Economy', 'Crisis', 'Corporate Control'], quote: 'Google managed to survive, but the crash meant that they met the power of money, which was going to reshape their aims completely.', start: 2210, end: 2215 }, 
      { id: 'google-data-trails-predict', title: 'Google (Data Trails & Predict)', category: 'Technological Apparatus', desc: 'Engineers realized they could build a picture of how every individual behaved to predict what advertisements they would click.', color: '#689F38', tags: ['Google', 'Data', 'Prediction', 'Surveillance'], quote: 'Every time someone searched the web, they left trails behind them... they could build up a picture of how every individual behaved and how they were likely to behave in the future. It meant they could predict what advertisement an individual would click on', start: 2254, end: 2269 }, 
      { id: '911-patriot-act-privacy-lost', title: '9/11 & Patriot Act (Privacy Lost)', category: 'Systemic Event', desc: "Everyone's personal data must be open to examination to stop further attacks; privacy became irrelevant.", color: '#D32F2F', tags: ['Security', 'Privacy', 'State Control', 'Systemic'], quote: 'Privacy of the individual now became irrelevant in the face of a much higher need, security.', start: 2347, end: 2353 }, 
      { id: 'google-sidelining-consciousness', title: 'Google (Sidelining Consciousness)', category: 'Systemic Impact', desc: 'Taking people\'s data to predict what they would do, what they thought or felt as individuals was completely eradicated.', color: '#AFB42B', tags: ['Google', 'Dehumanization', 'Control', 'Data'], quote: "What Google were now doing was taking people's data and using it to predict what those individuals would do... What they thought or felt as individuals and the stories they told themselves was completely iraded. Consciousness was being sidelined even more.", start: 2402, end: 2425 }, 
      { id: 'data-gold-rush-surveillance', title: 'Data Gold Rush (Surveillance)', category: 'Economic Apparatus', desc: 'Products (Roomba, We Vibe, Kayla doll, Pokémon Go) set up to mine traces of human behavior everywhere.', color: '#FFD700', tags: ['Surveillance Capitalism', 'Privacy', 'Commercial'], quote: 'Products of more and more companies around the world were set up to mine all the traces of human behavior everywhere.', start: 3691, end: 3698 }, 
      { id: 'pokemon-go-persuasive', title: 'Pokémon Go (Persuasive Gaming)', category: 'Technological Apparatus', desc: 'An experiment to see if you could move mass groups of people around to where you wanted them to monetize checkpoints.', color: '#FFEB3B', tags: ['Gaming', 'Behavioral Control', 'Monetization'], quote: 'Pokémon, she said, is about herding people to monetize checkpoints without them being fully aware of it.', start: 3789, end: 3795 }, 
      { id: 'algorithmic-mortgages-broken', title: 'Algorithmic Mortgages (Broken)', category: 'Systemic Apparatus', desc: 'Computers cut up dangerous high-risk loans and recombined them; the connection of debts to human reality was broken.', color: '#90A4AE', tags: ['Finance', 'Abstraction', 'Crisis', 'Systemic'], quote: 'The computers cut up the dangerous high-risk loans and recombined them with other safer loans... the connection of the debts to human reality was broken.', start: 4049, end: 4062 }, 
      { id: 'china-algorithmic-governance', title: 'China (Algorithmic Governance)', category: 'Systemic Control', desc: 'Adjusting behavior with "social credits" for rewards/penalties, forcibly reprogram if unresponsive (Xinjiang).', color: '#4169E1', tags: ['China', 'Surveillance State', 'Social Control', 'BF Skinner'], quote: 'And if the data from all the different sources showed a person behaving well... then they would be given what were called social credits.', start: 5315, end: 5329 }, 
      { id: 'skinner-operant-conditioning', title: 'Skinner (Operant Conditioning)', category: 'Psychological Theory', desc: 'Easily alter behavior of animals using simple rewards, leading to a "beyond freedom and dignity" utopia (Walden Two).', color: '#1E88E5', tags: ['Behaviorism', 'Control', 'Utopia', 'China'], quote: 'Skinner had shown how he could easily alter the behavior of animals like pigeons by using a simple system of rewards. He called it operant conditioning.', start: 5356, end: 5369 }, 
      { id: 'skinner-walden2', title: 'Walden 2 Utopia', category: 'Concept', desc: 'Utopia where human behavior is controlled through operant conditioning, freeing society from dangerous and irrational impulses.', color: '#87CEEB', tags: ['Utopia', 'Control', 'Prediction', 'BF Skinner'], quote: 'Skinner wrote a novel called Walden 2 that described a future utopia where all human behavior would be controlled through this kind of operant conditioning.', start: 5410, end: 5422 }, 
      { id: 'russia-oligarchs-putin-rise', title: "Russia (Oligarchic Control)", category: 'Systemic Event', desc: 'Oligarchs looted the country and selected Vladimir Putin, a man who believed in nothing, to protect their power.', color: '#607D8B', tags: ['Russia', 'Corruption', 'Power Elite'], quote: 'In 1999, the oligarchs decided to select Russia\'s next president... And they selected Vladimir Putin... a man who believed in nothing.', start: 1905, end: 1926 }, 
      { id: 'kursk-disaster-anger-power', title: "Kursk Disaster (Putin's Power)", category: 'Systemic Event', desc: 'Putin turned public anger away from himself and towards the corrupt elites in Moscow, the oligarchs, discovering a new source of power.', color: '#455A64', tags: ['Putin', 'Populism', 'Crisis Management'], quote: 'What Putin then did to save himself was turn that anger away from himself and towards the very people who had put him in power.', start: 2053, end: 2062 }, 
      { id: 'putin-no-logic-strategy', title: 'Putin (No Logic/Strategy)', category: 'Leadership Critique', desc: 'Everything is a tactical step, a real-time response to external stimuli devoid of any ultimate objective (Mikhail Zygar).', color: '#37474F', tags: ['Putin', 'Nihilism', 'Post-Truth'], quote: 'The Russian journalist Mikuel Zygar wrote, "There is no logic in the age of Putin. There is no plan or strategy. Everything that happens... is a tactical step... devoid of any ultimate objective."', start: 2126, end: 2147 }, 
      { id: 'putin-eurasia-defense', title: 'Putin (Eurasia as Defense)', category: 'Political Ideology', desc: 'Summoned a dark, frightening vision of Russia (Eurasia) as the last defense against a corrupt West, promoting Russian exceptionalism.', color: '#D32F2F', tags: ['Putin', 'Nationalism', 'Geopolitics', 'Propaganda'], quote: 'He summoned up a dark, frightening vision from Russia\'s past. It said that Russia as a whole, what was called Eurasia, was the last defense against a corrupt West that was trying to take over the whole world.', start: 4809, end: 4827 }, 
      { id: 'nightwolves-conspiracy-propaganda', title: 'Nightwolves (Conspiracy Drama)', category: 'Culture/Propaganda', desc: 'Extreme nationalist motorcycle club dramatized a paranoid conspiracy that America/Illuminati were planning to undermine Putin and destroy Russia.', color: '#E53935', tags: ['Russia', 'Conspiracy', 'Nationalism'], quote: 'The Nightwolves put on mass shows that dramatized the paranoid conspiracy theory that America... were planning to undermine Vladimir Putin and destroy Russia.', start: 4893, end: 4907 }, 
      { id: 'russia-dream-consumption', title: 'Russia (Dream World of Consumption)', category: 'Systemic Critique', desc: 'The country rode through the first decade of the 21st century in a state of semi-oblivion, in a dream world of consumption.', color: '#BBDEFB', tags: ['Social Decay', 'Illusion', 'Economy'], quote: 'The country, he said, rode through the first decade of the 21st century in a state of semi-oblivion, in a dream world of consumption.', start: 3611, end: 3618 }, 
      { id: 'london-second-empire-discretion', title: 'London (Second Empire of Secrecy)', category: 'Systemic Apparatus', desc: "City's 'discretion in the market' turned into a force shield, hiding hundreds of billions of illegal fortunes, making the world seem bewilderingly complicated.", color: '#757575', tags: ['Finance', 'Corruption', 'Offshore', 'Globalization'], quote: 'Now, the discretion that the city was still so proud of had in reality turned into a force shield. It stopped any proper investigation of what was really going on.', start: 5013, end: 5019 }, 
      { id: 'china-princelings-void', title: "China (Princelings' Ideological Void)", category: 'Systemic Event', desc: 'Children of the Cultural Revolution in power; money filled the void of any guiding ideology, dissolving social bonds.', color: '#FF5722', tags: ['China', 'Elite', 'Corruption', 'Ideological Vacuum'], quote: 'What had been buried and forgotten was any guiding ideology, any confident story about what this was all for. Instead, money had filled the void...', start: 3011, end: 3023 }, 
      { id: 'china-land-grab-corruption', title: 'China (Massive Land Grab)', category: 'Systemic Event', desc: 'Organized gangs were forcing farmers out of their houses at gunpoint and seizing their land.', color: '#F4511E', tags: ['Corruption', 'Injustice', 'Economy', 'Systemic'], quote: 'Organized gangs were forcing farmers out of their houses at gunpoint and seizing their land.', start: 3043, end: 3050 }, 
      { id: 'bo-chongqing-experiment', title: 'Bo Xilai (Chongqing Experiment)', category: 'Political Project', desc: 'Used the city as a laboratory to reawaken past idealism with Mao songs and tackle inequality, later exposed as a corruption smokescreen.', color: '#A1887F', tags: ['Bo Xilai', 'Populism', 'Hypocrisy'], quote: 'Bor soon became famous and he was seen as a future leader.', start: 3261, end: 3267 }, 
      { id: 'xi-jinping-giant-control', title: 'Xi Jinping (Giant Control System)', category: 'Political Project', desc: 'Decided to turn China into a giant system in which everyone\'s behavior could be predicted, managed, and controlled.', color: '#1A237E', tags: ['China', 'Totalitarian', 'Surveillance', 'Control'], start: 5296, end: 5301 }, 
      { id: 'conspiracy-theories-human-ai', title: 'Conspiracy Theories (Human AI)', category: 'Social Phenomenon', desc: 'Humans spent vast amounts of time searching online data for patterns like AI, turning them into fantastic, elaborate stories.', color: '#7E57C2', tags: ['Social', 'Fragmentation', 'Narrative', 'Post-Truth'], quote: 'But then it got more complicated because human beings were also exposed to the avalanche of data online and they started to behave in very much the same way as Jeffrey Hinton\'s artificial intelligence machines.', start: 4129, end: 4161 }, 
      { id: 'illuminati-mind-control', title: 'Illuminati (Mind Control Theory)', category: 'Conspiracy Theory', desc: 'Millions convinced major stars were manipulated by Illuminati via MK Ultra/Disney, with hidden messages and triangles in videos.', color: '#5E35B1', tags: ['Conspiracy', 'Media', 'Control', 'Paranoia'], quote: 'Millions of people became convinced that all the major stars, from Britney Spears to Beyonce, were being manipulated and controlled by the Illuminati. The theory said that the Illuminati had worked with the CIA and their MK Ultra project and with Walt Disney to create a new system of mind control.', start: 4216, end: 4221 }, 
      { id: 'thornley-op-mindfuck', title: 'Operation Mindfuck (Thornley)', category: 'Theory/Action', desc: 'Spread Illuminati theory to parody/ridicule conspiracy theories, believing they undermined individual confidence.', color: '#9575CD', tags: ['Parody', 'Manipulation', 'Subversion'], quote: 'They had spread the conspiracy theory that the Illuminati were really the secret rulers of the world. They had done it to parody and ridicule all conspiracy theories because they thought that they undermined the confidence of individuals and made them easier to control.', start: 4182, end: 4196 }, 
      { id: '2008-global-economic-crash', title: '2008 Global Economic Crash', category: 'Systemic Event', desc: 'Mortgage systems failed completely, leading to global crash; governments transferred private debt to public, leading to austerity.', color: '#E57373', tags: ['Economy', 'Crisis', 'Inequality', 'Systemic'], quote: 'In 2008, the systems in the banks that had structured the mortgage loans failed completely. It led to a global economic crash.', start: 4329, end: 4336 }, 
      { id: 'banks-rigging-money-laundering', title: 'Banks (Rigging/Laundering)', category: 'Systemic Corruption', desc: 'Major banks rigged interest rates and laundered money for organized crime, but "nothing seemed to change".', color: '#E53935', tags: ['Corruption', 'Finance', 'Impunity'], quote: 'That all the major banks had been rigging interest rates and many of them had been laundering money for organized crime, including the drug cartels in Mexico. But again, nothing seemed to change.', start: 4370, end: 4378 }, 
      { id: 'populist-anger-elite-bailout', title: 'Populist Anger (Elite Bailout)', category: 'Political Phenomenon', desc: 'The party of Davos, the scientific, engineering, managerial, financial, cultural elite bail themselves out. (Populist critique).', color: '#F44336', tags: ['Politics', 'Resistance', 'Inequality'], quote: 'The party of Davos, the scientific, engineering, managerial, financial, cultural elite bail themselves out.', start: 4415, end: 4422 }, 
      { id: 'brexit-take-back-control', title: 'Brexit (Take Back Control)', category: 'Political Project', desc: 'For Dominic Cummings, a way to get rid of failed elites and old political systems, transforming a decaying society.', color: '#EF5350', tags: ['Populism', 'Nationalism', 'Disenchantment'], quote: 'For Dominic Cummings, Brexit was not an end in itself. For him, it was a way of getting rid of the failed elites and the old political systems that ran Britain.', start: 4476, end: 4488 }, 
      { id: 'trump-qanon-pedophile-cabal', title: 'Trump & QAnon', category: 'Political Phenomenon', desc: 'Paranoia allowed Trump to hide corruption; QAnon explained nothing happening via a "secret cabal of pedophiles in Washington".', color: '#B71C1C', tags: ['Politics', 'Conspiracy', 'Post-Truth'], quote: 'His supporters, though, had their own conspiracy theory, QAnon, that explained why nothing was happening. Trump was being stopped by a secret cabal of pedophiles in Washington.', start: 6093, end: 6105 }, 
      { id: 'liberal-avoidance-despair', title: 'Liberal Avoidance (Despair)', category: 'Critique', desc: 'Liberals avoided facing genuine grievances and real anger, having no idea how to solve problems of desolation/despair.', color: '#BBDEFB', tags: ['Politics', 'Elite Disconnect', 'Failure'], quote: 'But the liberal opposition, it was a way of avoiding facing up to the genuine grievances and the very real anger in America that Trump\'s election had revealed.', start: 6143, end: 6152 }, 
      { id: 'fragile-structure-discon-frag', title: 'Fragile Structure (Disconnected Fragments)', category: 'Systemic Vulnerability', desc: 'Groups clinging to power protected themselves behind this brittle shell of conspiracy theories built out of disconnected fragments. But it was a very fragile structure.', color: '#9E9E9E', tags: ['Illusion', 'Vulnerability', 'Post-Truth'], quote: 'Groups clinging to power protected themselves behind this brittle shell of conspiracy theories built out of disconnected fragments. But it was a very fragile structure.', start: 6164, end: 6183 }, 
      { id: 'ai-dogs-everywhere-meaningless', title: 'AI (Dogs Everywhere)', category: 'Technological Impact', desc: 'Google engineers demonstrated AI altering reality, seeing dogs everywhere; a world where anything could be anything, because there was no real meaning any longer.', color: '#4FC3F7', tags: ['AI', 'Perception', 'Illusion', 'Meaninglessness'], quote: 'Google engineers demonstrated how easily reality in this fragmented world could become strange and frightening. They created an AI program to learn how to see dogs. But they then showed how if they ran the algorithm backwards, the machines would alter the images of reality they were being fed, so they would see dogs everywhere.', start: 6193, end: 6210 }, 
      { id: 'covid-deep-inequalities', title: 'COVID-19 (Deep Inequalities)', category: 'Global Crisis', desc: 'The virus, a force completely outside systems of power, brought into focus how deep inequalities in modern Western societies have gone.', color: '#7E57C2', tags: ['Crisis', 'Social', 'Systemic', 'Vulnerability'], quote: 'The virus was a force that came from completely outside the systems of power. But it has come at a moment when many of the old certainties of this age are already cracking.', start: 6364, end: 6371 }, 
      { id: 'future-indiv-disappear', title: 'Future (Individualism Disappears)', category: 'Future Scenario', desc: 'Data used to predict/manage human behavior like BF Skinner predicted; individualism would be just a brief moment in history.', color: '#5C6BC0', tags: ['Dystopia', 'Control', 'BF Skinner'], quote: 'Data will be gathered and used on a massive scale to predict and manage all human behavior in the way that the psychologist BF Skinner predicted. He said that individualism would be just a brief moment in history before science would find a way to manage and control everyone.', start: 6421, end: 6432 }, 
      { id: 'future-old-stability', title: 'Future (Return to Old Stability)', category: 'Future Scenario', desc: 'Hope for return to an old stability where individualism can continue to be managed by a benign elite, but enormous pressures will not go away.', color: '#9FA8DA', tags: ['Nostalgia', 'Illusion', 'Unresolved Conflict'], quote: 'Many people are hoping that with the election of Joe Biden in America, it will be possible to return to an old stability where individualism can continue to be managed by a benign elite. But although Donald Trump is gone and the Brexit deal done, what they both revealed was that underneath Western societies, there are enormous pressures building up that will not go away.', start: 6490, end: 6509 }, 
      { id: 'future-imagine-new', title: 'Future (Imagine New)', category: 'Future Scenario', desc: 'Regain confidence, imagine genuinely new kinds of futures (David Graeber: "the world is something we make and could just as easily make differently").', color: '#66BB6A', tags: ['Hope', 'Agency', 'Transformation'], quote: 'If we can regain our confidence, we will find that we have the power to influence how that future turns out. And as a first step, we have to start imagining what kind of future it is we want to build.', start: 6603, end: 6609 }, 
      { id: 'graeber-world-we-make', title: 'Graeber (World We Make)', category: 'Core Concept', desc: 'The ultimate hidden truth of the world, he wrote, is that it is something we make and could just as easily make differently.', color: '#4CAF50', tags: ['Graeber', 'Agency', 'Liberation', 'Potential'], quote: 'The ultimate hidden truth of the world, he wrote, is that it is something we make and could just as easily make differently.', start: 6678, end: 6690 }

    function toast(message) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 15px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:.5px;z-index:9999;opacity:0;transition:opacity .3s ease, transform .3s ease';
        t.textContent = message;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(-10px)'; }, 10);
        setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(10px)'; }, 2800);
        setTimeout(() => t.remove(), 3200);
    }

    function download(filename, text, mimeType){
      const element = document.createElement('a');
      element.setAttribute('href', `data:${mimeType};charset=utf-8,${encodeURIComponent(text)}`);
      element.setAttribute('download', filename);
      element.style.display = 'none';
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    }


    // ————————————————————————————————————————————
    // BUILD DECK FROM RAW CONCEPTS
    // ————————————————————————————————————————————
    function initializeDeckAndUI(){
        buildDeck();
        updateCollection();
    }
    initializeDeckAndUI(); // Call this once the script loads

    function buildDeck(){
      deck = [...rawConcepts].sort(()=> Math.random() - .5);
      showNextCard();
    }

    // ————————————————————————————————————————————
    // CARD RENDER + SWIPE + INLINE VIDEO
    // ————————————————————————————————————————————
    function showNextCard(){
      if (story.length >= 12 || deck.length === 0){ showComplete(); return; }
      const fragment = deck.pop();
      if (!fragment || !fragment.id) {
          console.error("Fragment missing ID:", fragment);
          return showNextCard(); // Skip this fragment
      }
      if (swipedCards.has(fragment.id)){ showNextCard(); return; } // Skip already swiped cards
      currentCard = fragment;
      renderCard(fragment);
    }

    function buildEmbed(c){
      const videoId = 'BQ2n6SN7gOY'; // Default YouTube video ID
      const start = Math.floor(c.start || 0);
      const end = Math.floor(c.end || start + 30); // Default 30s if end not specified
      return `https://www.youtube.com/embed/${videoId}?start=${start}&end=${end}&playsinline=1&autoplay=1&mute=0&rel=0&modestbranding=1`;
    }

    function renderCard(fragment){
      const stack = document.getElementById('cardStack');
      const color = getColor(fragment.category);
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="card-header" style="background:${color}">
          <div class="card-category">${fragment.category || 'Concept'}</div>
          <div>${fragment.title || 'Untitled Fragment'}</div>
        </div>
        <div class="card-body">
          <div class="card-desc">${fragment.desc || 'A fascinating idea awaits your interpretation.'}</div>
          ${fragment.quote ? `<div class="card-quote">"${fragment.quote}"</div>` : ''}
          ${fragment.tags && fragment.tags.length > 0 ? `<div class="card-tags">${fragment.tags.join(' · ')}</div>` : ''}
          <div class="card-time">${fmt(fragment.start || 0)} – ${fmt(fragment.end || (fragment.start || 0) + 30)}</div>
          <div class="inline-player"><iframe src="${buildEmbed(fragment)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>
        </div>
        <div class="card-controls">
          <button class="control-btn" data-act="accept">Collect</button>
          <button class="control-btn ghost" data-act="chat">Chat</button>
        </div>
        <div class="swipe-guide left">←</div>
        <div class="swipe-guide right">→</div>
        <div class="swipe-guide up">↑</div>
        <div class="swipe-guide down">↓</div>
      `;
      stack.querySelectorAll('.card').forEach(c=>c.remove());
      stack.appendChild(el);

      // Controls
      el.querySelector('[data-act="accept"]').addEventListener('click', (e)=>{ e.stopPropagation(); swipeRight(fragment) });
      el.querySelector('[data-act="chat"]').addEventListener('click', (e)=>{ e.stopPropagation(); openChatFor(fragment) });

      setupCardInteraction(el, fragment);
    }

    function setupCardInteraction(card, fragment){
      const onStart = (e)=>{ isDragging = true; card.classList.add('swiping'); const t = e.touches ? e.touches[0] : e; startX = t.clientX; startY = t.clientY; };
      const onMove  = (e)=>{ if(!isDragging) return; e.preventDefault(); const t = e.touches ? e.touches[0] : e; currentX = t.clientX - startX; currentY = t.clientY - startY; const angle = currentX * 0.03; card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${angle}deg)`; const g = card.querySelectorAll('.swipe-guide'); g.forEach(x=>x.style.opacity='0'); if (Math.abs(currentX) > Math.abs(currentY)) { if (currentX>50) card.querySelector('.swipe-guide.right').style.opacity = Math.min(currentX/150,1); else if (currentX<-50) card.querySelector('.swipe-guide.left').style.opacity = Math.min(Math.abs(currentX)/150,1); } else { if (currentY<-50) card.querySelector('.swipe-guide.up').style.opacity = Math.min(Math.abs(currentY)/150,1); else if (currentY>50) card.querySelector('.swipe-guide.down').style.opacity = Math.min(currentY/150,1); } };
      const onEnd   = ()=>{ if(!isDragging) return; isDragging=false; card.classList.remove('swiping'); const threshold=80; if (Math.abs(currentX) > Math.abs(currentY)) { if (currentX>threshold) swipeRight(fragment); else if (currentX<-threshold) swipeLeft(fragment); else resetCard(card); } else { if (currentY<-threshold) swipeUp(fragment); else if (currentY>threshold) swipeDown(fragment); else resetCard(card); } currentX=0; currentY=0; };
      card.addEventListener('touchstart', onStart, {passive:false});
      card.addEventListener('touchmove',  onMove,  {passive:false});
      card.addEventListener('touchend',   onEnd);
      card.addEventListener('mousedown',  onStart);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onEnd);
    }

    function resetCard(card){ card.style.transform=''; card.querySelectorAll('.swipe-guide').forEach(el=>el.style.opacity='0'); }

    function createFlash(type){ const flash = document.createElement('div'); flash.className = `swipe-flash ${type}`; document.body.appendChild(flash); setTimeout(()=>flash.remove(), 500); }

    // Minimal swipe sounds using WebAudio (silent-fail)
    let audioContext = null; const getAudioContext = ()=>{ if(!audioContext) audioContext = new (window.AudioContext||window.webkitAudioContext)(); return audioContext; }
    function playSwipeSound(type){ try{ const ctx=getAudioContext(); const now=ctx.currentTime; const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); const env=(t,f1,f2,d)=>{ o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(f2,t+d); g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.01,t+d); o.start(t); o.stop(t+d); }; if(type==='accept') env(now,800,1200,.15); else if(type==='reject') env(now,400,220,.18); else if(type==='info') env(now,600,900,.10); else if(type==='predict') env(now,520,640,.12); }catch(e){} }

    // Swipe actions
    function swipeRight(fragment){ createFlash('accept'); playSwipeSound('accept'); story.push(fragment); swipedCards.add(fragment.id); animateCardOut('right'); setTimeout(showNextCard, 250); updateCollection(); addMatch(fragment); }
    function swipeLeft(fragment){  createFlash('reject'); playSwipeSound('reject'); swipedCards.add(fragment.id); animateCardOut('left');  setTimeout(showNextCard, 250); }
    function swipeUp(fragment){    createFlash('info');   playSwipeSound('info');   showTransclusions(fragment); setTimeout(()=>{ const c=document.querySelector('.card'); if(c) resetCard(c); }, 90); }
    function swipeDown(fragment){  createFlash('predict');playSwipeSound('predict'); showPredictions(fragment);   setTimeout(()=>{ const c=document.querySelector('.card'); if(c) resetCard(c); }, 90); }

    function animateCardOut(direction){ const card=document.querySelector('.card'); if(!card) return; const distance=window.innerWidth; const x = (direction==='right'? distance : direction==='left' ? -distance : 0); const y = (direction==='up' ? -distance : direction==='down' ? distance : 0); card.style.transition='transform .25s ease, opacity .25s ease'; card.style.transform=`translate(${x}px, ${y}px) rotate(${x*.1}deg)`; card.style.opacity='0'; }

    // ————————————————————————————————————————————
    // COLLECTION (LIST/GRID) with REORDER + SNAP
    // ————————————————————————————————————————————
    function updateCollection(){
      document.getElementById('collectionCount').textContent = story.length;
      renderList();
      renderGrid();
    }

    // LIST view: HTML5 drag & drop
    function renderList(){
      const list=document.getElementById('listView');
      list.innerHTML = story.map((frag, idx)=>{
        const chatData = getChatData(frag);
        const decisionStatus = chatData.decision ? `<span class="chat-decision-status ${chatData.decision}">${chatData.decision}</span>` : '';
        return `
          <div class="list-item" draggable="true" data-idx="${idx}">
            <div class="list-item-preview" style="background:${getColor(frag.category || 'Concept')}">${idx+1}</div>
            <div class="list-item-info">
              <div class="list-item-title">${frag.title || 'Untitled Fragment'} ${decisionStatus}</div>
              <div class="list-item-meta">${frag.category || 'Concept'} · ${fmt(frag.start || 0)}–${fmt(frag.end || (frag.start || 0) + 30)}</div>
            </div>
            <div class="list-item-actions">
              <button class="list-action-btn" data-action="watch" data-idx="${idx}">Watch</button>
              <button class="list-action-btn ghost" data-action="chat" data-idx="${idx}">Chat</button>
              <button class="list-action-btn" data-action="remove" data-idx="${idx}">×</button>
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('[data-action="watch"]').forEach(btn=> btn.addEventListener('click', ()=> openInlineInCollection(parseInt(btn.dataset.idx)) ));
      list.querySelectorAll('[data-action="chat"]').forEach(btn=> btn.addEventListener('click', ()=> openChatFor(story[parseInt(btn.dataset.idx)]) ));
      list.querySelectorAll('[data-action="remove"]').forEach(btn=> btn.addEventListener('click', ()=> { const i=parseInt(btn.dataset.idx); story.splice(i,1); updateCollection(); }));

      // DnD reordering
      let dragIndex=null;
      list.querySelectorAll('.list-item').forEach(row=>{
        row.addEventListener('dragstart', e=>{ row.classList.add('dragging'); dragIndex = +row.dataset.idx; e.dataTransfer.effectAllowed='move'; });
        row.addEventListener('dragend',   ()=>{ row.classList.remove('dragging'); dragIndex=null; renderList(); renderGrid(); });
        row.addEventListener('dragover', e=>{
          e.preventDefault();
          const over=row; const overIdx=+over.dataset.idx;
          if (dragIndex===null || dragIndex===overIdx) return;
          // swap positions in story array
          const item = story.splice(dragIndex,1)[0];
          story.splice(overIdx,0,item);
          dragIndex = overIdx;
          renderList(); // live update for snapping feel
        });
      });
    }

    // GRID view: DOM order == visual order; placeholder snapping
    function renderGrid(){
      const grid=document.getElementById('gridView');
      grid.innerHTML = '';
      story.forEach((frag, idx)=>{
        const chatData = getChatData(frag);
        const decisionStatus = chatData.decision ? `<span class="chat-decision-status ${chatData.decision}">${chatData.decision}</span>` : '';
        const tile=document.createElement('div');
        tile.className='grid-item';
        tile.setAttribute('draggable','true');
        tile.dataset.idx=idx;
        tile.innerHTML=`
          <div class="grid-item-visual" style="background:${getColor(frag.category || 'Concept')}">${idx+1}<div class="grid-item-remove" title="Remove" data-idx="${idx}">×</div></div>
          <div class="grid-item-chip">
            <div class="grid-item-number">ITEM ${idx+1}</div>
            <div class="grid-item-name">${(frag.title || 'Untitled Fragment').substring(0,20)} ${decisionStatus}</div>
          </div>`;
        grid.appendChild(tile);
      });

      grid.querySelectorAll('.grid-item-remove').forEach(btn=> btn.addEventListener('click', ()=>{ const i=+btn.dataset.idx; story.splice(i,1); updateCollection(); }));

      // DnD for grid (snap by DOM insertion)
      let draggingEl=null; let dragIdx=null;
      grid.querySelectorAll('.grid-item').forEach(tile=>{
        tile.addEventListener('dragstart', e=>{ draggingEl=tile; dragIdx=+tile.dataset.idx; tile.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
        tile.addEventListener('dragend',   ()=>{ if(draggingEl) draggingEl.classList.remove('dragging'); draggingEl=null; dragIdx=null; renderGrid(); renderList(); });
        tile.addEventListener('dragover', e=>{
          e.preventDefault();
          const over=tile; const overIdx=+over.dataset.idx;
          if (dragIdx===null || dragIdx===overIdx) return;
          const item = story.splice(dragIdx,1)[0];
          story.splice(overIdx,0,item);
          dragIdx = overIdx;
          renderGrid(); // re-render for visual snap
        });
      });
    }

    function openInlineInCollection(idx){
      const frag = story[idx];
      openChatFor(frag); // Focus chat panel on this fragment
    }

    // ————————————————————————————————————————————
    // TRANSCLUSIONS + PREDICTIONS (unchanged minimal)
    // ————————————————————————————————————————————
    function showTransclusions(fragment){
      const similar = rawConcepts.filter(c => 
        c.id !== fragment.id && 
        (c.category === fragment.category || 
         c.tags?.some(tag => fragment.tags?.includes(tag))));
      
      const text = similar.length 
        ? `Similar Fragments:\n${similar.map(t=>`• ${t.title} (${t.category})`).join('\n')}` 
        : 'No similar fragments found.';
      toast(text);
    }

    function showPredictions(fragment){
      const shuffled = [...rawConcepts].filter(c => c.id !== fragment.id).sort(() => Math.random() - 0.5);
      const predictions = shuffled.slice(0, 3); // Top 3 random predictions

      const text = predictions.length 
        ? `Potential Next Fragments:\n${predictions.map(p=>`• ${p.title} (${p.category})`).join('\n')}` 
        : 'No predictions available.';
      toast(text);
    }

    // ————————————————————————————————————————————
    // CHAT / MATCHES (DIAMOND)
    // ————————————————————————————————————————————
    const chatBtn = document.getElementById('chatBtn');
    const chatPanel = document.getElementById('chatPanel');
    const chatThread = document.getElementById('chatThread');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const chatProfile = document.getElementById('chatProfile');

    chatBtn.addEventListener('click', ()=>{ chatPanel.classList.toggle('open'); chatBtn.classList.toggle('active'); });

    function addMatch(fragment){
      openChatFor(fragment);
      // Initial system message to prompt persuasion
      pushChat(fragment, 'sys', `You've collected me, "${fragment.title || 'this fragment'}". Now, persuade me to fully join your film. I will decide after 5 turns of conversation if your vision aligns with my essence.`);
    }

    function openChatFor(fragment){
      currentFragmentForChat = fragment;
      chatPanel.classList.add('open'); chatBtn.classList.add('active');
      const chatData = getChatData(fragment);
      const decisionStatusText = chatData.decision ? ` — ${chatData.decision}` : '';
      chatProfile.innerHTML = `<strong>${fragment.title || 'Untitled Fragment'}</strong>${decisionStatusText}<br><span style="opacity:.7">${fragment.category || 'Concept'} · ${fmt(fragment.start || 0)}–${fmt(fragment.end || (fragment.start || 0) + 30)}</span>`;
      renderChatThread();
    }

    function threadKey(f){ return f ? `frag:${f.id}` : 'frag:none'; }

    function getChatData(fragment) {
      const key = threadKey(fragment);
      let chats = store.chats;
      if (!chats[key]) {
        chats[key] = { messages: [], turnCount: 0, decision: null };
        store.chats = chats; // Save the updated chats object
      }
      return chats[key];
    }

    function renderChatThread(){
      const chatData = getChatData(currentFragmentForChat);
      chatThread.innerHTML = chatData.messages.map(m=>`<div class="chat-bubble ${m.role==='user'?'me':''}">${escapeHtml(m.content)}</div>`).join('');
      chatThread.scrollTop = chatThread.scrollHeight;

      // Disable input if a decision has been made
      const isDisabled = chatData.decision !== null;
      chatInput.disabled = isDisabled;
      chatSend.disabled = isDisabled;
      chatInput.placeholder = isDisabled ? `This fragment has ${chatData.decision.toLowerCase()}.` : "Say something persuasive…";
    }

    function pushChat(fragment, role, content){
      const chatData = getChatData(fragment);
      chatData.messages.push({ role, content, ts: Date.now() });
      if (role === 'user') { // Increment turnCount only for user messages
        chatData.turnCount++;
      }
      store.chats = { ...store.chats, [threadKey(fragment)]: chatData }; // Update storage with the modified chatData
      renderChatThread();
      updateCollection(); // Re-render collection to show decision status
    }

    chatSend.addEventListener('click', handleSend);
    chatInput.addEventListener('keydown', e=>{ if(e.key==='Enter') handleSend(); });

    async function handleSend(){
      const content = chatInput.value.trim(); 
      if(!content || !currentFragmentForChat) {
        if (!currentFragmentForChat) toast("Select a fragment to chat with first!");
        return;
      }

      const chatData = getChatData(currentFragmentForChat);
      if (chatData.decision !== null) { 
        toast(`This fragment has already ${chatData.decision.toLowerCase()}. No further conversation.`);
        return;
      }
      
      const userMessageCount = chatData.messages.filter(m => m.role === 'user').length + 1; // Anticipate next user message as this one

      pushChat(currentFragmentForChat, 'user', content);
      chatInput.value='';
      
      if (store.key) {
        try {
          await generateAiReply(currentFragmentForChat, userMessageCount);
        } catch (err) {
          console.error("Error generating AI reply:", err);
          pushChat(currentFragmentForChat, 'assistant', `(AI Error: ${err.message || 'Could not get a response.'})`);
          simulateReply(currentFragmentForChat, userMessageCount); // Fallback to simulation
        }
      } else {
        simulateReply(currentFragmentForChat, userMessageCount);
      }
    }

    // Helper to get fragment details with sensible defaults
    function getFragmentDetails(f) {
      return {
        title: f?.title || "an intriguing film fragment",
        category: f?.category || "Core Concept",
        tags: (f?.tags && f.tags.length > 0 ? f.tags.join(', ') : "concept, insight, discussion"),
        quote: (f?.quote || `"${f?.title || 'This fragment'} holds a subtle truth."`).slice(0,160),
        desc: (f?.desc || `A profound idea that demands careful consideration, spanning from ${fmt(f?.start || 0)} to ${fmt(f?.end || (f?.start || 0) + 30)}.` ).slice(0,260),
        startFmt: f ? fmt(f.start || 0) : "0:00",
        endFmt: f ? fmt(f.end || (f.start || 0) + 30) : "0:30",
        id: f?.id || "unknown-fragment-id"
      };
    }
