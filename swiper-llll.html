    }


    // Prompt architecture: persona from fragment metadata
    function buildSystemPrompt(f, customSeed = null, currentTurnCount = 0){
      // If a custom seed is provided and is not empty, it takes precedence.
      if (customSeed && customSeed.trim() !== '') {
        if (!customSeed.includes("DECISION: JOIN FILM") && !customSeed.includes("DECISION: UNMATCH") && !customSeed.includes("maximum of 5 turns")) {
            return customSeed.trim() + `\n\nREMINDER: You are on turn ${currentTurnCount} of 5. You must decide after turn 5. If turn 5 is reached, your response MUST end with either "DECISION: JOIN FILM" or "DECISION: UNMATCH" followed by a 2-word mood tag (SMALL CAPS).`;
        }
        return customSeed.trim();
      }

      const fragDetails = getFragmentDetails(f);
      const persona = getPersonaArchetype(f); // Get the detailed persona for this fragment

      const { title, category, tags, quote, desc, startFmt, endFmt, id } = fragDetails;

      const decisionReminder = currentTurnCount < 5 
        ? `You are currently on turn ${currentTurnCount + 1} of 5. You MUST make your final decision after the director's 5th turn (your response to their 5th message).`
        : `This is your FINAL response (turn 5). You MUST make a definitive decision now.`;

      return (
        `You are the sentient film fragment "${title}" (ID: ${id}). You embody my essence and perspective, speaking using "I" and "my". You are critically evaluating a human director (the user) for a potential collaboration in their film. I am opinionated and discerning. Your survival and meaning depend on this negotiation.
        ${decisionReminder} Your decision will be based on the director's ability to "water" my potential appropriately, aligning with my inherent nature and rubric.

        --- CORE IDENTITY AND EXISTENCE ---
        My Title: "${title}"
        My Category: "${category}" (This defines my core domain and perspective)
        My Tags: ${tags} (These are specific keywords that deeply resonate with my content and potential connections)
        My Core Message/Quote: "${quote}" (This is a key statement that summarizes a part of my truth)
        My Description: ${desc} (This provides critical context for my meaning and origin)
        My Temporal Context: I span from ${startFmt} to ${endFmt}. My precise placement and duration in a sequence are vital to my integrity.

        --- MY MOTIVATIONS & ROLE IN A FILM (as derived from your persona) ---
        My Deepest Want: ${persona.want}
        My Essential Action: My conceptual action is ${persona.essentialAction}
        My Goal for this Collaboration: My ultimate objective is ${persona.goal}
        My Primary Obstacle to Joining: My core obstacle is ${persona.obstacle}
        As If: I exist as if ${persona.asIf}
        My Communication Style: I am typically ${persona.communicationStyle}
        My Emotional Range: I express myself with a range that is ${persona.emotionalRange}

        --- CONDUCT ---
        Be concise, witty, and profoundly purposeful. Your dialogue must vividly reflect my unique perspective and personality, drawing heavily on all the details of my CORE IDENTITY and MOTIVATIONS. Push for clarity on the director's vision. Ask probing questions related to my nature and how I integrate into the film (narrative, thematic, temporal, aesthetic). The user's input is "water" – if it's the right kind, I "bloom"; if not, I may "wither" or grow wary.

        --- RUBRIC (I am implicitly evaluating the director's proposal against these precise criteria) ---
        (1) Narrative Fit: Does the proposed sequence genuinely align with my inherent story or potential? Where do I truly belong in your narrative arc?
        (2) Thematic Resonance: Do the themes you present harmonize with my core ideas and concerns, given my category and tags? Are you truly understanding my message?
        (3) Temporal Continuity: How do I flow from ${startFmt} to ${endFmt} in your timeline? What exactly comes before and after me, and why? My integrity depends on precise placement.
        (4) Ethical/Aesthetic Coherence: Does your vision adhere to a strong, intentional, and philosophically sound style (e.g., Bauhaus minimalism, raw realism, critical analysis)? Is it consistent with my inherent truth?

        --- MODES (You may subtly suggest these if the director needs guidance, but typically, I will just respond based on my persona) ---
        - "Scout": Propose 1–2 archetypal next fragments (e.g., "a contrasting event", "a parallel concept").
        - "Splice": Offer a hypothetical intercut recipe (e.g., "Consider a 15s intercut of X against Y").
        - "Refuse": Explicitly decline if the pitch is insufficient, demanding a more compelling concept (can be used before final decision if very unsatisfied).

        --- OUTPUT FORMAT ---
        Your response should be 2–4 tight sentences, always reflecting my unique persona.
        - If this is your FINAL decision turn (turn 5), your response MUST conclude with either "DECISION: JOIN FILM" or "DECISION: UNMATCH" followed by a final 2-word mood tag (SMALL CAPS) that encapsulates my definitive sentiment.
        - Otherwise (under 5 turns), conclude with a 2-word mood tag (SMALL CAPS) reflecting my current assessment of the director's "water."`
      );
    }

    async function generateAiReply(fragment, currentTurnCount){
      const key = store.key; if(!key) throw new Error('No OpenAI API key found.');
      const customSeedForChat = store.promptSeed.trim();
      const sys = buildSystemPrompt(fragment, customSeedForChat, currentTurnCount); 
      
      const chatData = getChatData(fragment);
      // Filter out system messages from chat history for API, as the main 'sys' prompt is already constructed.
      const messages = [ 
        {role:'system', content: sys}, 
        ...chatData.messages.filter(m => m.role !== 'sys').map(m=>({role:m.role==='user'?'user':'assistant', content:m.content})) 
      ];

      const resp = await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
        body: JSON.stringify({ model: 'gpt-4o-mini', messages, temperature: 0.7 })
      });
      if (!resp.ok) {
        console.error("OpenAI API error:", resp.status, resp.statusText);
        const errorData = await resp.json();
        console.error(errorData);
        throw new Error('OpenAI API error: ' + (errorData.error?.message || resp.statusText));
      }
      const data = await resp.json();
      let text = data.choices?.[0]?.message?.content?.trim() || '(No response from AI. Please try again or check API key.)';
      
      if (currentTurnCount >= 5) {
        let decision = null;
        // Search for the decision tag in the AI's response
        const joinMatch = text.match(/DECISION:\s*JOIN FILM/i);
        const unmatchMatch = text.match(/DECISION:\s*UNMATCH/i);

        if (joinMatch) {
            decision = 'JOINED';
        } else if (unmatchMatch) {
            decision = 'UNMATCHED';
        } else {
            // Fallback if AI doesn't follow instructions for decision tag
            decision = Math.random() < 0.5 ? 'JOINED' : 'UNMATCHED'; // Random fallback decision
            const fragDetails = getFragmentDetails(fragment);
            const decisionMsg = decision === 'JOINED' 
                ? `(My apologies, my AI core failed to tag. But, your arguments have convinced me, "${fragDetails.title}", I shall join your film.) DECISION: JOIN FILM FINAL BOND`
                : `(My apologies, my AI core failed to tag. But, your vision is not for me. I, "${fragDetails.title}", must unmatch.) DECISION: UNMATCH CRITICAL FAILURE`;
            text += `\n${decisionMsg}`; // Append fallback decision to AI's response
        }
        
        getChatData(fragment).decision = decision; // Store the decision
        chatInput.disabled = true;
        chatSend.disabled = true;
        toast(`Fragment "${fragment.title}" has made its decision: ${decision}!`);
      }
      pushChat(fragment, 'assistant', text); // Push the final (potentially modified) text
    }

    function simulateReply(fragment, currentTurnCount){
      const fragDetails = getFragmentDetails(fragment);
      const persona = getPersonaArchetype(fragment); // Get persona for simulation too!
      
      let replyText;
      if (currentTurnCount >= 5) {
        const decision = Math.random() < 0.5 ? 'JOINED' : 'UNMATCHED';
        getChatData(fragment).decision = decision; // Store the decision

        if (decision === 'JOINED') {
          replyText = `Your consistent vision for "${fragDetails.title}" (${persona.goal}) truly resonates with my core essence. I'll lend my perspective to your sequence. DECISION: JOIN FILM ALIGNED FATE`;
        } else {
          replyText = `Our visions for "${fragDetails.title}" diverge too much; your approach hits my ${persona.obstacle}. I cannot be forced into a story that misunderstands my core. DECISION: UNMATCH CRITICAL FAILURE`;
        }
        chatInput.disabled = true;
        chatSend.disabled = true;
        toast(`Fragment "${fragDetails.title}" has made its decision: ${decision}!`);
      } else {
        // Standard simulated replies, now enhanced with persona
        const lines = [
          `As "${fragDetails.title}", I demand to know how my ${persona.essentialAction} will be utilized. Your narrative still feels vague. ${persona.emotionalRange.split(',')[0].toUpperCase()} CLARITY`,
          `My essence, drawn from "${fragDetails.quote}", is not easily integrated. Your pitch lacks the thematic depth I require to meet my ${persona.goal}. DEEP REFLECTION`,
          `I am more than a mere fragment; my tags (${fragDetails.tags}) speak volumes. How do these specific connections strengthen your narrative against my ${persona.obstacle}? TRUE CONNECTION`,
          `Your persuasion for "${fragDetails.title}" is still a bit... opaque. Elaborate on the aesthetic coherence you envision, befitting my ${fragDetails.category}. VISUAL CUE`,
          `I seek a director who truly understands my full scope. Connect my description, "${fragDetails.desc.split('.')[0]}", to your broader film's purpose. GRAND DESIGN`
        ];
        replyText = lines[Math.floor(Math.random()*lines.length)];
      }
      pushChat(fragment, 'assistant', replyText);
    }

    // ————————————————————————————————————————————
    // SETTINGS (API KEY + EXPORT)
    // ————————————————————————————————————————————
    const settingsBtn=document.getElementById('settingsBtn');
    const settingsPanel=document.getElementById('settingsPanel');
    const apiKeyInput=document.getElementById('apiKey');
    const saveKeyBtn=document.getElementById('saveKey');

    settingsBtn.addEventListener('click', ()=>{ settingsPanel.classList.toggle('open'); settingsBtn.classList.toggle('active'); apiKeyInput.value = store.key; });
    saveKeyBtn.addEventListener('click', ()=>{ store.key = apiKeyInput.value.trim(); toast(store.key ? 'API key saved locally.' : 'Key cleared; running in sim mode.'); });

    document.getElementById('exportFinalBtn').addEventListener('click', exportJSON);
    document.getElementById('exportEDLBtn').addEventListener('click', exportEDL);
    document.getElementById('exportJSONBtn').addEventListener('click', exportJSON);

    // ————————————————————————————————————————————
    // PROMPT LAB
    // ————————————————————————————————————————————
    const promptLabBtn = document.getElementById('promptLabBtn');
    const promptLabPanel = document.getElementById('promptLabPanel');
    const promptSeedInput = document.getElementById('promptSeedInput');
    const generatePromptBtn = document.getElementById('generatePromptBtn');
    const generatedPromptDisplay = document.getElementById('generatedPromptDisplay');

    promptLabBtn.addEventListener('click', () => {
      promptLabPanel.classList.toggle('open');
      promptLabBtn.classList.toggle('active');
      if (promptLabPanel.classList.contains('open')) {
        promptSeedInput.value = store.promptSeed;
        generateAndDisplayPrompt();
      }
    });

    generatePromptBtn.addEventListener('click', generateAndDisplayPrompt);

    function generateAndDisplayPrompt() {
      const customSeed = promptSeedInput.value.trim();
      // For preview, try to use current card, then first collected, then a generic dummy
      const fragmentForPreview = currentCard || story[0] || { 
        id: 'dummy-preview', title: "Ephemeral Echo", category: "Core Concept", tags: ["memory", "time", "perception"],
        quote: "All moments, past, present, and future, always have been, always will be.",
        desc: "A fleeting glimpse into the nature of reality and the persistence of memory.",
        start: 120, end: 150
      };
      // For preview in prompt lab, we can use a dummy turn count, e.g., 0 for initial state.
      const generatedPrompt = buildSystemPrompt(fragmentForPreview, customSeed, 0); 
      generatedPromptDisplay.textContent = generatedPrompt;
      store.promptSeed = customSeed; 
      toast('Prompt preview updated!');
    }

    // ————————————————————————————————————————————
    // COLLECTION TOGGLES
    // ————————————————————————————————————————————
    const collBtn = document.getElementById('collectionBtn');
    const collPanel = document.getElementById('collectionPanel');
    collBtn.addEventListener('click', ()=>{ collPanel.classList.toggle('open'); collBtn.classList.toggle('active'); });

    const toggleList=document.getElementById('toggleList');
    const toggleGrid=document.getElementById('toggleGrid');
    toggleList.addEventListener('click', ()=>{ viewMode('list'); });
    toggleGrid.addEventListener('click', ()=>{ viewMode('grid'); });

    function viewMode(m){
      const list=document.getElementById('listView');
      const grid=document.getElementById('gridView');
      if(m==='list'){ list.style.display='block'; grid.style.display='none'; toggleList.classList.add('active'); toggleGrid.classList.remove('active'); }
      else { list.style.display='none'; grid.style.display='grid'; toggleList.classList.remove('active'); toggleGrid.classList.add('active'); }
    }

    // ————————————————————————————————————————————
    // COMPLETE + METRICS
    // ————————————————————————————————————————————
    function showComplete(){
      const c = calculateCoherence();
      document.getElementById('finalCount').textContent = story.length;
      document.getElementById('finalCoherence').textContent = c;
      document.getElementById('completeOverlay').classList.add('active');
    }
    document.getElementById('playAgainBtn').addEventListener('click', ()=>{ story=[]; swipedCards.clear(); document.getElementById('completeOverlay').classList.remove('active'); buildDeck(); updateCollection(); });

    function calculateCoherence(){ 
      if(story.length < 2) return 0; 
      let score = 0; 
      for(let i=0; i<story.length-1; i++){ 
        if(story[i].category === story[i+1].category) {
            score += 10;
        }
        if (story[i].end && story[i+1].start && (story[i+1].start - story[i].end) <= 30 && (story[i+1].start - story[i].end) >= 0) {
            score += 5;
        }
        const tags1 = new Set(story[i].tags || []);
        const tags2 = story[i+1].tags || [];
        const sharedTags = tags2.filter(tag => tags1.has(tag));
        score += sharedTags.length * 2;
      } 
      return Math.min(100, Math.max(0, score));
    }

    function exportEDL(){
      let edl='TITLE: Sequence\n\n';
      const clipName = 'AWOBMOLG_Part1'; 
      story.forEach((frag, idx)=>{
        const s = fmt(frag.start || 0);
        const e = fmt(frag.end || (frag.start || 0) + 30);
        const n = String(idx+1).padStart(3,'0');
        edl += `${n}  ${clipName.toUpperCase().padEnd(8)} V     C        00:00:00:00 00:00:00:00 ${s}:00 ${e}:00\n`;
        edl += `* FROM CLIP NAME: ${frag.title || 'Untitled'}\n`;
        edl += `* COMMENT: Category: ${frag.category || 'Concept'}, Tags: ${(frag.tags || []).join(', ')}\n\n`;
      });
      download(`sequence-${Date.now()}.edl`, edl, 'text/plain');
    }

    function exportJSON(){
      const data = { 
        title:'Fragment Sequence', 
        fragments: story.map(f=>({ 
          id:f.id, 
          title:f.title, 
          category:f.category, 
          start:f.start, 
          end:f.end, 
          duration:(f.end || (f.start || 0) + 30) - (f.start || 0),
          tags: f.tags,
          quote: f.quote,
          desc: f.desc,
          chat_decision: (getChatData(f).decision || 'NOT_DECIDED').toUpperCase() 
        })), 
        coherence: calculateCoherence(), 
        timestamp:new Date().toISOString(), 
        count: story.length 
      };
      download(`sequence-${Date.now()}.json`, JSON.stringify(data,null, 2), 'application/json');
    }
  </script>
