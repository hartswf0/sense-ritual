<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <title>ORGANIC GARDEN — Flowing Flux Fields</title>
  <style>
    :root{
      --bg:#0a0a0a; --ui:#111; --line:#222;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{height:100%; margin:0; background:var(--bg); color:#0ff; font-family:-apple-system,sans-serif;}
    
    .wrap{display:flex; flex-direction:column; height:100vh; height:100dvh;}
    
    /* Header */
    header{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--ui); border-bottom:2px solid var(--line);}
    .brand{font-weight:900; letter-spacing:3px; font-size:16px; color:#0ff;}
    .stats{display:flex; gap:16px; font-size:12px; font-weight:700;}
    .stat{color:#666;}
    .stat-value{color:#0ff;}
    
    /* Game Area */
    #gameArea{position:relative; flex:1; display:flex; align-items:center; justify-content:center; background:var(--bg);}
    canvas{background:#0d0d0d; border:2px solid var(--line); border-radius:8px; touch-action:none; image-rendering:pixelated; cursor:pointer; z-index: 10;}
    
    /* Video Preview */
    .video-preview{
      position: absolute;
      width: 160px;
      height: 90px;
      border: 2px solid #0ff;
      background: #000;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
    }
    .video-preview.active {
      opacity: 1;
    }
    
    /* Toolbar: fixed bottom */
    .toolbar{position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:center; gap:8px; padding:10px; background:rgba(0,0,0,0.85); border-top:2px solid #0ff; z-index:2000; flex-wrap:wrap; pointer-events:auto;}
    .btn{appearance:none; border:none; color:#0ff; background:rgba(0,255,255,0.1); border:1px solid #0ff; padding:8px 10px; border-radius:4px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.15s ease;}
    .btn:active{transform:scale(0.95); background:#0ff; color:#000;}
    .btn:hover{opacity:0.8;}
    
    /* Timeline lane (narrow) */
    .timeline-panel{position:fixed; right:0; top:60px; bottom:50px; width:72px; background:rgba(0,0,0,0.78); border-left:2px solid #0ff; padding:6px 4px; overflow-y:auto; transform:translateX(0); transition:width 0.25s ease, padding 0.25s ease; z-index:50; display:flex; flex-direction:column; gap:6px;}
    .timeline-panel.collapsed{width:0; padding:0; border-left:none; pointer-events:none;}
    .timeline-title{font-size:10px; font-weight:900; color:#0ff; margin:0 0 6px; text-align:center; letter-spacing:1px;}
    .clip-item{width:100%; aspect-ratio:16/9; margin-bottom:8px; border:2px solid #333; cursor:pointer; position:relative; overflow:hidden;}
    .clip-item video{width:100%; height:100%; object-fit:cover;}
    .clip-label{position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.9); padding:3px; font-size:8px; color:#0ff; text-align:center; text-transform:uppercase; letter-spacing:0.5px;}

    /* Timeline handle */
    .timeline-handle{position:fixed; right:0; top:50%; transform:translateY(-50%); width:22px; height:72px; background:rgba(0,255,255,0.12); border-left:2px solid #0ff; color:#0ff; display:flex; align-items:center; justify-content:center; z-index:110; cursor:pointer; backdrop-filter: blur(2px); box-shadow: inset 0 0 10px rgba(0,255,255,0.25); font-weight:900;}
    .timeline-handle:active{background:rgba(0,255,255,0.25);}
    
    @media (max-width: 768px) {
      .timeline-panel{width:160px;}
    }
    
    /* Shape Colors - High Contrast Bauhaus */
    .color-0{border-color:#FF6B6B !important;}
    .color-1{border-color:#4ECDC4 !important;}
    .color-2{border-color:#FFE66D !important;}
    .color-3{border-color:#95E1D3 !important;}
    .color-4{border-color:#F38181 !important;}
    .color-5{border-color:#AA96DA !important;}
    .color-6{border-color:#A8E6CF !important;}
    .color-7{border-color:#FFB74D !important;}
    .color-8{border-color:#FCBAD3 !important;}
    .color-9{border-color:#FFA07A !important;}
    
    /* Modal */
    .modal{position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:1000;}
    .modal.show{display:flex;}
    .modal-content{text-align:center; padding:40px;}
    .modal-title{font-size:48px; font-weight:900; color:#0ff; margin-bottom:20px;}
    .modal-stats{font-size:18px; color:#666; margin-bottom:30px;}
    .modal-btn{padding:16px 40px; background:#0ff; border:none; color:#000; font-weight:900; font-size:16px; cursor:pointer; margin:5px; border-radius:4px;}
    
    /* Hint Badge */
    .hint-badge{position:fixed; bottom:80px; right:16px; background:#0ff; color:#000; padding:8px 12px; border-radius:4px; font-size:11px; font-weight:700; z-index:100; display:none;}
    .hint-badge.show{display:block; animation:pulse 0.5s ease-out;}
    
    @keyframes pulse {
      0% { transform: scale(1); opacity:1; }
      100% { transform: scale(1.1); opacity:1; }
    }
    
    /* Timeline Controls */
    .timeline-controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111;
      border-top: 1px solid #0ff;
    }
    
    .clip-editor {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 600px;
      background: #111;
      border: 3px solid #0ff;
      padding: 20px;
      z-index: 1000;
      display: none;
    }
    
    .clip-editor.active {
      display: block;
    }
    
    .trim-handle {
      position: absolute;
      top: 0;
      height: 100%;
      width: 4px;
      background: #0ff;
      cursor: col-resize;
    }
    
    /* Beat Editor */
    .beat-editor {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }

    .beat-editor label {
      font-size: 12px;
      color: #0ff;
    }

    .beat-editor select {
      background: #000;
      color: #0ff;
      border: 1px solid #0ff;
      padding: 5px;
      width: 100%;
    }
    
    /* Beat Indicator */
    .beat-indicator {
      font-size: 10px;
      font-weight: 700;
      color: #FFD700;
      background: rgba(0,0,0,0.7);
      padding: 3px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">FLUX GARDEN</div>
    <div class="stats">
      <div class="stat">SCORE <span class="stat-value" id="score">0</span></div>
      <div class="stat">MOVES <span class="stat-value" id="moves">30</span></div>
      <div class="stat">CLIPS <span class="stat-value" id="clips">0</span></div>
    </div>
  </header>
  
  <div id="gameArea">
    <canvas id="game"></canvas>
    <div class="video-preview" id="videoPreview" style="display:none;">
      <video id="previewVideo" muted loop playsinline></video>
      <div class="video-label" id="videoLabel">Scene 01</div>
    </div>
  </div>
  
  <div class="toolbar">
    <button class="btn" id="hintBtn">HINT</button>
    <button class="btn" id="automataBtn">AUTO</button>
    <button class="btn" id="pauseBtn">PAUSE</button>
    <button class="btn" id="soundBtn">MUTE</button>
    <button class="btn" id="hapticBtn">HAPTIC</button>
    <button class="btn" id="exportBtn">EXPORT</button>
  </div>
</div>

<div class="timeline-panel" id="timelinePanel">
  <div class="timeline-title">SEQUENCE</div>
  <div id="clipList"></div>
</div>
<div class="timeline-controls">
  <button class="btn" id="playBtn">PLAY SEQ</button>
  <button class="btn" id="pauseSequenceBtn">PAUSE SEQ</button>
  <button class="btn" id="trimBtn">TRIM</button>
  <button class="btn" id="exportBtn">EXPORT</button>
</div>
<div class="timeline-handle" id="timelineHandle">></div>

<div class="clip-editor" id="clipEditor">
  <div class="editor-header">
    <h3>Edit Clip: <span id="clipTitle"></span></h3>
    <button id="closeEditor">✕</button>
  </div>
  <div class="video-container">
    <video id="editVideo" controls></video>
    <div class="trim-container">
      <div class="trim-handle" id="startHandle"></div>
      <div class="trim-handle" id="endHandle"></div>
    </div>
  </div>
  <div class="time-display">
    <span id="startTime">0:00</span>
    <span id="endTime">0:00</span>
  </div>
  <div class="editor-controls">
    <button id="saveTrim">Save Changes</button>
  </div>
</div>

<div class="hint-badge" id="hintBadge"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title">SEQUENCE COMPLETE</div>
    <div class="modal-stats" id="modalStats"></div>
    <button class="modal-btn" onclick="location.reload()">NEW SEQUENCE</button>
  </div>
</div>

<script>
console.log(' FLUX GARDEN — Stable Edition Loading...');

const TYPE_SOURCES = {
  0: {file: 'MEDIA/video_0443d3f46b1f433597e8d9d89469cad8.mp4', title: 'Blush', color: '#FFD3D3', shape: 'circle'},
  1: {file: 'MEDIA/video_06ac4003fedc438588cf48eb594c8f22.mp4', title: 'Sky', color: '#D4E7FF', shape: 'square'},
  2: {file: 'MEDIA/video_0e770098e193417596602ae22ae3ab30.mp4', title: 'Cream', color: '#FFF5D4', shape: 'triangle'},
  3: {file: 'MEDIA/video_0eb7d2bceba7433ba17f37bbfc2a5007.mp4', title: 'Mint', color: '#D4F4DD', shape: 'hexagon'},
  4: {file: 'MEDIA/video_14c639e88a2c4718aee990049945815c.mp4', title: 'Peach', color: '#FFE4D4', shape: 'diamond'},
  5: {file: 'MEDIA/video_219ff5b76d874686bcfecbe4d10f5c83.mp4', title: 'Lavender', color: '#E8D4FF', shape: 'pentagon'},
  6: {file: 'MEDIA/video_27b3377368254f1babcfb96a0c47859a.mp4', title: 'Sage', color: '#D9EAD3', shape: 'star'},
  7: {file: 'MEDIA/video_29245c98b1904304bdaa5513eb2ddc76.mp4', title: 'Apricot', color: '#FFE0CC', shape: 'roundsquare'},
  8: {file: 'MEDIA/video_3250a9cf85244759a18a4db13c37d174.mp4', title: 'Rose', color: '#FFD4E5', shape: 'octagon'},
  9: {file: 'MEDIA/video_37ed60eedd054e2aaa8bb1448f65d760.mp4', title: 'Sand', color: '#F4E8D4', shape: 'cross'}
};

const SEGMENTS_PER_TYPE = 4;
const TYPE_SEGMENTS = {};
const typeUsage = {};

for (let t = 0; t < 10; t++) {
  TYPE_SEGMENTS[t] = [];
  typeUsage[t] = 0;
  for (let s = 0; s < SEGMENTS_PER_TYPE; s++) {
    const start = s * 10;
    const end = start + 10;
    TYPE_SEGMENTS[t].push({
      index: s,
      start,
      end,
      title: `${TYPE_SOURCES[t].title} ${s+1}`,
      file: TYPE_SOURCES[t].file
    });
  }
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID_SIZE = 8;
const CELL_SIZE = 50;

const game = {
  grid: [],
  selected: null,
  score: 0,
  moves: 30,
  sequence: [], // Ensure sequence is initialized
  busy: false,
  soundEnabled: true,
  hapticEnabled: true,
  automataEnabled: false,
  paused: false,
  gameOver: false,
  hintQueue: [],
  selectedHint: null,
  loadedVideos: {},
  typeSegmentVideos: {},
  segmentUsage: {},
  collectedTypes: new Set(),
  flowTime: 0,
  flowField: [],
  beats: [
    {id:1, name:'Opening Image', syntagma:'AS'},
    {id:2, name:'Theme Stated', syntagma:'PS'},
    {id:3, name:'Set-Up', syntagma:'BS'},
    {id:4, name:'Catalyst', syntagma:'DS'},
    {id:5, name:'Debate', syntagma:'AS'},
    {id:6, name:'Break into Two', syntagma:'PS'},
    {id:7, name:'B Story', syntagma:'BS'},
    {id:8, name:'Fun and Games', syntagma:'DS'},
    {id:9, name:'Midpoint', syntagma:'AS'},
    {id:10, name:'Bad Guys Close In', syntagma:'PS'},
    {id:11, name:'All Is Lost', syntagma:'BS'},
    {id:12, name:'Dark Night', syntagma:'DS'},
    {id:13, name:'Break into Three', syntagma:'AS'},
    {id:14, name:'Finale', syntagma:'PS'},
    {id:15, name:'Final Image', syntagma:'BS'}
  ]
};

// Initialize sounds
function initSounds() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  
  game.sounds = {
    match: () => {
      if (!game.soundEnabled) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = 523.25;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      osc.start(audioContext.currentTime);
      osc.stop(audioContext.currentTime + 0.1);
    },
    select: () => {
      if (!game.soundEnabled) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = 392;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
      osc.start(audioContext.currentTime);
      osc.stop(audioContext.currentTime + 0.05);
    },
    error: () => {
      if (!game.soundEnabled) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = 200;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      osc.start(audioContext.currentTime);
      osc.stop(audioContext.currentTime + 0.1);
    }
  };
}

function haptic(pattern = 10) {
  if (!game.hapticEnabled || !navigator.vibrate) return;
  navigator.vibrate(pattern);
}

// Create cell
function createCell(type) {
  return {
    type,
    state: 'stable',
    brightness: 0.5,
    scale: 1,
    targetScale: 1
  };
}

// Initialize grid
function createGrid() {
  game.grid = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    game.grid[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      game.grid[r][c] = createCell(Math.floor(Math.random() * 10));
    }
  }
  
  while (findMatches().length > 0) {
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        if (game.grid[r][c]) {
          game.grid[r][c].type = Math.floor(Math.random() * 10);
        }
      }
    }
  }
  
  generateHints();
}

// Initialize type segments
function initTypeSegments() {
  for (let type = 0; type < 10; type++) {
    for (let segIdx = 0; segIdx < SEGMENTS_PER_TYPE; segIdx++) {
      const seg = TYPE_SEGMENTS[type][segIdx];
      const key = `${type}_${segIdx}`;
      const v = document.createElement('video');
      v.src = seg.file;
      v.muted = true;
      v.playsinline = true;
      v.loop = false;
      v.preload = 'auto';
      v.crossOrigin = 'anonymous';
      
      v.addEventListener('loadedmetadata', () => {
        try {
          v.currentTime = Math.min(seg.start, Math.max(0, v.duration - 0.2));
          v.play().catch(e => console.log('Video autoplay blocked:', e));
        } catch(e) {}
      });
      
      v.addEventListener('timeupdate', () => {
        if (v.currentTime >= seg.end) {
          try {
            v.currentTime = seg.start;
            if (v.paused) v.play().catch(()=>{});
          } catch(e) {}
        }
      });
      
      v.load();
      game.typeSegmentVideos[key] = v;
    }
  }
  console.log(' Type-segment videos created');
}

function segmentIndexForCell(type, r, c) {
  return (r + c * 3) % SEGMENTS_PER_TYPE;
}

function nextSegmentForType(type) {
  if (!game.segmentUsage[type]) game.segmentUsage[type] = [];
  let minUsed = Infinity;
  let minIdx = 0;
  for (let s = 0; s < SEGMENTS_PER_TYPE; s++) {
    const used = game.segmentUsage[type].filter(u => u === s).length;
    if (used < minUsed) {
      minUsed = used;
      minIdx = s;
    }
  }
  game.segmentUsage[type].push(minIdx);
  return minIdx;
}

// Perlin noise for subtle flow
function perlin2D(x, y) {
  const freq1 = 0.05;
  const freq2 = 0.1;
  return (
    Math.sin(x * freq1 + game.flowTime * 0.0005) * Math.cos(y * freq1) * 0.3 +
    Math.sin(x * freq2 - game.flowTime * 0.0008) * Math.sin(y * freq2) * 0.2
  );
}

function initFlowField() {
  game.flowField = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    game.flowField[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      game.flowField[r][c] = {dx: 0, dy: 0};
    }
  }
}

function updateFlowField() {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const angle = perlin2D(c * 10, r * 10) * Math.PI * 2;
      game.flowField[r][c] = {
        dx: Math.cos(angle) * 1.5,
        dy: Math.sin(angle) * 1.5
      };
    }
  }
}

// Draw shapes
function drawShape(ctx, x, y, size, type) {
  const cx = x + CELL_SIZE / 2;
  const cy = y + CELL_SIZE / 2;
  const r = size * 0.35;
  
  ctx.beginPath();
  
  switch (TYPE_SOURCES[type].shape) {
    case 'circle':
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      break;
    case 'square':
      ctx.rect(cx - r, cy - r, r * 2, r * 2);
      break;
    case 'triangle':
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r * 0.866, cy + r * 0.5);
      ctx.lineTo(cx - r * 0.866, cy + r * 0.5);
      ctx.closePath();
      break;
    case 'hexagon':
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i;
        const px = cx + Math.cos(a) * r;
        const py = cy + Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'diamond':
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      ctx.closePath();
      break;
    case 'pentagon':
      for (let i = 0; i < 5; i++) {
        const a = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const px = cx + Math.cos(a) * r;
        const py = cy + Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'star':
      for (let i = 0; i < 10; i++) {
        const a = (Math.PI * 2 / 10) * i - Math.PI / 2;
        const rad = i % 2 === 0 ? r : r * 0.5;
        const px = cx + Math.cos(a) * rad;
        const py = cy + Math.sin(a) * rad;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'roundsquare':
      const rr = r * 0.3;
      ctx.moveTo(cx - r + rr, cy - r);
      ctx.arcTo(cx + r, cy - r, cx + r, cy + r, rr);
      ctx.arcTo(cx + r, cy + r, cx - r, cy + r, rr);
      ctx.arcTo(cx - r, cy + r, cx - r, cy - r, rr);
      ctx.arcTo(cx - r, cy - r, cx + r, cy - r, rr);
      ctx.closePath();
      break;
    case 'octagon':
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI / 4) * i;
        const px = cx + Math.cos(a) * r;
        const py = cy + Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'cross':
      const w = r * 0.4;
      ctx.rect(cx - w, cy - r, w * 2, r * 2);
      ctx.rect(cx - r, cy - w, r * 2, w * 2);
      break;
    default:
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
  }
}

// Get neighbors
function getNeighbors(r, c) {
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr;
      const nc = c + dc;
      if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
        neighbors.push({r: nr, c: nc});
      }
    }
  }
  return neighbors;
}

// Find matches
function findMatches() {
  const matches = [];
  const checked = new Set();
  
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE - 2; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      if (game.grid[r][c+1] && game.grid[r][c+2] &&
          game.grid[r][c+1].type === cell.type && game.grid[r][c+2].type === cell.type) {
        for (let i = 0; i < 3; i++) {
          const key = `${r},${c+i}`;
          if (!checked.has(key)) {
            matches.push({r, c: c+i});
            checked.add(key);
          }
        }
      }
    }
  }
  
  for (let c = 0; c < GRID_SIZE; c++) {
    for (let r = 0; r < GRID_SIZE - 2; r++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      if (game.grid[r+1][c] && game.grid[r+2][c] &&
          game.grid[r+1][c].type === cell.type && game.grid[r+2][c].type === cell.type) {
        for (let i = 0; i < 3; i++) {
          const key = `${r+i},${c}`;
          if (!checked.has(key)) {
            matches.push({r: r+i, c});
            checked.add(key);
          }
        }
      }
    }
  }
  
  return matches;
}

// Generate hints
function generateHints() {
  game.hintQueue = [];
  
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      const directions = [[0, 1], [1, 0], [0, -1], [-1, 0]];
      for (const [dr, dc] of directions) {
        const nr = r + dr;
        const nc = c + dc;
        if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) continue;
        
        const neighbor = game.grid[nr][nc];
        if (!neighbor) continue;
        
        [game.grid[r][c], game.grid[nr][nc]] = [game.grid[nr][nc], game.grid[r][c]];
        if (findMatches().length > 0) {
          game.hintQueue.push({r1: r, c1: c, r2: nr, c2: nc});
        }
        [game.grid[r][c], game.grid[nr][nc]] = [game.grid[nr][nc], game.grid[r][c]];
      }
    }
  }
}

// Show hint
function showHint() {
  if (game.hintQueue.length === 0) return;
  
  game.selectedHint = game.hintQueue[Math.floor(Math.random() * game.hintQueue.length)];
  document.getElementById('hintBadge').textContent = 'TRY THOSE CELLS ↓';
  document.getElementById('hintBadge').classList.add('show');
  
  setTimeout(() => {
    document.getElementById('hintBadge').classList.remove('show');
    game.selectedHint = null;
  }, 3000);
  
  haptic(20);
  if (game.sounds.select) game.sounds.select();
}

// Handle click
function handleClick(e) {
  if (game.busy || game.gameOver || game.paused) return;
  
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const col = Math.floor((x / rect.width) * GRID_SIZE);
  const row = Math.floor((y / rect.height) * GRID_SIZE);
  
  if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return;
  if (!game.grid[row] || !game.grid[row][col]) return;
  
  if (!game.selected) {
    game.selected = {r: row, c: col};
    game.grid[row][col].targetScale = 1.2;
    
    // Show video preview for this cell
    const cell = game.grid[row][col];
    const segIdx = segmentIndexForCell(cell.type, row, col);
    showVideoPreview(cell.type, segIdx);
    
    if (game.sounds.select) game.sounds.select();
    haptic(10);
  } else {
    const {r: r1, c: c1} = game.selected;
    const r2 = row, c2 = col;
    
    game.grid[r1][c1].targetScale = 1;
    
    const adjacent = Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    
    if (adjacent) {
      trySwap(r1, c1, r2, c2);
    } else {
      if (game.sounds.error) game.sounds.error();
      haptic([10, 50, 10]);
    }
    
    game.selected = null;
    hideVideoPreview();
  }
}

// Try swap
function trySwap(r1, c1, r2, c2) {
  [game.grid[r1][c1], game.grid[r2][c2]] = [game.grid[r2][c2], game.grid[r1][c1]];
  
  const matches = findMatches();
  
  if (matches.length === 0) {
    [game.grid[r1][c1], game.grid[r2][c2]] = [game.grid[r2][c2], game.grid[r1][c1]];
    if (game.sounds.error) game.sounds.error();
    haptic([10, 50, 10]);
    return;
  }
  
  game.moves--;
  document.getElementById('moves').textContent = game.moves;
  
  if (game.sounds.match) game.sounds.match();
  haptic(30);
  
  processMatches(matches);
}

// Process matches
function processMatches(matches) {
  game.busy = true;
  
  const matchedVideos = new Set();
  matches.forEach(({r, c}) => {
    const cell = game.grid[r][c];
    if (cell) matchedVideos.add(cell.type);
    game.grid[r][c] = null;
    game.score += 10;
  });
  
  let lastCollectedSeg = null;
  matchedVideos.forEach(type => {
    const segIdx = nextSegmentForType(type);
    showVideoPreview(type, segIdx);
    lastCollectedSeg = TYPE_SEGMENTS[type][segIdx];
    game.collectedTypes.add(type);
    
    // Add to sequence
    const beatNum = game.sequence.length + 1;
    const syntagma = ['AS', 'PS', 'BS', 'DS'][beatNum % 4];
    
    game.sequence.push({
      title: lastCollectedSeg.title,
      file: lastCollectedSeg.file,
      start: lastCollectedSeg.start,
      end: lastCollectedSeg.end,
      syntagma,
      beat: beatNum
    });
  });
  
  document.getElementById('score').textContent = game.score;
  document.getElementById('clips').textContent = game.sequence.length;
  
  updateTimeline();
  
  setTimeout(() => {
    dropCandies();
    refillGrid();
    
    const newMatches = findMatches();
    if (newMatches.length > 0) {
      processMatches(newMatches);
    } else {
      game.busy = false;
      generateHints();
      
      if (game.moves <= 0) {
        game.gameOver = true;
        showModal();
      }
    }
  }, 300);
}

// Drop candies
function dropCandies() {
  for (let c = 0; c < GRID_SIZE; c++) {
    let writePos = GRID_SIZE - 1;
    for (let r = GRID_SIZE - 1; r >= 0; r--) {
      if (game.grid[r][c]) {
        game.grid[writePos][c] = game.grid[r][c];
        if (writePos !== r) {
          game.grid[r][c] = null;
        }
        writePos--;
      }
    }
  }
}

// Refill grid
function refillGrid() {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (!game.grid[r][c]) {
        game.grid[r][c] = createCell(Math.floor(Math.random() * 10));
      }
    }
  }
}

// Update timeline
function updateTimeline() {
  const clipList = document.getElementById('clipList');
  
  clipList.innerHTML = '';
  
  game.sequence.forEach((video, i) => {
    const clip = document.createElement('div');
    clip.className = 'clip-item';
    
    const vid = document.createElement('video');
    vid.src = video.file;
    vid.muted = true;
    vid.playsinline = true;
    
    const label = document.createElement('div');
    label.className = 'clip-label';
    label.textContent = `${i + 1}. ${video.title}`;
    
    clip.appendChild(vid);
    clip.appendChild(label);
    clipList.appendChild(clip);
  });
}

// Show modal
function showModal() {
  const modal = document.getElementById('modal');
  const stats = document.getElementById('modalStats');
  
  stats.innerHTML = `
    <div>FINAL SCORE: ${game.score}</div>
    <div>SEQUENCES: ${game.sequence.length}</div>
  `;
  
  modal.classList.add('show');
  haptic([100, 50, 100]);
}

// Draw
function draw() {
  game.flowTime++;
  
  if (game.flowTime % 10 === 0) {
    updateFlowField();
  }
  
  const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grad.addColorStop(0, '#1a1a1a');
  grad.addColorStop(1, '#0f0f0f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      // Subtle flow displacement - minimal movement
      const flow = game.flowField[r][c];
      const x = c * CELL_SIZE + flow.dx * 0.3;
      const y = r * CELL_SIZE + flow.dy * 0.3;
      
      const segIdx = segmentIndexForCell(cell.type, r, c);
      const key = `${cell.type}_${segIdx}`;
      const video = game.typeSegmentVideos[key];
      
      ctx.save();
      
      // Smooth scale animation
      const diff = (cell.targetScale - cell.scale) * 0.1;
      cell.scale += diff;
      
      const centerX = x + CELL_SIZE / 2;
      const centerY = y + CELL_SIZE / 2;
      ctx.translate(centerX, centerY);
      ctx.scale(cell.scale, cell.scale);
      ctx.translate(-centerX, -centerY);
      
      // Draw video-clipped shape
      if (video && video.readyState >= 2) {
        ctx.save();
        
        // Draw brighter video
        ctx.globalAlpha = 1.0;
        ctx.filter = 'brightness(1.8) contrast(1.2)';
        
        drawShape(ctx, x, y, CELL_SIZE, cell.type);
        ctx.clip();
        
        const vw = video.videoWidth || 1920;
        const vh = video.videoHeight || 1080;
        const cellW = vw / GRID_SIZE;
        const cellH = vh / GRID_SIZE;
        const sx = c * cellW;
        const sy = r * cellH;
        
        ctx.drawImage(
          video,
          sx, sy, cellW, cellH,
          x + 4, y + 4, CELL_SIZE - 8, CELL_SIZE - 8
        );
        
        ctx.restore();
      }
      
      // Draw shape outline
      drawShape(ctx, x, y, CELL_SIZE, cell.type);
      
      ctx.fillStyle = TYPE_SOURCES[cell.type].color + '20';
      ctx.fill();
      
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Selection highlight
      if (game.selected && game.selected.r === r && game.selected.c === c) {
        drawShape(ctx, x, y, CELL_SIZE, cell.type);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      
      // Hint highlight
      if (game.selectedHint && 
          ((game.selectedHint.r1 === r && game.selectedHint.c1 === c) ||
           (game.selectedHint.r2 === r && game.selectedHint.c2 === c))) {
        drawShape(ctx, x, y, CELL_SIZE, cell.type);
        ctx.strokeStyle = '#ffff00';
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      ctx.restore();
    }
  }
  
  if (game.selected) {
    const {r, c} = game.selected;
    const x = c * CELL_SIZE + CELL_SIZE/2; // center of cell in canvas coordinates
    const y = r * CELL_SIZE; // top of cell
    
    // Convert to gameArea coordinates
    const rect = canvas.getBoundingClientRect();
    
    const offsetX = x * (rect.width / canvas.width);
    const offsetY = y * (rect.height / canvas.height);
    
    const preview = document.getElementById('videoPreview');
    const previewWidth = 160;
    const previewHeight = 90;
    
    let left = offsetX - previewWidth/2;
    let top = offsetY - previewHeight - 10;
    
    // If near the top, show below
    if (top < 20) {
      top = offsetY + CELL_SIZE + 10;
    }
    
    // Adjust to be within gameArea
    left = Math.max(10, Math.min(left, rect.width - previewWidth - 10));
    top = Math.max(10, Math.min(top, rect.height - previewHeight - 10));
    
    preview.style.left = left + 'px';
    preview.style.top = top + 'px';
  }
  
  requestAnimationFrame(draw);
}

// Automata update
function updateAutomata() {
  if (!game.automataEnabled || game.paused || game.busy || game.gameOver) return;
  
  // Only make moves occasionally
  if (Math.random() > 0.2) return;
  
  if (game.hintQueue.length > 0) {
    const hint = game.hintQueue[Math.floor(Math.random() * game.hintQueue.length)];
    trySwap(hint.r1, hint.c1, hint.r2, hint.c2);
  }
}

// Export sequence
function exportSequence() {
  if (game.sequence.length === 0) return;
  
  const otiData = {
    version: '0.1',
    title: 'Flux Garden Sequence',
    clips: game.sequence.map((seg, index) => ({
      id: `clip_${index}`,
      file: seg.file,
      start: seg.start,
      end: seg.end,
      title: seg.title,
      syntagma: seg.syntagma || 'AS',
      beat: index + 1
    }))
  };
  
  const json = JSON.stringify(otiData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = `flux-garden-sequence-${Date.now()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Show video preview
function showVideoPreview(type, segIdx) {
  const key = `${type}_${segIdx}`;
  const video = game.typeSegmentVideos[key];
  const preview = document.getElementById('previewVideo');
  const label = document.getElementById('videoLabel');
  const container = document.getElementById('videoPreview');
  
  if (!video) return;
  
  preview.src = video.src;
  preview.currentTime = TYPE_SEGMENTS[type][segIdx].start;
  preview.play().catch(e => console.log('Preview play error:', e));
  
  label.textContent = TYPE_SEGMENTS[type][segIdx].title;
  container.classList.add('active');
}

// Hide video preview
function hideVideoPreview() {
  const container = document.getElementById('videoPreview');
  container.classList.remove('active');
}

// Initialize
function init() {
  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('click', handleClick);
  
  document.getElementById('hintBtn').addEventListener('click', showHint);
  document.getElementById('automataBtn').addEventListener('click', toggleAutomata);
  document.getElementById('pauseBtn').addEventListener('click', togglePause);
  document.getElementById('soundBtn').addEventListener('click', toggleSound);
  document.getElementById('hapticBtn').addEventListener('click', toggleHaptic);
  document.getElementById('timelineHandle').addEventListener('click', () => {
    document.getElementById('timelinePanel').classList.toggle('collapsed');
  });
  document.getElementById('exportBtn').addEventListener('click', exportSequence);
  document.getElementById('playBtn').addEventListener('click', playSequence);
  document.getElementById('pauseSequenceBtn').addEventListener('click', pauseSequence);
  document.getElementById('trimBtn').addEventListener('click', openTrimEditor);
  document.getElementById('closeEditor').addEventListener('click', closeTrimEditor);
  document.getElementById('saveTrim').addEventListener('click', saveTrim);
  
  initSounds();
  initTypeSegments();
  initFlowField();
  createGrid();
  
  setTimeout(() => {
    Object.values(game.typeSegmentVideos).forEach(v => {
      if (v.paused && v.readyState >= 2) {
        v.play().catch(()=>{});
      }
    });
  }, 500);
  
  setInterval(updateAutomata, 500);
  document.getElementById('videoPreview').style.display = 'block';
  
  draw();
}

function resize() {
  const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 600);
  canvas.width = GRID_SIZE * CELL_SIZE;
  canvas.height = GRID_SIZE * CELL_SIZE;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
}

function toggleSound() {
  game.soundEnabled = !game.soundEnabled;
  document.getElementById('soundBtn').textContent = game.soundEnabled ? 'MUTE' : 'UNMUTE';
}

function toggleHaptic() {
  game.hapticEnabled = !game.hapticEnabled;
  document.getElementById('hapticBtn').textContent = game.hapticEnabled ? 'HAPTIC' : 'NO VIB';
}

function toggleAutomata() {
  game.automataEnabled = !game.automataEnabled;
  document.getElementById('automataBtn').textContent = game.automataEnabled ? 'AUTO ON' : 'AUTO OFF';
}

function togglePause() {
  game.paused = !game.paused;
  document.getElementById('pauseBtn').textContent = game.paused ? 'PLAY' : 'PAUSE';
}

let currentSequenceIndex = 0;
let sequencePlaying = false;
let currentClip = null;

function playSequence() {
  if (game.sequence.length === 0) return;
  
  sequencePlaying = true;
  currentSequenceIndex = 0;
  playClip(currentSequenceIndex);
}

function playClip(index) {
  if (!sequencePlaying || index >= game.sequence.length) {
    sequencePlaying = false;
    return;
  }
  
  const clip = game.sequence[index];
  const preview = document.getElementById('previewVideo');
  
  preview.src = clip.file;
  preview.currentTime = clip.start;
  preview.play().catch(e => console.log('Play error:', e));
  
  preview.onended = () => {
    currentSequenceIndex++;
    if (currentSequenceIndex < game.sequence.length) {
      playClip(currentSequenceIndex);
    } else {
      sequencePlaying = false;
    }
  };
}

function pauseSequence() {
  sequencePlaying = false;
  const preview = document.getElementById('previewVideo');
  preview.pause();
}

function openTrimEditor() {
  if (game.sequence.length === 0) return;
  
  // Use the first clip for demo, in real use you'd select a clip
  currentClip = 0;
  const clip = game.sequence[currentClip];
  const editVideo = document.getElementById('editVideo');
  
  document.getElementById('clipTitle').textContent = clip.title;
  editVideo.src = clip.file;
  editVideo.currentTime = clip.start;
  
  document.getElementById('clipEditor').classList.add('active');
}

function closeTrimEditor() {
  document.getElementById('clipEditor').classList.remove('active');
}

function saveTrim() {
  const editVideo = document.getElementById('editVideo');
  const clip = game.sequence[currentClip];
  
  // For demo, just update start/end
  clip.start = editVideo.currentTime;
  clip.end = clip.start + 10; // 10-second clip
  
  closeTrimEditor();
  updateTimeline();
}

init();
</script>
