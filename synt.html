      { id: 'zubaydah-perpetual-now', title: 'Perpetual Now (Zubaydah)', category: 'Emotional State', desc: 'His identity had disintegrated into random memories, trapped in a perpetual now, no way of moving forward.', color: '#424242', tags: ['Existential', 'Fragmentation', 'Nihilism'], quote: 'He wrote how it was as though time had stopped. He was trapped in a perpetual now, haunted by fragments of memory, with no way of moving forward into the future.', youtubeId: YOUTUBE_VIDEO_ID, start: 1313, end: 1320 },
      { id: 'cia-enhanced-interrogation', title: 'CIA Enhanced Interrogation', category: 'Systemic Control', desc: 'Used waterboarding 83 times, smashing, and freezing to reduce Abu Zubaydah to a state of "learned helplessness".', color: '#B71C1C', tags: ['Torture', 'Power', 'Control', 'Psychology', 'Systemic'], quote: 'They would use it to reduce Abu Zubeda back to a state of learned helplessness. They called it enhanced interrogation.', youtubeId: YOUTUBE_VIDEO_ID, start: 2604, end: 2616 },
      { id: 'cia-godzilla-fear', title: 'CIA & Godzilla (Fear Wave)', category: 'Systemic Impact', desc: "Disconnected memories from Zubaydah's brain, including from films like Godzilla, spread fear across America.", color: '#795548', tags: ['Media', 'Propaganda', 'Fear', 'Systemic'], quote: 'Desperate for the torture to stop, Zuba just spewed out all the disconnected memories inside his brain... many of them drawn from the films he had watched, including Godzilla.', youtubeId: YOUTUBE_VIDEO_ID, start: 2664, end: 2675 },
      { id: 'chaos-theory-unpredictable', title: 'Chaos Theory', category: 'Scientific Theory', desc: 'One tiny change in equations could have massive catastrophic consequences which they could never have predicted.', color: '#42A5F5', tags: ['Science', 'Complexity', 'Prediction', 'Limits of Control'], quote: 'One tiny change in their equations could have massive catastrophic consequences which they could never have predicted. It was called chaos theory.', youtubeId: YOUTUBE_VIDEO_ID, start: 664, end: 669 },
      { id: 'complexity-theory-patterns', title: 'Complexity Theory', category: 'Scientific Theory', desc: 'Computers could be used to see hidden underlying patterns and make the chaos manageable (Murray Gell-Mann).', color: '#2196F3', tags: ['Science', 'Patterns', 'Management', 'Control'], quote: 'But in the 1990s... computers could be used to see hidden underlying patterns and make the chaos manageable. This new idea was called complexity theory.', youtubeId: YOUTUBE_VIDEO_ID, start: 738, end: 751 },
      { id: 'gell-mann-underlying-patterns', title: 'Gell-Mann: Underlying Patterns', category: 'Core Concept', desc: 'Believed there were underlying patterns at every level of the universe: particles, thought, societies, languages.', color: '#1976D2', tags: ['Gell-Mann', 'Universal', 'Structure', 'Order'], quote: 'He believed that there were underlying patterns at every level of the universe. Not just in the particles, but in the way people think, in the structure of human societies, and even in the languages they spoke.', youtubeId: YOUTUBE_VIDEO_ID, start: 766, end: 779 },
      { id: 'gazzaniga-multiple-selves', title: 'Gazzaniga: Multiple Selves', category: 'Psychological Theory', desc: 'Inside brains, human beings have all kinds of different selves; conscious mind makes up stories for illusion of control.', color: '#FFB74D', tags: ['Neuroscience', 'Psychology', 'Identity', 'Illusion'], quote: 'Gazanaga argued that really there were multiple selves inside the human brain. Each one taking control at different moments. Normally that is hidden because the one self that is conscious constantly makes up stories to explain what all the other selves are doing.', youtubeId: YOUTUBE_VIDEO_ID, start: 1450, end: 1478 },
      { id: 'hinton-neural-networks', title: 'Hinton: Neural Networks (AI)', category: 'Technological Apparatus', desc: 'AI learns from mass data, looks for connections/patterns, completely ignores all human stories and meaning.', color: '#00BCD4', tags: ['AI', 'Data', 'Pattern Recognition', 'Algorithms'], quote: "Hinton's neural networks were a kind of intelligence that completely ignored all stories.", youtubeId: YOUTUBE_VIDEO_ID, start: 3595, end: 3606 },
      { id: 'hinton-vector-world-myth', title: 'Vector World (AI Mythology)', category: 'Core Concept', desc: 'The world is too complicated for us as human beings to understand, but nothing is too complicated for the machines and data.', color: '#0097A7', tags: ['AI', 'Mythology', 'Control', 'Dehumanization'], quote: 'He called it vector world. It expressed what was becoming one of the most powerful mythologies of our age... that the world is too complicated for us as human beings to understand. But nothing is too complicated for the machines and the data.', youtubeId: YOUTUBE_VIDEO_ID, start: 3628, end: 3652 },
      { id: 'google-mission-idealism', title: 'Google (Early Mission)', category: 'Organizational Idealism', desc: "To make the world's information accessible and useful, providing instant access to any information anybody ever wants.", color: '#8BC34A', tags: ['Google', 'Information', 'Idealism', 'Technology'], quote: "At Google, our mission is to make the world's information accessible and useful...", youtubeId: YOUTUBE_VIDEO_ID, start: 1739, end: 1770 },
      { id: 'dot-com-burst-money-power', title: 'Dot-Com Bust (Money Power)', category: 'Economic Event', desc: 'The crash meant Google met the power of money, which was going to reshape their aims completely by venture capitalists.', color: '#BCAAA4', tags: ['Economy', 'Crisis', 'Corporate Control'], quote: 'Google managed to survive, but the crash meant that they met the power of money, which was going to reshape their aims completely.', youtubeId: YOUTUBE_VIDEO_ID, start: 2210, end: 2215 },
      { id: 'google-data-trails-predict', title: 'Google (Data Trails & Predict)', category: 'Technological Apparatus', desc: 'Engineers realized they could build a picture of how every individual behaved to predict what advertisements they would click.', color: '#689F38', tags: ['Google', 'Data', 'Prediction', 'Surveillance'], quote: 'Every time someone searched the web, they left trails behind them... they could build up a picture of how every individual behaved and how they were likely to behave in the future. It meant they could predict what advertisement an individual would click on', youtubeId: YOUTUBE_VIDEO_ID, start: 2254, end: 2269 },
      { id: '911-patriot-act-privacy-lost', title: '9/11 & Patriot Act (Privacy Lost)', category: 'Systemic Event', desc: "Everyone's personal data must be open to examination to stop further attacks; privacy became irrelevant.", color: '#D32F2F', tags: ['Security', 'Privacy', 'State Control', 'Systemic'], quote: 'Privacy of the individual now became irrelevant in the face of a much higher need, security.', youtubeId: YOUTUBE_VIDEO_ID, start: 2347, end: 2353 },
      { id: 'google-sidelining-consciousness', title: 'Google (Sidelining Consciousness)', category: 'Systemic Impact', desc: 'Taking people\'s data to predict what they would do, what they thought or felt as individuals was completely eradicated.', color: '#AFB42B', tags: ['Google', 'Dehumanization', 'Control', 'Data'], quote: "What Google were now doing was taking people's data and using it to predict what those individuals would do... What they thought or felt as individuals and the stories they told themselves was completely iraded. Consciousness was being sidelined even more.", youtubeId: YOUTUBE_VIDEO_ID, start: 2402, end: 2425 },
      { id: 'data-gold-rush-surveillance', title: 'Data Gold Rush (Surveillance)', category: 'Economic Apparatus', desc: 'Products (Roomba, We Vibe, Kayla doll, Pokémon Go) set up to mine traces of human behavior everywhere.', color: '#FFD700', tags: ['Surveillance Capitalism', 'Privacy', 'Commercial'], quote: 'Products of more and more companies around the world were set up to mine all the traces of human behavior everywhere.', youtubeId: YOUTUBE_VIDEO_ID, start: 3691, end: 3698 },
      { id: 'pokemon-go-persuasive', title: 'Pokémon Go (Persuasive Gaming)', category: 'Technological Apparatus', desc: 'An experiment to see if you could move mass groups of people around to where you wanted them to monetize checkpoints.', color: '#FFEB3B', tags: ['Gaming', 'Behavioral Control', 'Monetization'], quote: 'Pokémon, she said, is about herding people to monetize checkpoints without them being fully aware of it.', youtubeId: YOUTUBE_VIDEO_ID, start: 3789, end: 3795 },
      { id: 'algorithmic-mortgages-broken', title: 'Algorithmic Mortgages (Broken)', category: 'Systemic Apparatus', desc: 'Computers cut up dangerous high-risk loans and recombined them; the connection of debts to human reality was broken.', color: '#90A4AE', tags: ['Finance', 'Abstraction', 'Crisis', 'Systemic'], quote: 'The computers cut up the dangerous high-risk loans and recombined them with other safer loans... the connection of the debts to human reality was broken.', youtubeId: YOUTUBE_VIDEO_ID, start: 4049, end: 4062 },
      { id: 'china-algorithmic-governance', title: 'China (Algorithmic Governance)', category: 'Systemic Control', desc: 'Adjusting behavior with "social credits" for rewards/penalties, forcibly reprogram if unresponsive (Xinjiang).', color: '#4169E1', tags: ['China', 'Surveillance State', 'Social Control', 'BF Skinner'], quote: 'And if the data from all the different sources showed a person behaving well... then they would be given what were called social credits.', youtubeId: YOUTUBE_VIDEO_ID, start: 5315, end: 5329 },
      { id: 'skinner-operant-conditioning', title: 'Skinner (Operant Conditioning)', category: 'Psychological Theory', desc: 'Easily alter behavior of animals using simple rewards, leading to a "beyond freedom and dignity" utopia (Walden Two).', color: '#1E88E5', tags: ['Behaviorism', 'Control', 'Utopia', 'China'], quote: 'Skinner had shown how he could easily alter the behavior of animals like pigeons by using a simple system of rewards. He called it operant conditioning.', youtubeId: YOUTUBE_VIDEO_ID, start: 5356, end: 5369 },
      { id: 'skinner-walden2', title: 'Walden 2 Utopia', category: 'Concept', desc: 'Utopia where human behavior is controlled through operant conditioning, freeing society from dangerous and irrational impulses.', color: '#87CEEB', tags: ['Utopia', 'Control', 'Prediction', 'BF Skinner'], quote: 'Skinner wrote a novel called Walden 2 that described a future utopia where all human behavior would be controlled through this kind of operant conditioning.', youtubeId: YOUTUBE_VIDEO_ID, start: 5410, end: 5422 },
      { id: 'russia-oligarchs-putin-rise', title: "Russia (Oligarchic Control)", category: 'Systemic Event', desc: 'Oligarchs looted the country and selected Vladimir Putin, a man who believed in nothing, to protect their power.', color: '#607D8B', tags: ['Russia', 'Corruption', 'Power Elite'], quote: 'In 1999, the oligarchs decided to select Russia\'s next president... And they selected Vladimir Putin... a man who believed in nothing.', youtubeId: YOUTUBE_VIDEO_ID, start: 1905, end: 1926 },
      { id: 'kursk-disaster-anger-power', title: "Kursk Disaster (Putin's Power)", category: 'Systemic Event', desc: 'Putin turned public anger away from himself and towards the corrupt elites in Moscow, the oligarchs, discovering a new source of power.', color: '#455A64', tags: ['Putin', 'Populism', 'Crisis Management'], quote: 'What Putin then did to save himself was turn that anger away from himself and towards the very people who had put him in power.', youtubeId: YOUTUBE_VIDEO_ID, start: 2053, end: 2062 },
      { id: 'putin-no-logic-strategy', title: 'Putin (No Logic/Strategy)', category: 'Leadership Critique', desc: 'Everything is a tactical step, a real-time response to external stimuli devoid of any ultimate objective (Mikhail Zygar).', color: '#37474F', tags: ['Putin', 'Nihilism', 'Post-Truth'], quote: 'The Russian journalist Mikuel Zygar wrote, "There is no logic in the age of Putin. There is no plan or strategy. Everything that happens... is a tactical step... devoid of any ultimate objective."', youtubeId: YOUTUBE_VIDEO_ID, start: 2126, end: 2147 },
      { id: 'putin-eurasia-defense', title: 'Putin (Eurasia as Defense)', category: 'Political Ideology', desc: 'Summoned a dark, frightening vision of Russia (Eurasia) as the last defense against a corrupt West, promoting Russian exceptionalism.', color: '#D32F2F', tags: ['Putin', 'Nationalism', 'Geopolitics', 'Propaganda'], quote: 'He summoned up a dark, frightening vision from Russia\'s past. It said that Russia as a whole, what was called Eurasia, was the last defense against a corrupt West that was trying to take over the whole world.', youtubeId: YOUTUBE_VIDEO_ID, start: 4809, end: 4827 },
      { id: 'nightwolves-conspiracy-propaganda', title: 'Nightwolves (Conspiracy Drama)', category: 'Culture/Propaganda', desc: 'Extreme nationalist motorcycle club dramatized a paranoid conspiracy that America/Illuminati were planning to undermine Putin and destroy Russia.', color: '#E53935', tags: ['Russia', 'Conspiracy', 'Nationalism'], quote: 'The Nightwolves put on mass shows that dramatized the paranoid conspiracy theory that America... were planning to undermine Vladimir Putin and destroy Russia.', youtubeId: YOUTUBE_VIDEO_ID, start: 4893, end: 4907 },
      { id: 'russia-dream-consumption', title: 'Russia (Dream World of Consumption)', category: 'Systemic Critique', desc: 'The country rode through the first decade of the 21st century in a state of semi-oblivion, in a dream world of consumption.', color: '#BBDEFB', tags: ['Social Decay', 'Illusion', 'Economy'], quote: 'The country, he said, rode through the first decade of the 21st century in a state of semi-oblivion, in a dream world of consumption.', youtubeId: YOUTUBE_VIDEO_ID, start: 3611, end: 3618 },
      { id: 'london-second-empire-discretion', title: 'London (Second Empire of Secrecy)', category: 'Systemic Apparatus', desc: "City's 'discretion in the market' turned into a force shield, hiding hundreds of billions of illegal fortunes, making the world seem bewilderingly complicated.", color: '#757575', tags: ['Finance', 'Corruption', 'Offshore', 'Globalization'], quote: 'Now, the discretion that the city was still so proud of had in reality turned into a force shield. It stopped any proper investigation of what was really going on.', youtubeId: YOUTUBE_VIDEO_ID, start: 5013, end: 5019 },
      { id: 'china-princelings-void', title: "China (Princelings' Ideological Void)", category: 'Systemic Event', desc: 'Children of the Cultural Revolution in power; money filled the void of any guiding ideology, dissolving social bonds.', color: '#FF5722', tags: ['China', 'Elite', 'Corruption', 'Ideological Vacuum'], quote: 'What had been buried and forgotten was any guiding ideology, any confident story about what this was all for. Instead, money had filled the void...', youtubeId: YOUTUBE_VIDEO_ID, start: 3011, end: 3023 },
      { id: 'china-land-grab-corruption', title: 'China (Massive Land Grab)', category: 'Systemic Event', desc: 'Organized gangs were forcing farmers out of their houses at gunpoint and seizing their land.', color: '#F4511E', tags: ['Corruption', 'Injustice', 'Economy', 'Systemic'], quote: 'Organized gangs were forcing farmers out of their houses at gunpoint and seizing their land.', youtubeId: YOUTUBE_VIDEO_ID, start: 3043, end: 3050 },
      { id: 'bo-chongqing-experiment', title: 'Bo Xilai (Chongqing Experiment)', category: 'Political Project', desc: 'Used the city as a laboratory to reawaken past idealism with Mao songs and tackle inequality, later exposed as a corruption smokescreen.', color: '#A1887F', tags: ['Bo Xilai', 'Populism', 'Hypocrisy'], quote: 'Bor soon became famous and he was seen as a future leader.', youtubeId: YOUTUBE_VIDEO_ID, start: 3261, end: 3267 },
      { id: 'xi-jinping-giant-control', title: 'Xi Jinping (Giant Control System)', category: 'Political Project', desc: 'Decided to turn China into a giant system in which everyone\'s behavior could be predicted, managed, and controlled.', color: '#1A237E', tags: ['China', 'Totalitarian', 'Surveillance', 'Control'], youtubeId: YOUTUBE_VIDEO_ID, start: 5296, end: 5301 },
      { id: 'conspiracy-theories-human-ai', title: 'Conspiracy Theories (Human AI)', category: 'Social Phenomenon', desc: 'Humans spent vast amounts of time searching online data for patterns like AI, turning them into fantastic, elaborate stories.', color: '#7E57C2', tags: ['Social', 'Fragmentation', 'Narrative', 'Post-Truth'], quote: 'But then it got more complicated because human beings were also exposed to the avalanche of data online and they started to behave in very much the same way as Jeffrey Hinton\'s artificial intelligence machines.', youtubeId: YOUTUBE_VIDEO_ID, start: 4129, end: 4161 },
      { id: 'illuminati-mind-control', title: 'Illuminati (Mind Control Theory)', category: 'Conspiracy Theory', desc: 'Millions convinced major stars were manipulated by Illuminati via MK Ultra/Disney, with hidden messages and triangles in videos.', color: '#5E35B1', tags: ['Conspiracy', 'Media', 'Control', 'Paranoia'], quote: 'Millions of people became convinced that all the major stars, from Britney Spears to Beyonce, were being manipulated and controlled by the Illuminati. The theory said that the Illuminati had worked with the CIA and their MK Ultra project and with Walt Disney to create a new system of mind control.', youtubeId: YOUTUBE_VIDEO_ID, start: 4216, end: 4221 },
      { id: 'thornley-op-mindfuck', title: 'Operation Mindfuck (Thornley)', category: 'Theory/Action', desc: 'Spread Illuminati theory to parody/ridicule conspiracy theories, believing they undermined individual confidence.', color: '#9575CD', tags: ['Parody', 'Manipulation', 'Subversion'], quote: 'They had spread the conspiracy theory that the Illuminati were really the secret rulers of the world. They had done it to parody and ridicule all conspiracy theories because they thought that they undermined the confidence of individuals and made them easier to control.', youtubeId: YOUTUBE_VIDEO_ID, start: 4182, end: 4196 },
      { id: '2008-global-economic-crash', title: '2008 Global Economic Crash', category: 'Systemic Event', desc: 'Mortgage systems failed completely, leading to global crash; governments transferred private debt to public, leading to austerity.', color: '#E57373', tags: ['Economy', 'Crisis', 'Inequality', 'Systemic'], quote: 'In 2008, the systems in the banks that had structured the mortgage loans failed completely. It led to a global economic crash.', youtubeId: YOUTUBE_VIDEO_ID, start: 4329, end: 4336 },
      { id: 'banks-rigging-money-laundering', title: 'Banks (Rigging/Laundering)', category: 'Systemic Corruption', desc: 'Major banks rigged interest rates and laundered money for organized crime, but "nothing seemed to change".', color: '#E53935', tags: ['Corruption', 'Finance', 'Impunity'], quote: 'That all the major banks had been rigging interest rates and many of them had been laundering money for organized crime, including the drug cartels in Mexico. But again, nothing seemed to change.', youtubeId: YOUTUBE_VIDEO_ID, start: 4370, end: 4378 },
      { id: 'populist-anger-elite-bailout', title: 'Populist Anger (Elite Bailout)', category: 'Political Phenomenon', desc: 'The party of Davos, the scientific, engineering, managerial, financial, cultural elite bail themselves out. (Populist critique).', color: '#F44336', tags: ['Politics', 'Resistance', 'Inequality'], quote: 'The party of Davos, the scientific, engineering, managerial, financial, cultural elite bail themselves out.', youtubeId: YOUTUBE_VIDEO_ID, start: 4415, end: 4422 },
      { id: 'brexit-take-back-control', title: 'Brexit (Take Back Control)', category: 'Political Project', desc: 'For Dominic Cummings, a way to get rid of failed elites and old political systems, transforming a decaying society.', color: '#EF5350', tags: ['Populism', 'Nationalism', 'Disenchantment'], quote: 'For Dominic Cummings, Brexit was not an end in itself. For him, it was a way of getting rid of the failed elites and the old political systems that ran Britain.', youtubeId: YOUTUBE_VIDEO_ID, start: 4476, end: 4488 },
      { id: 'trump-qanon-pedophile-cabal', title: 'Trump & QAnon', category: 'Political Phenomenon', desc: 'Paranoia allowed Trump to hide corruption; QAnon explained nothing happening via a "secret cabal of pedophiles in Washington".', color: '#B71C1C', tags: ['Politics', 'Conspiracy', 'Post-Truth'], quote: 'His supporters, though, had their own conspiracy theory, QAnon, that explained why nothing was happening. Trump was being stopped by a secret cabal of pedophiles in Washington.', youtubeId: YOUTUBE_VIDEO_ID, start: 6093, end: 6105 },
      { id: 'liberal-avoidance-despair', title: 'Liberal Avoidance (Despair)', category: 'Critique', desc: 'Liberals avoided facing genuine grievances and real anger, having no idea how to solve problems of desolation/despair.', color: '#BBDEFB', tags: ['Politics', 'Elite Disconnect', 'Failure'], quote: 'But the liberal opposition, it was a way of avoiding facing up to the genuine grievances and the very real anger in America that Trump\'s election had revealed.', youtubeId: YOUTUBE_VIDEO_ID, start: 6143, end: 6152 },
      { id: 'fragile-structure-discon-frag', title: 'Fragile Structure (Disconnected Fragments)', category: 'Systemic Vulnerability', desc: 'Groups clinging to power protected themselves behind this brittle shell of conspiracy theories built out of disconnected fragments. But it was a very fragile structure.', color: '#9E9E9E', tags: ['Illusion', 'Vulnerability', 'Post-Truth'], quote: 'Groups clinging to power protected themselves behind this brittle shell of conspiracy theories built out of disconnected fragments. But it was a very fragile structure.', youtubeId: YOUTUBE_VIDEO_ID, start: 6164, end: 6183 },
      { id: 'ai-dogs-everywhere-meaningless', title: 'AI (Dogs Everywhere)', category: 'Technological Impact', desc: 'Google engineers demonstrated AI altering reality, seeing dogs everywhere; a world where anything could be anything, because there was no real meaning any longer.', color: '#4FC3F7', tags: ['AI', 'Perception', 'Illusion', 'Meaninglessness'], quote: 'Google engineers demonstrated how easily reality in this fragmented world could become strange and frightening. They created an AI program to learn how to see dogs. But they then showed how if they ran the algorithm backwards, the machines would alter the images of reality they were being fed, so they would see dogs everywhere.', youtubeId: YOUTUBE_VIDEO_ID, start: 6193, end: 6210 },
      { id: 'covid-deep-inequalities', title: 'COVID-19 (Deep Inequalities)', category: 'Global Crisis', desc: 'The virus, a force completely outside systems of power, brought into focus how deep inequalities in modern Western societies have gone.', color: '#7E57C2', tags: ['Crisis', 'Social', 'Systemic', 'Vulnerability'], quote: 'The virus was a force that came from completely outside the systems of power. But it has come at a moment when many of the old certainties of this age are already cracking.', youtubeId: YOUTUBE_VIDEO_ID, start: 6364, end: 6371 },
      { id: 'future-indiv-disappear', title: 'Future (Individualism Disappears)', category: 'Future Scenario', desc: 'Data used to predict/manage human behavior like BF Skinner predicted; individualism would be just a brief moment in history.', color: '#5C6BC0', tags: ['Dystopia', 'Control', 'BF Skinner'], quote: 'Data will be gathered and used on a massive scale to predict and manage all human behavior in the way that the psychologist BF Skinner predicted. He said that individualism would be just a brief moment in history before science would find a way to manage and control everyone.', youtubeId: YOUTUBE_VIDEO_ID, start: 6421, end: 6432 },
      { id: 'future-old-stability', title: 'Future (Return to Old Stability)', category: 'Future Scenario', desc: 'Hope for return to an old stability where individualism can continue to be managed by a benign elite, but enormous pressures will not go away.', color: '#9FA8DA', tags: ['Nostalgia', 'Illusion', 'Unresolved Conflict'], quote: 'Many people are hoping that with the election of Joe Biden in America, it will be possible to return to an old stability where individualism can continue to be managed by a benign elite. But although Donald Trump is gone and the Brexit deal done, what they both revealed was that underneath Western societies, there are enormous pressures building up that will not go away.', youtubeId: YOUTUBE_VIDEO_ID, start: 6490, end: 6509 },
      { id: 'future-imagine-new', title: 'Future (Imagine New)', category: 'Future Scenario', desc: 'Regain confidence, imagine genuinely new kinds of futures (David Graeber: "the world is something we make and could just as easily make differently").', color: '#66BB6A', tags: ['Hope', 'Agency', 'Transformation'], quote: 'If we can regain our confidence, we will find that we have the power to influence how that future turns out. And as a first step, we have to start imagining what kind of future it is we want to build.', youtubeId: YOUTUBE_VIDEO_ID, start: 6603, end: 6609 },
      { id: 'graeber-world-we-make', title: 'Graeber (World We Make)', category: 'Core Concept', desc: 'The ultimate hidden truth of the world, he wrote, is that it is something we make and could just as easily make differently.', color: '#4CAF50', tags: ['Graeber', 'Agency', 'Liberation', 'Potential'], quote: 'The ultimate hidden truth of the world, he wrote, is that it is something we make and could just as easily make differently.', youtubeId: YOUTUBE_VIDEO_ID, start: 6678, end: 6690 }
    ];

    // --- Global State for UI ---
    let selected = []; // Holds IDs of selected concepts for the dock/story
    let filter = '';
    let currentView = 'grid';
    let clickTimers = {}; // For double-click detection in Grid/List

    // --- UI Control Functions ---
    const viewBtns = document.querySelectorAll('.view-btn');
    viewBtns.forEach(btn => { btn.addEventListener('click', () => switchView(btn.dataset.view)); });

    function switchView(view) {
      currentView = view;
      viewBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
      document.getElementById('gridView').style.display = view === 'grid' ? '' : 'none';
      document.getElementById('listView').style.display = view === 'list' ? '' : 'none';
      document.getElementById('icosahedron-container').classList.toggle('active', view === '3d');
      
      if (view === '3d') {
        if (!window.icosahedronInitialized) initIcosahedron3D();
        resizeIcosahedronCanvas(); // Ensure canvas is correctly sized
        // Ensure animation loop is running
        if (!window.animationFrameId) animateIcosahedron3D(); 
        
        // Show/hide 3d specific UI
        document.getElementById('info3d').style.display = 'block';
        document.getElementById('toggleLabels3d').style.display = 'block';
        updateIcosahedronSelection(); // Apply selection highlights to 3D elements
      } else {
        document.getElementById('info3d').style.display = 'none';
        document.getElementById('toggleLabels3d').style.display = 'none';
      }
    }

    function renderCards() {
      const grid = document.getElementById('gridView');
      grid.innerHTML = '<div class="cards-grid" id="cardsGrid"></div>';
      const gridWrap = document.getElementById('cardsGrid');
      rawConcepts.forEach(data => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = data.id;
        const headerColor = data.color || '#e0e0e0';
        const textColor = isLight(headerColor) ? '#000' : '#fff';
        card.innerHTML = `
          <div class="card-header" style="background-color: ${headerColor}; color: ${textColor};">${data.title}</div>
          <div class="card-body">
            <div class="card-category">${data.category}</div>
            <div class="card-desc">${data.desc}</div>
            ${data.quote ? `<div class="card-quote">"${data.quote}"</div>` : ''}
            <div class="card-tags">${(data.tags || []).join(' · ')}</div>
          </div>`;
        card.addEventListener('click', (event) => handleConceptClick(data.id, card, event));
        gridWrap.appendChild(card);
      });
    }

    function renderList() {
      const list = document.getElementById('listView');
      list.innerHTML = '';
      rawConcepts.forEach(data => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.dataset.id = data.id;
        item.innerHTML = `
          <div class="list-item-color" style="background-color: ${data.color}"></div>
          <div class="list-item-content">
            <div class="list-item-title">${data.title}</div>
            <div class="list-item-meta">${data.category}</div>

    // Handles single-click (select/deselect) and double-click (play video) for Grid/List views
    function handleConceptClick(id, element, event) {
      let clickCount = clickTimers[id]?.count || 0;
      clickCount++;

      if (clickTimers[id]) clearTimeout(clickTimers[id].timer);

      if (clickCount === 2) {
        // Double-click detected
        const conceptData = rawConcepts.find(c => c.id === id);
        if (conceptData) playVideo(conceptData);
        clickTimers[id] = { count: 0, timer: null }; // Reset
      } else {
        // First click, set timer for potential second click
        clickTimers[id] = {
          count: clickCount,
          timer: setTimeout(() => {
            // Single click action: toggle selection
            toggleSelect(id, element);
            clickTimers[id] = { count: 0, timer: null }; // Reset after action
          }, 300) // 300ms debounce for double-click
        };
      }
    }

    function toggleSelect(id, element) {
      const index = selected.indexOf(id);
      const wasAdded = index === -1;
      
      if (index !== -1) {
        selected.splice(index, 1);
      } else {
        if (selected.length < 12) {
          selected.push(id);
          // AUTO-PLAY: When node is collected, add to video trail
          const conceptData = rawConcepts.find(c => c.id === id);
          if (conceptData) {
            addToVideoTrail(conceptData);
          }
        }
      }
      
      // Update UI for grid/list (element might be null if called from 3D view)
      if (element && element.classList) {
        element.classList.toggle('selected', selected.includes(id));
      } else { // if called from 3D, update all visible UI elements that might be out of sync
        document.querySelectorAll('[data-id]').forEach(el => {
          el.classList.toggle('selected', selected.includes(el.dataset.id));
        });
      }
      updateDock();
      updateCounts();
      updateIcosahedronSelection(); // Keep 3D connections updated with highlights
    }

      const dock = document.getElementById('dockContent');
      const header = document.querySelector('.dock-header');
      header.textContent = `Your Story (${selected.length}/12)`;
      if (selected.length === 0) {
        dock.innerHTML = '<div class="empty-state">Select up to 12 concepts to build your story</div>';
        return;
      }
      dock.innerHTML = '';
      selected.forEach((id, idx) => {
        const data = rawConcepts.find(c => c.id === id);
        if (!data) return; // defensive check

        const item = document.createElement('div');
        item.className = 'dock-item';
        item.style.borderColor = data.color;
        item.innerHTML = `

          <div class="dock-item-category">${data.category}</div>

          e.stopPropagation();
          toggleSelect(id, null); // Pass null, as we'll refresh all UI

    function isLight(color) {
      const hex = color.replace('#', '');
      if (hex.length === 3) { // Handle shorthand hex codes
        const r = parseInt(hex.charAt(0) + hex.charAt(0), 16);
        const g = parseInt(hex.charAt(1) + hex.charAt(1), 16);
        const b = parseInt(hex.charAt(2) + hex.charAt(2), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 > 128;
      }
      const r = parseInt(hex.substring(0, 2), 16);
      const g = parseInt(hex.substring(2, 4), 16);
      const b = parseInt(hex.substring(4, 6), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 128;
    }

    }

    // --- Icosahedron 3D Initialization ---
    function initIcosahedron3D() {
        if (window.icosahedronInitialized) return;

        icosahedronProcessedData = generateIcosahedronData(); // Generate data from rawConcepts

        const container = document.getElementById('icosahedron-container');
        const canvas = document.getElementById('icosahedron-canvas');
        
        // Clear previous children to prevent duplicates on re-init if ever called
        if (window.icosahedronGroup) {
            window.icosahedronGroup.children.slice().forEach(child => {
                window.icosahedronGroup.remove(child);
            });
        }
        window.icosahedronTopics.forEach(t => t.userData.label?.remove()); // Optional chaining for robustness
        window.icosahedronParticipants.forEach(p => p.userData.label?.remove());
        window.icosahedronTopics = [];
        window.icosahedronParticipants = [];
        icosahedronTopicMap.clear();
        icosahedronParticipantMap.clear();
        rawConceptTo3DObjectMap.clear();


        window.icosahedronScene = new THREE.Scene();
        window.icosahedronScene.background = new THREE.Color(0xffffff); // White background

        window.icosahedronCamera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        window.icosahedronCamera.position.z = 5;

        window.icosahedronRenderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        window.icosahedronRenderer.setPixelRatio(window.devicePixelRatio);
        window.icosahedronRenderer.setSize(container.clientWidth, container.clientHeight);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        window.icosahedronScene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(5, 5, 5);
        window.icosahedronScene.add(pointLight);

        window.icosahedronGroup = new THREE.Group();
        window.icosahedronScene.add(window.icosahedronGroup);

        // Icosahedron geometry (the translucent cage)
        const geometry = new THREE.IcosahedronGeometry(1.5, 0); // Slightly larger
        const material = new THREE.MeshPhongMaterial({
            color: 0x156289, // A deep blue
            wireframe: true,
            transparent: true,
            opacity: 0.2 // More translucent
        });
        const icosahedronMesh = new THREE.Mesh(geometry, material);
        window.icosahedronGroup.add(icosahedronMesh);

        // --- Create Topics (Spheres) ---
        const positionAttribute = geometry.attributes.position;
        const uniqueVertices = new Map(); // To ensure one sphere per unique vertex
        let vertexCount = 0; // Tracks which vertex we're assigning to

        for (let i = 0; i < positionAttribute.count; i++) {
            const vertex = new THREE.Vector3();
            vertex.fromBufferAttribute(positionAttribute, i);
            // Use a fixed precision key to compare vertices
            const key = `${vertex.x.toFixed(4)},${vertex.y.toFixed(4)},${vertex.z.toFixed(4)}`;

            if (!uniqueVertices.has(key) && vertexCount < icosahedronProcessedData.topics.length) {
                const sphereGeometry = new THREE.SphereGeometry(0.08, 16, 16); // Slightly larger spheres
                const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 }); // Green
                const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
                sphere.position.copy(vertex);

                // Map topic data to sphere userData
                const topicData = icosahedronProcessedData.topics[vertexCount];
                sphere.userData = {
                    type: 'topic',
                    id: topicData.id,
                    rawConceptId: topicData.rawConceptId, // Link to original raw concept
                    name: topicData.title,
                    teamMembers: topicData.teamMembers,
                    critics: topicData.critics,
                    observers: topicData.observers
                };

                // Create and attach HTML label
                const label = document.createElement('div');
                label.className = 'element-label';
                label.textContent = topicData.title; // Use full title for label
                container.appendChild(label); // Append label to the 3D container
                sphere.userData.label = label;

                window.icosahedronGroup.add(sphere);
                window.icosahedronTopics.push(sphere);
                icosahedronTopicMap.set(topicData.id, sphere); // Map T-ID to object
                rawConceptTo3DObjectMap.set(topicData.rawConceptId, sphere); // Map rawConceptId to object
                uniqueVertices.set(key, sphere);
                vertexCount++;
            }
        }

        // --- Create Participants (Edges) ---
        const edgesGeometry = new THREE.EdgesGeometry(geometry);
        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 }); // Red, slightly thicker line
        let participantAssignmentIndex = 0; // For sequential assignment to generated participants

        const edgePositions = edgesGeometry.attributes.position.array;
        for (let i = 0; i < edgePositions.length; i += 6) {
            if (participantAssignmentIndex >= icosahedronProcessedData.participants.length) break;

            const startVertex = new THREE.Vector3(
                edgePositions[i], edgePositions[i + 1], edgePositions[i + 2]
            );
            const endVertex = new THREE.Vector3(
                edgePositions[i + 3], edgePositions[i + 4], edgePositions[i + 5]
            );

            const points = [startVertex, endVertex];
            const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const edge = new THREE.Line(lineGeometry, edgesMaterial.clone());

            // Map participant data to edge userData
            const participantData = icosahedronProcessedData.participants[participantAssignmentIndex];
            edge.userData = {
                type: 'participant',
                id: participantData.id,
                rawConceptId: participantData.rawConceptId, // Link to original raw concept
                name: participantData.name,
                roles: participantData.roles,
                description: participantData.description,
                connectedTopics: participantData.connectedTopics
            };
            participantAssignmentIndex++;

            // Create and attach HTML label at midpoint
            const midpoint = new THREE.Vector3().addVectors(startVertex, endVertex).multiplyScalar(0.5);
            const label = document.createElement('div');
            label.className = 'element-label';
            label.textContent = participantData.name; // Use full name for label
            container.appendChild(label); // Append label to the 3D container
            edge.userData.label = label;
            edge.userData.midpoint = midpoint;

            window.icosahedronGroup.add(edge);
            window.icosahedronParticipants.push(edge);
            icosahedronParticipantMap.set(participantData.id, edge); // Map P-ID to object
            rawConceptTo3DObjectMap.set(participantData.rawConceptId, edge); // Map rawConceptId to object
        }

        // OrbitControls for camera movement - IMPORTANT: attach to renderer's DOM element (the canvas)
        window.icosahedronControls = new THREE.OrbitControls(window.icosahedronCamera, window.icosahedronRenderer.domElement);
        window.icosahedronControls.enableDamping = true;
        window.icosahedronControls.dampingFactor = 0.05;
        window.icosahedronControls.minDistance = 2;
        window.icosahedronControls.maxDistance = 10;
        window.icosahedronControls.autoRotate = false; // Start without auto-rotation
        window.icosahedronControls.autoRotateSpeed = 2.0;

        setupIcosahedronInteraction();
        window.icosahedronInitialized = true;

        // Start animation loop only if not already running
        if (!window.animationFrameId) animateIcosahedron3D();
    }

    // --- Icosahedron 3D Interaction ---
    const icosahedronRaycaster = new THREE.Raycaster();
    icosahedronRaycaster.params.Line.threshold = 0.15; // Increased for easier line selection
    const icosahedronMouse = new THREE.Vector2();
    const tooltip3d = document.getElementById('tooltip3d');
    let icosahedronHoveredObject = null; // Currently hovered 3D object

    function setupIcosahedronInteraction() {
        const canvas = document.getElementById('icosahedron-canvas');
        canvas.addEventListener('mousemove', onIcosahedronMouseMove);
        canvas.addEventListener('mouseout', onIcosahedronMouseOut);
        canvas.addEventListener('mousedown', (e) => {
            icosahedronClickStartTime = Date.now();
            icosahedronClickStartPos = { x: e.clientX, y: e.clientY };
        });
        canvas.addEventListener('touchstart', (e) => {
            icosahedronClickStartTime = Date.now();
            const touch = e.touches[0];
            icosahedronClickStartPos = { x: touch.clientX, y: touch.clientY };
        });
        canvas.addEventListener('click', onIcosahedronClick); // Single click for selection (no Shift needed)
        canvas.addEventListener('dblclick', onIcosahedronDoubleClick); // Double click for video
    }

    function onIcosahedronMouseMove(event) {
        const rect = event.target.getBoundingClientRect();
        icosahedronMouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        icosahedronMouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        icosahedronRaycaster.setFromCamera(icosahedronMouse, window.icosahedronCamera);
        const intersects = icosahedronRaycaster.intersectObjects([...window.icosahedronTopics, ...window.icosahedronParticipants], true);

        if (intersects.length > 0) {
            const object = intersects[0].object;
            const rawConceptId = object.userData.rawConceptId;

            tooltip3d.style.display = 'block';
            tooltip3d.style.left = event.clientX + 10 + 'px';
            tooltip3d.style.top = event.clientY + 10 + 'px';

            if (object.userData.type === 'topic') {
                const topicConcept = rawConcepts.find(rc => rc.id === rawConceptId);
                tooltip3d.innerHTML = `<strong>Topic: ${object.userData.name}</strong><br>`;
                tooltip3d.innerHTML += `<em>Description:</em> ${topicConcept ? topicConcept.desc : 'N/A'}<br>`;
                tooltip3d.innerHTML += `<em>Team Members:</em> ${object.userData.teamMembers.map(pid => icosahedronParticipantMap.get(pid)?.userData?.name || pid).join(', ') || 'None'}<br>`;
                tooltip3d.innerHTML += `<em>Critics:</em> ${object.userData.critics.map(pid => icosahedronParticipantMap.get(pid)?.userData?.name || pid).join(', ') || 'None'}<br>`;
                tooltip3d.innerHTML += `<em>Observers:</em> ${object.userData.observers.map(pid => icosahedronParticipantMap.get(pid)?.userData?.name || pid).join(', ') || 'None'}`;
            } else if (object.userData.type === 'participant') {
                const participantConcept = rawConcepts.find(rc => rc.id === rawConceptId);
                tooltip3d.innerHTML = `<strong>Connection: ${object.userData.name}</strong><br>`;
                tooltip3d.innerHTML += `<em>Description:</em> ${participantConcept ? participantConcept.desc : 'N/A'}<br>`;
                tooltip3d.innerHTML += `<em>Roles:</em> ${object.userData.roles.join(', ') || 'N/A'}<br>`;
                tooltip3d.innerHTML += `<em>Connects:</em> ${object.userData.connectedTopics.map(tid => icosahedronTopicMap.get(tid)?.userData?.name || tid).join(', ')}`;
            }

            if (object !== icosahedronHoveredObject) {
                resetIcosahedronHighlights(); // Reset previous hover highlight
                icosahedronHoveredObject = object;
                applyHighlight(object, true); // Apply new hover highlight
            }
        } else {
            tooltip3d.style.display = 'none';
            if (icosahedronHoveredObject) {
                resetIcosahedronHighlights(); // Clear the last hovered object's highlights
                icosahedronHoveredObject = null;
            }
        }
    }

    function onIcosahedronMouseOut() {
        tooltip3d.style.display = 'none';
        resetIcosahedronHighlights();
        icosahedronHoveredObject = null;
    }

    // Handles click for selection in 3D (no Shift key needed)
    let icosahedronClickStartTime = 0;
    let icosahedronClickStartPos = { x: 0, y: 0 };
    
    function onIcosahedronClick(event) {
        // Check if this was a drag (camera movement) or a real click
        const clickDuration = Date.now() - icosahedronClickStartTime;
        const clickDistance = Math.sqrt(
            Math.pow(event.clientX - icosahedronClickStartPos.x, 2) +
            Math.pow(event.clientY - icosahedronClickStartPos.y, 2)
        );
        
        // If drag detected (moved >10px or held >300ms), don't select
        if (clickDistance > 10 || clickDuration > 300) {
            return;
        }

        const rect = event.target.getBoundingClientRect();
        icosahedronMouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        icosahedronMouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        icosahedronRaycaster.setFromCamera(icosahedronMouse, window.icosahedronCamera);
        const intersects = icosahedronRaycaster.intersectObjects([...window.icosahedronTopics, ...window.icosahedronParticipants], true);

        if (intersects.length > 0) {
            const clickedObject = intersects[0].object;
            const rawConceptId = clickedObject.userData.rawConceptId;
            const conceptData = rawConcepts.find(c => c.id === rawConceptId);
            console.log(`✅ Collected: ${conceptData?.title} (${selected.length + 1}/12)`);
            toggleSelect(rawConceptId, null); // toggle selection. Visual update handled by updateIcosahedronSelection
        }
    }

    // Handles double-click for video playback in 3D
    function onIcosahedronDoubleClick(event) {
        const rect = event.target.getBoundingClientRect();
        icosahedronMouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        icosahedronMouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        icosahedronRaycaster.setFromCamera(icosahedronMouse, window.icosahedronCamera);
        const intersects = icosahedronRaycaster.intersectObjects([...window.icosahedronTopics, ...window.icosahedronParticipants], true);

        if (intersects.length > 0) {
            const clickedObject = intersects[0].object;
            const rawConceptId = clickedObject.userData.rawConceptId;
            const conceptData = rawConcepts.find(rc => rc.id === rawConceptId);
            if (conceptData) playVideo(conceptData);
        }
    }

    // Colors for highlighting
    const COLOR_TOPIC_DEFAULT = new THREE.Color(0x00ff00); // Green
    const COLOR_PARTICIPANT_DEFAULT = new THREE.Color(0xff0000); // Red
    const COLOR_HIGHLIGHT_HOVER = new THREE.Color(0xffff00); // Yellow
    const COLOR_HIGHLIGHT_SELECTED = new THREE.Color(0x0000ff); // Blue for selected
    const COLOR_CONNECTED_HIGHLIGHT = new THREE.Color(0x00ffff); // Cyan for connected

    function applyHighlight(object, isHover = false) {
        const rawConceptId = object.userData.rawConceptId;
        const isCurrentlySelected = selected.includes(rawConceptId);
        let highlightColor;

        if (isCurrentlySelected) {
            highlightColor = COLOR_HIGHLIGHT_SELECTED;
            // Also highlight connected nodes if this is a selected node
            highlightConnected(object, COLOR_CONNECTED_HIGHLIGHT);
        } else if (isHover) {
            highlightColor = COLOR_HIGHLIGHT_HOVER;
            // Also highlight connected nodes on hover
            highlightConnected(object, COLOR_CONNECTED_HIGHLIGHT);
        } else {
            // Should not happen if logic is sound, but as fallback
            highlightColor = object.userData.type === 'topic' ? COLOR_TOPIC_DEFAULT : COLOR_PARTICIPANT_DEFAULT;
        }

        if (object.material.color) {
            object.material.color.copy(highlightColor);
            if (object.userData.type === 'participant') {
                object.material.linewidth = isCurrentlySelected ? 4 : (isHover ? 3 : 2); // Make lines thicker for selected/hovered
            }
        }
        if (object.userData.label) {
            object.userData.label.style.display = 'block';
        }
    }

    function highlightConnected(sourceObject, color) {
        if (sourceObject.userData.type === 'topic') {
            const topicData = icosahedronProcessedData.topics.find(t => t.id === sourceObject.userData.id);
            if (!topicData) return;

            // Highlight connected participants
            [...topicData.teamMembers, ...topicData.critics, ...topicData.observers].forEach(pId => {
                const participantObj = icosahedronParticipantMap.get(pId);
                if (participantObj && !selected.includes(participantObj.userData.rawConceptId)) { // Don't override main selection
                    participantObj.material.color.copy(color);
                    participantObj.material.linewidth = 3;
                    if (participantObj.userData.label) participantObj.userData.label.style.display = 'block';
                }
                // Highlight the other end of the participant connection (the other topic)
                const connectedRawTopicIds = participantObj?.userData.connectedTopics
                    .filter(tid => tid !== sourceObject.userData.id)
                    .map(tid => icosahedronTopicMap.get(tid)?.userData.rawConceptId);
                connectedRawTopicIds?.forEach(rcId => {
                    const otherTopicObj = rawConceptTo3DObjectMap.get(rcId);
                    if (otherTopicObj && !selected.includes(otherTopicObj.userData.rawConceptId)) {
                        otherTopicObj.material.color.copy(color);
                        if (otherTopicObj.userData.label) otherTopicObj.userData.label.style.display = 'block';
                    }
                });
            });
        } else if (sourceObject.userData.type === 'participant') {
            const participantData = icosahedronProcessedData.participants.find(p => p.id === sourceObject.userData.id);
            if (!participantData) return;

            // Highlight connected topics
            participantData.connectedTopics.forEach(tId => {
                const topicObj = icosahedronTopicMap.get(tId);
                if (topicObj && !selected.includes(topicObj.userData.rawConceptId)) { // Don't override main selection
                    topicObj.material.color.copy(color);
                    if (topicObj.userData.label) topicObj.userData.label.style.display = 'block';
                }
            });
        }
    }


    function resetIcosahedronHighlights() {
        window.icosahedronTopics.forEach(topic => {
            // Reset to default if not selected
            if (!selected.includes(topic.userData.rawConceptId)) {
                topic.material.color.copy(COLOR_TOPIC_DEFAULT); 
            }
            // Hide label if labels are not globally visible AND not currently hovered/selected
            const isHovered = icosahedronHoveredObject && icosahedronHoveredObject.userData.rawConceptId === topic.userData.rawConceptId;
            const isSelected = selected.includes(topic.userData.rawConceptId);
            if (topic.userData.label && !window.icosahedronLabelsVisible && !isHovered && !isSelected) {
                topic.userData.label.style.display = 'none';
            }
        });
        window.icosahedronParticipants.forEach(participant => {
            // Reset to default if not selected
            if (!selected.includes(participant.userData.rawConceptId)) {
                participant.material.color.copy(COLOR_PARTICIPANT_DEFAULT); 
                participant.material.linewidth = 2; // Reset line thickness
            }
            // Hide label if labels are not globally visible AND not currently hovered/selected
            const isHovered = icosahedronHoveredObject && icosahedronHoveredObject.userData.rawConceptId === participant.userData.rawConceptId;
            const isSelected = selected.includes(participant.userData.rawConceptId);
            if (participant.userData.label && !window.icosahedronLabelsVisible && !isHovered && !isSelected) {
                participant.userData.label.style.display = 'none';
            }
        });
        // After resetting, re-apply persistent selected highlights
        updateIcosahedronSelection();
    }

    function updateIcosahedronSelection() {
        if (!window.icosahedronInitialized || !icosahedronProcessedData) return;

        // First, reset all to default (non-selected, non-hovered state for non-selected items)
        window.icosahedronTopics.forEach(topic => {
            topic.material.color.copy(COLOR_TOPIC_DEFAULT);
            if (topic.userData.label) {
                topic.userData.label.style.display = (window.icosahedronLabelsVisible || selected.includes(topic.userData.rawConceptId)) ? 'block' : 'none';
            }
        });
        window.icosahedronParticipants.forEach(participant => {
            participant.material.color.copy(COLOR_PARTICIPANT_DEFAULT);
            participant.material.linewidth = 2;
            if (participant.userData.label) {
                participant.userData.label.style.display = (window.icosahedronLabelsVisible || selected.includes(participant.userData.rawConceptId)) ? 'block' : 'none';
            }
        });

        // Then, apply persistent selection highlights and connected highlights
        selected.forEach(rawConceptId => {
            const object = rawConceptTo3DObjectMap.get(rawConceptId);
            if (object) {
                applyHighlight(object, false); // Apply selection highlight
            }
        });

        // Finally, re-apply current hover highlight if any
        if (icosahedronHoveredObject) {
            applyHighlight(icosahedronHoveredObject, true);
        }

        updateIcosahedronLabels(); // Ensure label visibility and position are correct
    }


    // Update label positions based on 3D coordinates projected to screen
    function updateIcosahedronLabels() {
        if (!window.icosahedronInitialized || !window.icosahedronCamera) return;

        const container = document.getElementById('icosahedron-container');
        if (!container || container.offsetWidth === 0 || container.offsetHeight === 0) return; // Not visible
        const containerRect = container.getBoundingClientRect();

        window.icosahedronTopics.forEach(topic => {
            if (!topic.userData.label) return;

            const vector = topic.position.clone();
            vector.applyMatrix4(window.icosahedronGroup.matrixWorld);
            vector.project(window.icosahedronCamera);
            
            // Check if object is behind the camera
            if (vector.z > 1) { // z is normalized depth from -1 to 1, >1 means behind.
                topic.userData.label.style.display = 'none';
                return;
            }

            // Convert to screen coordinates relative to the icosahedron-container
            const x = (vector.x * 0.5 + 0.5) * containerRect.width;
            const y = (-vector.y * 0.5 + 0.5) * containerRect.height;
            topic.userData.label.style.left = `${x}px`;
            topic.userData.label.style.top = `${y}px`;
            
            // Only display if globally visible OR currently hovered OR currently selected
            const isHovered = icosahedronHoveredObject && icosahedronHoveredObject.userData.rawConceptId === topic.userData.rawConceptId;
            const isSelected = selected.includes(topic.userData.rawConceptId);
            topic.userData.label.style.display = (window.icosahedronLabelsVisible || isHovered || isSelected) ? 'block' : 'none';
        });

        window.icosahedronParticipants.forEach(participant => {
            if (!participant.userData.label) return;

            const vector = participant.userData.midpoint.clone();
            vector.applyMatrix4(window.icosahedronGroup.matrixWorld);
            vector.project(window.icosahedronCamera);

            // Check if object is behind the camera
            if (vector.z > 1) { 
                participant.userData.label.style.display = 'none';
                return;
            }

            const x = (vector.x * 0.5 + 0.5) * containerRect.width;
            const y = (-vector.y * 0.5 + 0.5) * containerRect.height;
            participant.userData.label.style.left = `${x}px`;
            participant.userData.label.style.top = `${y}px`;

            const isHovered = icosahedronHoveredObject && icosahedronHoveredObject.userData.rawConceptId === participant.userData.rawConceptId;
            const isSelected = selected.includes(participant.userData.rawConceptId);
            participant.userData.label.style.display = (window.icosahedronLabelsVisible || isHovered || isSelected) ? 'block' : 'none';
        });
    }

    // Label toggle functionality for 3D view
    const toggleLabels3dButton = document.getElementById('toggleLabels3d');
    toggleLabels3dButton.addEventListener('click', () => {
        window.icosahedronLabelsVisible = !window.icosahedronLabelsVisible;
        toggleLabels3dButton.textContent = window.icosahedronLabelsVisible ? 'Hide Labels' : 'Show Labels';
        updateIcosahedronLabels(); // Update label visibility immediately
    });

    // Animation loop
    function animateIcosahedron3D() {
        window.animationFrameId = requestAnimationFrame(animateIcosahedron3D); // Store ID to potentially cancel
        if (!window.icosahedronInitialized) return;

        window.icosahedronControls.update(); // THIS IS CRUCIAL FOR ORBITCONTROLS TO WORK
        window.icosahedronRenderer.render(window.icosahedronScene, window.icosahedronCamera);
        updateIcosahedronLabels();
    }

    // Resize handler for the icosahedron canvas
    function resizeIcosahedronCanvas() {
      if (window.icosahedronRenderer && window.icosahedronCamera && window.icosahedronInitialized) {
        const container = document.getElementById('icosahedron-container');
        window.icosahedronCamera.aspect = container.clientWidth / container.clientHeight;
        window.icosahedronCamera.updateProjectionMatrix();
        window.icosahedronRenderer.setSize(container.clientWidth, container.clientHeight);
        updateIcosahedronLabels(); // Recalculate label positions
      }
    }

    window.addEventListener('resize', () => {
        resizeIcosahedronCanvas();
    });

    // --- INITIALIZATION ---
    console.log("SYNTEGRON: Initializing Extended Field of Vision...");
    renderCards();
    renderList();
    updateDock();
    updateCounts();
    // Default to Grid view initially
    switchView('grid'); 
  </script>
</body>
