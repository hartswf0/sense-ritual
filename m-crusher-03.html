<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Crush: Documentary Assembly</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', 'Helvetica', sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

.container {
  display: grid;
  grid-template-rows: 60px 1fr 100px;
  height: 100vh;
  gap: 2px;
  background: #000;
}

.header {
  background: #111;
  border-bottom: 2px solid #333;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
}

.title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #FFD700;
}

.stats {
  display: flex;
  gap: 30px;
  font-size: 14px;
  font-weight: 700;
}

.stat-item {
  color: #FFD700;
}

.game-area {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

canvas {
  border: 3px solid #FFD700;
  box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
  background: #0a0a0a;
}

.sequence-bar {
  background: #111;
  border-top: 2px solid #333;
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

.sequence-item {
  min-width: 120px;
  height: 80px;
  background: #222;
  border: 2px solid #FFD700;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

.sequence-icon {
  font-size: 24px;
  margin-bottom: 4px;
}

.sequence-title {
  font-size: 10px;
  font-weight: 700;
  color: #FFD700;
  text-align: center;
}

.sequence-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  background: #f00;
  color: #fff;
  width: 20px;
  height: 20px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 900;
}

.controls {
  position: fixed;
  bottom: 120px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  width: 50px;
  height: 50px;
  background: #FFD700;
  border: none;
  color: #000;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.2s;
}

.btn:hover {
  background: #fff;
  transform: scale(1.1);
}

.btn:active {
  transform: scale(0.95);
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #111;
  border: 3px solid #FFD700;
  padding: 30px;
  max-width: 600px;
  width: 90%;
}

.modal-title {
  font-size: 24px;
  font-weight: 900;
  color: #FFD700;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.modal-body {
  color: #fff;
  line-height: 1.8;
}

.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.modal-btn {
  flex: 1;
  padding: 15px;
  background: #FFD700;
  border: none;
  color: #000;
  font-weight: 900;
  cursor: pointer;
  font-size: 14px;
}

.modal-btn.secondary {
  background: #333;
  color: #FFD700;
}

.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #FFD700;
  color: #000;
  padding: 12px 24px;
  font-weight: 900;
  font-size: 14px;
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 100;
}

.toast.show {
  opacity: 1;
}

::-webkit-scrollbar {
  height: 8px;
}

::-webkit-scrollbar-track {
  background: #000;
}

::-webkit-scrollbar-thumb {
  background: #FFD700;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">MATRIX CRUSH</div>
    <div class="stats">
      <div class="stat-item">LEVEL: <span id="level">1</span></div>
      <div class="stat-item">SCORE: <span id="score">0</span></div>
      <div class="stat-item">TARGET: <span id="target">500</span></div>
      <div class="stat-item">MOVES: <span id="moves">30</span></div>
    </div>
  </div>

  <div class="game-area">
    <canvas id="game" width="480" height="480"></canvas>
  </div>

  <div class="sequence-bar" id="sequenceBar">
    <div style="color: #FFD700; font-size: 12px; padding: 30px; opacity: 0.5;">
      Match 3+ to collect fragments →
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn" id="shuffleBtn" title="Shuffle">⟲</button>
  <button class="btn" id="exportBtn" title="Export">↓</button>
  <button class="btn" id="helpBtn" title="Help">?</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">VICTORY</div>
    <div class="modal-body" id="modalBody">
      Target reached. Fragments assembled.
    </div>
    <div class="modal-buttons">
      <button class="modal-btn" id="nextLevel">NEXT LEVEL</button>
      <button class="modal-btn secondary" id="replay">REPLAY</button>
    </div>
  </div>
</div>

<script>
console.log('🎬 Matrix Crush Loading...');

const YOUTUBE_VIDEO_ID = 'BQ2n6SN7gOY';
const FRAGMENTS = [
  { id: 'fom', title: 'Family of Man', category: 'Media Apparatus', icon: '◯', start: 27, end: 53, color: '#4A90E2' },
  { id: 'self', title: 'Individual Self', category: 'Core Concept', icon: '◐', start: 67, end: 78, color: '#62ff87' },
  { id: 'fairy', title: 'Unreal Fairyland', category: 'Systemic Critique', icon: '◑', start: 197, end: 204, color: '#E24A4A' },
  { id: 'grand', title: 'Grand Stories', category: 'Core Concept', icon: '◒', start: 143, end: 148, color: '#62ff87' },
  { id: 'boom', title: 'Societal Boom', category: 'Systemic Control', icon: '◓', start: 230, end: 237, color: '#ff9ecb' },
  { id: 'crack', title: 'Crack Epidemic', category: 'Systemic Event', icon: '◔', start: 291, end: 300, color: '#ffd166' }
];

const LEVELS = [
  {target:500, moves:30},
  {target:1200, moves:28},
  {target:2200, moves:26},
  {target:3500, moves:24},
  {target:5200, moves:22}
];

const N = 8;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let cell = 60;
let grid = [];
let score = 0;
let moves = 30;
let target = 500;
let level = 0;
let collected = [];
let selected = null;
let dragging = false;
let dragStart = null;

function init() {
  console.log('🎮 Initializing...');
  resize();
  startLevel(0);
  setupControls();
  requestAnimationFrame(loop);
}

function startLevel(lvl) {
  level = lvl;
  const L = LEVELS[level % LEVELS.length];
  score = 0;
  moves = L.moves;
  target = L.target;
  collected = [];
  grid = makeGrid();
  updateUI();
  renderSequence();
  console.log('Level', level + 1, 'started');
}

function makeGrid() {
  const g = [];
  for(let r=0; r<N; r++) {
    g[r] = [];
    for(let c=0; c<N; c++) {
      let t;
      do {
        t = Math.floor(Math.random() * FRAGMENTS.length);
      } while(
        (c>1 && g[r][c-1]===t && g[r][c-2]===t) ||
        (r>1 && g[r-1][c]===t && g[r-2][c]===t)
      );
      g[r][c] = t;
    }
  }
  return g;
}

function resize() {
  const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 600);
  canvas.width = canvas.height = size;
  cell = size / N;
}

function loop() {
  draw();
  requestAnimationFrame(loop);
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for(let r=0; r<N; r++) {
    for(let c=0; c<N; c++) {
      const t = grid[r][c];
      if(t == null) continue;
      
      const x = c * cell;
      const y = r * cell;
      const frag = FRAGMENTS[t];
      
      // Cell background
      ctx.fillStyle = '#111';
      ctx.fillRect(x+2, y+2, cell-4, cell-4);
      
      // Gradient fill
      const grd = ctx.createRadialGradient(x+cell/2, y+cell/2, 0, x+cell/2, y+cell/2, cell/2);
      grd.addColorStop(0, frag.color + '44');
      grd.addColorStop(1, frag.color + '11');
      ctx.fillStyle = grd;
      ctx.fillRect(x+4, y+4, cell-8, cell-8);
      
      // Icon
      ctx.fillStyle = frag.color;
      ctx.font = `${cell*0.4}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(frag.icon, x+cell/2, y+cell/2);
      
      // Border
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1;
      ctx.strokeRect(x+2, y+2, cell-4, cell-4);
      
      // Selection
      if(selected && selected.r===r && selected.c===c) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.strokeRect(x+1, y+1, cell-2, cell-2);
      }
    }
  }
}

canvas.onmousedown = (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / (rect.width / N));
  const y = Math.floor((e.clientY - rect.top) / (rect.height / N));
  if(x<0||y<0||x>=N||y>=N) return;
  
  dragging = true;
  dragStart = {r:y, c:x};
  selected = {r:y, c:x};
};

canvas.onmousemove = (e) => {
  if(!dragging || !dragStart) return;
  
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / (rect.width / N));
  const y = Math.floor((e.clientY - rect.top) / (rect.height / N));
  
  const dr = y - dragStart.r;
  const dc = x - dragStart.c;
  
  if(Math.abs(dr) > 0 || Math.abs(dc) > 0) {
    let targetR = dragStart.r;
    let targetC = dragStart.c;
    
    if(Math.abs(dr) > Math.abs(dc)) {
      targetR = dragStart.r + (dr > 0 ? 1 : -1);
    } else if(Math.abs(dc) > 0) {
      targetC = dragStart.c + (dc > 0 ? 1 : -1);
    }
    
    if(targetR>=0 && targetR<N && targetC>=0 && targetC<N) {
      trySwap(dragStart.r, dragStart.c, targetR, targetC);
      dragging = false;
      dragStart = null;
      selected = null;
    }
  }
};

canvas.onmouseup = () => {
  dragging = false;
  dragStart = null;
  selected = null;
};

function trySwap(r1, c1, r2, c2) {
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;
  
  const matched = findMatches();
  if(matched.length > 0) {
    processMatches(matched);
    moves--;
    updateUI();
  } else {
    grid[r1][c1] = grid[r2][c2];
    grid[r2][c2] = tmp;
    showToast('NO MATCH');
  }
}

function findMatches() {
  const matched = [];
  const marked = Array(N).fill(0).map(() => Array(N).fill(false));
  
  for(let r=0; r<N; r++) {
    for(let c=0; c<N-2; c++) {
      if(grid[r][c]>=0 && grid[r][c]===grid[r][c+1] && grid[r][c]===grid[r][c+2]) {
        marked[r][c] = marked[r][c+1] = marked[r][c+2] = true;
      }
    }
  }
  
  for(let c=0; c<N; c++) {
    for(let r=0; r<N-2; r++) {
      if(grid[r][c]>=0 && grid[r][c]===grid[r+1][c] && grid[r][c]===grid[r+2][c]) {
        marked[r][c] = marked[r+1][c] = marked[r+2][c] = true;
      }
    }
  }
  
  for(let r=0; r<N; r++) {
    for(let c=0; c<N; c++) {
      if(marked[r][c]) matched.push([r,c]);
    }
  }
  
  return matched;
}

function processMatches(matched) {
  const types = new Set();
  matched.forEach(([r,c]) => {
    types.add(grid[r][c]);
    grid[r][c] = -1;
  });
  
  types.forEach(t => {
    const frag = FRAGMENTS[t];
    if(!collected.find(f => f.id === frag.id)) {
      collected.push(frag);
      showToast(`COLLECTED: ${frag.icon} ${frag.title}`);
      renderSequence();
    }
  });
  
  score += matched.length * 60;
  
  setTimeout(() => {
    dropAndFill();
    const next = findMatches();
    if(next.length > 0) {
      processMatches(next);
    } else {
      checkWin();
    }
  }, 200);
}

function dropAndFill() {
  for(let c=0; c<N; c++) {
    let write = N-1;
    for(let r=N-1; r>=0; r--) {
      if(grid[r][c] >= 0) {
        grid[write][c] = grid[r][c];
        if(write !== r) grid[r][c] = -1;
        write--;
      }
    }
    for(let r=write; r>=0; r--) {
      grid[r][c] = Math.floor(Math.random() * FRAGMENTS.length);
    }
  }
}

function checkWin() {
  if(score >= target) {
    showModal('VICTORY', `Level ${level+1} complete! Score: ${score}`);
  } else if(moves <= 0) {
    showModal('GAME OVER', `Out of moves. Score: ${score}`);
  }
}

function renderSequence() {
  const bar = document.getElementById('sequenceBar');
  bar.innerHTML = '';
  
  collected.forEach((frag, idx) => {
    const item = document.createElement('div');
    item.className = 'sequence-item';
    item.innerHTML = `
      <div class="sequence-icon">${frag.icon}</div>
      <div class="sequence-title">${frag.title}</div>
      <button class="sequence-remove">✕</button>
    `;
    item.querySelector('.sequence-remove').onclick = (e) => {
      e.stopPropagation();
      collected.splice(idx, 1);
      renderSequence();
    };
    item.onclick = () => {
      window.open(`https://www.youtube.com/watch?v=${YOUTUBE_VIDEO_ID}&t=${frag.start}s`, '_blank');
    };
    bar.appendChild(item);
  });
}

function updateUI() {
  document.getElementById('level').textContent = level + 1;
  document.getElementById('score').textContent = score;
  document.getElementById('target').textContent = target;
  document.getElementById('moves').textContent = moves;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

function showModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modal').classList.add('show');
}

function setupControls() {
  document.getElementById('shuffleBtn').onclick = () => {
    grid = makeGrid();
    showToast('SHUFFLED');
  };
  
  document.getElementById('exportBtn').onclick = () => {
    if(collected.length === 0) {
      showToast('NO FRAGMENTS');
      return;
    }
    const data = {
      title: 'Matrix Crush Sequence',
      timestamp: new Date().toISOString(),
      fragments: collected.map((f, idx) => ({
        order: idx + 1,
        title: f.title,
        category: f.category,
        icon: f.icon,
        start: f.start,
        end: f.end
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `matrix_crush_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('EXPORTED');
  };
  
  document.getElementById('helpBtn').onclick = () => {
    showModal('HELP', 'Drag to swap adjacent candies. Match 3+ to collect documentary fragments. Reach target score before running out of moves.');
  };
  
  document.getElementById('nextLevel').onclick = () => {
    document.getElementById('modal').classList.remove('show');
    startLevel(level + 1);
  };
  
  document.getElementById('replay').onclick = () => {
    document.getElementById('modal').classList.remove('show');
    startLevel(level);
  };
}

window.addEventListener('resize', resize);
init();
console.log('✅ Matrix Crush Ready');
</script>
</body>
</html>
