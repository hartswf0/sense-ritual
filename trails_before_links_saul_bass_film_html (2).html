<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SENSING & RITUALIZING — Code-Cinema Edition</title>
<style>
  :root{
    --bg:#0b0c10; --ink:#eaeaea; --bass:#E94F37; --amber:#F6C667; --mint:#3EB489; --ghost:#9aa3a5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(1200px 800px at 50% 50%, #121418, #090a0d 60%, #000 100%);color:var(--ink);font-family:system-ui, "Inter", Arial, sans-serif;overflow:hidden}

  /* Stage & Slides */
  .stage{position:fixed;inset:0;display:grid;place-items:center}
  .slide{position:absolute;inset:0;display:grid;grid-template-rows:auto 1fr auto;opacity:0;transform:scale(.985);transition:opacity .6s ease, transform .6s ease}
  .slide.active{opacity:1;transform:scale(1)}
  header{padding:2.5vh 5vw;text-align:center}
  h1,h2,h3{margin:.15em 0;letter-spacing:.06em;text-transform:uppercase;font-weight:900}
  h1{font-size:clamp(34px,6.6vw,96px);color:var(--bass)}
  h2{font-size:clamp(22px,3.8vw,48px);color:var(--amber)}
  h3{font-size:clamp(18px,2.6vw,28px);color:var(--mint)}
  p{margin:.6em auto;max-width:1100px;color:var(--ghost);font-size:clamp(16px,1.9vw,22px)}

  /* Canvas container keeps the alley clear and centers art */
  .canvas-wrap{position:relative;display:grid;place-items:center;padding:1vh 2vw}
  canvas{width:90vw;height:64vh;max-width:1400px;border-radius:20px;background:linear-gradient(180deg, #0f1115, #0a0b0f);border:2px solid rgba(255,255,255,.06);box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 0 80px rgba(255,255,255,.02)}

  /* HUD stays off the alley */
  .hud{position:fixed;left:1rem;right:1rem;bottom:1rem;display:flex;justify-content:space-between;align-items:center;gap:.6rem;pointer-events:none}
  .pill{pointer-events:auto;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:.45rem .7rem;display:flex;align-items:center;gap:.5rem}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);padding:.45rem .8rem;border-radius:12px;font-weight:800;text-transform:uppercase;font-size:.8rem}
  .btn:hover{background:rgba(255,255,255,.1)}
  .dots{display:flex;gap:.35rem}
  .dot{width:9px;height:9px;border-radius:50%;background:#333}
  .dot.active{background:var(--amber)}

  /* Saul Bass hairlines sweeping across the frame */
  .orn{position:fixed;inset:0;pointer-events:none}
  .hair{position:absolute;left:-30%;right:130%;height:2px;background:linear-gradient(90deg, transparent, var(--bass), transparent);opacity:.18;animation:sweep 8s linear infinite}
  .hair:nth-child(2){top:45%;animation-duration:10s}
  .hair:nth-child(3){top:75%;animation-duration:12s}
  @keyframes sweep{0%{transform:translateX(0)}100%{transform:translateX(-70%)}}

  @media (max-width:680px){ canvas{height:58vh} }
</style>
</head>
<body>
  <div class="orn" aria-hidden="true">
    <div class="hair" style="top:15%"></div>
    <div class="hair"></div>
    <div class="hair"></div>
  </div>

  <main class="stage" id="stage" aria-live="polite"></main>

  <div class="hud" id="hud">
    <div class="pill"><div id="label">Intro</div></div>
    <div class="pill"><div class="dots" id="dots"></div></div>
    <div class="pill">
      <button class="btn" id="prev">Prev</button>
      <button class="btn" id="next">Next</button>
      <button class="btn" id="auto">Autoplay: Off</button>
      <button class="btn" id="help">Help</button>
    </div>
  </div>

<script>
// ================================
// CODE-CINEMA: Saul Bass x John Whitney
// Each slide renders generative visuals—no stock images.
// ================================
const stage = document.getElementById('stage');
const dots = document.getElementById('dots');
const label = document.getElementById('label');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const autoBtn = document.getElementById('auto');
let slideIndex = 0, autoplay=false, timer=null;

// Utility: make canvas
function makeCanvas(){
  const wrap = document.createElement('div'); wrap.className='canvas-wrap';
  const c = document.createElement('canvas'); c.width=1600; c.height=900; wrap.appendChild(c);
  return {wrap, c, ctx:c.getContext('2d')};
}

// Utility: noise texture for Whitney-esque grit
function makeNoise(ctx,w,h,alpha=28){
  const id = ctx.createImageData(w,h); const d = id.data;
  for(let i=0;i<d.length;i+=4){ const n = (Math.random()*alpha)|0; d[i]=d[i+1]=d[i+2]=n; d[i+3]=255; }
  return id;
}

// Slide factory
function slide(title, subtitle, painter){
  const el = document.createElement('section'); el.className='slide';
  const header = document.createElement('header');
  const h2 = document.createElement('h2'); h2.textContent=title;
  if(subtitle){ const p = document.createElement('p'); p.textContent=subtitle; header.appendChild(h2); header.appendChild(p); }
  else header.appendChild(h2);
  const {wrap, c, ctx} = makeCanvas();
  const footer = document.createElement('div'); footer.style.height='6vh';
  el.appendChild(header); el.appendChild(wrap); el.appendChild(footer);

  let raf, t0=performance.now(), noise;
  function fit(){ const r = c.getBoundingClientRect(); /* no-op keeper for now */ }
  window.addEventListener('resize', fit);

  function draw(t){
    const T = (t - t0)/1000; ctx.save(); painter(ctx, c, T, noise); ctx.restore(); raf=requestAnimationFrame(draw);
  }
  function start(){ noise = makeNoise(ctx, c.width, c.height, 34); raf=requestAnimationFrame(draw); }
  function stop(){ cancelAnimationFrame(raf); }
  return {el, start, stop, setTitle:(s)=>{h2.textContent=s}, get label(){return title}};
}

// Color helpers
const C = {
  bass:'#E94F37', amber:'#F6C667', mint:'#3EB489', ghost:'#9aa3a5', ink:'#eaeaea'
};

// Whitney math helpers
function lissajous(kx,ky,ph,amp,ctr){
  return (t)=>({ x: ctr.x + Math.sin(t*kx + ph)*amp.x, y: ctr.y + Math.sin(t*ky)*amp.y });
}

// 1) INTRO — Kinetic typographic weave
const intro = slide(
  'Act 3: Sensing & Ritualizing',
  'Mind, attention, and the architecture of knowledge.',
  (ctx, c, T, noise)=>{
    ctx.clearRect(0,0,c.width,c.height);
    // grain
    ctx.globalAlpha=.08; ctx.putImageData(noise,0,0); ctx.globalAlpha=1;
    // bands
    for(let i=0;i<18;i++){
      const y = c.height*(i+1)/20;
      ctx.lineWidth = 2 + 2*Math.sin(T*1.2 + i*.6);
      const hue = 8 + i*2; const grad = ctx.createLinearGradient(0,y,c.width,y);
      grad.addColorStop(0, 'rgba(233,79,55,.12)');
      grad.addColorStop(.5, 'rgba(246,198,103,.08)');
      grad.addColorStop(1, 'rgba(62,180,137,.12)');
      ctx.strokeStyle = grad; ctx.beginPath();
      for(let x=0;x<c.width;x+=20){
        const yy = y + Math.sin((x/180)+T*.8 + i*.2)*12 + Math.cos(T*1.4 + i)*6;
        if(x===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
      }
      ctx.stroke();
    }
    // Saul Bass blocks
    ctx.save();
    ctx.translate(c.width*.5, c.height*.42);
    for(let k=0;k<9;k++){
      const s = 260 - k*24 + Math.sin(T*1.1 + k)*8;
      ctx.rotate( (Math.sin(T*.4 + k)*0.002) );
      ctx.strokeStyle = k%2? 'rgba(233,79,55,.35)':'rgba(246,198,103,.28)';
      ctx.lineWidth = 4; ctx.strokeRect(-s/2,-s/2,s,s);
    }
    ctx.restore();
  }
);

// 2) FEED ARCHITECTURES — Flowing columns (show, don’t tell)
const feed = slide(
  'Attention Architectures: Bodies in the Feed',
  'Ritualized scrolling and rhythmic salience.',
  (ctx, c, T, noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.globalAlpha=.06; ctx.putImageData(noise,0,0); ctx.globalAlpha=1;
    const cols = 7, gap = 24; const w = (c.width - (cols+1)*gap)/cols; const h = c.height*.86;
    for(let i=0;i<cols;i++){
      const x = gap + i*(w+gap), y = (c.height-h)/2; // column frame
      // column body
      ctx.fillStyle='rgba(255,255,255,.04)'; ctx.fillRect(x,y,w,h);
      // flowing cards
      const speed = .12 + i*.03; const n = 10;
      for(let j=0;j<n;j++){
        const t = (T*speed + j*.15) % 1; const yy = y + h*(1-t);
        const pad = 10 + (i%2?4:0);
        const cw = w - pad*2; const ch = 18 + ( (j%3)*10 );
        ctx.fillStyle = j%4===0? 'rgba(233,79,55,.9)' : j%5===0? 'rgba(246,198,103,.9)' : 'rgba(255,255,255,.08)';
        ctx.fillRect(x+pad, yy, cw, ch);
        // tiny engagement dots
        ctx.fillStyle='rgba(255,255,255,.5)'; for(let d=0; d<5; d++){ ctx.fillRect(x+pad+6+d*10, yy+ch+6, 4,4); }
      }
    }
  }
);

// 3) GUIDING QUESTION — Orbiting glyphs as attention inflow
const question = slide(
  'How do platforms design attention and belonging?',
  '',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0); ctx.globalAlpha=.85;
    const ctr={x:c.width/2,y:c.height/2};
    const orbit = lissajous(1,2,0,{x:260,y:160},ctr);
    for(let k=0;k<180;k++){
      const p = orbit(T + k*.02); const r = 6 + 3*Math.sin(k*.2+T*2);
      ctx.fillStyle = `hsla(${(k*3+200)%360}, 80%, 60%, ${.06 + .5*Math.pow(k/180,2)})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.strokeStyle='rgba(233,79,55,.7)'; ctx.lineWidth=3; ctx.beginPath();
    ctx.arc(ctr.x, ctr.y, 110 + Math.sin(T)*6, 0, Math.PI*2); ctx.stroke();
  }
);

// 4) CONCEPTS — Trails vs Links diptych
const concepts = slide(
  "Memex Trails ↔ Hypertext Links",
  "Associative paths vs network nodes",
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    // Left: trails (Bezier)
    ctx.save(); ctx.translate(c.width*.22, c.height*.5);
    for(let i=0;i<18;i++){
      ctx.strokeStyle = i%3? 'rgba(246,198,103,.8)':'rgba(233,79,55,.8)'; ctx.lineWidth = 1.5 + (i%5===0?2:0);
      ctx.beginPath(); ctx.moveTo(-260, -180+i*18);
      const c1y = -140 + Math.sin(T*1.1+i)*60; const c2y =  140 + Math.cos(T*.9+i)*60;
      ctx.bezierCurveTo(-60,c1y, 60,c2y, 260,-180+i*18);
      ctx.stroke();
    }
    ctx.restore();
    // Right: nodes (simple force-ish jitter)
    const nodes=[]; const R = 240; const cx=c.width*.68, cy=c.height*.5;
    for(let i=0;i<36;i++){
      const a = (i/36)*Math.PI*2; const r = R*(.5+.5*Math.sin(T*.7+i));
      nodes.push({x:cx + Math.cos(a)*r, y:cy + Math.sin(a)*r});
    }
    ctx.strokeStyle='rgba(62,180,137,.35)'; ctx.lineWidth=1.2;
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.hypot(dx,dy);
      if(d<160){ ctx.globalAlpha = 1 - d/160; ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke(); }
    }
    ctx.globalAlpha=1; nodes.forEach((n,k)=>{ ctx.fillStyle = k%5? 'rgba(62,180,137,.9)':'rgba(233,79,55,.9)'; ctx.beginPath(); ctx.arc(n.x,n.y, 4 + (k%7===0?2:0), 0, Math.PI*2); ctx.fill(); });
  }
);

// 5) WIKIPEDIA — Spiral trail-map
const wiki = slide(
  'Wikipedia as Cognitive Extension',
  'Trails become linked public memory.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const cx=c.width/2, cy=c.height/2; ctx.lineWidth=1.6; ctx.strokeStyle='rgba(246,198,103,.8)';
    ctx.beginPath();
    for(let a=0;a<Math.PI*6;a+=.06){ const r=16*a; const x=cx+Math.cos(a+T*.3)*r, y=cy+Math.sin(a+T*.3)*r; if(a===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.stroke();
    for(let k=0;k<64;k++){ const a=k*.3, r=16*a; const x=cx+Math.cos(a+T*.3)*r, y=cy+Math.sin(a+T*.3)*r; ctx.fillStyle='rgba(62,180,137,.85)'; ctx.fillRect(x-3,y-3,6,6); }
  }
);

// 6) HIDDEN CURRICULA — Book→Phone morph via rounded rect anim
const hidden = slide(
  'Hidden Curricula: Platforms as Pedagogy',
  'Education isn’t only taught; it’s coded.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const x=c.width*.5, y=c.height*.5; const w=520, h=320; const r = 6 + 60*(.5+.5*Math.sin(T*1.2));
    function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x-w/2+r,y-h/2);ctx.arcTo(x+w/2,y-h/2,x+w/2,y+h/2,r);ctx.arcTo(x+w/2,y+h/2,x-w/2,y+h/2,r);ctx.arcTo(x-w/2,y+h/2,x-w/2,y-h/2,r);ctx.arcTo(x-w/2,y-h/2,x+w/2,y-h/2,r);ctx.closePath();}
    ctx.lineWidth=6; ctx.strokeStyle='rgba(233,79,55,.9)'; rr(x,y,w,h,r); ctx.stroke();
    ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,.25)'; rr(x,y,w*.56,h*1.3,46); ctx.stroke();
    // inside lines like pages/feed
    for(let i=0;i<12;i++){ ctx.strokeStyle=i%3? 'rgba(255,255,255,.12)':'rgba(246,198,103,.6)'; ctx.lineWidth=i%4?1.5:3; const yy=y-h/2+30+i*22+Math.sin(T+i)*3; ctx.beginPath(); ctx.moveTo(x-w/2+30,yy); ctx.lineTo(x+w/2-30,yy); ctx.stroke(); }
  }
);

// 7) FEED MECHANISMS — Gauge + ghosted posts
const mechanisms = slide(
  'From Up-Ranking to Shadow-Banning',
  'What you don’t see teaches what matters.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const cx=c.width*.25, cy=c.height*.55; const R=180; // gauge
    ctx.lineWidth=16; ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.beginPath(); ctx.arc(cx,cy,R,Math.PI,.0); ctx.stroke();
    const pct=.5+.5*Math.sin(T*.7); ctx.strokeStyle='rgba(62,180,137,.9)'; ctx.beginPath(); ctx.arc(cx,cy,R,Math.PI, Math.PI*(1-pct)); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='900 40px system-ui'; ctx.fillText(`${Math.round(pct*100)}% reach`, cx-120, cy+16);
    // posts
    const x=c.width*.55, y=c.height*.3, w=520, h=360; ctx.fillStyle='rgba(255,255,255,.05)'; ctx.fillRect(x,y,w,h);
    for(let i=0;i<8;i++){
      const yy=y+20+i*42; const ghost = i%3===0;
      ctx.fillStyle=ghost? 'rgba(255,255,255,.06)':'rgba(233,79,55,.85)'; ctx.fillRect(x+20,yy, w-40, 24);
    }
  }
);

// 8) ATTENTION ECONOMY — Balancing scale
const economy = slide(
  'Attention Economy ↔ The Self',
  'Algorithmic gatekeepers shape individualism.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const cx=c.width/2, cy=c.height*.6; const tilt = Math.sin(T*.9)*.35;
    // beam
    ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=10; ctx.beginPath(); ctx.moveTo(cx-280,cy); ctx.lineTo(cx+280,cy); ctx.stroke();
    // fulcrum
    ctx.fillStyle='rgba(233,79,55,.8)'; ctx.beginPath(); ctx.moveTo(cx,cy-90); ctx.lineTo(cx-40,cy+60); ctx.lineTo(cx+40,cy+60); ctx.closePath(); ctx.fill();
    // pans
    function pan(x,sign,color){ ctx.save(); ctx.translate(x,cy); ctx.rotate(tilt*sign); ctx.fillStyle=color; ctx.fillRect(-100,-14,200,28); ctx.beginPath(); ctx.arc(0,60,58,0,Math.PI*2); ctx.fillStyle='rgba(246,198,103,.7)'; ctx.fill(); ctx.restore(); }
    pan(cx-280,-1,'rgba(255,255,255,.12)'); // economy
    pan(cx+280, 1,'rgba(255,255,255,.12)'); // self
  }
);

// 9) RITUALS — Pulsing altar
const rituals = slide(
  'Platform Rituals: Performance & Exclusion',
  'Silence is also a signal.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const cx=c.width/2, cy=c.height/2;
    for(let r=0;r<8;r++){
      const R=40+r*42 + Math.sin(T*1.5+r)*6; ctx.strokeStyle=r%2? 'rgba(246,198,103,.7)':'rgba(233,79,55,.7)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
    }
    // minimal heart glyphs rotating
    for(let k=0;k<18;k++){
      const a = (k/18)*Math.PI*2 + T*.6; const R = 160 + 80*Math.sin(k*.7+T);
      const x=cx+Math.cos(a)*R, y=cy+Math.sin(a)*R;
      ctx.save(); ctx.translate(x,y); ctx.rotate(a+Math.PI/4);
      ctx.fillStyle='rgba(233,79,55,.9)';
      ctx.beginPath(); ctx.moveTo(0,14); ctx.bezierCurveTo(14,-6, 38,-6, 38,12); ctx.bezierCurveTo(38,30, 20,42, 0,56); ctx.bezierCurveTo(-20,42, -38,30, -38,12); ctx.bezierCurveTo(-38,-6, -14,-6, 0,14); ctx.fill();
      ctx.restore();
    }
  }
);

// 10) ATTENTION FLOWS — Live dual-series graph (scroll vs dwell)
const flows = slide(
  'Attention Flows: Scroll Rate vs Dwell Time',
  'Peaks mark capture; valleys mark drift.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const W=c.width*.8, H=c.height*.5, x0=(c.width-W)/2, y0=(c.height-H)/2;
    // axes
    ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.strokeRect(x0,y0,W,H);
    // generate series
    function series(seed,amp){ const arr=[]; for(let i=0;i<180;i++){ arr.push(.5+.5*Math.sin(i*.12+seed)+.35*Math.sin(i*.033+seed*2)); } return arr.map(v=>v*amp); }
    const scroll = series( T*.6, H*.46 );
    const dwell  = series( T*.9+2, H*.36 ).map((v,i)=> v*(1+(Math.sin(i*.2+T*2)*.15)) );
    // draw
    function path(dat, col){ ctx.strokeStyle=col; ctx.lineWidth=3; ctx.beginPath(); dat.forEach((v,i)=>{ const x=x0 + (i/(dat.length-1))*W; const y=y0 + H - v; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke(); }
    path(scroll, 'rgba(233,79,55,.9)');
    path(dwell,  'rgba(62,180,137,.9)');
    // spikes
    ctx.fillStyle='rgba(246,198,103,.9)'; for(let i=10;i<170;i+=35){ const x=x0+(i/(179))*W; const y=y0 + H - dwell[i]; ctx.fillRect(x-2,y-18,4,18); }
  }
);

// 11) HEATMAP — True generative heatmap
const heatmap = slide(
  'Attention Heatmap',
  'Where the gaze lingers becomes value.',
  (ctx,c,T,noise)=>{
    // heat grid
    const cols=48, rows=27; const cw=c.width/cols, rh=c.height/rows;
    const pts=[]; // moving hotspots
    for(let k=0;k<6;k++) pts.push({x:c.width*(.2 + .12*k), y:c.height*(.3 + .07*k), vx:.6+Math.random(), vy:.7+Math.random()});
    // animate within render frame
    ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle='rgba(255,255,255,.03)'; ctx.fillRect(0,0,c.width,c.height);
    for(let i=0;i<rows;i++){
      for(let j=0;j<cols;j++){
        const x=j*cw+cw/2, y=i*rh+rh/2; let v=0;
        for(const p of pts){ const dx=x-(p.x+Math.sin(T+p.vx*i*.03+j*.02)*120), dy=y-(p.y+Math.cos(T*.9+p.vy*j*.02+i*.01)*80); const d=Math.hypot(dx,dy); v += Math.exp(-(d*d)/(2*120*120)); }
        const h = 10 + 190*v; const a = Math.min(1, v*1.4);
        ctx.fillStyle=`hsla(${h}, 90%, ${40+30*v}%, ${a*.85})`;
        ctx.fillRect(j*cw, i*rh, cw+1, rh+1);
      }
    }
    // UI frame overlay
    ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=12; ctx.strokeRect(c.width*.18, c.height*.14, c.width*.64, c.height*.72);
  }
);

// 12) FEATURE TIMELINE — Stems & bursts
const timeline = slide(
  'Feature Rollouts & Ritual Change',
  'Each feature remaps behavior.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const x0=c.width*.1, x1=c.width*.9, y=c.height*.7; ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();
    for(let k=0;k<8;k++){
      const x = x0 + (k/7)*(x1-x0); const h = 40 + 120*(.5+.5*Math.sin(T*1.1 + k));
      ctx.fillStyle='rgba(246,198,103,.85)'; ctx.fillRect(x-8, y-h, 16, h);
      // burst
      ctx.strokeStyle='rgba(233,79,55,.7)'; ctx.lineWidth=2; for(let r=20;r<80;r+=15){ ctx.beginPath(); ctx.arc(x, y-h, r + Math.sin(T*2+k)*4, 0, Math.PI*2); ctx.stroke(); }
    }
  }
);

// 13) MODERATION — Fuzzy Venn with noise mask
const moderation = slide(
  'Moderation as Moral Pedagogy',
  'Who decides respectful, and with what consequences?',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const cx=c.width/2, cy=c.height/2, R=180;
    function circle(x, col){ ctx.fillStyle=col; ctx.beginPath(); ctx.arc(cx+x,cy,R,0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=.75; circle(-120,'rgba(62,180,137,.65)'); circle(120,'rgba(233,79,55,.65)');
    ctx.globalAlpha=1; ctx.fillStyle='rgba(246,198,103,.75)'; ctx.beginPath(); ctx.arc(cx-120,cy,R,0,Math.PI*2); ctx.clip(); ctx.beginPath(); ctx.arc(cx+120,cy,R,0,Math.PI*2); ctx.clip('evenodd');
    // intersection texture
    for(let i=0;i<2200;i++){ const x=cx+(Math.random()*240-120), y=cy+(Math.random()*200-100); ctx.fillRect(x,y,1.5,1.5); }
  }
);

// 14) CLOSER — Dissolving network
const closer = slide(
  'What Now? Act · Inquire · Recompose',
  'Audit rituals, compare curricula, redesign a gesture.',
  (ctx,c,T,noise)=>{
    ctx.clearRect(0,0,c.width,c.height); ctx.putImageData(noise,0,0);
    const N=220; const pts=[]; for(let i=0;i<N;i++){ const a=i/N*Math.PI*2; const r=220+120*Math.sin(i*.17+T*.6); pts.push({x:c.width/2+Math.cos(a)*r, y:c.height/2+Math.sin(a)*r}); }
    ctx.strokeStyle='rgba(246,198,103,.5)'; ctx.lineWidth=1.2; for(let i=0;i<N;i+=1){ for(let j=i+1;j<i+8 && j<N; j++){ const p=pts[i], q=pts[j]; ctx.globalAlpha=.2; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke(); }}
    ctx.globalAlpha=1; pts.forEach((p,k)=>{ ctx.fillStyle = k%9? 'rgba(62,180,137,.9)':'rgba(233,79,55,.9)'; ctx.fillRect(p.x-2,p.y-2,4,4); });
  }
);

const slides = [intro, feed, question, concepts, wiki, hidden, mechanisms, economy, rituals, flows, heatmap, timeline, moderation, closer];
// Build DOM
slides.forEach((s,idx)=>{ stage.appendChild(s.el); const d=document.createElement('div'); d.className='dot'; d.onclick=()=>go(idx); dots.appendChild(d); });

function go(n){ if(n<0) n=0; if(n>slides.length-1) n=slides.length-1; if(n===slideIndex) return;
  slides[slideIndex].el.classList.remove('active'); slides[slideIndex].stop();
  slideIndex=n; slides[slideIndex].el.classList.add('active'); slides[slideIndex].start();
  label.textContent = slides[slideIndex].label; updateDots(); }
function updateDots(){ [...dots.children].forEach((d,i)=>d.classList.toggle('active', i===slideIndex)); }

// Init
slides[0].el.classList.add('active'); slides[0].start(); updateDots();

function next(){ go(slideIndex+1); }
function prev(){ go(slideIndex-1); }

nextBtn.addEventListener('click', (e)=>{e.stopPropagation(); next();});
prevBtn.addEventListener('click', (e)=>{e.stopPropagation(); prev();});
autoBtn.addEventListener('click', (e)=>{e.stopPropagation(); autoplay=!autoplay; autoBtn.textContent=`Autoplay: ${autoplay?'On':'Off'}`; if(timer) clearInterval(timer); if(autoplay){ timer=setInterval(()=>{ if(slideIndex<slides.length-1) next(); else go(0); }, 5200); }});

// Tap/keys
window.addEventListener('keydown', (e)=>{ if(e.key==='ArrowRight' || e.key===' ') next(); if(e.key==='ArrowLeft') prev(); });
stage.addEventListener('pointerdown',(e)=>{ const w=window.innerWidth; if(e.clientX<w*0.33) prev(); else next(); });
</script>
