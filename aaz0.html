            this.PIECE_TOKENS = {
                'I': { shape: [[1,1,1,1]], concept: this.VIDEO_CONCEPTS[0] },
                'O': { shape: [[1,1],[1,1]], concept: this.VIDEO_CONCEPTS[1] },
                'T': { shape: [[0,1,0],[1,1,1]], concept: this.VIDEO_CONCEPTS[2] },
                'L': { shape: [[0,0,1],[1,1,1]], concept: this.VIDEO_CONCEPTS[3] },
                'J': { shape: [[1,0,0],[1,1,1]], concept: this.VIDEO_CONCEPTS[4] },
                'S': { shape: [[0,1,1],[1,1,0]], concept: this.VIDEO_CONCEPTS[5] },
                'Z': { shape: [[1,1,0],[0,1,1]], concept: this.VIDEO_CONCEPTS[6] }
            };
            
            this.fragmentQueue = [...this.VIDEO_CONCEPTS];
            this.usedFragments = new Set();
            
            this.initGame();
        }
        
        initGame() {
            this.setupScene();
            this.setupCamera();
            this.setupRenderer();
            this.setupLighting();
            this.setupControls();
            this.setupUI();
            this.fillNextQueue();
        }
        
        setupScene() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x0a0a0a);
            
            // Grid visualization
            const gridHelper = new THREE.GridHelper(this.GRID_WIDTH, this.GRID_WIDTH, 0x333333, 0x1a1a1a);
            gridHelper.rotation.x = Math.PI / 2;
            gridHelper.position.set(this.GRID_WIDTH / 2, this.GRID_HEIGHT / 2, -0.1);
            this.scene.add(gridHelper);
        }
        
        setupCamera() {
            this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // PERFECTLY CENTERED on grid
            this.defaultCameraPos = new THREE.Vector3(
                this.GRID_WIDTH / 2,
                this.GRID_HEIGHT / 2,
                this.GRID_HEIGHT * 1.2
            );
            this.defaultCameraLookAt = new THREE.Vector3(
                this.GRID_WIDTH / 2,
                this.GRID_HEIGHT / 2,
                0
            );
            
            this.camera.position.copy(this.defaultCameraPos);
            this.camera.lookAt(this.defaultCameraLookAt);
            
            // Animation targets
            this.cameraTarget = {
                position: this.camera.position.clone(),
                lookAt: this.defaultCameraLookAt.clone()
            };
            
            // Raycaster for click detection
            this.raycaster = new THREE.Raycaster();
            this.mouse = new THREE.Vector2();
        }
        
        setupRenderer() {
            const canvas = document.getElementById('tetrisCanvas');
            this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            
            this.cssScene = new THREE.Scene();
            this.cssRenderer = new THREE.CSS3DRenderer();
            this.cssRenderer.setSize(window.innerWidth, window.innerHeight);
            this.cssRenderer.domElement.style.position = 'absolute';
            this.cssRenderer.domElement.style.top = '0';
            this.cssRenderer.domElement.style.pointerEvents = 'none';
            document.body.insertBefore(this.cssRenderer.domElement, canvas);
            
            window.addEventListener('resize', () => this.onWindowResize());
            window.addEventListener('click', (e) => this.handleClick(e));
        }
        
        setupLighting() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            const directional = new THREE.DirectionalLight(0xffffff, 0.8);
            directional.position.set(5, 5, 5);
            this.scene.add(ambient, directional);
        }
        
        setupControls() {
            const keyMap = {
                'ArrowLeft': () => this.movePiece(-1),
                'ArrowRight': () => this.movePiece(1),
                'ArrowDown': () => this.dropPiece(),
                'ArrowUp': () => this.rotatePiece(),
                'c': () => this.holdPieceFunction(),
                ' ': () => this.togglePause()
            };
            
            window.addEventListener('keydown', (e) => {
                const action = keyMap[e.key];
                if (action) action();
            });
            
            // Mobile controls
            document.getElementById('leftBtn').addEventListener('click', () => this.movePiece(-1));
            document.getElementById('rightBtn').addEventListener('click', () => this.movePiece(1));
            document.getElementById('dropBtn').addEventListener('click', () => this.dropPiece());
            document.getElementById('rotateBtn').addEventListener('click', () => this.rotatePiece());
            document.getElementById('holdBtn').addEventListener('click', () => this.holdPieceFunction());
            document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
            
            // Difficulty selection
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const difficulty = btn.dataset.difficulty;
                    this.startGame(difficulty);
                    document.getElementById('titleScreen').classList.add('hidden');
                });
            });
            
            // Restart
            document.getElementById('restartBtn').addEventListener('click', () => this.resetGame());
        }
        
        setupUI() {
            // Toggle panels
            document.getElementById('flowToggle').addEventListener('click', () => {
                document.getElementById('narrativeFlow').classList.toggle('active');
            });
            
            document.getElementById('paramToggle').addEventListener('click', () => {
                document.getElementById('parameterSpace').classList.toggle('active');
            });
            
            document.getElementById('timelineToggle').addEventListener('click', () => {
                const timeline = document.getElementById('timelineRibbon');
                timeline.classList.toggle('active');
                if (timeline.classList.contains('active')) {
                    this.renderTimeline();
                }
            });
            
            // Parameter sliders
            this.setupSlider('speedSlider', 'speedValue', (val) => {
                this.speedMultiplier = val * 2; // 0-2x speed
                this.dropInterval = Math.max(100, 1000 / this.speedMultiplier);
            });
            
            this.setupSlider('gravitySlider', 'gravityValue', (val) => {
                this.gravityMultiplier = val * 2;
            });
            
            this.setupSlider('zoomSlider', 'zoomValue', (val) => {
                this.zoomLevel = 0.5 + val * 1.5; // 0.5x to 2x zoom
                this.updateCameraZoom();
            });
            
            // Focus overlay
            document.getElementById('focusClose').addEventListener('click', () => {
                this.unfocusBlock();
            });
            
            document.getElementById('focusRemove').addEventListener('click', () => {
                this.removeFragment();
            });
        }
        
        setupSlider(sliderId, valueId, callback) {
            const slider = document.getElementById(sliderId);
            const thumb = slider.querySelector('.slider-thumb');
            const fill = slider.querySelector('.slider-fill');
            const valueDisplay = document.getElementById(valueId);
            
            let isDragging = false;
            
            const updateSlider = (e) => {
                const rect = slider.getBoundingClientRect();
                const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const percent = x / rect.width;
                
                thumb.style.left = (percent * 100) + '%';
                fill.style.width = (percent * 100) + '%';
                valueDisplay.textContent = percent.toFixed(2);
                
                callback(percent);
            };
            
            thumb.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mousemove', (e) => {
                if (isDragging) updateSlider(e);
            });
            document.addEventListener('mouseup', () => isDragging = false);
            
            slider.addEventListener('click', updateSlider);
        }
        
        handleClick(event) {
            // Skip UI elements
            if (event.target.closest('#statusBar, #symbolicControls, #narrativeFlow, #parameterSpace')) {
                return;
            }
            
            this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            this.raycaster.setFromCamera(this.mouse, this.camera);
            const intersects = this.raycaster.intersectObjects(this.scene.children, true);
            
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (obj.parent && obj.parent.userData.concept) {
                    this.focusOnBlock(obj.parent);
                }
            } else if (this.focusedBlock) {
                this.unfocusBlock();
            }
        }
        
        focusOnBlock(block) {
            this.focusedBlock = block;
            const concept = block.userData.concept;
            
            // Smooth camera animation to block
            this.cameraAnimating = true;
            const blockPos = block.position.clone();
            
            this.cameraTarget = {
                position: new THREE.Vector3(blockPos.x, blockPos.y, blockPos.z + 3),
                lookAt: blockPos
            };
            
            // Show focus overlay
            document.getElementById('focusTitle').textContent = concept.title;
            document.getElementById('focusMeta').textContent = `${concept.category} • ${concept.start}s-${concept.end}s`;
            document.getElementById('focusOverlay').classList.add('active');
            
            // Pause game while focused
            this.isPaused = true;
        }
        
        unfocusBlock() {
            this.focusedBlock = null;
            this.cameraAnimating = true;
            
            // Return to default view
            this.cameraTarget = {
                position: this.defaultCameraPos.clone().multiplyScalar(this.zoomLevel),
                lookAt: this.defaultCameraLookAt.clone()
            };
            
            document.getElementById('focusOverlay').classList.remove('active');
            this.isPaused = false;
        }
        
        removeFragment() {
            if (!this.focusedBlock) return;
            
            const pos = this.focusedBlock.userData.position;
            if (pos) {
                this.grid[pos.y][pos.x] = null;
                this.scene.remove(this.focusedBlock);
                
                // Remove from collected fragments
                this.collectedFragments = this.collectedFragments.filter(f => 
                    !(f.x === pos.x && f.lineY === pos.y)
                );
                
                this.applyGravity();
                this.renderLockedBlocks();
                this.updateNarrativeFlow();
            }
            
            this.unfocusBlock();
        }
        
        updateCameraAnimation() {
            if (!this.cameraAnimating) return;
            
            const speed = 0.1;
            const positionDelta = this.cameraTarget.position.clone().sub(this.camera.position);
            
            if (positionDelta.length() < 0.01) {
                this.camera.position.copy(this.cameraTarget.position);
                this.camera.lookAt(this.cameraTarget.lookAt);
                this.cameraAnimating = false;
            } else {
                this.camera.position.add(positionDelta.multiplyScalar(speed));
                this.camera.lookAt(this.cameraTarget.lookAt);
            }
        }
        
        updateCameraZoom() {
            if (!this.cameraAnimating) {
                const zoomedPos = this.defaultCameraPos.clone().multiplyScalar(this.zoomLevel);
                this.camera.position.copy(zoomedPos);
                this.camera.lookAt(this.defaultCameraLookAt);
            }
        }
        
        fillNextQueue() {
            while (this.nextPieces.length < 3) {
                this.nextPieces.push(this.selectPieceWithProbability());
            }
        }
        
        selectPieceWithProbability() {
            if (this.fragmentQueue.length === 0) {
                this.fragmentQueue = [...this.VIDEO_CONCEPTS];
                for (let i = this.fragmentQueue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.fragmentQueue[i], this.fragmentQueue[j]] = [this.fragmentQueue[j], this.fragmentQueue[i]];
                }
                this.usedFragments.clear();
            }
            
            const concept = this.fragmentQueue.shift();
            this.usedFragments.add(concept.id);
            
            const pieceTypes = Object.keys(this.PIECE_TOKENS);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            const pieceShape = this.PIECE_TOKENS[randomType].shape;
            
            return new Piece(randomType, pieceShape, concept, this.GRID_WIDTH, this.GRID_HEIGHT);
        }
        
        spawnPiece() {
            if (this.nextPieces.length === 0) this.fillNextQueue();
            
            this.currentPiece = this.nextPieces.shift();
            this.currentPiece.x = Math.floor(this.GRID_WIDTH / 2) - Math.ceil(this.currentPiece.shape[0].length / 2);
            this.currentPiece.y = this.GRID_HEIGHT - 1;
            
            this.fillNextQueue();
            
            if (this.currentPiece.checkCollision(this.grid)) {
                this.showGameOver();
                return;
            }
            
            this.renderPiece();
            
            if (!this.gameLoopStarted) {
                this.startGameLoop();
                this.gameLoopStarted = true;
            }
        }
        
        renderPiece() {
            if (this.pieceGroup) this.scene.remove(this.pieceGroup);
            this.pieceGroup = new THREE.Group();
            
            this.currentPiece.shape.forEach((row, y) => {
                row.forEach((cell, x) => {
                    if (cell) {
                        const block = this.renderBlock(
                            this.currentPiece.x + x,
                            this.currentPiece.y - y,
                            this.currentPiece.concept.color,
                            0.8,
                            this.currentPiece.concept
                        );
                        this.pieceGroup.add(block);
                    }
                });
            });
            
            this.scene.add(this.pieceGroup);
        }
        
        renderBlock(x, y, color, opacity = 1, concept = null) {
            const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95);
            const material = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.3,
                opacity: opacity,
                transparent: opacity < 1
            });
            
            const cube = new THREE.Mesh(geometry, material);
            
            const edges = new THREE.LineSegments(
                new THREE.EdgesGeometry(geometry),
                new THREE.LineBasicMaterial({ color: 0xffffff, opacity: opacity, transparent: opacity < 1 })
            );
            
            const blockGroup = new THREE.Group();
            blockGroup.add(cube);
            blockGroup.add(edges);
            blockGroup.position.set(x + 0.5, y + 0.5, 0);
            blockGroup.userData.concept = concept;
            blockGroup.userData.position = { x, y };
            blockGroup.name = 'lockedBlock';
            
            return blockGroup;
        }
        
        createVideoScreen(concept) {
            const el = document.createElement('div');
            const size = 300;
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.background = '#000';
            el.style.overflow = 'hidden';
            el.style.position = 'relative';
            
            if (this.USE_LOCAL_MEDIA && this.VIDEO_FILE_MAP[concept.id]) {
                const video = document.createElement('video');
                video.src = this.MEDIA_FOLDER + this.VIDEO_FILE_MAP[concept.id];
                video.loop = true;
                video.muted = true;
                video.autoplay = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.play().catch(e => console.log('Autoplay prevented'));
                el.appendChild(video);
            }
            
            const obj = new THREE.CSS3DObject(el);
            obj.scale.set(1/size, 1/size, 1);
            obj.userData.concept = concept;
            return obj;
        }
        
        movePiece(direction) {
            if (this.isPaused || this.isGameOver) return;
            this.currentPiece.x += direction;
            if (this.currentPiece.checkCollision(this.grid)) {
                this.currentPiece.x -= direction;
            } else {
                this.renderPiece();
            }
        }
        
        rotatePiece() {
            if (this.isPaused || this.isGameOver) return;
            const rotated = this.currentPiece.attemptRotate(this.grid);
            if (rotated) this.renderPiece();
        }
        
        dropPiece() {
            if (this.isPaused || this.isGameOver) return;
            this.currentPiece.y -= 1;
            if (this.currentPiece.checkCollision(this.grid)) {
                this.currentPiece.y += 1;
                this.lockPiece();
                this.clearLines();
                this.updateScore();
                this.spawnPiece();
            } else {
                this.renderPiece();
            }
        }
        
        holdPieceFunction() {
            if (this.isPaused || this.isGameOver || !this.canHold) return;
            this.canHold = false;
            
            if (this.holdPiece) {
                const temp = this.holdPiece;
                this.holdPiece = this.currentPiece;
                this.currentPiece = new Piece(
                    temp.type,
                    JSON.parse(JSON.stringify(temp.shape)),
                    temp.concept,
                    this.GRID_WIDTH,
                    this.GRID_HEIGHT
                );
                this.currentPiece.x = Math.floor(this.GRID_WIDTH / 2) - Math.ceil(this.currentPiece.shape[0].length / 2);
                this.currentPiece.y = this.GRID_HEIGHT - 1;
                
                if (this.currentPiece.checkCollision(this.grid)) {
                    this.showGameOver();
                    return;
                }
                
                this.renderPiece();
            } else {
                this.holdPiece = this.currentPiece;
                this.spawnPiece();
            }
        }
        
        lockPiece() {
            this.currentPiece.shape.forEach((row, dy) => {
                row.forEach((cell, dx) => {
                    if (cell) {
                        const x = this.currentPiece.x + dx;
                        const y = Math.floor(this.currentPiece.y - dy);
                        
                        if (y >= 0 && y < this.GRID_HEIGHT && x >= 0 && x < this.GRID_WIDTH) {
                            this.grid[y][x] = {
                                color: this.currentPiece.concept.color,
                                concept: this.currentPiece.concept
                            };
                            
                            if (this.currentPiece.concept) {
                                const videoScreen = this.createVideoScreen(this.currentPiece.concept);
                                videoScreen.position.set(x + 0.5, y + 0.5, 0.5);
                                videoScreen.name = `video_${x}_${y}`;
                                this.cssScene.add(videoScreen);
                            }
                        }
                    }
                });
            });
            
            this.canHold = true;
            this.renderLockedBlocks();
        }
        
        clearLines() {
            const linesToClear = [];
            
            for (let y = 0; y < this.GRID_HEIGHT; y++) {
                if (this.grid[y].every(cell => cell !== null)) {
                    linesToClear.push(y);
                }
            }
            
            if (linesToClear.length > 0) {
                linesToClear.forEach(y => {
                    for (let x = 0; x < this.GRID_WIDTH; x++) {
                        const cell = this.grid[y][x];
                        if (cell && cell.concept) {
                            this.collectedFragments.push({
                                concept: cell.concept,
                                timestamp: Date.now(),
                                lineY: y,
                                x: x
                            });
                        }
                        
                        const videoKey = `video_${x}_${y}`;
                        const video = this.cssScene.children.find(c => c.name === videoKey);
                        if (video) this.cssScene.remove(video);
                        
                        this.grid[y][x] = null;
                    }
                });
                
                this.applyGravity();
                this.updateNarrativeFlow();
                this.updateFragmentCount();
                this.renderLockedBlocks();
            }
        }
        
        applyGravity() {
            for (let x = 0; x < this.GRID_WIDTH; x++) {
                const blocks = [];
                for (let y = 0; y < this.GRID_HEIGHT; y++) {
                    if (this.grid[y][x] !== null) {
                        blocks.push(this.grid[y][x]);
                    }
                }
                
                for (let y = 0; y < this.GRID_HEIGHT; y++) {
                    this.grid[y][x] = null;
                }
                
                for (let i = 0; i < blocks.length; i++) {
                    this.grid[i][x] = blocks[i];
                }
            }
            
            // Recreate videos
            for (let y = 0; y < this.GRID_HEIGHT; y++) {
                for (let x = 0; x < this.GRID_WIDTH; x++) {
                    const cell = this.grid[y][x];
                    if (cell && cell.concept) {
                        const videoScreen = this.createVideoScreen(cell.concept);
                        videoScreen.position.set(x + 0.5, y + 0.5, 0.5);
                        videoScreen.name = `video_${x}_${y}`;
                        this.cssScene.add(videoScreen);
                    }
                }
            }
        }
        
        renderLockedBlocks() {
            const existing = this.scene.children.filter(c => c.name === 'lockedBlock');
            existing.forEach(b => this.scene.remove(b));
            
            for (let y = 0; y < this.GRID_HEIGHT; y++) {
                for (let x = 0; x < this.GRID_WIDTH; x++) {
                    const cell = this.grid[y][x];
                    if (cell !== null) {
                        const color = typeof cell === 'object' ? cell.color : cell;
                        const concept = typeof cell === 'object' ? cell.concept : null;
                        const block = this.renderBlock(x, y, color, 1, concept);
                        this.scene.add(block);
                    }
                }
            }
        }
        
        updateNarrativeFlow() {
            const flowNodes = document.getElementById('flowNodes');
            flowNodes.innerHTML = '';
            
            this.collectedFragments.forEach((frag, i) => {
                if (i > 0) {
                    const connector = document.createElement('div');
                    connector.className = 'flow-connector';
                    flowNodes.appendChild(connector);
                }
                
                const node = document.createElement('div');
                node.className = 'flow-node';
                node.innerHTML = `
                    <div class="flow-node-icon">${this.getCategoryIcon(frag.concept.category)}</div>
                    <div>${frag.concept.title}</div>
                `;
                node.addEventListener('click', () => {
                    alert(`${frag.concept.title}\n${frag.concept.category}\n${frag.concept.start}s-${frag.concept.end}s`);
                });
                flowNodes.appendChild(node);
            });
        }
        
        getCategoryIcon(category) {
            const icons = {
                'Media Apparatus': '📺',
                'Core Concept': '💡',
                'Theory': '📚',
                'Systemic Critique': '⚠️',
                'Systemic Event': '⏱️'
            };
            return icons[category] || '◆';
        }
        
        updateFragmentCount() {
            document.getElementById('fragmentCount').textContent = 
                `${this.collectedFragments.length}/${this.VIDEO_CONCEPTS.length}`;
        }
        
        renderTimeline() {
            const canvas = document.getElementById('timelineCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (this.collectedFragments.length === 0) return;
            
            const barHeight = 60;
            const gap = 10;
            const barWidth = (canvas.width - gap * (this.collectedFragments.length + 1)) / this.collectedFragments.length;
            
            this.collectedFragments.forEach((frag, i) => {
                const x = gap + i * (barWidth + gap);
                const y = (canvas.height - barHeight) / 2;
                
                ctx.fillStyle = `#${frag.concept.color.toString(16).padStart(6, '0')}`;
                ctx.fillRect(x, y, barWidth, barHeight);
                
                ctx.strokeStyle = '#AED581';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, barWidth, barHeight);
                
                ctx.fillStyle = '#fff';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(frag.concept.title, x + barWidth/2, y + barHeight/2);
            });
        }
        
        updateScore() {
            this.score += 10;
            document.getElementById('scoreDisplay').textContent = this.score;
            
            if (this.score >= this.level * 100) {
                this.level++;
                document.getElementById('levelDisplay').textContent = this.level;
                this.dropInterval = Math.max(200, this.dropInterval - 50);
            }
        }
        
        togglePause() {
            if (this.isGameOver) return;
            this.isPaused = !this.isPaused;
        }
        
        showGameOver() {
            this.isGameOver = true;
            document.getElementById('finalScore').textContent = this.score;
            document.getElementById('finalFragments').textContent = this.collectedFragments.length;
            document.getElementById('gameOverModal').classList.add('active');
        }
        
        resetGame() {
            this.grid = Array.from({ length: this.GRID_HEIGHT }, () => Array(this.GRID_WIDTH).fill(null));
            this.score = 0;
            this.level = 1;
            this.collectedFragments = [];
            this.isGameOver = false;
            
            document.getElementById('scoreDisplay').textContent = '0';
            document.getElementById('levelDisplay').textContent = '1';
            document.getElementById('fragmentCount').textContent = '0/7';
            document.getElementById('gameOverModal').classList.remove('active');
            
            if (this.pieceGroup) this.scene.remove(this.pieceGroup);
            const existing = this.scene.children.filter(c => c.name === 'lockedBlock');
            existing.forEach(b => this.scene.remove(b));
            
            this.cssScene.children.forEach(c => {
                if (c.name && c.name.startsWith('video_')) this.cssScene.remove(c);
            });
            
            this.nextPieces = [];
            this.holdPiece = null;
            this.fillNextQueue();
            this.spawnPiece();
        }
        
        startGame(difficulty) {
            const intervals = { beginner: 1000, medium: 700, expert: 400 };
            this.dropInterval = intervals[difficulty] || 1000;
            this.spawnPiece();
        }
        
        startGameLoop() {
            this.lastDropTime = Date.now();
            const animate = () => {
                requestAnimationFrame(animate);
                
                if (!this.isPaused && !this.isGameOver) {
                    const now = Date.now();
                    if (now - this.lastDropTime > this.dropInterval) {
                        this.dropPiece();
                        this.lastDropTime = now;
                    }
                }
                
                this.updateCameraAnimation();
                this.renderer.render(this.scene, this.camera);
                if (this.cssRenderer) this.cssRenderer.render(this.cssScene, this.camera);
            };
            animate();
        }
        
        onWindowResize() {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.cssRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    }
    
    class Piece {
        constructor(type, shape, concept, gridWidth, gridHeight) {
            this.type = type;
            this.shape = shape;
            this.concept = concept;
            this.color = concept.color;
            this.gridWidth = gridWidth;
            this.gridHeight = gridHeight;
            this.x = 0;
            this.y = 0;
            this.rotationState = 0;
        }
        
        rotate() {
            this.shape = this.shape[0].map((_, index) =>
                this.shape.map(row => row[index]).reverse()
            );
            this.rotationState = (this.rotationState + 1) % 4;
        }
        
        attemptRotate(grid) {
            const originalShape = JSON.parse(JSON.stringify(this.shape));
            const originalX = this.x;
            const originalY = this.y;
            const originalRotation = this.rotationState;
            
            this.rotate();
            
            const wallKicks = [[0,0], [1,0], [-1,0], [0,1], [0,-1]];
            
            for (const [kickX, kickY] of wallKicks) {
                this.x += kickX;
                this.y += kickY;
                if (!this.checkCollision(grid)) {
                    return true;
                }
                this.x = originalX;
                this.y = originalY;
            }
            
            this.shape = originalShape;
            this.rotationState = originalRotation;
            return false;
        }
        
        checkCollision(grid) {
            return this.shape.some((row, dy) =>
                row.some((cell, dx) => {
                    if (!cell) return false;
                    const x = this.x + dx;
                    const y = Math.floor(this.y - dy);
                    return (
                        x < 0 || x >= this.gridWidth ||
                        y < 0 || y >= this.gridHeight ||
                        (y >= 0 && grid[y] && grid[y][x])
                    );
                })
            );
        }
    }
    
    window.addEventListener('load', () => {
        new QuantumTetris();
    });
    </script>
