    .tool-name {

      font-weight: 700;
      letter-spacing: 0.05em;

    .credit {
      margin-top: 3rem;

      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.1em;

    @media (max-width: 480px) {

      }
