<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MEDIA TV SWIPER — Documentary Fragments</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --bg: #000;
    --card-bg: #1a1a1a;
    --accent: #AED581;
    --text: #fff;
    --dim: #666;
  }
  body{ 
    font-family: 'Courier New', monospace; 
    background: var(--bg); 
    color: var(--text); 
    overflow: hidden;
    touch-action: pan-y;
  }
  
  /* VERTICAL FEED CONTAINER */
  #feed-container{
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  /* TV CARD */
  .tv-card{
    position: absolute;
    width: min(92vw, 600px);
    max-height: 85vh;
    background: var(--card-bg);
    border: 3px solid var(--accent);
    border-radius: 0;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
    touch-action: pan-y;
  }
  
  .tv-card.swiping{
    transition: none;
  }
  
  .tv-card.exiting-up{
    animation: exitUp 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  
  .tv-card.exiting-down{
    animation: exitDown 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  
  @keyframes exitUp{
    to{ transform: translateY(-120vh); opacity: 0; }
  }
  
  @keyframes exitDown{
    to{ transform: translateY(120vh); opacity: 0; }
  }
  
  /* TV SCREEN */
  .tv-screen{
    width: 100%;
    flex: 0 0 auto;
    aspect-ratio: 16 / 9;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  .tv-screen video{
    width: 100%;
    height: 100%;
    object-fit: cover;
    border: none;
  }
  
  .tv-screen .placeholder{
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    color: var(--dim);
    font-size: 48px;
  }
  
  /* TV INFO */
  .tv-info{
    padding: 20px;
    flex: 1;
    overflow-y: auto;
  }
  
  .tv-title{
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .tv-category{
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  
  .tv-desc{
    font-size: 14px;
    line-height: 1.6;
    color: #ccc;
    margin-bottom: 16px;
  }
  
  .tv-tags{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  
  .tv-tag{
    padding: 4px 10px;
    background: rgba(174, 213, 129, 0.2);
    border: 1px solid var(--accent);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  /* SWIPE INDICATOR */
  .swipe-indicator{
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--dim);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  
  /* COUNTER */
  .counter{
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 14px;
    color: var(--accent);
    font-weight: bold;
    z-index: 10;
    background: rgba(0,0,0,0.8);
    padding: 8px 12px;
    border: 2px solid var(--accent);
  }
</style>
</head>

      { id: 'brexit-take-back-control', title: 'Brexit', category: 'Political Project', desc: 'A way to get rid of failed elites and old political systems.', tags: ['Populism', 'Nationalism'], file: 'video_d216d4ed13a74083bc1414427d93b6ef.mp4' },
      { id: 'trump-qanon-pedophile-cabal', title: 'Trump & QAnon', category: 'Political Phenomenon', desc: 'QAnon explained nothing happening via secret cabal of pedophiles.', tags: ['Politics', 'Conspiracy'], file: 'video_d8c1e1812f3f4477ad1ea5afba750261.mp4' },
      { id: 'liberal-avoidance-despair', title: 'Liberal Avoidance', category: 'Critique', desc: 'Liberals avoided facing genuine grievances and real anger.', tags: ['Politics', 'Elite Disconnect'], file: 'video_ddb407bcc9b24ef9ae0e3dfcfd99fb72.mp4' },
      { id: 'covid-deep-inequalities', title: 'COVID-19', category: 'Global Crisis', desc: 'The virus brought into focus how deep inequalities have gone.', tags: ['Crisis', 'Social'], file: 'video_e12fb3631ca341a78bc30a14f94615b6.mp4' }

    // --- STATE ---
    let currentIndex = 0;
    let currentCard = null;
    let startY = 0;
    let currentY = 0;
    let isDragging = false;

    // --- INIT ---
    function init(){
      showCard(currentIndex);
      updateCounter();
    }

    // --- SHOW CARD ---
    function showCard(index){
      if(index < 0 || index >= fragments.length) return;
      
      const container = document.getElementById('feed-container');
      
      // Remove old card
      if(currentCard){
        currentCard.remove();
      }
      
      const frag = fragments[index];
      const card = document.createElement('div');
      card.className = 'tv-card';
      
      card.innerHTML = `
        <div class="tv-screen">
          <video autoplay loop muted playsinline>
            <source src="${frag.file}" type="video/mp4">
          </video>
        </div>
        <div class="tv-info">
          <div class="tv-title">${frag.title}</div>
          <div class="tv-category">${frag.category}</div>
          <div class="tv-desc">${frag.desc}</div>
          <div class="tv-tags">
            ${frag.tags.map(t => `<span class="tv-tag">${t}</span>`).join('')}
          </div>
        </div>
      `;
      
      container.appendChild(card);
      currentCard = card;
      
      // Add touch events
      card.addEventListener('touchstart', handleTouchStart, {passive: false});
      card.addEventListener('touchmove', handleTouchMove, {passive: false});
      card.addEventListener('touchend', handleTouchEnd, {passive: false});
      
      // Add mouse events for desktop
      card.addEventListener('mousedown', handleMouseDown);
      card.addEventListener('mousemove', handleMouseMove);
      card.addEventListener('mouseup', handleMouseEnd);
      card.addEventListener('mouseleave', handleMouseEnd);
    }

    // --- TOUCH HANDLERS ---
    function handleTouchStart(e){
      startY = e.touches[0].clientY;
      currentY = startY;
      isDragging = true;
      currentCard.classList.add('swiping');
    }

    function handleTouchMove(e){
      if(!isDragging) return;
      e.preventDefault();
      currentY = e.touches[0].clientY;
      const deltaY = currentY - startY;
      currentCard.style.transform = `translateY(${deltaY}px)`;
      currentCard.style.opacity = 1 - Math.abs(deltaY) / 500;
    }

    function handleTouchEnd(e){
      if(!isDragging) return;
      isDragging = false;
      currentCard.classList.remove('swiping');
      
      const deltaY = currentY - startY;
      const threshold = 100;
      
      if(deltaY < -threshold){
        // Swipe up - next
        nextCard();
      } else if(deltaY > threshold){
        // Swipe down - previous
        prevCard();
      } else {
        // Reset
        currentCard.style.transform = '';
        currentCard.style.opacity = '';
      }
    }

    // --- MOUSE HANDLERS ---
    function handleMouseDown(e){
      startY = e.clientY;
      currentY = startY;
      isDragging = true;
      currentCard.classList.add('swiping');
    }

    function handleMouseMove(e){
      if(!isDragging) return;
      e.preventDefault();
      currentY = e.clientY;
      const deltaY = currentY - startY;
      currentCard.style.transform = `translateY(${deltaY}px)`;
      currentCard.style.opacity = 1 - Math.abs(deltaY) / 500;
    }

    function handleMouseEnd(e){
      if(!isDragging) return;
      isDragging = false;
      currentCard.classList.remove('swiping');
      
      const deltaY = currentY - startY;
      const threshold = 100;
      
      if(deltaY < -threshold){
        nextCard();
      } else if(deltaY > threshold){
        prevCard();
      } else {
        currentCard.style.transform = '';
        currentCard.style.opacity = '';
      }
    }

    // --- NAVIGATION ---
    function nextCard(){
      if(currentIndex >= fragments.length - 1) return;
      currentCard.classList.add('exiting-up');
      setTimeout(() => {
        currentIndex++;
        showCard(currentIndex);
        updateCounter();
      }, 400);
    }

    function prevCard(){
      if(currentIndex <= 0) return;
      currentCard.classList.add('exiting-down');
      setTimeout(() => {
        currentIndex--;
        showCard(currentIndex);
        updateCounter();
      }, 400);
    }

    function updateCounter(){
      document.getElementById('counter').textContent = `${currentIndex + 1} / ${fragments.length}`;
    }

    // --- KEYBOARD ---
    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowUp') nextCard();
      if(e.key === 'ArrowDown') prevCard();
    });

    // --- START ---
    init();
  </script>
</body>
