<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>Fragment Swipe</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;touch-action:none;user-select:none}.game{display:flex;flex-direction:column;height:100vh}.top{padding:16px 20px;display:flex;justify-content:space-between;background:rgba(0,0,0,.3);backdrop-filter:blur(10px)}.score{display:flex;gap:20px;font-size:13px;font-weight:600}.score-item{display:flex;flex-direction:column;align-items:center}.score-val{font-size:24px;font-weight:900}.score-lbl{font-size:10px;opacity:.8;text-transform:uppercase}.stack{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:20px}.card{position:absolute;width:90%;max-width:400px;height:70vh;max-height:600px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);cursor:grab;transition:transform .3s,opacity .3s;overflow:hidden}.card.swiping{transition:none}.card-head{height:40%;padding:30px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}.card-head::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--c) 0%,var(--cd) 100%);opacity:.9}.card-title{position:relative;font-size:28px;font-weight:900;line-height:1.2;margin-bottom:12px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.2)}.card-cat{position:relative;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.9)}.card-body{height:60%;padding:30px;background:#fff;color:#333;overflow-y:auto}.card-desc{font-size:16px;line-height:1.6;margin-bottom:20px;color:#444}.card-quote{font-size:14px;font-style:italic;line-height:1.6;padding:16px;background:#f8f8f8;border-left:4px solid var(--c);color:#666;margin-bottom:16px}.ind{position:absolute;font-size:80px;font-weight:900;opacity:0;transition:opacity .2s;pointer-events:none;text-shadow:0 4px 20px rgba(0,0,0,.3)}.ind.r{top:50%;right:40px;color:#4CAF50}.ind.l{top:50%;left:40px;color:#f44336}.ind.u{top:80px;left:50%;transform:translateX(-50%);color:#2196F3}.ind.d{bottom:80px;left:50%;transform:translateX(-50%);color:#FF9800}.hints{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:20px;font-size:11px;font-weight:600;text-transform:uppercase;opacity:.7}.hint{display:flex;flex-direction:column;align-items:center;gap:6px}.hint-icon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;z-index:1000}.overlay.active{display:flex}.ov-head{padding:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}.ov-title{font-size:20px;font-weight:900}.ov-close{font-size:28px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1)}.ov-content{flex:1;overflow-y:auto;padding:20px}.item{background:rgba(255,255,255,.05);border-left:4px solid;padding:16px;margin-bottom:12px;border-radius:8px}.item.trans{border-color:#2196F3}.item.pred{border-color:#FF9800;cursor:pointer}.item.story{border-color:#4CAF50}.item-lbl{font-size:12px;font-weight:600;text-transform:uppercase;color:#2196F3;margin-bottom:8px}.item-title{font-size:16px;font-weight:700;margin-bottom:6px}.item-weight{float:right;font-size:18px;font-weight:900;color:#FF9800}.complete{text-align:center;padding:40px 20px}.complete-emoji{font-size:80px;margin-bottom:20px}.complete-title{font-size:32px;font-weight:900;margin-bottom:16px}.complete-stats{display:flex;justify-content:center;gap:30px;margin:30px 0}.complete-stat-val{font-size:48px;font-weight:900;color:#4CAF50}.complete-stat-lbl{font-size:12px;opacity:.7;text-transform:uppercase}.complete-actions{display:flex;flex-direction:column;gap:12px;margin-top:40px;max-width:300px;margin-left:auto;margin-right:auto}.complete-btn{padding:16px;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer}.complete-btn.primary{background:#4CAF50;color:#000}.complete-btn.secondary{background:rgba(255,255,255,.1);color:#fff}</style></head><body><div class="game"><div class="top"><div class="score"><div class="score-item"><div class="score-val" id="cnt">0</div><div class="score-lbl">Story</div></div><div class="score-item"><div class="score-val" id="coh">0</div><div class="score-lbl">Flow</div></div></div><div class="score"><div class="score-item"><div class="score-val" id="rem">68</div><div class="score-lbl">Left</div></div></div></div><div class="stack" id="stack"><div class="hints"><div class="hint"><div class="hint-icon">👈</div><div>Skip</div></div><div class="hint"><div class="hint-icon">👆</div><div>Who</div></div><div class="hint"><div class="hint-icon">👇</div><div>Next</div></div><div class="hint"><div class="hint-icon">👉</div><div>Add</div></div></div></div></div><div class="overlay" id="transOv"><div class="ov-head"><div class="ov-title">👥 Who Else</div><div class="ov-close" id="transClose">×</div></div><div class="ov-content" id="transContent"></div></div><div class="overlay" id="predOv"><div class="ov-head"><div class="ov-title">🔮 Next</div><div class="ov-close" id="predClose">×</div></div><div class="ov-content" id="predContent"></div></div><div class="overlay" id="compOv"><div class="ov-content"><div class="complete"><div class="complete-emoji">🎉</div><div class="complete-title">Story Complete!</div><div class="complete-stats"><div class="complete-stat"><div class="complete-stat-val" id="fCnt">12</div><div class="complete-stat-lbl">Fragments</div></div><div class="complete-stat"><div class="complete-stat-val" id="fCoh">85</div><div class="complete-stat-lbl">Flow</div></div></div><div class="complete-actions"><button class="complete-btn primary" id="playAgain">Play Again</button><button class="complete-btn secondary" id="export">Export</button></div></div></div></div><script src="class-analysis-data.js"></script><script>let deck=[],story=[],swiped=new Set(),cur,isDrag=false,startX,startY,curX,curY;const colors={'Systemic Control':{l:'#E74C3C',d:'#C0392B'},'Economic Event':{l:'#F39C12',d:'#D68910'},'Scientific Theory':{l:'#3498DB',d:'#2980B9'},'Future Scenario':{l:'#2ECC71',d:'#27AE60'},'Core Concept':{l:'#2ECC71',d:'#27AE60'}};const getC=c=>colors[c]||{l:'#7F8C8D',d:'#5F6C6D'};function build(){const all=[];stories.forEach((s,i)=>{s.selected.forEach((c,p)=>{all.push({...c,ss:i,sp:p})})});deck=all.sort(()=>Math.random()-.5);next()}function next(){if(story.length>=12||deck.length===0){complete();return}const f=deck.pop();if(swiped.has(f.id)){next();return}cur=f;render(f);update()}function render(f){const st=document.getElementById('stack'),cs=getC(f.category),c=document.createElement('div');c.className='card';c.style.setProperty('--c',cs.l);c.style.setProperty('--cd',cs.d);c.innerHTML=`<div class="card-head"><div class="card-title">${f.title}</div><div class="card-cat">${f.category}</div></div><div class="card-body"><div class="card-desc">${f.desc||''}</div>${f.quote?`<div class="card-quote">"${f.quote}"</div>`:''}</div><div class="ind r">✓</div><div class="ind l">✕</div><div class="ind u">👥</div><div class="ind d">🔮</div>`;st.querySelectorAll('.card').forEach(x=>x.remove());st.appendChild(c);setup(c,f)}function setup(c,f){const onStart=e=>{isDrag=true;c.classList.add('swiping');const t=e.touches?e.touches[0]:e;startX=t.clientX;startY=t.clientY};const onMove=e=>{if(!isDrag)return;e.preventDefault();const t=e.touches?e.touches[0]:e;curX=t.clientX-startX;curY=t.clientY-startY;c.style.transform=`translate(${curX}px,${curY}px) rotate(${curX*.1}deg)`;const inds=c.querySelectorAll('.ind');inds.forEach(i=>i.style.opacity='0');if(Math.abs(curX)>Math.abs(curY)){if(curX>50)c.querySelector('.ind.r').style.opacity=Math.min(curX/150,1);else if(curX<-50)c.querySelector('.ind.l').style.opacity=Math.min(Math.abs(curX)/150,1)}else{if(curY<-50)c.querySelector('.ind.u').style.opacity=Math.min(Math.abs(curY)/150,1);else if(curY>50)c.querySelector('.ind.d').style.opacity=Math.min(curY/150,1)}};const onEnd=()=>{if(!isDrag)return;isDrag=false;c.classList.remove('swiping');const th=100;if(Math.abs(curX)>Math.abs(curY)){if(curX>th)swipeR(f);else if(curX<-th)swipeL(f);else reset(c)}else{if(curY<-th)swipeU(f);else if(curY>th)swipeD(f);else reset(c)}curX=0;curY=0};c.addEventListener('touchstart',onStart);c.addEventListener('touchmove',onMove);c.addEventListener('touchend',onEnd);c.addEventListener('mousedown',onStart);document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onEnd)}function reset(c){c.style.transform='';c.querySelectorAll('.ind').forEach(i=>i.style.opacity='0')}function swipeR(f){story.push(f);swiped.add(f.id);animOut('r');setTimeout(next,300)}function swipeL(f){swiped.add(f.id);animOut('l');setTimeout(next,300)}function swipeU(f){showTrans(f);setTimeout(()=>{const c=document.querySelector('.card');if(c)reset(c)},100)}function swipeD(f){showPred(f);setTimeout(()=>{const c=document.querySelector('.card');if(c)reset(c)},100)}function animOut(d){const c=document.querySelector('.card');if(!c)return;const dist=window.innerWidth,x=d==='r'?dist:d==='l'?-dist:0,y=d==='u'?-dist:d==='d'?dist:0;c.style.transition='transform .3s,opacity .3s';c.style.transform=`translate(${x}px,${y}px) rotate(${x*.2}deg)`;c.style.opacity='0'}function showTrans(f){const trans=[];stories.forEach((s,i)=>{s.selected.forEach(c=>{if(c.id===f.id)trans.push({story:i+1,concept:c})})});const h=trans.map(t=>`<div class="item trans"><div class="item-lbl">Story ${t.story}</div><div class="item-title">${t.concept.title}</div></div>`).join('');document.getElementById('transContent').innerHTML=h||'<p style="text-align:center;opacity:.5">None</p>';document.getElementById('transOv').classList.add('active')}function showPred(f){const preds={};stories.forEach(s=>{s.selected.forEach((c,i)=>{if(c.id===f.id&&i<s.selected.length-1){const n=s.selected[i+1];if(!preds[n.id])preds[n.id]={concept:n,count:0};preds[n.id].count++}})});const sorted=Object.values(preds).map(p=>({...p,prob:Math.round((p.count/stories.length)*100)})).sort((a,b)=>b.count-a.count).slice(0,5);const h=sorted.map(p=>`<div class="item pred" data-id="${p.concept.id}"><div class="item-lbl">Predicted</div><div class="item-title">${p.concept.title}<span class="item-weight">${p.prob}%</span></div></div>`).join('');document.getElementById('predContent').innerHTML=h||'<p style="text-align:center;opacity:.5">None</p>';document.getElementById('predOv').classList.add('active');document.querySelectorAll('.item.pred').forEach(it=>{it.addEventListener('click',()=>{const id=it.dataset.id,fr=deck.find(x=>x.id===id);if(fr){story.push(fr);swiped.add(fr.id);document.getElementById('predOv').classList.remove('active');next()}})})}function complete(){const coh=calcCoh();document.getElementById('fCnt').textContent=story.length;document.getElementById('fCoh').textContent=coh;document.getElementById('compOv').classList.add('active')}function calcCoh(){if(story.length<2)return 0;let sc=0;for(let i=0;i<story.length-1;i++){if(story[i].category===story[i+1].category)sc+=10;if(story[i].ss!==story[i+1].ss)sc+=5}return Math.min(100,sc)}function update(){document.getElementById('cnt').textContent=story.length;document.getElementById('coh').textContent=calcCoh();document.getElementById('rem').textContent=deck.length}document.getElementById('transClose').addEventListener('click',()=>{document.getElementById('transOv').classList.remove('active')});document.getElementById('predClose').addEventListener('click',()=>{document.getElementById('predOv').classList.remove('active')});document.getElementById('playAgain').addEventListener('click',()=>{story=[];swiped.clear();document.getElementById('compOv').classList.remove('active');build()});document.getElementById('export').addEventListener('click',()=>{const data={title:'My Story',fragments:story,coherence:calcCoh(),timestamp:new Date().toISOString()},blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`story-${Date.now()}.json`;a.click();URL.revokeObjectURL(url)});build()</script></body></html>
