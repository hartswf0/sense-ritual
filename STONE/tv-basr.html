<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>TV SWIPER — Vertical Feed</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --bg: #000;
    --card-bg: #1a1a1a;
    --accent: #0a84ff;
    --text: #fff;
    --dim: #666;
  }
  body{ 
    font-family: system-ui, -apple-system, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    overflow: hidden;
    touch-action: pan-y;
  }
  
  /* VERTICAL FEED CONTAINER */
  #feed-container{
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  /* TV CARD */
  .tv-card{
    position: absolute;
    width: min(92vw, 600px);
    max-height: 85vh;
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 8px;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
    touch-action: pan-y;
  }
  
  .tv-card.swiping{
    transition: none;
  }
  
  .tv-card.exiting-up{
    animation: exitUp 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  
  .tv-card.exiting-down{
    animation: exitDown 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  
  @keyframes exitUp{
    to{ transform: translateY(-120vh); opacity: 0; }
  }
  
  @keyframes exitDown{
  }
  
  /* TV SCREEN */
  .tv-screen{
    width: 100%;
    flex: 0 0 auto;
    aspect-ratio: 16 / 9;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  .tv-screen iframe,
  .tv-screen video,
  .tv-screen img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    border: none;
  }
  
  .tv-screen .placeholder{
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    color: var(--dim);
    font-size: 48px;
  }
  
  /* TV INFO */
  .tv-info{
    padding: 12px 16px;
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    background: rgba(0,0,0,0.8);
  }
  
  .tv-id{
    font-size: 11px;
    font-weight: 700;
    color: #0ff;
    letter-spacing: 0.5px;
    font-family: monospace;
  }
  
  .tv-title{
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .tv-tags{
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  
  .tv-tags::-webkit-scrollbar{
    display: none;
  }
  
  .tag{
    padding: 3px 8px;
    background: rgba(10,132,255,0.2);
    border: 1px solid rgba(10,132,255,0.4);
    border-radius: 8px;
    font-size: 9px;
    font-weight: 600;
    white-space: nowrap;
  }
  
  .tv-meta{
    font-size: 10px;
    color: var(--dim);
    font-family: monospace;
    white-space: nowrap;
  }
  
  /* CARD CHAT AREA (BENEATH CARD) */
  .card-chat-area{
    background: #000;
    border-top: 2px solid #0ff;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 180px;
    flex: 0 0 auto;
    position: relative;
    z-index: 1;
    transition: height 0.3s ease;
  }
  
  .card-chat-area.collapsed{
    height: 40px;
  }
  
  .card-chat-area.collapsed .card-chat-messages,
  .card-chat-area.collapsed .card-chat-input{
    display: none;
  }
  
  .chat-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: rgba(0,255,255,0.1);
    border-bottom: 1px solid #0ff;
  }
  
  .chat-header-title{
    font-size: 10px;
    font-weight: 700;
    color: #0ff;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .chat-controls{
    display: flex;
    gap: 8px;
  }
  
  .chat-btn{
    background: transparent;
    border: 1px solid #0ff;
    color: #0ff;
    padding: 4px 8px;
    font-size: 10px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.2s;
  }
  
  .chat-btn:hover{
    background: #0ff;
    color: #000;
  }
  
  .chat-btn:active{
    transform: scale(0.95);
  }
  
  .card-chat-messages{
    padding: 12px;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: #0ff #000;
  }
  
  .card-chat-messages::-webkit-scrollbar{
    width: 4px;
  }
  
  .card-chat-messages::-webkit-scrollbar-track{
    background: #000;
  }
  
  .card-chat-messages::-webkit-scrollbar-thumb{
    background: #0ff;
    border-radius: 2px;
  }
  
  .card-chat-msg{
    padding: 8px 10px;
    font-size: 11px;
    line-height: 1.5;
    font-family: 'Courier New', monospace;
    max-width: 85%;
    word-wrap: break-word;
    user-select: text;
    cursor: text;
    position: relative;
  }
  
  .card-chat-msg:hover{
    background: rgba(0,255,255,0.05);
  }
  
  .card-chat-msg.user{
    background: transparent;
    border-left: 3px solid #0ff;
    color: #0ff;
    align-self: flex-end;
    text-align: left;
    margin-left: auto;
  }
  
  .card-chat-msg.agent{
    background: transparent;
    border-left: 3px solid #fff;
    color: #fff;
    align-self: flex-start;
  }
  
  .card-chat-msg.system{
    background: transparent;
    color: #666;
    font-size: 9px;
    text-align: center;
    align-self: center;
    border: none;
    max-width: 100%;
  }
  
  .card-chat-input{
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
    border-top: 1px solid #333;
    background: #000;
  }
  
  .card-chat-input input{
    padding: 12px;
    background: #000;
    border: none;
    border-right: 1px solid #333;
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 11px;
  }
  
  .card-chat-input input:focus{
    outline: none;
    background: #0a0a0a;
  }
  
  .card-chat-input input::placeholder{
    color: #333;
  }
  
  .card-chat-input button{
    padding: 12px 16px;
    background: #000;
    border: none;
    color: #0ff;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s ease;
  }
  
  .card-chat-input button:hover{
    background: #0a0a0a;
    color: #fff;
  }
  
  .card-chat-input button:active{
    background: #0ff;
    color: #000;
  }
  
  .swipe-hint{
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 48px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 10;
  }
  
  .swipe-hint.left{
    left: 40px;
  }
  
  .swipe-hint.right{
    right: 40px;
  }
  
  .tv-card.swiping-left .swipe-hint.left,
  .tv-card.swiping-right .swipe-hint.right{
    opacity: 1;
  }
  
  /* SIDE MENU */
  #side-menu{
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
  }
  
  .menu-btn{
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: rgba(26,26,26,0.9);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 24px;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  
  .menu-btn:active{
    transform: scale(0.9);
    background: rgba(10,132,255,0.3);
  }
  
  .menu-btn.active{
    background: var(--accent);
    border-color: var(--accent);
  }
  
  /* COUNTER */
  #counter{
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    padding: 12px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    z-index: 100;
    border: 2px solid rgba(255,255,255,0.1);
  }
  
  /* COLLECTION PANEL */
  #collection-panel{
    position: fixed;
    right: -100%;
    top: 0;
    width: min(400px, 90vw);
    height: 100vh;
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(20px);
    z-index: 200;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    border-left: 2px solid rgba(255,255,255,0.1);
  }
  
  #collection-panel.open{
    right: 0;
  }
  
  .panel-header{
    padding: 24px;
    border-bottom: 2px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .panel-title{
    font-size: 20px;
    font-weight: 700;
  }
  
  .close-btn{
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
  }
  
  .panel-content{
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  
  .collection-item{
    padding: 12px;
    background: #1a1a1a;
    border-left: 3px solid #333;
    margin-bottom: 2px;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
    touch-action: none;
    border-right: 1px solid #0a0a0a;
  }
  
  .collection-item:active{
    cursor: grabbing;
  }
  
  .collection-item.dragging{
    opacity: 0.5;
    transform: scale(0.95);
  }
  
  .collection-item:hover{
    background: #222;
    border-left-color: var(--accent);
  }
  
  .collection-item.accepted{
    border-left-color: #2ECC71;
  }
  
  .collection-item.rejected{
    border-left-color: #E74C3C;
  }
  
  .drag-handle{
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 24px;
    background: #0a0a0a;
    display: grid;
    place-items: center;
    font-size: 12px;
    opacity: 0.7;
    cursor: grab;
    border-right: 1px solid #333;
  }
  
  .item-content{
    margin-left: 32px;
    display: grid;
    gap: 8px;
  }
  
  .item-header{
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }
  
  .item-title{
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
  }
  
  .item-time{
    font-family: monospace;
    color: #666;
    font-size: 10px;
  }
  
  .item-actions{
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  
  .action-btn{
    padding: 4px 10px;
    background: #0a0a0a;
    border: 1px solid #333;
    color: var(--text);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .action-btn:active{
    background: #000;
    border-color: var(--accent);
  }
  
  .label-input{
    width: 100%;
    padding: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    margin-top: 8px;
  }
  
  .label-badge{
    display: inline-block;
    padding: 2px 8px;
    background: #000;
    border: 1px solid #ffa500;
    font-size: 9px;
    font-weight: 700;
    color: #ffa500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  /* CHAT EDITOR (INLINE IN COLLECTION) */
  .chat-editor{
    margin-top: 8px;
    padding: 0;
    background: #000;
    border: 1px solid #333;
    display: none;
    position: relative;
    z-index: 10;
  }
  
  .chat-editor.open{
    display: grid;
    gap: 0;
  }
  
  .chat-messages{
    max-height: 200px;
    overflow-y: auto;
    padding: 8px;
    background: #000;
    border-bottom: 1px solid #333;
  }
  
  .chat-msg{
    padding: 6px 8px;
    margin-bottom: 4px;
    font-size: 10px;
    line-height: 1.4;
    font-family: monospace;
  }
  
  .chat-msg.user{
    background: #1a1a1a;
    color: #0ff;
    text-align: right;
  }
  
  .chat-msg.agent{
    background: #0a0a0a;
    color: #fff;
  }
  
  .chat-msg.system{
    background: transparent;
    color: #666;
    font-size: 9px;
    text-align: center;
  }
  
  .chat-input-row{
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
    background: #000;
  }
  
  .chat-input-row input{
    padding: 8px;
    background: #0a0a0a;
    border: none;
    border-right: 1px solid #333;
    color: #0ff;
    font-family: monospace;
    font-size: 10px;
  }
  
  .chat-input-row button{
    padding: 8px 12px;
    background: #0a0a0a;
    border: none;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .chat-input-row button:active{
    background: #000;
  }
  
  /* TIMELINE EDITOR */
  .timeline-editor{
    margin-top: 8px;
    padding: 8px;
    background: #0a0a0a;
    border: 1px solid #333;
    display: none;
  }
  
  .timeline-editor.open{
    display: grid;
    gap: 8px;
  }
  
  .timeline-controls{
    display: grid;
    grid-template-columns: 60px 1fr 60px;
    gap: 4px;
    align-items: center;
  }
  
  .time-input{
    padding: 4px 8px;
    background: #000;
    border: 1px solid #333;
    color: #0ff;
    font-family: monospace;
    font-size: 11px;
    text-align: center;
    width: 60px;
  }
  
  .time-slider{
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: #333;
    outline: none;
  }
  
  .time-slider::-webkit-slider-thumb{
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    cursor: pointer;
  }
  
  .time-slider::-moz-range-thumb{
    width: 12px;
    height: 12px;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }
  
  .notes-area{
    width: 100%;
    min-height: 60px;
    padding: 6px;
    background: #000;
    border: 1px solid #333;
    color: var(--text);
    font-size: 10px;
    font-family: monospace;
    resize: vertical;
  }
  
  .url-input{
    width: 100%;
    padding: 6px;
    background: #000;
    border: 1px solid #333;
    color: #0ff;
    font-size: 10px;
    font-family: monospace;
  }
  
  .timeline-actions{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  
  .timeline-label{
    font-size: 9px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  
  .export-section{
    padding: 12px;
    border-top: 2px solid #000;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    background: #0a0a0a;
  }
  
  .export-btn{
    padding: 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: var(--text);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .export-btn:active{
    background: #000;
    border-color: var(--accent);
  }
  
  .export-btn.secondary{
    background: #0a0a0a;
  }
  
  /* SETTINGS PANEL */
  #settings-panel{
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 0;
    background: var(--bg);
    border-left: 3px solid var(--accent);
    z-index: 900;
    display: grid;
    grid-template-rows: auto 1fr;
    transition: width 0.3s ease;
    overflow: hidden;
  }
  
  #settings-panel.open{
    width: 360px;
  }
  
  /* LOADING */
  #loading{
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: var(--bg);
    z-index: 1000;
    font-size: 14px;
    color: var(--dim);
  }
  
  #loading.hidden{
    display: none;
  }
  
  /* MOBILE OPTIMIZATIONS */
  @media (max-width: 480px){
    #collection-panel.open{ width: 100vw; }
    #settings-panel.open{ width: 100vw; }
  }
</style>
</head>
<body>

<div id="loading">LOADING...</div>

<div id="counter">
  <span id="current-index">1</span> / <span id="total-count">0</span>
</div>

<div id="side-menu">
  <button class="menu-btn" id="btn-collection" title="Collection">C</button>
  <button class="menu-btn" id="btn-settings" title="Settings">S</button>
</div>

<div id="feed-container"></div>

<div id="collection-panel">
  <div class="panel-header">
    <div class="panel-title">Collection (<span id="collection-count">0</span>)</div>
    <button class="close-btn" id="close-collection">✕</button>
  </div>
  <div class="panel-content" id="collection-list"></div>
  <div class="export-section">
    <button class="export-btn" id="export-a3">Export A3</button>
    <button class="export-btn secondary" id="export-json">Export JSON</button>
  </div>
</div>

<div id="settings-panel">
  <div class="panel-header">
    <div class="panel-title">Settings</div>
    <button class="close-btn" id="close-settings">✕</button>
  </div>
  <div class="panel-content" style="padding:16px;">
    <div style="margin-bottom:16px;">
      <label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">OpenAI API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-..." style="width:100%;padding:10px;background:#000;border:1px solid #333;color:#0ff;font-family:monospace;font-size:11px;" />
      <button id="save-api-key" style="margin-top:8px;padding:8px 12px;background:#0a0a0a;border:1px solid #333;color:#fff;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;">SAVE</button>
      <div style="font-size:9px;color:#666;margin-top:8px;line-height:1.4;">Stored locally. Leave blank for simulation mode.</div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  
  // --- STATE ---
  let tvs = [];
  let currentIndex = 0;
  let mediaLibrary = [];
  let collection = []; // Accepted TVs
  let rejected = []; // Rejected TVs
  let touchStartY = 0;
  let touchStartX = 0;
  let isDragging = false;
  let currentCard = null;
  
  // --- MEDIA LIBRARY ---
  function initMediaLibrary(){
    const videos = [
      // WHERE YOU GO WHEN YOU LEAVE (CODEX) - First version
      { name: 'Out of Life', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 0, end: 135, tags: ['poem', 'intro'] },
      { name: 'Flashing Lights', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 136, end: 271, tags: ['poem'] },
      { name: 'How to Break Off an Engagement', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 272, end: 407, tags: ['poem'] },
      { name: 'Nevermore', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 408, end: 543, tags: ['poem'] },
      { name: 'Bloodline', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 544, end: 679, tags: ['poem'] },
      { name: 'Resurrecting Atlantis', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 680, end: 815, tags: ['poem'] },
      { name: 'DJ Turn Me Up', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 816, end: 951, tags: ['poem'] },
      { name: 'Newly Single', url: 'https://www.youtube.com/watch?v=uDUoMnp1z_g', start: 952, end: 1087, tags: ['poem'] },

  function parseYouTubeUrl(url){
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/,
      /youtube\.com\/embed\/([^?\s]+)/
    ];
    for(let pattern of patterns){
      const match = url.match(pattern);
      if(match) return match[1];
    }
    return null;
  }

  // --- TOUCH HANDLING ---
  function onTouchStart(e){
    touchStartY = e.touches[0].clientY;
    touchStartX = e.touches[0].clientX;
    isDragging = true;
    currentCard = e.currentTarget;
    currentCard.classList.add('swiping');
  }
  
  function onTouchMove(e){
    if(!isDragging) return;
    
    const deltaY = e.touches[0].clientY - touchStartY;
    const deltaX = e.touches[0].clientX - touchStartX;
    
    // Vertical swipe (navigate)
    if(Math.abs(deltaY) > Math.abs(deltaX)){
      currentCard.style.transform = `translateY(${deltaY}px) rotate(${deltaY * 0.02}deg)`;
      currentCard.style.opacity = 1 - Math.abs(deltaY) / 500;
    }
    // Horizontal swipe (accept/reject)
    else {
      currentCard.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.05}deg)`;
      
      if(deltaX < -50){
        currentCard.classList.add('swiping-left');
        currentCard.classList.remove('swiping-right');
      } else if(deltaX > 50){
        currentCard.classList.add('swiping-right');
        currentCard.classList.remove('swiping-left');
      } else {
        currentCard.classList.remove('swiping-left', 'swiping-right');
      }
    }
  }
  
  function onTouchEnd(e){
    if(!isDragging) return;
    
    const deltaY = e.changedTouches[0].clientY - touchStartY;
    const deltaX = e.changedTouches[0].clientX - touchStartX;
    
    isDragging = false;
    currentCard.classList.remove('swiping', 'swiping-left', 'swiping-right');
    
    const threshold = 100;
    
    // Vertical swipe
    if(Math.abs(deltaY) > Math.abs(deltaX)){
      if(Math.abs(deltaY) > threshold){
        if(deltaY < 0){
          // Swipe up - next
          nextTV();
        } else {
          // Swipe down - previous
          prevTV();
        }
      } else {
        // Snap back
        currentCard.style.transform = '';
        currentCard.style.opacity = '';
      }
    }
    // Horizontal swipe
    else {
      if(Math.abs(deltaX) > threshold){
        if(deltaX < 0){
          // Swipe left - reject
          rejectTV();
        } else {
          // Swipe right - accept
          acceptTV();
        }
      } else {
        // Snap back
        currentCard.style.transform = '';
      }
    }
    
    currentCard = null;
  }
  
  function onMouseDown(e){
    touchStartY = e.clientY;
    touchStartX = e.clientX;
    isDragging = true;
    currentCard = e.currentTarget;
    currentCard.classList.add('swiping');
    
    const onMouseMove = (e) => {
      if(!isDragging) return;
      
      const deltaY = e.clientY - touchStartY;
      const deltaX = e.clientX - touchStartX;
      
      if(Math.abs(deltaY) > Math.abs(deltaX)){
        currentCard.style.transform = `translateY(${deltaY}px) rotate(${deltaY * 0.02}deg)`;
        currentCard.style.opacity = 1 - Math.abs(deltaY) / 500;
      } else {
        currentCard.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.05}deg)`;
        
        if(deltaX < -50){
          currentCard.classList.add('swiping-left');
          currentCard.classList.remove('swiping-right');
        } else if(deltaX > 50){
          currentCard.classList.add('swiping-right');
          currentCard.classList.remove('swiping-left');
        }
      }
    };
    
    const onMouseUp = (e) => {
      if(!isDragging) return;
      
      const deltaY = e.clientY - touchStartY;
      const deltaX = e.clientX - touchStartX;
      
      isDragging = false;
      currentCard.classList.remove('swiping', 'swiping-left', 'swiping-right');
      
      const threshold = 100;
      
      if(Math.abs(deltaY) > Math.abs(deltaX)){
        if(Math.abs(deltaY) > threshold){
          if(deltaY < 0) nextTV();
          else prevTV();
        } else {
          currentCard.style.transform = '';
          currentCard.style.opacity = '';
        }
      } else {
        if(Math.abs(deltaX) > threshold){
          if(deltaX < 0) rejectTV();
          else acceptTV();
        } else {
          currentCard.style.transform = '';
        }
      }
      
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      currentCard = null;
    };
    
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }

  // Drag-to-reorder functionality
  let draggedItem = null;
  let draggedIndex = null;
  
  function handleDragStart(e){
    draggedItem = e.currentTarget;
    draggedIndex = parseInt(draggedItem.dataset.index);
    draggedItem.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  
  function handleDragOver(e){
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    
    const target = e.currentTarget;
    if(target === draggedItem) return;
    
    const targetIndex = parseInt(target.dataset.index);
    if(targetIndex > draggedIndex){
      target.parentNode.insertBefore(draggedItem, target.nextSibling);
    } else {
      target.parentNode.insertBefore(draggedItem, target);
    }
  }
  
  function handleDrop(e){
    e.preventDefault();
    const targetIndex = parseInt(e.currentTarget.dataset.index);
    
    // Reorder collection array
    const item = collection.splice(draggedIndex, 1)[0];
    collection.splice(targetIndex, 0, item);
    
    console.log('Reordered:', draggedIndex, '→', targetIndex);
  }
  
  function handleDragEnd(e){
    e.currentTarget.classList.remove('dragging');
    draggedItem = null;
    draggedIndex = null;
    updateCollection();
  }
  
  // Touch drag for mobile (collection reorder)
  let dragTouchStartY = 0;
  let dragTouchItem = null;
  
  function handleTouchStart(e){
    const handle = e.target.closest('.drag-handle');
    if(!handle) return;
    
    dragTouchStartY = e.touches[0].clientY;
    dragTouchItem = e.currentTarget;
    dragTouchItem.style.opacity = '0.5';
    
    const onTouchMove = (e) => {
      e.preventDefault();
      const deltaY = e.touches[0].clientY - dragTouchStartY;
      dragTouchItem.style.transform = `translateY(${deltaY}px)`;
      
      // Find target position
      const items = Array.from(dragTouchItem.parentNode.children);
      const currentY = e.touches[0].clientY;
      
      items.forEach(item => {
        if(item === dragTouchItem) return;
        const rect = item.getBoundingClientRect();
        if(currentY > rect.top && currentY < rect.bottom){
          const currentIndex = items.indexOf(dragTouchItem);
          const targetIndex = items.indexOf(item);
          
          if(targetIndex > currentIndex){
            item.parentNode.insertBefore(dragTouchItem, item.nextSibling);
          } else {
            item.parentNode.insertBefore(dragTouchItem, item);
          }
        }
      });
    };
    
    const onTouchEnd = (e) => {
      dragTouchItem.style.opacity = '';
      dragTouchItem.style.transform = '';
      
      // Reorder collection array
      const items = Array.from(dragTouchItem.parentNode.children);
      const newOrder = items.map(item => parseInt(item.dataset.index));
      const reordered = newOrder.map(i => collection[i]);
      collection.length = 0;
      collection.push(...reordered);
      
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
      
      updateCollection();
      console.log('Touch reorder complete');
    };
    
    document.addEventListener('touchmove', onTouchMove, {passive: false});
    document.addEventListener('touchend', onTouchEnd);
  }
  
  // Helper functions for time conversion
  function secondsToTimecode(seconds){
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
  }
  
  function timecodeToSeconds(timecode){
    const parts = timecode.split(':');
    if(parts.length === 2){
      return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }
    return parseInt(timecode) || 0;
  }

    editor.addEventListener('click', (e) => {
      e.stopPropagation();
    });
    
    itemDiv.querySelector('.item-content').appendChild(editor);
    
    // Render existing messages
    renderChatMessages(index);
    
    // Wire up send button
    const input = editor.querySelector(`#chat-input-${index}`);
    const sendBtn = editor.querySelector(`#chat-send-${index}`);
    
    const sendMessage = async () => {
      const message = input.value.trim();
      if(!message) return;
      
      // Add user message
      collection[index].chatHistory.push({
        role: 'user',
        content: message
      });
      
      input.value = '';
      renderChatMessages(index);
      
      // Get API key from localStorage
      const apiKey = localStorage.getItem('openai_api_key');
      
      if(!apiKey){
        // Simulated response
        setTimeout(() => {
          collection[index].chatHistory.push({
            role: 'assistant',
            content: `[SIMULATION] Regarding "${item.name}": ${getSimulatedResponse(message, item)}`
          });
          renderChatMessages(index);
        }, 500);
        return;
      }
      
      // Real OpenAI API call
      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: collection[index].chatHistory,
            max_tokens: 150,
            temperature: 0.7
          })
        });
        
        const data = await response.json();
        
        if(data.choices && data.choices[0]){
          collection[index].chatHistory.push({
            role: 'assistant',
            content: data.choices[0].message.content
          });
          renderChatMessages(index);
        }
      } catch(error){
        console.error('OpenAI API error:', error);
        collection[index].chatHistory.push({
          role: 'system',
          content: 'API error. Check console or use simulation mode.'
        });
        renderChatMessages(index);
      }
    };
    
    sendBtn.onclick = sendMessage;
    input.onkeydown = (e) => {
      if(e.key === 'Enter') sendMessage();
    };
    
    input.focus();
  }
  
  function renderChatMessages(index){
    const messagesDiv = document.getElementById(`chat-messages-${index}`);
    if(!messagesDiv) return;
    
    const item = collection[index];
    if(!item.chatHistory) return;
    
    messagesDiv.innerHTML = item.chatHistory
      .filter(msg => msg.role !== 'system' || msg.content.includes('API error'))
      .map(msg => {
        const className = msg.role === 'user' ? 'user' : msg.role === 'system' ? 'system' : 'agent';
        return `<div class="chat-msg ${className}">${msg.content}</div>`;
      }).join('');
    
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  function getSimulatedResponse(message, item){
    const responses = [
      `This clip works at ${secondsToTimecode(item.start || 0)} because it establishes context.`,
      `Consider the ${item.tags[0] || 'thematic'} elements when placing this.`,
      `The timing (${secondsToTimecode(item.start || 0)} - ${secondsToTimecode(item.end || 0)}) creates natural pacing.`,
      `What comes before this clip? That affects its impact.`,
      `This moment needs breathing room. Don't rush the cut.`
    ];
    return responses[Math.floor(Math.random() * responses.length)];
  }
  
  function renderFeedChatMessages(index){
    const messagesDiv = document.getElementById(`chat-messages-${index}`);
    if(!messagesDiv || !mediaLibrary[index]) return;
    
    const item = mediaLibrary[index];
    if(!item.chatHistory) return;
    
    messagesDiv.innerHTML = item.chatHistory
      .filter(msg => msg.role !== 'system' || msg.content.includes('API error'))
      .map(msg => {
        const className = msg.role === 'user' ? 'user' : msg.role === 'system' ? 'system' : 'agent';
        return `<div class="card-chat-msg ${className}">${msg.content}</div>`;
      }).join('');
    
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  // Timeline Editor - Edit times, notes, URLs, swap media
  function toggleTimelineEditor(itemDiv, index){
    const existing = itemDiv.querySelector('.timeline-editor');
    if(existing){
      existing.remove();
      return;
    }
    
    const item = collection[index];
    const editor = document.createElement('div');
    editor.className = 'timeline-editor open';
    
    const startTime = secondsToTimecode(item.start || 0);
    const endTime = secondsToTimecode(item.end || 0);
    const maxSeconds = item.end || 300;
    
    editor.innerHTML = `
      <div class="timeline-label">TIMELINE (MM:SS)</div>
      <div class="timeline-controls">
        <input type="text" class="time-input" id="start-${index}" value="${startTime}" placeholder="00:00">
        <input type="range" class="time-slider" id="slider-${index}" min="0" max="${maxSeconds}" value="${item.start || 0}" step="1">
        <input type="text" class="time-input" id="end-${index}" value="${endTime}" placeholder="00:00">
      </div>
      <div class="timeline-label">NOTES</div>
      <textarea class="notes-area" id="notes-${index}" placeholder="Add editing notes, comments, or instructions...">${item.notes || ''}</textarea>
      <div class="timeline-label">REFERENCE URL</div>
      <input type="text" class="url-input" id="url-${index}" value="${item.referenceUrl || ''}" placeholder="https://...">
      <div class="timeline-actions">
        <button class="action-btn" id="save-${index}">SAVE</button>
        <button class="action-btn" id="swap-${index}">SWAP MEDIA</button>
        <button class="action-btn" id="cancel-${index}">CANCEL</button>
      </div>
    `;
    
    itemDiv.querySelector('.item-content').appendChild(editor);
    
    // Wire up controls
    const startInput = editor.querySelector(`#start-${index}`);
    const endInput = editor.querySelector(`#end-${index}`);
    const slider = editor.querySelector(`#slider-${index}`);
    const notesArea = editor.querySelector(`#notes-${index}`);
    const urlInput = editor.querySelector(`#url-${index}`);
    
    // Slider updates start time
    slider.oninput = () => {
      const seconds = parseInt(slider.value);
      startInput.value = secondsToTimecode(seconds);
    };
    
    // Time inputs update on blur
    startInput.onblur = () => {
      const seconds = timecodeToSeconds(startInput.value);
      startInput.value = secondsToTimecode(seconds);
      slider.value = seconds;
    };
    
    endInput.onblur = () => {
      const seconds = timecodeToSeconds(endInput.value);
      endInput.value = secondsToTimecode(seconds);
    };
    
    // Save button
    editor.querySelector(`#save-${index}`).onclick = () => {
      collection[index].start = timecodeToSeconds(startInput.value);
      collection[index].end = timecodeToSeconds(endInput.value);
      collection[index].notes = notesArea.value.trim();
      collection[index].referenceUrl = urlInput.value.trim();
      
      // Update embed URL with new times
      if(collection[index].videoId){
        collection[index].embedUrl = `https://www.youtube.com/embed/${collection[index].videoId}?autoplay=1&mute=1&loop=1&playlist=${collection[index].videoId}&start=${collection[index].start}&end=${collection[index].end}`;
      }
      
      updateCollection();
      console.log('Timeline saved:', collection[index]);
    };
    
    // Swap media button
    editor.querySelector(`#swap-${index}`).onclick = () => {
      const newUrl = prompt('Enter new YouTube URL or video ID:');
      if(newUrl){
        const videoId = parseYouTubeUrl(newUrl) || newUrl;
        collection[index].videoId = videoId;
        collection[index].embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&start=${collection[index].start || 0}&end=${collection[index].end || 0}`;
        updateCollection();
        console.log('Media swapped:', videoId);
      }
    };
    
    // Cancel button
    editor.querySelector(`#cancel-${index}`).onclick = () => {
      editor.remove();
    };
  }
  
  // Label input
  function showLabelInput(itemDiv, index){
    const existing = itemDiv.querySelector('.label-input');
    if(existing){
      existing.remove();
      return;
    }
    
    const input = document.createElement('input');
    input.className = 'label-input';
    input.type = 'text';
    input.placeholder = 'Label (Opening, Act 2, Climax)';
    input.value = collection[index].label || '';
    
    input.onkeydown = (e) => {
      if(e.key === 'Enter'){
        collection[index].label = input.value.trim();
        updateCollection();
        console.log('Label saved:', collection[index].label);
      }
      if(e.key === 'Escape'){
        input.remove();
      }
    };
    
    input.onblur = () => {
      collection[index].label = input.value.trim();
      updateCollection();
    };
    
    itemDiv.querySelector('.item-content').appendChild(input);
    input.focus();
  }
  
  // --- KEYBOARD ---
  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowUp') nextTV();
    if(e.key === 'ArrowDown') prevTV();
    if(e.key === 'ArrowRight') acceptTV();
    if(e.key === 'ArrowLeft') rejectTV();
    if(e.key === 'c') toggleCollection();
  });
  
  // --- EXPORT FUNCTIONS ---
  function exportAsA3(){
    // A3 format: EDL-style text with all metadata
    let output = '# TV COLLECTION EXPORT\n';
    output += `# Generated: ${new Date().toISOString()}\n`;
    output += `# Total Clips: ${collection.length}\n\n`;
    output += '=' .repeat(80) + '\n\n';
    
    collection.forEach((item, i) => {
      const num = String(i + 1).padStart(3, '0');
      const label = item.label ? ` [${item.label}]` : '';
      const duration = item.end && item.start ? item.end - item.start : 0;
      
      output += `CLIP ${num}: ${item.name}${label}\n`;
      output += `${'─'.repeat(80)}\n`;
      output += `ID:       ${item.id}\n`;
      output += `SOURCE:   https://www.youtube.com/watch?v=${item.videoId}\n`;
      
      if(item.start !== undefined){
        output += `IN:       ${secondsToTimecode(item.start)}\n`;
        output += `OUT:      ${secondsToTimecode(item.end)}\n`;
        output += `DURATION: ${secondsToTimecode(duration)}\n`;
      }
      
      output += `TAGS:     ${item.tags.join(', ')}\n`;
      
      if(item.referenceUrl){
        output += `REF URL:  ${item.referenceUrl}\n`;
      }
      
      if(item.notes){
        output += `NOTES:\n`;
        output += `  ${item.notes.replace(/\n/g, '\n  ')}\n`;
      }
      
      output += '\n';
    });
    
    downloadFile('collection-edl.txt', output);
    console.log('Exported EDL format');
  }
  
  function exportAsJSON(){
    // OTI.json format: Structured data with all editing metadata
    const oti = {
      version: '1.0.0',
      type: 'tv-collection-edl',
      metadata: {
        title: 'TV Swiper Collection',
        created: new Date().toISOString(),
        count: collection.length,
        totalDuration: collection.reduce((sum, item) => {
          return sum + (item.end && item.start ? item.end - item.start : 0);
        }, 0)
      },
      items: collection.map((item, i) => ({
        index: i + 1,
        id: item.id,
        name: item.name,
        label: item.label || null,
        tags: item.tags,
        type: item.type,
        videoId: item.videoId,
        embedUrl: item.embedUrl,
        timeRange: item.start !== undefined ? {
          start: item.start,
          end: item.end,
          duration: item.end - item.start,
          inPoint: secondsToTimecode(item.start),
          outPoint: secondsToTimecode(item.end)
        } : null,
        filepath: `https://www.youtube.com/watch?v=${item.videoId}${item.start !== undefined ? `&t=${item.start}s` : ''}`,
        notes: item.notes || null,
        referenceUrl: item.referenceUrl || null,
        accepted: item.accepted,
        modified: new Date().toISOString()
      }))
    };
    
    const json = JSON.stringify(oti, null, 2);
    downloadFile('collection-oti.json', json);
    console.log('Exported OTI.json format');
  }
  
  function downloadFile(filename, content){
    const blob = new Blob([content], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }
  
  
  function toggleSettings(){
    const panel = document.getElementById('settings-panel');
    panel.classList.toggle('open');
  }
  
  function saveApiKey(){
    const input = document.getElementById('api-key-input');
    const key = input.value.trim();
    
    if(key){
      localStorage.setItem('openai_api_key', key);
      console.log('API key saved');
    } else {
      localStorage.removeItem('openai_api_key');
      console.log('API key removed - using simulation mode');
    }
    
    toggleSettings();
  }
  
  // --- UI EVENTS ---
  function init(){
    initMediaLibrary();
    showTV(0);
    document.getElementById('loading').classList.add('hidden');
    
    // --- UI EVENTS ---
    document.getElementById('btn-collection').onclick = toggleCollection;
    document.getElementById('close-collection').onclick = toggleCollection;
    document.getElementById('btn-settings').onclick = toggleSettings;
    document.getElementById('close-settings').onclick = toggleSettings;
    document.getElementById('save-api-key').onclick = saveApiKey;
    document.getElementById('export-a3').onclick = exportAsA3;
    document.getElementById('export-json').onclick = exportAsJSON;
    
    // Load saved API key
    const savedKey = localStorage.getItem('openai_api_key');
    if(savedKey){
      document.getElementById('api-key-input').value = savedKey;
    }
    
    console.log(`
%cTV SWIPER - AI Chat Editor%c

%cNAVIGATION:%c
↑ / Swipe Up - Next TV
↓ / Swipe Down - Previous TV
→ / Swipe Right - Accept (add to collection)
← / Swipe Left - Reject
C - Toggle collection
S - Settings (API key)

%cCHAT (INLINE):%c
CHAT - Opens inline chat below clip
  • OpenAI API integration
  • Context-aware responses
  • Persistent chat history per clip
  • Simulation mode (no API key)

%cOTHER ACTIONS:%c
LABEL - Add structural labels
VIEW - Jump to clip in feed
REMOVE - Delete from collection
:: Handle - Drag to reorder

%cEXPORT:%c
EDL.txt - Edit decision list with timecodes
OTI.json - Structured metadata + chat history

%cSETTINGS:%c
Configure OpenAI API key for real AI chat
Leave blank for simulation mode
    `,
    'color:#0ff;font-size:16px;font-weight:bold', '',
    'color:#0a84ff;font-weight:bold', '',
    'color:#0a84ff;font-weight:bold', '',
    'color:#0a84ff;font-weight:bold', '',
    'color:#0a84ff;font-weight:bold', '',
    'color:#0a84ff;font-weight:bold', ''
    );
  }
  
  if(document.readyState === 'complete' || document.readyState === 'interactive'){
    setTimeout(init, 0);
  } else {
    window.addEventListener('load', init);
  }
  
})();
</script>
