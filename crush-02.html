<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Matrix Crush: Film Assembly Puzzle</title>
<style>
  :root{ --bg:#0a0e14; --surface:#111723; --accent:#ffd400; --grid:#2d3340; --text:#c7d0e0; }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
  .wrap{display:grid;grid-template-rows:auto 1fr auto;max-width:900px;margin:0 auto;height:100%;}
  header{display:flex;gap:.75rem;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid #202634;background:linear-gradient(#0d121c,#0a0e14)}
  .stat{display:flex;gap:.5rem;align-items:center;font-weight:600}
  .chip{background:#121a28;border:1px solid #243047;border-radius:999px;padding:.35rem .6rem;display:inline-flex;gap:.35rem;align-items:center}
  .chip b{color:var(--accent)}
  #gameArea{position:relative;display:grid;place-items:center;padding:8px}
  canvas{width:100%;height:100%;max-width:820px;max-height:820px;touch-action:none;background:radial-gradient(120% 120% at 50% 0%, #101826 0%, #0a0e14 70%)}
  .controls{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;padding:.75rem;border-top:1px solid #202634;background:linear-gradient(#0d121c,#0a0e14)}
  button{appearance:none;border:1px solid #2c3649;background:#131b2a;color:var(--text);padding:.7rem .8rem;border-radius:14px;font-weight:700;letter-spacing:.02em}
  button:active{transform:translateY(1px)}
  .primary{border-color:#4b556d;background:#1a2436;color:#fff}
  .accent{border-color:#7d5b00;background:#1e1600;color:#ffdb66}
  .ghost{background:#101827}
  .sel{outline:2px solid var(--accent)}
  .mini{font-size:.8rem;padding:.55rem .6rem}
  .row{grid-column:span 4;display:flex;gap:.5rem}
  .badge{background:#161f30;border:1px solid #283349;border-radius:10px;padding:.1rem .4rem;margin-left:.35rem;font-size:.8rem}
  .toast{position:fixed;inset:auto 0 90px 0;display:flex;justify-content:center;pointer-events:none}
  .toast > div{background:#0e1524;border:1px solid #263149;color:#dff4ff;padding:.55rem .8rem;border-radius:12px;box-shadow:0 10px 24px rgba(0,0,0,.35)}
  .overlay{position:absolute;inset:0;display:grid;place-items:center}
  .card{background:#0e1524cc;border:1px solid #2a3850;color:#eef;backdrop-filter:blur(6px);padding:18px;border-radius:14px;text-align:center}
  .title{font-size:20px;font-weight:900;margin-bottom:6px;color:#fff}
  .confetti{position:absolute;inset:0;pointer-events:none}
  .timeline{position:fixed;bottom:0;left:0;right:0;background:#0a0e14ee;border-top:2px solid var(--accent);padding:8px 12px;display:none;max-height:120px;overflow-y:auto;backdrop-filter:blur(8px);z-index:100}
  .timeline.show{display:block}
  .timeline-title{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:.7;margin-bottom:6px}
  .fragments{display:flex;gap:8px;flex-wrap:wrap}
  .fragment{background:#131b2a;border:1px solid #2c3649;border-radius:8px;padding:6px 10px;font-size:11px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s}
  .fragment:hover{border-color:var(--accent);background:#1a2436}
  .fragment-icon{font-size:14px;opacity:.9}
  .fragment-title{font-weight:600}
  .fragment-cat{opacity:.6;font-size:10px;margin-left:4px}

</head>
<body>
<div class="wrap">
  <header>
    <div class="stat"><span class="chip">🎯 Target: <b id="target">6000</b></span><span class="chip">🌀 Moves: <b id="moves">30</b></span><span class="chip">⭐ Score: <b id="score">0</b></span></div>
    <div class="stat">
      <button id="newGame" class="primary mini">New</button>
      <button id="pauseBtn" class="ghost mini">⏯</button>
    </div>
  </header>
  <main id="gameArea">
    <canvas id="board" width="820" height="820"></canvas>
    <canvas id="fx" class="confetti" width="820" height="820"></canvas>
    <div id="startOverlay" class="overlay">
      <div class="card">
        <div class="title">Matrix Crush</div>
        <div style="opacity:.8;margin-bottom:10px;font-size:13px">Match fragments to assemble the documentary timeline.<br>Each candy represents a narrative category.</div>
        <div style="margin:12px 0;font-size:11px;opacity:.7">◯ Media Apparatus · ◐ Core Concept · ◑ Systemic Critique<br>◒ Systemic Control · ◓ Systemic Event · ◔ Personal</div>
        <button class="primary" id="startBtn">Begin Assembly</button>
      </div>
    </div>
    <div id="endOverlay" class="overlay" hidden>
      <div class="card" id="endCard"></div>
    </div>
  </main>
  <footer class="controls">
    <button id="hammer" title="Remove one candy" class="accent">🔨 Hammer<span id="hammerCnt" class="badge">2</span></button>
    <button id="rowBlast" title="Clear a row" class="accent">📍 Row<span id="rowCnt" class="badge">2</span></button>
    <button id="colorBomb" title="Clear a color" class="accent">🌈 Color<span id="colorCnt" class="badge">1</span></button>
    <button id="shuffle" title="Shuffle board" class="accent">🔀 Shuffle<span id="shuffleCnt" class="badge">2</span></button>
    <div class="row">
      <button id="undo" class="ghost">↩︎ Undo</button>
      <button id="hint" class="ghost">💡 Hint</button>
      <button id="sfx" class="ghost">🔊 SFX</button>
    </div>
  </footer>
</div>
<div class="toast" id="toast" hidden><div id="toastMsg"></div></div>
<div class="timeline" id="timeline">
  <div class="timeline-title">Assembled Fragments</div>
  <div class="fragments" id="fragmentsList"></div>
</div>
<script>
(() => {
  // ====== CONFIG ======
  const N = 8;                 // grid size
  const TYPES = 6;             // candy colors
  const CELL = 96;             // px base
  const MOVES_START = 30;
  const TARGET_SCORE = 6000;
  const SCORE3 = 60, SCORE4 = 150, SCORE5 = 400; // scoring tiers
  const BOOSTERS = { hammer:2, row:2, color:1, shuffle:2 };

  // ====== STORY FRAGMENTS (from matrix-editor) ======
  const STORY_FRAGMENTS = [
    { id: 'fom-exhibition-1950s', title: 'Family of Man', category: 'Media Apparatus', desc: 'A new way of seeing the world, an alternative to the horrors of Nazism and communism.', icon: '◯', start: 27, end: 53 },
    { id: 'bayer-individual-self', title: 'Individual Self', category: 'Core Concept', desc: 'At the center of that world is the individual self, making their own story.', icon: '◐', start: 67, end: 78 },
    { id: 'afeni-fairyland-conceal', title: 'Unreal Fairyland', category: 'Systemic Critique', desc: 'The world that concealed the harsh reality of power.', icon: '◑', start: 197, end: 204 },
    { id: 'tupac-grand-stories', title: 'Grand Stories', category: 'Core Concept', desc: 'Believed deeply in their power to move people and inspire change.', icon: '◒', start: 143, end: 148 },
    { id: 'society-boom-q', title: 'Societal Boom', category: 'Systemic Control', desc: 'Society lets you go far, but as soon as you ask questions, boom.', icon: '◓', start: 230, end: 237 },
    { id: 'crack-epidemic-afeni-fall', title: 'Crack Epidemic', category: 'Systemic Event', desc: 'Crack swept through black communities, Afeni became addicted.', icon: '◔', start: 291, end: 300 }
  ];

  const FRAGMENT_CATEGORIES = [
    { name: 'Media Apparatus', color: '#4A90E2', icon: '◯' },
    { name: 'Core Concept', color: '#62ff87', icon: '◐' },
    { name: 'Systemic Critique', color: '#E24A4A', icon: '◑' },
    { name: 'Systemic Control', color: '#ff9ecb', icon: '◒' },
    { name: 'Systemic Event', color: '#ffd166', icon: '◓' },
    { name: 'Personal Apparatus', color: '#bd9cff', icon: '◔' }
  ];

  const YT_VIDEO_ID = 'BQ2n6SN7gOY';

  // ====== STATE ======
  let collectedFragments = [];
  let grid = null, locked=false, score=0, moves=MOVES_START, target=TARGET_SCORE, paused=false;
  let selA=null, selB=null, lastState=null; // for undo
  let boosters = {...BOOSTERS};
  const board = document.getElementById('board');
  const fx = document.getElementById('fx');
  const ctx = board.getContext('2d');
  const fxc = fx.getContext('2d');

  const ui = {
    target: document.getElementById('target'),
    moves: document.getElementById('moves'),
    score: document.getElementById('score'),
    hammer: document.getElementById('hammer'),
    rowBlast: document.getElementById('rowBlast'),
    colorBomb: document.getElementById('colorBomb'),
    shuffle: document.getElementById('shuffle'),
    undo: document.getElementById('undo'),
    hint: document.getElementById('hint'),
    sfx: document.getElementById('sfx'),
    pause: document.getElementById('pauseBtn'),
    newGame: document.getElementById('newGame'),
    startOverlay: document.getElementById('startOverlay'),
    endOverlay: document.getElementById('endOverlay'),
    endCard: document.getElementById('endCard'),
    toast: document.getElementById('toast'),
    toastMsg: document.getElementById('toastMsg'),
    counts: {
      hammer: document.getElementById('hammerCnt'),
      row: document.getElementById('rowCnt'),
      color: document.getElementById('colorCnt'),
      shuffle: document.getElementById('shuffleCnt'),
    }
  };

  // ====== AUDIO (simple, fileless) ======
  const Audio = (() => {
    const AC = window.AudioContext||window.webkitAudioContext; let ctx = null; let enabled=true;
    function ensure(){ if(!ctx && AC){ try{ ctx=new AC(); }catch(_){} } }
    const beep = (f=520,d=0.06,type='square',gain=0.03)=>{ if(!enabled) return; ensure(); if(!ctx) return; const o=ctx.createOscillator(), g=ctx.createGain(); o.type=type; o.frequency.value=f; g.gain.value=gain; o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+d); };
    const thud = ()=>beep(180,0.08,'sawtooth',0.05);
    return { beep, thud, toggle(){ enabled=!enabled; ui.sfx.classList.toggle('sel',enabled);} };
  })();

  // ====== UTIL ======
  const rand = (n) => Math.floor(Math.random()*n);
  const clone = (g) => g.map(r=>r.slice());
  const inside = (r,c) => r>=0&&c>=0&&r<N&&c<N;
  const posToRC = (x,y)=>{ const sz=CELL*N; const bx=(board.width - sz)/2; const by=(board.height - sz)/2; return { r: Math.floor((y-by)/CELL), c: Math.floor((x-bx)/CELL) }; };
  const rcToXY = (r,c)=>{ const sz=CELL*N; const bx=(board.width - sz)/2; const by=(board.height - sz)/2; return { x:bx + c*CELL + CELL/2, y:by + r*CELL + CELL/2 }; };

  // ====== GRID GEN (no initial matches) ======
  function freshGrid(){
    const g = Array.from({length:N}, ()=>Array(N).fill(0));
    for(let r=0;r<N;r++){
      for(let c=0;c<N;c++){
        let t; do{ t=rand(TYPES); } while((c>1 && g[r][c-1]===t && g[r][c-2]===t) || (r>1 && g[r-1][c]===t && g[r-2][c]===t));
        g[r][c]=t;
      }
    }
    return g;
  }

  // ====== RENDER ======
  const PALETTE = FRAGMENT_CATEGORIES.map(c => c.color);
  function drawCandy(x,y,t,scale=1,selected=false){
    const category = FRAGMENT_CATEGORIES[t];
    const rr=(CELL*0.38)*scale; const grd=ctx.createRadialGradient(x-rr*.4,y-rr*.4,rr*.2,x,y,rr);
    grd.addColorStop(0,'#ffffff'); grd.addColorStop(0.08,'#ffffffcc'); grd.addColorStop(0.12,PALETTE[t]); grd.addColorStop(1,shade(PALETTE[t],-0.25));
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=selected?4:2; ctx.strokeStyle=selected?'#ffd400':'#0c1220'; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.arc(x-rr*.2,y-rr*.25,rr*.5,Math.PI*1.05,Math.PI*1.95); ctx.fill();
    
    // Draw category icon
    ctx.fillStyle='#fff';
    ctx.font=`${CELL*0.3}px system-ui`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(category.icon, x, y);
  }
  function shade(col,pct){ const n=parseInt(col.slice(1),16); let r=n>>16,g=n>>8&255,b=n&255; r=Math.round(r*(1+pct)); g=Math.round(g*(1+pct)); b=Math.round(b*(1+pct)); r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b)); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }

  function drawGrid(){
    ctx.clearRect(0,0,board.width,board.height);
    const sz=CELL*N; const bx=(board.width - sz)/2; const by=(board.height - sz)/2;
    ctx.strokeStyle='#243047'; ctx.lineWidth=3; ctx.strokeRect(bx-6,by-6,sz+12,sz+12);
    // Safety: if grid not ready yet, stop here (pre‑start renders)
    if(!Array.isArray(grid) || grid.length!==N) return;
    for(let r=0;r<N;r++){
      for(let c=0;c<N;c++){
        const {x,y}=rcToXY(r,c);
        ctx.strokeStyle='#1c263b'; ctx.lineWidth=1; ctx.strokeRect(x-CELL/2+1,y-CELL/2+1,CELL-2,CELL-2);
        const t=grid[r][c]; if(t<0) continue; const selected=!!(selA && selA.r===r && selA.c===c); drawCandy(x,y,t,1,selected);
      }
    }
  }

  // ====== MATCH FIND/REMOVE ======
  function findMatches(g){
    const src = g || grid; // tolerate undefined
    const matched = Array.from({length:N},()=>Array(N).fill(false));
    if(!Array.isArray(src) || src.length!==N) return matched;
    // rows (defensive checks per row)
    for(let r=0;r<N;r++){
      if(!Array.isArray(src[r]) || src[r].length!==N) continue;
      let streak=1;
      for(let c=1;c<=N;c++){
        const eq = (c<N && src[r]?.[c]===src[r]?.[c-1]);
        if(eq){ streak++; }
        else { if(streak>=3){ for(let k=0;k<streak;k++) matched[r][c-1-k]=true; } streak=1; }
      }
    }
    // cols (defensive checks per row access)
    for(let c=0;c<N;c++){
      let streak=1;
      for(let r=1;r<=N;r++){
        const eq = (r<N && src[r]?.[c]===src[r-1]?.[c]);
        if(eq){ streak++; }
        else { if(streak>=3){ for(let k=0;k<streak;k++) matched[r-1-k][c]=true; } streak=1; }
      }
    }
    return matched;
  }
  const anyTrue=(m)=>{ for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(m[r][c]) return true; return false; };
  function removeMatches(m){
    const groups = groupCount(m); score += groups.score; ui.score.textContent=score; sparkle(m);
    
    // Collect fragments from matched candies
    const matchedTypes = new Set();
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) {
      if(m[r][c]) {
        matchedTypes.add(grid[r][c]);
        grid[r][c] = -1;
      }
    }
    
    // Add fragments for each matched type
    matchedTypes.forEach(type => {
      const categoryFragments = STORY_FRAGMENTS.filter(f => f.category === FRAGMENT_CATEGORIES[type].name);
      if(categoryFragments.length > 0) {
        const fragment = categoryFragments[Math.floor(Math.random() * categoryFragments.length)];
        if(!collectedFragments.find(f => f.id === fragment.id)) {
          collectedFragments.push(fragment);
          showFragmentToast(fragment);
          updateTimeline();
        }
      }
    });
  }
  function groupCount(m){
    let visited=Array.from({length:N},()=>Array(N).fill(false)); let total=0, sc=0;
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(m[r][c] && !visited[r][c]){
      let q=[[r,c]], size=0; visited[r][c]=true; while(q.length){ const [rr,cc]=q.pop(); size++; total++; [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{const nr=rr+dr,nc=cc+dc; if(inside(nr,nc)&&m[nr][nc]&&!visited[nr][nc]){visited[nr][nc]=true;q.push([nr,nc]);}});} sc += size>=5?SCORE5: size===4?SCORE4: SCORE3; }
    return {total, score: sc};
  }

  // ====== GRAVITY/REFILL ======
  function dropCandies(){
    for(let c=0;c<N;c++){
      let write=N-1; for(let r=N-1;r>=0;r--){ if(grid[r][c]!==-1){ grid[write][c]=grid[r][c]; write--; } }
      for(let r=write;r>=0;r--){ grid[r][c] = rand(TYPES); }
    }
  }

  // ====== GAME FLOW ======
  function trySwap(a,b){ if(locked||!grid) return false; if(!a||!b) return false; if(Math.abs(a.r-b.r)+Math.abs(a.c-b.c)!==1) return false; saveUndo(); swap(a,b); if(resolveBoard()){ moves--; updateMoves(); Audio.thud(); return true; } else { swap(a,b); flash('No match'); return false; } }
  const swap=(a,b)=>{ const t=grid[a.r][a.c]; grid[a.r][a.c]=grid[b.r][b.c]; grid[b.r][b.c]=t; };
  const saveUndo=()=>{ lastState = {grid:clone(grid), score, moves}; };
  function undo(){ if(!lastState) return; grid=clone(lastState.grid); score=lastState.score; moves=lastState.moves; selA=selB=null; drawGrid(); updateUI(); flash('Undid last move'); }

  function resolveBoard(){
    locked=true; let chain=0;
    function step(){
      const m=findMatches(); if(!anyTrue(m)){ locked=false; drawGrid(); checkEnd(); return chain>0; }
      chain++; removeMatches(m); drawGrid(); setTimeout(()=>{ dropCandies(); drawGrid(); setTimeout(step,140); },140);
    }
    step(); return true;
  }

  function checkEnd(){ if(score>=target){ victory(); } else if(moves<=0){ defeat(); } }
  function victory(){ confetti(); ui.endCard.innerHTML = `<div class="title">YOU WIN 🎉</div><div style="margin:.5rem 0 1rem">Candies explode, score <b>${score}</b>!</div><button class="primary" onclick="location.reload()">Play Again</button>`; ui.endOverlay.hidden=false; }
  function defeat(){ ui.endCard.innerHTML = `<div class="title">OUT OF MOVES</div><div style="margin:.5rem 0 1rem">Score <b>${score}</b></div><button class="primary" onclick="location.reload()">Try Again</button>`; ui.endOverlay.hidden=false; }

  const updateMoves=()=>{ ui.moves.textContent=moves; };
  function updateUI(){ ui.score.textContent=score; ui.target.textContent=target; updateMoves(); ui.counts.hammer.textContent=boosters.hammer; ui.counts.row.textContent=boosters.row; ui.counts.color.textContent=boosters.color; ui.counts.shuffle.textContent=boosters.shuffle; }

  // ====== PARTICLES ======
  const sparks=[];
  function sparkle(mask){ for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(mask[r][c]){ const {x,y}=rcToXY(r,c); for(let i=0;i<10;i++) sparks.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.8)*-5,a:1,life:30+rand(20),col:PALETTE[grid[r][c]===-1?rand(TYPES):grid[r][c]]}); } }
  function confetti(){ for(let i=0;i<220;i++) sparks.push({x:board.width/2+(Math.random()-0.5)*300,y:0,vx:(Math.random()-0.5)*4,vy:Math.random()*3+2,a:1,life:80+rand(40),col:PALETTE[rand(TYPES)]}); }
  function fxLoop(){ fxc.clearRect(0,0,fx.width,fx.height); for(let i=sparks.length-1;i>=0;i--){ const p=sparks[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.a*=0.985; p.life--; if(p.life<=0||p.a<.03){sparks.splice(i,1); continue;} fxc.globalAlpha=p.a; fxc.fillStyle=p.col; fxc.beginPath(); fxc.arc(p.x,p.y,2.2,0,Math.PI*2); fxc.fill(); } requestAnimationFrame(fxLoop); }

  // ====== INPUT (drag to swap) ======
  let dragging=false, lastRC=null;
  function onDown(x,y){ if(paused||locked||!grid) return; dragging=true; const {r,c}=posToRC(x,y); if(!inside(r,c)) return; selA={r,c}; lastRC={r,c}; drawGrid(); }
  function onMove(x,y){ if(!dragging||!selA||!grid) return; const {r,c}=posToRC(x,y); if(!inside(r,c)) return; if(Math.abs(r-selA.r)+Math.abs(c-selA.c)===1 && (r!==lastRC.r || c!==lastRC.c)){ selB={r,c}; trySwap(selA,selB); selA=selB=null; dragging=false; drawGrid(); } }
  function onUp(){ dragging=false; selA=selB=null; drawGrid(); }

  board.addEventListener('mousedown', e=>onDown(e.offsetX,e.offsetY));
  board.addEventListener('mousemove', e=>onMove(e.offsetX,e.offsetY));
  board.addEventListener('mouseup', onUp);
  board.addEventListener('mouseleave', onUp);
  board.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; const r=board.getBoundingClientRect(); onDown(t.clientX-r.left, t.clientY-r.top); e.preventDefault(); });
  board.addEventListener('touchmove', e=>{ const t=e.changedTouches[0]; const r=board.getBoundingClientRect(); onMove(t.clientX-r.left, t.clientY-r.top); e.preventDefault(); });
  board.addEventListener('touchend', onUp);

  // ====== BOOSTERS ======
  let activeBooster=null; // 'hammer' | 'row' | 'color' | 'shuffle'
  function selectBooster(name){ if(locked||!grid) return; if(name==='shuffle'){ if(boosters.shuffle<=0) return flash('No shuffles'); boosters.shuffle--; shuffleBoard(); updateUI(); return; }
    if(boosters[name]<=0) return flash('No charges'); activeBooster = (activeBooster===name? null : name); ['hammer','rowBlast','colorBomb'].forEach(id=>ui[id].classList.toggle('sel', (name==='row' && id==='rowBlast') || (name==='hammer' && id==='hammer') || (name==='color' && id==='colorBomb'))); }

  ui.hammer.onclick=()=>selectBooster('hammer');
  ui.rowBlast.onclick=()=>selectBooster('row');
  ui.colorBomb.onclick=()=>selectBooster('color');
  ui.shuffle.onclick=()=>selectBooster('shuffle');

  board.addEventListener('click', e=>{
    if(!activeBooster||locked||!grid) return; const r=board.getBoundingClientRect(); const {r:rr,c:cc}=posToRC(e.clientX-r.left,e.clientY-r.top); if(!inside(rr,cc)) return; saveUndo();
    if(activeBooster==='hammer'){ boosters.hammer--; grid[rr][cc]=-1; dropCandies(); resolveBoard(); flash('Hammer used'); }
    else if(activeBooster==='row'){ boosters.row--; for(let c=0;c<N;c++) grid[rr][c]=-1; dropCandies(); resolveBoard(); flash('Row cleared'); }
    else if(activeBooster==='color'){ boosters.color--; const color=grid[rr][cc]; for(let r0=0;r0<N;r0++) for(let c0=0;c0<N;c0++) if(grid[r0][c0]===color) grid[r0][c0]=-1; dropCandies(); resolveBoard(); flash('Color bomb!'); }
    activeBooster=null; ['hammer','rowBlast','colorBomb'].forEach(id=>ui[id].classList.remove('sel')); updateUI();
  });

  function shuffleBoard(){ if(!grid) return; for(let r=0;r<N;r++) for(let c=0;c<N;c++){ const r2=rand(N), c2=rand(N); const t=grid[r][c]; grid[r][c]=grid[r2][c2]; grid[r2][c2]=t; } drawGrid(); if(!anyTrue(findMatches(grid))) { // ensure at least one matchable move exists via brute retries
      let tries=0; while(tries<10 && getMoves().length===0){ for(let r=0;r<N;r++) for(let c=0;c<N;c++){ const r2=rand(N), c2=rand(N); const t=grid[r][c]; grid[r][c]=grid[r2][c2]; grid[r2][c2]=t; } tries++; }
      drawGrid();
    }
    resolveBoard();
  }

  // ====== HINT ======
  function getMoves(){ if(!grid) return []; const list=[]; const dirs=[[1,0],[-1,0],[0,1],[0,-1]]; for(let r=0;r<N;r++) for(let c=0;c<N;c++) for(const [dr,dc] of dirs){ const nr=r+dr, nc=c+dc; if(!inside(nr,nc)) continue; swapRC(grid,r,c,nr,nc); if(anyTrue(findMatches(grid))) list.push([[r,c],[nr,nc]]); swapRC(grid,r,c,nr,nc); } return list; }
  function swapRC(g,r1,c1,r2,c2){ const t=g[r1][c1]; g[r1][c1]=g[r2][c2]; g[r2][c2]=t; }
  function showHint(){ const mv=getMoves(); if(!mv.length){ flash('No moves — shuffling'); shuffleBoard(); return; } const [[a,b]] = mv; selA={r:a[0],c:a[1]}; setTimeout(()=>{selA=null; drawGrid();},700); drawGrid(); Audio.beep(700,0.08,'triangle',0.05); }

  // ====== FRAGMENTS & TIMELINE ======
  function showFragmentToast(fragment){
    flash(`${fragment.icon} ${fragment.title} — ${fragment.category}`);
  }
  
  function updateTimeline(){
    const timelineEl = document.getElementById('timeline');
    const fragmentsList = document.getElementById('fragmentsList');
    
    if(collectedFragments.length === 0){
      timelineEl.classList.remove('show');
      return;
    }
    
    timelineEl.classList.add('show');
    fragmentsList.innerHTML = '';
    
    collectedFragments.forEach(fragment => {
      const div = document.createElement('div');
      div.className = 'fragment';
      div.innerHTML = `
        <span class="fragment-icon">${fragment.icon}</span>
        <span class="fragment-title">${fragment.title}</span>
        <span class="fragment-cat">${fragment.category}</span>
      `;
      div.onclick = () => showFragmentDetail(fragment);
      fragmentsList.appendChild(div);
    });
  }
  
  function showFragmentDetail(fragment){
    const origin = window.location.origin;
    const embedUrl = `https://www.youtube-nocookie.com/embed/${YT_VIDEO_ID}?start=${fragment.start}&end=${fragment.end}&controls=1&modestbranding=1&fs=1&autoplay=1`;
    
    ui.endCard.innerHTML = `
      <div class="title">${fragment.icon} ${fragment.title}</div>
      <div style="margin:.5rem 0;opacity:.8;font-size:12px">${fragment.category}</div>
      <div style="margin:.5rem 0;font-size:13px">${fragment.desc}</div>
      <iframe width="100%" height="200" src="${embedUrl}" frameborder="0" allowfullscreen style="margin-top:10px;border-radius:8px"></iframe>
      <button class="primary" style="margin-top:12px" onclick="document.getElementById('endOverlay').hidden=true">Close</button>
    `;
    ui.endOverlay.hidden=false;
  }

  // ====== TOAST ======
  let toastTimer=null; function flash(msg){ ui.toastMsg.textContent=msg; ui.toast.hidden=false; clearTimeout(toastTimer); toastTimer=setTimeout(()=>ui.toast.hidden=true, 1100); }

  // ====== RESIZE CANVAS ======
  function resize(){ const area=document.getElementById('gameArea'); const s=Math.min(area.clientWidth-16, area.clientHeight-16); const size=Math.max(420, Math.min(820, s)); board.width=board.height=fx.width=fx.height=size; drawGrid(); }
  addEventListener('resize', resize);

  // ====== INIT ======
  function start(){ 
    collectedFragments = [];
    grid=freshGrid(); 
    score=0; 
    moves=MOVES_START; 
    boosters={...BOOSTERS}; 
    updateUI(); 
    updateTimeline();
    drawGrid(); 
    resolveBoard(); 
  }
  
  document.getElementById('startBtn').onclick=()=>{ 
    ui.startOverlay.hidden=true; 
    start(); 
  };
  ui.newGame.onclick=()=>{ start(); };

  // ====== FX LOOP & FIRST LAYOUT ======
  fxLoop(); resize();

  // ====== DEV SELF‑TESTS (sanity checks) ======
  (function tests(){
    try{ drawGrid(); console.assert(true, 'drawGrid pre‑start safe'); }catch(e){ console.error('drawGrid pre‑start failed', e); }
    const m=findMatches(); console.assert(Array.isArray(m) && m.length===N && m[0].length===N, 'findMatches returns NxN when grid undefined');
    // Test 3: fresh board has zero matches (by construction)
    const g=freshGrid(); const mm=findMatches(g); console.assert(!anyTrue(mm), 'freshGrid should have no matches');
    // Test 4: synthetic 3-in-row should match
    const g2=Array.from({length:N},()=>Array(N).fill(0)); g2[0][0]=1; g2[0][1]=1; g2[0][2]=1; const mm2=findMatches(g2); console.assert(mm2[0][0]&&mm2[0][1]&&mm2[0][2], '3-in-row detected');
  })();
})();
</script>
