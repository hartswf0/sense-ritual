<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MESHWORK 725 — Mosaic Automata</title>
  <style>
    :root{
      --bg:#0a0a0a; --ui:#111; --line:#222;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{height:100%; margin:0; background:var(--bg); color:#0ff; font-family:-apple-system,sans-serif;}
    
    .wrap{display:flex; flex-direction:column; height:100vh; height:100dvh;}
    
    /* Header */
    header{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--ui); border-bottom:2px solid var(--line);}
    .brand{font-weight:900; letter-spacing:3px; font-size:16px; color:#0ff;}
    .stats{display:flex; gap:16px; font-size:12px; font-weight:700;}
    .stat{color:#666;}
    .stat-value{color:#0ff;}
    .act-counter{font-weight:700; color:#FFD700;} /* New style for Act Counter */
    
    /* Game Area */
    #gameArea{position:relative; flex:1; display:flex; align-items:center; justify-content:center; background:var(--bg);}
    canvas{background:#0d0d0d; border:2px solid var(--line); border-radius:8px; touch-action:none; /* image-rendering:pixelated; */ }
    
    /* Video Preview */
    .video-preview{position:absolute; top:20px; right:20px; width:160px; height:90px; border:2px solid #0ff; background:#000; overflow:hidden; pointer-events:none; opacity:0.8;}
    .video-preview video{width:100%; height:100%; object-fit:cover;}
    .video-label{position:absolute; bottom:4px; left:4px; background:rgba(0,0,0,0.9); padding:2px 6px; font-size:10px; color:#0ff; font-weight:700;}
    
    @media (max-width: 640px) {
      .video-preview{width:120px; height:68px; top:10px; right:10px;}
    }
    
    /* Toolbar: fixed bottom, concise */
    .toolbar{position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:center; gap:8px; padding:10px; background:rgba(0,0,0,0.85); border-top:2px solid #0ff; z-index:120;}
    .btn{appearance:none; border:none; color:#0ff; background:rgba(0,255,255,0.1); border:1px solid #0ff; padding:8px 10px; border-radius:4px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase;}
    .btn:active{transform:scale(0.95); background:#0ff; color:#000;}
    
    /* Timeline lane (narrow) */
    .timeline-panel{position:fixed; right:0; top:60px; bottom:50px; width:72px; background:rgba(0,0,0,0.78); border-left:2px solid #0ff; padding:6px 4px; overflow-y:auto; transform:translateX(0); transition:width 0.25s ease, padding 0.25s ease; z-index:100; display:flex; flex-direction:column; gap:6px;}
    .timeline-panel.collapsed{width:0; padding:0; border-left:none; pointer-events:none;}
    .timeline-title{font-size:10px; font-weight:900; color:#0ff; margin:0 0 6px; text-align:center; letter-spacing:1px;}
    .clip-item{width:100%; aspect-ratio:16/9; margin-bottom:8px; border:2px solid #333; cursor:pointer; position:relative; overflow:hidden;}
    .clip-item video{width:100%; height:100%; object-fit:cover;}
    .clip-label{position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.9); padding:3px; font-size:8px; color:#0ff; text-align:center; text-transform:uppercase; letter-spacing:0.5px;}
    .clip-item.locked .clip-label::after { content: "🔒"; position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); font-size: 1.5em; }
    .clip-item.locked { border-color: #666 !important; opacity: 0.6; filter: grayscale(100%); }
    .clip-item.muted { opacity: 0.4; filter: grayscale(100%); } /* Added for Half-Silence Rule */


    .sequence-player{position:sticky; bottom:0; background:#0b0b0b; border-top:2px solid #0ff; padding:8px;}
    .sequence-player video{width:100%; aspect-ratio:16/9; background:#000; border:2px solid #0ff;}

    /* Timeline handle */
    .timeline-handle{position:fixed; right:0; top:50%; transform:translateY(-50%); width:22px; height:72px; background:rgba(0,255,255,0.12); border-left:2px solid #0ff; color:#0ff; display:flex; align-items:center; justify-content:center; z-index:110; cursor:pointer; backdrop-filter: blur(2px); box-shadow: inset 0 0 10px rgba(0,255,255,0.25); font-weight:900;}
    .timeline-handle:active{background:rgba(0,255,255,0.25);}
    
    @media (max-width: 768px) {
      .timeline-panel{width:160px;}
      .toolbar{grid-template-columns:repeat(3,1fr);}
    }
    
    /* Shape Colors - High Contrast Bauhaus (used for borders, not direct fill) */
    .color-0{border-color:#FF6666 !important;} /* Crimson */
    .color-1{border-color:#00FFFF !important;} /* Azure */
    .color-2{border-color:#FFFF00 !important;} /* Amber */
    .color-3{border-color:#88FFCC !important;} /* Jade */
    .color-4{border-color:#FF8888 !important;} /* Flame */
    .color-5{border-color:#DD88FF !important;} /* Violet */
    .color-6{border-color:#88FFAA !important;} /* Emerald */
    .color-7{border-color:#FFBB66 !important;} /* Gold */
    .color-8{border-color:#FFBBDD !important;} /* Rose */
    .color-9{border-color:#EEEEEE !important;} /* Stone */
    
    /* Loading */
    .loading{position:absolute; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition:opacity 1s ease-out;}
    .loading-text{font-size:18px; color:#0ff; font-weight:900; margin-bottom:10px;}
    .loading-spinner{border:3px solid rgba(0,255,255,0.2); border-top:3px solid #0ff; border-radius:50%; width:20px; height:20px; animation:spin 1s linear infinite;}
    @keyframes spin {0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);}}

    /* Modal */
    .modal{position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:1000;}
    .modal.show{display:flex;}
    .modal-content{text-align:center; padding:40px;}
    .modal-title{font-size:48px; font-weight:900; color:#0ff; margin-bottom:20px;}
    .modal-stats{font-size:18px; color:#666; margin-bottom:30px;}
    .modal-btn{padding:16px 40px; background:#0ff; border:none; color:#000; font-weight:900; font-size:16px; cursor:pointer; margin:5px;}
    
    /* Export Menu */
    .export-menu{position:fixed; bottom:100px; right:20px; background:rgba(17,17,17,0.98); border:2px solid #0ff; padding:16px; border-radius:8px; display:none; z-index:200;}
    .export-menu.show{display:block;}
    .export-option{padding:12px; margin:4px 0; background:rgba(0,255,255,0.1); border:2px solid #0ff; color:#0ff; cursor:pointer; font-weight:900; font-size:12px; text-align:center;}
    .export-option:hover{background:#0ff; color:#000;}
    
    /* Settings Panel */
    .settings-panel{position:fixed; top:60px; left:20px; background:rgba(17,17,17,0.95); border:2px solid #0ff; padding:16px; border-radius:8px; z-index:150; max-width:280px; display:none; /* Hidden by default */ }
    .settings-title{font-size:14px; font-weight:900; color:#0ff; margin-bottom:12px; letter-spacing:2px;}
    .settings-group{margin-bottom:16px;}
    .settings-label{font-size:11px; color:#999; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;}
    .settings-select{width:100%; padding:8px; background:#000; border:1px solid #0ff; color:#0ff; font-size:11px; font-weight:700; border-radius:4px; cursor:pointer;}
    .settings-select:hover{background:rgba(0,255,255,0.1);}
    .settings-slider{width:100%; margin-top:4px; height:30px; -webkit-appearance:none; appearance:none; background:#000; border:1px solid #0ff; border-radius:4px; outline:none;}
    .settings-slider::-webkit-slider-thumb{-webkit-appearance:none; appearance:none; width:20px; height:20px; background:#0ff; cursor:pointer; border-radius:50%;}
    .settings-slider::-moz-range-thumb{width:20px; height:20px; background:#0ff; cursor:pointer; border-radius:50%; border:none;}
    .settings-value{display:inline-block; color:#0ff; font-size:10px; font-weight:700; margin-left:8px;}
    @media (max-width:768px){.settings-panel{left:10px; top:50px; max-width:calc(100vw - 40px);} .settings-slider{height:40px;} .settings-slider::-webkit-slider-thumb{width:30px; height:30px;} .settings-slider::-moz-range-thumb{width:30px; height:30px;}}
  </style>
</head>

<div class="wrap">
  <header>
    <div class="brand">MESHWORK 725</div>
    <div class="stats">

  <div class="settings-group">

  </div>
  
  <div class="settings-group">
    <div class="settings-label">Bloom Size <span class="settings-value" id="bloomSizeVal">20px</span></div>
    <input type="range" class="settings-slider" id="bloomSize" min="0" max="50" value="20">

</div>

<div class="export-menu" id="exportMenu">
  <div class="export-option" onclick="exportJSON()">📄 JSON</div>
  <div class="export-option" onclick="exportEDL()">🎬 EDL</div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title">SEQUENCE COMPLETE</div>
    <div class="modal-stats" id="modalStats"></div>
    <button class="modal-btn" onclick="location.reload()">NEW SEQUENCE</button>
    <button class="modal-btn" onclick="document.getElementById('exportMenu').classList.toggle('show')">EXPORT</button>
  </div>
</div>

<script>
console.log('🌿 MESHWORK 725 — Living Mosaic Automata Loading...');

/*
# UTILITY PATENT: PROCEDURAL SYNTAGMATIC VIDEO EDITOR
## "Minecraft for Video Editors" - Spatial Narrative Construction System

CORE INNOVATION: Bottom-Up Narrative Assembly Through Spatial Reasoning

PATENT CLAIMS - PROCEDURAL DESIGN ELEMENTS

1. SYNTAGMATIC BLOCK SYSTEM: Each video block = syntagma (meaningful unit)
   - Properties: Temporal range, Thematic category, Narrative weight, Color coding
   - How it works: Physical adjacency creates syntagmatic chains
   - Current: Cell types are themes. Cells physically adjacent are neighbors.
   
2. SPATIAL PATTERN MATCHING (Match-3 Mechanics): Collect fragments only when 3+ identical themes align spatially
   - How it works: System analyzes completed lines for thematic patterns. Only concepts appearing 3+ times are "collected".
   - Current: Now *explicitly player-driven* match-3 detection to trigger BURSTING and collection.
   
3. QUANTUM STATE BLOCKS: Blocks exist in superposition until "observed" (locked in place)
   - States: QUIET (potential/dormant), LISTEN (activated/pre-burst), BURSTING (collapsed/observed), LOCKED (collected clip).
   - Current: QUIET/LISTEN are states of potential. BURSTING is collapse/observation. "Locked" clips.

4. TIME WARP MECHANICS: Spatial transformations = temporal manipulations
   - Operations: Rotate (time reversal), Hold (temporal suspension), Drop (accelerated time), Rewind (quantum state restoration)
   - Current: Drift, animations, subtle pulsing. Player nudges are micro-time warps.

5. TIME WORMS (Future Feature): Blocks that tunnel through the grid, connecting non-adjacent moments

6. NARRATIVE GRAVITY: Blocks fall at different speeds based on narrative weight
   - Current: Implemented as drift (subtle video texture movement) and the refactored `refillGrid` that simulates gravity for falling cells.

7. BLOCK FUSION: Adjacent blocks of same category can fuse into longer sequences

8. DIMENSIONAL LAYERS (Future Feature): Z-axis = narrative depth

9. CAUSAL CHAINS: System validates cause-effect relationships between adjacent blocks

10. PROCEDURAL GENERATION: Block spawn order determined by narrative algorithms
    - Current: Random candy type, global wind bias (removed from propagation, could be for spawn), automata rules are basic procedural generation (now mostly visual).

MINECRAFT PARALLELS:
- Blocks -> Video syntagmas (CELLS)
- Spatial building -> Narrative construction (GRID, PLAYER NUDGES)
- Resource mining -> Fragment collection (MATCH-3, HARVEST BLOOM)
- Creative mode -> Free arrangement (AUTO PLAY)
- Portals -> Time worms (FUTURE)

---

# V0.1: EVOLUTIONARY BEAT

**BEAT:** `COLLECTION`
**DESCRIPTION:** The core loop of collecting video segments is established through *player-driven* match-3 pattern recognition and locking/unlocking.

**Aesthetics:** "Holographic Organic Ritual Layers"
-   Thinner lines.
-   More dramatic, organic grid shapes.
-   Distinctive glyphs/runes for each type.
-   Layered visual effects for depth and holographic feel.

**Mechanics:**
-   **Player-Driven Match-3:** Swapping cells is the primary interaction. Matches trigger `BURSTING` and clip harvesting.
-   **Clips are `locked`** upon collection and must be `unlocked` for playback by tapping them in the timeline.
-   **"Act Counter"** tracks narrative progression (every `clipsPerAct` clips).
-   **"Half-Silence Rule":** Every other harvested clip is muted in the sequence.
*/

// TYPE_SOURCES with unicode flower symbols - BRIGHT colors
const TYPE_SOURCES = {
  0: {file: 'MEDIA/video_0443d3f46b1f433597e8d9d89469cad8.mp4', title: 'Crimson', color: '#FF6666', symbol: '❀'}, // Flower - brighter red
  1: {file: 'MEDIA/video_06ac4003fedc438588cf48eb594c8f22.mp4', title: 'Azure', color: '#00FFFF', symbol: '✿'},   // Outlined flower - pure cyan
  2: {file: 'MEDIA/video_0e770098e193417596602ae22ae3ab30.mp4', title: 'Amber', color: '#FFFF00', symbol: '✾'},   // Eight-petal - pure yellow
  3: {file: 'MEDIA/video_0eb7d2bceba7433ba17f37bbfc2a5007.mp4', title: 'Jade', color: '#88FFCC', symbol: '❁'},    // Flower punctuation - brighter mint
  4: {file: 'MEDIA/video_14c639e88a2c4718aee990049945815c.mp4', title: 'Flame', color: '#FF8888', symbol: '✽'},   // Six-petal - brighter coral
  5: {file: 'MEDIA/video_219ff5b76d874686bcfecbe4d10f5c83.mp4', title: 'Violet', color: '#DD88FF', symbol: '❃'},  // Four-petal - brighter purple
  6: {file: 'MEDIA/video_27b3377368254f1babcfb96a0c47859a.mp4', title: 'Emerald', color: '#88FFAA', symbol: '✺'}, // Sixteen-petal - brighter green
  7: {file: 'MEDIA/video_29245c98b1904304bdaa5513eb2ddc76.mp4', title: 'Gold', color: '#FFBB66', symbol: '❋'},    // Floral bullet - brighter orange
  8: {file: 'MEDIA/video_3250a9cf85244759a18a4db13c37d174.mp4', title: 'Rose', color: '#FFBBDD', symbol: '✻'},    // Teardrop petal - brighter pink
  9: {file: 'MEDIA/video_37ed60eedd054e2aaa8bb1448f65d760.mp4', title: 'Stone', color: '#EEEEEE', symbol: '❊'}    // Four-balloon - bright grey
};


// Auto-slice each type into segments (4 per type, 10s each)
const SEGMENTS_PER_TYPE = 4;
const TYPE_SEGMENTS = {};
const typeUsage = {}; // Track which segment index to use next per type

for (let t = 0; t < 10; t++) {
  TYPE_SEGMENTS[t] = [];
  typeUsage[t] = 0;
  for (let s = 0; s < SEGMENTS_PER_TYPE; s++) {
    const start = s * 10;
    const end = start + 10;
    TYPE_SEGMENTS[t].push({
      index: s,
      start,
      end,
      title: `${TYPE_SOURCES[t].title} ${s+1}`,
      file: TYPE_SOURCES[t].file
    });
  }
}

// Custom glyph drawing functions, for geometric shapes (instead of unicode symbols)
// These functions draw directly onto the canvas path.
const TYPE_GLYPHS_GEOMETRIC = [
    // Type 0: Crimson - Triangle pointing up
    (ctx, cx, cy, radius) => {
        ctx.moveTo(cx, cy - radius);
        ctx.lineTo(cx + radius * Math.sin(Math.PI * 2 / 3), cy + radius * Math.cos(Math.PI * 2 / 3));
        ctx.lineTo(cx + radius * Math.sin(Math.PI * 4 / 3), cy + radius * Math.cos(Math.PI * 4 / 3));
        ctx.closePath();
    },
    // Type 1: Azure - Square
    (ctx, cx, cy, radius) => {
        ctx.rect(cx - radius * 0.8, cy - radius * 0.8, radius * 1.6, radius * 1.6);
    },
    // Type 2: Amber - Circle
    (ctx, cx, cy, radius) => {
        ctx.arc(cx, cy, radius * 0.9, 0, Math.PI * 2);
    },
    // Type 3: Jade - Diamond
    (ctx, cx, cy, radius) => {
        ctx.moveTo(cx, cy - radius);
        ctx.lineTo(cx + radius, cy);
        ctx.lineTo(cx, cy + radius);
        ctx.lineTo(cx - radius, cy);
        ctx.closePath();
    },
    // Type 4: Flame - Cross (Plus sign)
    (ctx, cx, cy, radius) => {
        const arm = radius * 0.4;
        const thick = radius * 0.2;
        ctx.moveTo(cx - thick, cy - arm);
        ctx.lineTo(cx + thick, cy - arm);
        ctx.lineTo(cx + thick, cy - thick);
        ctx.lineTo(cx + arm, cy - thick);
        ctx.lineTo(cx + arm, cy + thick);
        ctx.lineTo(cx + thick, cy + thick);
        ctx.lineTo(cx + thick, cy + arm);
        ctx.lineTo(cx - thick, cy + arm);
        ctx.lineTo(cx - thick, cy + thick);
        ctx.lineTo(cx - arm, cy + thick);
        ctx.lineTo(cx - arm, cy - thick);
        ctx.lineTo(cx - thick, cy - thick);
        ctx.closePath();
    },
    // Type 5: Violet - Hexagon
    (ctx, cx, cy, radius) => {
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i;
            const x = cx + radius * Math.cos(angle);
            const y = cy + radius * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
    },
    // Type 6: Emerald - Star (5-pointed)
    (ctx, cx, cy, radius) => {
        for (let i = 0; i < 10; i++) {
            const angle = (Math.PI / 5) * i - Math.PI / 2;
            const r_inner = radius * 0.4;
            const currentR = i % 2 === 0 ? radius : r_inner;
            const x = cx + currentR * Math.cos(angle);
            const y = cy + currentR * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
    },
    // Type 7: Gold - Octagon
    (ctx, cx, cy, radius) => {
        for (let i = 0; i < 8; i++) {
            const angle = (Math.PI / 4) * i;
            const x = cx + radius * Math.cos(angle);
            const y = cy + radius * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
    },
    // Type 8: Rose - Rounded Rectangle
    (ctx, cx, cy, radius) => {
        const rectSize = radius * 1.5;
        const cornerRadius = radius * 0.3;
        ctx.roundRect(cx - rectSize / 2, cy - rectSize / 2, rectSize, rectSize, cornerRadius);
    },
    // Type 9: Stone - Spiral / Nautilus shell (more complex)
    (ctx, cx, cy, radius) => {
        const segments = 100;
        ctx.moveTo(cx, cy); // Start at the center
        for (let i = 0; i <= segments; i++) {
            const angle = 0.1 * i; // Controls tightness of spiral
            const currentRadius = radius * (i / segments);
            ctx.lineTo(cx + currentRadius * Math.cos(angle), cy + currentRadius * Math.sin(angle));
        }
    }
];


const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID_SIZE = 8;
const CELL_SIZE = 50; // Base unit for calculating cell dimensions

// Constants for geometric shape generation (not wavy paths now)
const JITTER_AMOUNT_FACTOR = 0.2; // Max jitter as a factor of CELL_SIZE (reduced for stability)
const BULGE_AMOUNT_FACTOR = 0.6;  // No longer directly used for wavy paths, but kept for context if desired.

// AUTOMATA CONSTANTS
const CELL_STATES = {
  QUIET: 'quiet',       // Dormant, video paused, darkened
  LISTEN: 'listen',     // Visually activated, pulsing, video paused
  BURSTING: 'bursting'  // Triggered by player match, animates and clears
};

const AUTOMATA_CONFIG = {
  UPDATE_FREQUENCY: 1,       // Update visual CA rules every frame
  MATCH_LENGTH: 3,           // For player-driven match-3 detection
  BURST_DURATION: 30         // Frames for the BURSTING animation
};

// Global "Season" and "Wind" parameters (for visual effects only now)
const SEASONS = {
  driftFactor: 0.0003,     // per-frame positional drift of sample window
  tensionGain: 0.002,      // how fast quiet edges accumulate visual bloom-tension
  bulgeSpeed: 0.015          // Speed of edge bulging animation
};
let seasonPhase = 0;       // slowly advances to modulate thresholds
let globalWindType = -1;   // bias for propagation, changes hourly (now visual/spawn hint only)
let lastWindChange = Date.now(); 
const WIND_CHANGE_INTERVAL = 1000 * 60 * 60; // Every hour

const game = {
  grid: [],

  score: 0,
  moves: 30,

  busy: false, // Flag to prevent input during animations

    match: null, 
    swap: null,
    win: null,
    error: null
  },
  soundEnabled: true,
  autoPlay: true, // Auto-play sequence from timeline
  useTypeSegments: true,
  typeSegmentVideos: {},
  segmentUsage: {},
  collectedTypes: new Set(),
  typePlaybackTime: {},
  automataFrame: 0, 
  jitteredPoints: [], // Stores pre-calculated jittered grid points
  actCounter: 1,      // NEW: Act Structure
  clipsCollectedInAct: 0,

  getBreathe: function() {

  }
};

function initTypeSegments() {
  for (let type = 0; type < 10; type++) {
    for (let segIdx = 0; segIdx < SEGMENTS_PER_TYPE; segIdx++) {
      const seg = TYPE_SEGMENTS[type][segIdx];
      const key = `${type}_${segIdx}`;
      const v = document.createElement('video');
      v.src = seg.file;
      v.muted = true;
      v.playsinline = true;
      v.loop = false; // We'll handle looping manually within segment range
      v.preload = 'auto';
      v.crossOrigin = 'anonymous';
      v.addEventListener('loadedmetadata', () => {
        try { 
            v.currentTime = Math.min(seg.start, Math.max(0, v.duration - 0.2)); 
            v.play().then(() => {
              // console.log(`✓ Video ${key} playing`); // Too chatty
            }).catch(e => {
              // console.log(`Video ${key} autoplay blocked, will start on interaction`); // Too chatty
            });
        } catch(e) { console.error("Error setting video current time:", e); }
      });
      
      // Also try to load immediately
      v.addEventListener('canplay', () => {
        if(v.paused) v.play().catch(() => {});
      });
      v.addEventListener('timeupdate', () => {
        if (v.currentTime >= seg.end) {
          try { v.currentTime = seg.start; } catch(e) {}
        }
      });
      v.addEventListener('pause', () => {
        // Only retry playing if not explicitly in a QUIET/LISTEN state
        // Find cell associated with this video/segment (approx)
        let foundCellActive = false;
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = game.grid[r][c];
                if (cell && cell.type === type && segmentIndexForCell(type, r, c) === segIdx && cell.state !== CELL_STATES.QUIET && cell.state !== CELL_STATES.LISTEN) {
                    foundCellActive = true;
                    break;
                }
            }
            if (foundCellActive) break;
        }

        if (foundCellActive) {
             setTimeout(() => { if (v.paused) v.play().catch(()=>{}); }, 100);
        }
      });

      v.load(); // Trigger preload
      game.typeSegmentVideos[key] = v;
    }
  }
  console.log('✓ Type-segment videos created:', Object.keys(game.typeSegmentVideos).length);
}

function segmentIndexForCell(type, r, c) {
  // Deterministic segment assignment for consistent visual mosaic
  return (r * GRID_SIZE + c) % SEGMENTS_PER_TYPE; 
}

function nextSegmentForType(type) {
  if (!game.segmentUsage[type]) game.segmentUsage[type] = [];
  let minUsed = Infinity;
  let minIdx = 0;
  for (let s = 0; s < SEGMENTS_PER_TYPE; s++) {
    const used = game.segmentUsage[type].filter(u => u === s).length;
    if (used < minUsed) {
      minUsed = used;
      minIdx = s;
    }
  }
  game.segmentUsage[type].push(minIdx);
  return minIdx;
}

// CELLULAR AUTOMATA FUNCTIONS

function createCell(type) {
  return {
    type,
    state: CELL_STATES.QUIET, 
    timer: 0,
    tension: 0, // Visual tension for glow/activity
    drift: {dx: (Math.random()*2-1)*SEASONS.driftFactor, dy: (Math.random()*2-1)*SEASONS.driftFactor} 
  };
}

function getNeighbors(r, c) {
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr;
      const nc = c + dc;
      if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
        neighbors.push({r: nr, c: nc, cell: game.grid[nr][nc]});
      }
    }
  }
  return neighbors;
}

// applyAutomataRules now primarily manages visual states and timers
function applyAutomataRules() {
  // Update seasonPhase here for smooth animation of bulges
  seasonPhase += SEASONS.bulgeSpeed; 

  // Update global wind (for potential future visual/spawn bias)
  if (Date.now() - lastWindChange > WIND_CHANGE_INTERVAL) {
    globalWindType = Math.floor(Math.random() * 10); 
    lastWindChange = Date.now();
    console.log(`🌬️ Global wind shifted to Type ${globalWindType}`);
  }

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue; 
      
      // Update BURSTING timer
      if (cell.state === CELL_STATES.BURSTING) {
        cell.timer++;
      }

      // Update tension for visual flair
      // Tension could relate to proximity to a match or just natural fluctuation
      // For now, let's keep a simple oscillating tension for visual interest
      cell.tension = (0.5 + 0.5 * Math.sin(game.automataFrame * SEASONS.tensionGain + (r+c)*0.5));
    }
  }
}

// Checks for a match of AUTOMATA_CONFIG.MATCH_LENGTH (3) or more
function findMatches() {
  const matches = [];
  const checked = new Set();
  
  // Horizontal
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = game.grid[r][c];
      if (!cell || checked.has(`${r},${c}`)) continue;
      
      const horizontalRun = [];
      for (let k = c; k < GRID_SIZE; k++) {
        if (game.grid[r][k] && game.grid[r][k].type === cell.type) {
          horizontalRun.push({r, c: k});
        } else {
          break;
        }
      }
      if (horizontalRun.length >= AUTOMATA_CONFIG.MATCH_LENGTH) {
        horizontalRun.forEach(coord => {
          matches.push(coord);
          checked.add(`${coord.r},${coord.c}`);
        });
      }
    }
  }
  
  // Vertical
  for (let c = 0; c < GRID_SIZE; c++) {
    for (let r = 0; r < GRID_SIZE; r++) {
      const cell = game.grid[r][c];
      if (!cell || checked.has(`${r},${c}`)) continue; // Also check if already part of a horizontal match
      
      const verticalRun = [];
      for (let k = r; k < GRID_SIZE; k++) {
        if (game.grid[k][c] && game.grid[k][c].type === cell.type) {
          verticalRun.push({r: k, c});
        } else {
          break;
        }
      }
      if (verticalRun.length >= AUTOMATA_CONFIG.MATCH_LENGTH) {
        verticalRun.forEach(coord => {
          matches.push(coord);
          checked.add(`${coord.r},${coord.c}`);
        });
      }
    }
  }
  
  return matches;
}

// Process successful player-triggered matches
function processMatches(matches) {
  game.busy = true; // Block input during animations
  game.hintActive = false; // Hide hint if a match is made

  // Mark all matched cells as BURSTING for animation
  matches.forEach(({r, c}) => {
    const cell = game.grid[r][c];
    if (cell) {
      cell.state = CELL_STATES.BURSTING;
      cell.timer = 0; // Reset timer for pop animation
    }
  });
  
  game.sounds.match(); 
  haptic(20);

  // After BURSTING animation, clear and refill
  setTimeout(() => {
    const matchedTypes = new Set();
    matches.forEach(({r, c}) => {
      const cell = game.grid[r][c];
      if (cell) {
        matchedTypes.add(cell.type);
      }
      game.grid[r][c] = null; // Clear matched cells
      game.score += 10;
    });
    
    document.getElementById('score').textContent = game.score;
    
    // Add to sequence and handle Act progression
    matchedTypes.forEach(type => {
      const segIdx = nextSegmentForType(type);
      const seg = TYPE_SEGMENTS[type][segIdx];
      const newClip = { 
        title: seg.title, 
        file: seg.file, 
        start: seg.start, 
        end: seg.end,
        sourceCell: matches[0], // Store source cell of first match for context
        locked: true, // NEW: Clips are locked by default
        mute: (game.sequence.length % 2 === 0) // NEW: Half-Silence Rule
      };
      game.sequence.push(newClip);
    });
    
    game.clipsCollectedInAct++;
    if (game.clipsCollectedInAct >= game.clipsPerAct) {
      game.actCounter++;
      game.clipsCollectedInAct = 0;
      document.getElementById('actCounter').textContent = game.actCounter;
      console.log(`🎬 Act ${game.actCounter} Initiated!`);
    }
    
    document.getElementById('clips').textContent = game.sequence.length;
    updateTimeline();
    maybeAutoPlaySequence();
    
    // Drop existing cells and refill with new ones
    refillGrid();
    
    // Check for cascades
    const newMatches = findMatches();
    if (newMatches.length > 0) {
      console.log('🔁 Cascade:', newMatches.length, 'matches');
      haptic(30);
      processMatches(newMatches); // Recursively process cascades
    } else {
      game.busy = false; // All animations and cascades finished, allow input
      checkGameOver();
    }
  }, AUTOMATA_CONFIG.BURST_DURATION * (1000/60)); // Convert frames to ms
  
  console.log('💥 Processed matches:', matches.length, '- Score:', game.score);
}

// SOUND SYSTEM - Web Audio API
function initSounds() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  
  game.sounds.match = () => { 
    if (!game.soundEnabled) return;
    playTone(audioContext, 523.25, 0.1); 
  };
  
  game.sounds.swap = () => {
    if (!game.soundEnabled) return;
    playTone(audioContext, 392, 0.05); 
  };
  
  game.sounds.win = () => {
    if (!game.soundEnabled) return;
    playTone(audioContext, 523.25, 0.1);
    setTimeout(() => playTone(audioContext, 659.25, 0.1), 100);
    setTimeout(() => playTone(audioContext, 783.99, 0.2), 200);
  };
  
  game.sounds.error = () => {
    if (!game.soundEnabled) return;
    playTone(audioContext, 200, 0.1);
  };
  
  console.log('🔊 Sound system initialized');
}

function playTone(audioContext, frequency, duration) {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.frequency.value = frequency;
  oscillator.type = 'sine';
  
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
  
  oscillator.start(audioContext.currentTime);
  oscillator.stop(audioContext.currentTime + duration);
}

// HAPTIC FEEDBACK
function haptic(pattern = 10) {
  if (navigator.vibrate) {
    navigator.vibrate(pattern);
  }
}

// Helper function to convert hex color to RGBA
function hexToRgba(hex, alpha) {
    let r = 0, g = 0, b = 0;
    if (hex.length === 4) { // #RGB
        r = "0x" + hex[1] + hex[1];
        g = "0x" + hex[2] + hex[2];
        b = "0x" + hex[3] + hex[3];
    } else if (hex.length === 7) { // #RRGGBB
        r = "0x" + hex[1] + hex[2];
        g = "0x" + hex[3] + hex[4];
        b = "0x" + hex[5] + hex[6];
    }
    return `rgba(${+r},${+g},${+b},${alpha})`;
}

// Function to generate jittered grid points for the corners of the cells
function generateJitteredPoints() {
    game.jitteredPoints = [];
    const jitterMax = CELL_SIZE * JITTER_AMOUNT_FACTOR; 

    for (let r = 0; r <= GRID_SIZE; r++) { 
        game.jitteredPoints[r] = [];
        for (let c = 0; c <= GRID_SIZE; c++) {
            let x = c * CELL_SIZE;
            let y = r * CELL_SIZE;

            let currentJitterX = 0;
            let currentJitterY = 0;

            // Apply less jitter at the canvas boundaries to keep the overall mosaic contained
            const jitterScaleX = (c === 0 || c === GRID_SIZE) ? 0.2 : 1; 
            const jitterScaleY = (r === 0 || r === GRID_SIZE) ? 0.2 : 1;
            
            currentJitterX = (Math.random() * 2 - 1) * jitterMax * jitterScaleX;
            currentJitterY = (Math.random() * 2 - 1) * jitterMax * jitterScaleY;
            
            game.jitteredPoints[r][c] = { x: x + currentJitterX, y: y + currentJitterY };
        }
    }
}

// Function to get the 4 corner points for a given cell (r, c)
function getCellCorners(r, c) {
  const p0 = game.jitteredPoints[r][c];
  const p1 = game.jitteredPoints[r][c+1];
  const p2 = game.jitteredPoints[r+1][c+1];
  const p3 = game.jitteredPoints[r+1][c];
  return [p0, p1, p2, p3]; // Order for drawing a convex quad
}

/**
 * Draws a single wavy quadratic curve segment.
 * @param {CanvasRenderingContext2D} context The canvas rendering context.
 * @param {{x:number, y:number}} p1 Start point.
 * @param {{x:number, y:number}} p2 End point.
 * @param {number} segmentSeed A unique seed for this specific edge segment to ensure consistent bulge.
 * @param {number} typeInfluence A number (e.g., cell type) to influence bulge variation.
 */
function drawWavyEdgeSegment(context, p1, p2, segmentSeed, typeInfluence) {
    const midX = (p1.x + p2.x) / 2;
    const midY = (p1.y + p2.y) / 2;

    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const length = Math.sqrt(dx * dx + dy * dy);

    let normalX = 0;
    let normalY = 0;
    if (length > 0) {
        normalX = -dy / length; 
        normalY = dx / length;  
    }
    
    const typeBulgeFactor = 1 + (typeInfluence % 3) * 0.1; // Subtle variation by type
    const animatedBulge = Math.sin(seasonPhase + segmentSeed * 0.1) * BULGE_AMOUNT_FACTOR * (CELL_SIZE / 2) * typeBulgeFactor;

    const controlX = midX + normalX * animatedBulge;
    const controlY = midY + normalY * animatedBulge;

    context.quadraticCurveTo(controlX, controlY, p2.x, p2.y);
}

/**
 * Draws a closed wavy quadrilateral path for a cell, used for clipping and filling.
 * @param {CanvasRenderingContext2D} context The canvas rendering context.
 * @param {Array<{x:number, y:number}>} corners The 4 corner points of the cell.
 * @param {number} r Row index of the cell.
 * @param {number} c Column index of the cell.
 * @param {number} cellType The type of the cell (for bulge variation).
 */
function drawWavyQuadPath(context, corners, r, c, cellType) {
    context.beginPath();
    context.moveTo(corners[0].x, corners[0].y);

    const numSides = corners.length;
    for (let i = 0; i < numSides; i++) {
        const p1 = corners[i];
        const p2 = corners[(i + 1) % numSides];
        
        const segmentSeed = (r * GRID_SIZE + c) * 10 + i; 
        
        drawWavyEdgeSegment(context, p1, p2, segmentSeed, cellType);
    }
    context.closePath();
}

/**
 * Draws the entire grid of wavy lines as a single path, for consistent aesthetics.
 * @param {CanvasRenderingContext2D} context The canvas rendering context.
 * @param {number} strokeWidth The width of the lines.
 * @param {string} strokeColor The color of the lines.
 */
function drawFullWavyGrid(context, strokeWidth, strokeColor) {
    context.beginPath();
    context.strokeStyle = strokeColor; 
    context.lineWidth = strokeWidth;     

    // Draw horizontal lines
    for (let r = 0; r <= GRID_SIZE; r++) {
        context.moveTo(game.jitteredPoints[r][0].x, game.jitteredPoints[r][0].y);
        for (let c = 0; c < GRID_SIZE; c++) {
            const p1 = game.jitteredPoints[r][c];
            const p2 = game.jitteredPoints[r][c+1];
            const segmentSeed = r * (GRID_SIZE + 1) + c; 
            drawWavyEdgeSegment(context, p1, p2, segmentSeed, 0); // Use 0 as dummy cell type for grid lines
        }
    }

    // Draw vertical lines
    for (let c = 0; c <= GRID_SIZE; c++) {
        context.moveTo(game.jitteredPoints[0][c].x, game.jitteredPoints[0][c].y);
        for (let r = 0; r < GRID_SIZE; r++) {
            const p1 = game.jitteredPoints[r][c];
            const p2 = game.jitteredPoints[r+1][c];
            const segmentSeed = (r * (GRID_SIZE + 1) + c) + (GRID_SIZE + 1) * (GRID_SIZE + 1) * 10; 
            drawWavyEdgeSegment(context, p1, p2, segmentSeed, 0); 
        }
    }
    context.stroke();
}


function createGrid() {
  game.grid = [];
  generateJitteredPoints(); // Generate jittered points for the entire grid first
  for (let r = 0; r < GRID_SIZE; r++) {
    game.grid[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      game.grid[r][c] = createCell(randomCandyType());
    }
  }
  
  // Ensure no initial matches
  while (findMatches().length > 0) {
    findMatches().forEach(({r, c}) => {
      game.grid[r][c] = createCell(randomCandyType());
    });
  }
  
  console.log('✓ Living grid created - irregular, wavy quadrilateral cells');
}

function randomCandyType() {
  return Math.floor(Math.random() * 10);
}

// Reusable offscreen canvas for video patterns
const offscreenVideoCanvas = document.createElement('canvas');
offscreenVideoCanvas.width = CELL_SIZE;
offscreenVideoCanvas.height = CELL_SIZE;
const offscreenVideoCtx = offscreenVideoCanvas.getContext('2d');


function draw() {
  game.automataFrame++;
  breathing.time += breathing.speed; // Increment breathing animation
  // seasonPhase is updated in applyAutomataRules now

  if (game.automataFrame % AUTOMATA_CONFIG.UPDATE_FREQUENCY === 0) {
    applyAutomataRules();
  }
  
  // Fill background with subtle dark color, not fully black
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = game.grid[r][c];
      if (!cell) continue;
      
      const polygonCorners = getCellCorners(r, c); 
      
      const segIdx = segmentIndexForCell(cell.type, r, c);
      const key = `${cell.type}_${segIdx}`;
      const video = game.typeSegmentVideos[key];
      
      ctx.save();
      
      // Handle BURSTING animation scaling
      if (cell.state === CELL_STATES.BURSTING) {
          const burstProgress = cell.timer / AUTOMATA_CONFIG.BURST_DURATION;
          const scale = 1 + burstProgress * 0.5; // Scale up to 1.5x
          const alpha = 1 - burstProgress;      // Fade out
          
          ctx.globalAlpha = alpha;
          // Scale around the center of the cell
          const cellCenterX = (polygonCorners[0].x + polygonCorners[1].x + polygonCorners[2].x + polygonCorners[3].x) / 4;
          const cellCenterY = (polygonCorners[0].y + polygonCorners[1].y + polygonCorners[2].y + polygonCorners[3].y) / 4;
          ctx.translate(cellCenterX, cellCenterY);
          ctx.scale(scale, scale);
          ctx.translate(-cellCenterX, -cellCenterY);
      }

      // --- Prepare video content on offscreen canvas ---
      if (video && video.readyState >= 2) {
        if (cell.state === CELL_STATES.QUIET || cell.state === CELL_STATES.LISTEN) {
            if (!video.paused) video.pause(); // Pause video for inactive states
        } else {
            if (video.paused) video.play().catch(()=>{}); // Play video for active states
        }

        const vw = video.videoWidth || 1920;
        const vh = video.videoHeight || 1080;
        const srcCellW = vw / GRID_SIZE; 
        const srcCellH = vh / GRID_SIZE; 
        
        // Apply cell's internal drift to the video sample window
        const driftX = (cell.drift.dx * game.automataFrame * vw);
        const driftY = (cell.drift.dy * game.automataFrame * vh);
        
        // Ensure source coordinates wrap around if drift goes out of bounds
        const sx = (c * srcCellW + driftX) % vw;
        const sy = (r * srcCellH + driftY) % vh;

        offscreenVideoCtx.clearRect(0, 0, CELL_SIZE, CELL_SIZE);
        offscreenVideoCtx.drawImage(
            video,
            sx < 0 ? sx + vw : sx, // Wrap negative coordinates
            sy < 0 ? sy + vh : sy, // Wrap negative coordinates
            srcCellW, srcCellH,    
            0, 0, CELL_SIZE, CELL_SIZE 
        );
      }
      const videoPattern = video && video.readyState >= 2 ? ctx.createPattern(offscreenVideoCanvas, 'no-repeat') : '#000';
      
      // --- LAYER 0: Colored Backing with BLOOM (soft glow behind) ---
      ctx.save();
      const backingColor = TYPE_SOURCES[cell.type].color;
      const backingAlpha = (0.3 + (0.1 * breathing.getBreathe())) * visualSettings.bloomIntensity;
      
      // Bloom layer (large soft glow)
      if(visualSettings.bloomIntensity > 0) {
        ctx.shadowColor = hexToRgba(backingColor, visualSettings.bloomIntensity * 0.6);
        ctx.shadowBlur = visualSettings.bloomSize;
        ctx.fillStyle = hexToRgba(backingColor, backingAlpha * 0.3);
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type);
        ctx.fill();
      }
      
      // Solid backing
      ctx.shadowBlur = 0;
      ctx.fillStyle = hexToRgba(backingColor, backingAlpha);
      drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type);
      ctx.fill();
      ctx.restore();
      
      // --- LAYER 1: Video Mosaic (ALWAYS DRAW, even if not ready) ---
      const hasVideo = video && video.readyState >= 2;
      
      if(hasVideo) {
        ctx.save();
        
        // Set clip FIRST
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type);
        ctx.clip();
        
        // Draw video pattern
        ctx.fillStyle = videoPattern;
        ctx.fillRect(0,0, canvas.width, canvas.height); // Fill entire clipped area

        ctx.restore();
      } else {
        // Video not ready - draw colored fill instead of black
        ctx.save();
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type);
        ctx.clip();
        
        const fillColor = TYPE_SOURCES[cell.type].color;
        const fillAlpha = 0.4 * breathing.getBreathe();
        ctx.fillStyle = hexToRgba(fillColor, fillAlpha);
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.restore();
      }
      
      // --- LAYER 2: Opaque Colored Shade Layer ---
      ctx.save();
      drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type);
      ctx.fillStyle = hexToRgba(TYPE_SOURCES[cell.type].color, 0.15); // Consistent 15% opaque shade
      ctx.fill();
      ctx.restore();

      // --- LAYER 3: Geometric Glyph (BREATHING, with glow) ---
      const center = {
          x: (polygonCorners[0].x + polygonCorners[1].x + polygonCorners[2].x + polygonCorners[3].x) / 4,
          y: (polygonCorners[0].y + polygonCorners[1].y + polygonCorners[2].y + polygonCorners[3].y) / 4
      };
      
      const symbolColor = TYPE_SOURCES[cell.type].color;
      
      // Calm breathing opacity (no harsh states)
      const breatheFactor = breathing.getBreathe();
      const baseOpacity = cell.state === CELL_STATES.BURSTING ? 1.0 : 
                         cell.state === CELL_STATES.LISTEN ? 0.9 : 
                         cell.state === CELL_STATES.QUIET ? 0.6 : 0.85;
      const symbolOpacity = baseOpacity * visualSettings.symbolBrightness * breatheFactor;
      
      ctx.save();
      ctx.globalCompositeOperation = visualSettings.blendMode;
      
      // Draw path for the geometric glyph (dynamic from TYPE_GLYPHS_GEOMETRIC)
      ctx.beginPath();
      TYPE_GLYPHS_GEOMETRIC[cell.type](ctx, center.x, center.y, CELL_SIZE * visualSettings.symbolSize * 0.5); // Radius is 0.5 * size factor
      ctx.closePath();
      
      // Breathing glow intensity
      const glowIntensity = visualSettings.glowIntensity * breatheFactor;
      ctx.shadowColor = hexToRgba(symbolColor, symbolOpacity * 0.8);
      ctx.shadowBlur = glowIntensity;
      
      // Draw symbol with breathing brightness
      ctx.fillStyle = hexToRgba(symbolColor, symbolOpacity);
      ctx.fill(); // Fill the geometric shape
      
      // Optional: draw stroke for the geometric symbol
      ctx.strokeStyle = hexToRgba(symbolColor, symbolOpacity);
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
      
      // --- LAYER 4: Soft Dissolved Borders (barely visible) ---
      if(visualSettings.borderOpacity > 0) {
        ctx.save();
        
        // Soft outer edge
        ctx.strokeStyle = `rgba(255, 255, 255, ${visualSettings.borderOpacity * 0.3})`;
        ctx.lineWidth = 2;
        ctx.shadowColor = `rgba(255, 255, 255, ${visualSettings.borderOpacity * 0.5})`;
        ctx.shadowBlur = 4 * visualSettings.edgeSoftness;
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type);
        ctx.stroke();
        
        // Inner definition (very subtle)
        ctx.shadowBlur = 0;
        ctx.strokeStyle = `rgba(255, 255, 255, ${visualSettings.borderOpacity * 0.5})`;
        ctx.lineWidth = 0.5;
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type);
        ctx.stroke();
        
        ctx.restore();
      }

      // QUIET state (gentle reveal - like uncovering)
      if (cell.state === CELL_STATES.QUIET) {
        const revealAlpha = 0.15 * (1 - breathing.getBreathe() * 0.3); // Breathing reveal
        ctx.fillStyle = `rgba(0,0,0,${revealAlpha})`; // Dark overlay
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type); 
        ctx.fill();
      } 
      // LISTEN state (calm breathing border)
      else if (cell.state === CELL_STATES.LISTEN) {
        const breatheBorder = 0.15 + breathing.getBreathe() * 0.1;
        ctx.strokeStyle = `rgba(0,255,255,${breatheBorder})`;
        ctx.lineWidth = 2;
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type); 
        ctx.stroke();
      } 
      
      ctx.restore(); // Restore globalAlpha and transform from BURSTING or default

      // Selected highlight (on top of everything)
      if (game.selected && game.selected.r === r && game.selected.c === c) {
        ctx.strokeStyle = '#0ff'; // Bright cyan
        ctx.lineWidth = 4; // Thicker border
        ctx.shadowColor = '#0ff';
        ctx.shadowBlur = 15; // Strong glow
        drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type); 
        ctx.stroke();
        ctx.shadowBlur = 0; // Reset shadow
      }
    }
  }

  // --- FINAL LAYER (GLOBAL): Draw the entire grid of lines once ---
  drawFullWavyGrid(ctx, 1.5, '#333'); // Draw grid with 1.5px width, dark grey color
  
  // Hint highlight (on top of everything else, over grid lines)
  if (game.hintActive && game.hintCoords) {
      const hintPulse = 0.5 + 0.5 * Math.sin(game.automataFrame / 10);
      const r1 = game.hintCoords.r1, c1 = game.hintCoords.c1;
      const r2 = game.hintCoords.r2, c2 = game.hintCoords.c2;

      const cell1Corners = getCellCorners(r1, c1);
      const cell2Corners = getCellCorners(r2, c2);

      ctx.strokeStyle = `rgba(255, 255, 0, ${hintPulse})`; // Yellow pulse
      ctx.lineWidth = 3;
      ctx.shadowColor = `rgba(255, 255, 0, ${hintPulse * 0.7})`;
      ctx.shadowBlur = 10;

      // Draw hint for both cells involved in the suggested swap
      drawWavyQuadPath(ctx, cell1Corners, r1, c1, game.grid[r1][c1].type); ctx.stroke();
      drawWavyQuadPath(ctx, cell2Corners, r2, c2, game.grid[r2][c2].type); ctx.stroke();
      ctx.shadowBlur = 0;
  }
  
  requestAnimationFrame(draw);
}


function handleClick(e) {
  if (game.busy) return;
  
  const rect = canvas.getBoundingClientRect();
  // Scale click coordinates to canvas's internal resolution
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clickX = (e.clientX - rect.left) * scaleX;
  const clickY = (e.clientY - rect.top) * scaleY;
  
  let clickedCellR = -1;
  let clickedCellC = -1;

  // Iterate over cells to find which one was clicked
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = game.grid[r][c]; 
      if (!cell) continue;

      const polygonCorners = getCellCorners(r, c);
      
      // Adjust path for current animation state (flow/breathe/burst) for accurate click detection
      ctx.save();
      
      // Calculate effective x,y for cell center/drawing origin
      const cellX = c * CELL_SIZE;
      const cellY = r * CELL_SIZE;
      const flow = {x:0, y:0}; // Flow field not yet integrated with click detection accurately for this iteration
      const breathe = 0; 
      
      let currentScale = 1;
      if (cell.state === CELL_STATES.BURSTING) {
          const burstProgress = cell.timer / AUTOMATA_CONFIG.BURST_DURATION;
          currentScale = 1 + burstProgress * 0.5;
      }
      
      // Apply translation and scaling in the same way as drawing
      ctx.translate(cellX + flow.dx + breathe + CELL_SIZE/2, cellY + flow.dy + breathe + CELL_SIZE/2);
      ctx.scale(currentScale, currentScale);
      ctx.translate(-(cellX + flow.dx + breathe + CELL_SIZE/2), -(cellY + flow.dy + breathe + CELL_SIZE/2));

      drawWavyQuadPath(ctx, polygonCorners, r, c, cell.type); 
      
      if (ctx.isPointInPath(clickX, clickY)) {
        clickedCellR = r;
        clickedCellC = c;
      }
      ctx.restore(); // Restore context after testing this cell
      ctx.beginPath(); // Clear the path after testing this cell, to not affect next iterations.
      if (clickedCellR !== -1) break; 
    }
    if (clickedCellR !== -1) break; 
  }

  if (clickedCellR === -1) { 
    game.selected = null; 
    game.hintActive = false; // Clear hint if clicking outside
    return;
  }
  
  const row = clickedCellR;
  const col = clickedCellC;

  console.log('👆 Click:', row, col);
  
  if (!game.selected) {
    game.selected = {r: row, c: col};
    const cell = game.grid[row][col];
    console.log('✓ Selected:', row, col, '- type:', cell.type, 'state:', cell.state);
    haptic(10);
    game.sounds.swap();
    game.hintActive = false; // Clear hint on selection
    
    // Update video preview
    const segIdx = segmentIndexForCell(cell.type, row, col);
    const seg = TYPE_SEGMENTS[cell.type][segIdx];
    const previewVideo = document.getElementById('previewVideo');
    previewVideo.src = seg.file;
    previewVideo.onloadedmetadata = () => {
        try { previewVideo.currentTime = seg.start; } catch(e) {}
        previewVideo.play().catch(()=>{});
    };
    document.getElementById('videoLabel').textContent = seg.title;
  } else {
    const {r: r1, c: c1} = game.selected;
    const r2 = row, c2 = col;
    
    // Check if adjacent (only horizontal or vertical)
    const adjacent = Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    
    if (adjacent) {
      console.log('🔄 Swapping (nudge):', [r1,c1], 'with', [r2,c2]);
      trySwap(r1, c1, r2, c2); // Initiate the swap attempt
    } else {
      console.log('❌ Not adjacent or re-selecting');
      // If player clicks the same cell, deselect it. If clicks non-adjacent, select new one.
      if (r1 === r2 && c1 === c2) {
        game.selected = null;
      } else {
        game.selected = {r: row, c: col}; // Select new cell
        const cell = game.grid[row][col];
        const segIdx = segmentIndexForCell(cell.type, row, col);
        const seg = TYPE_SEGMENTS[cell.type][segIdx];
        const previewVideo = document.getElementById('previewVideo');
        previewVideo.src = seg.file;
        previewVideo.onloadedmetadata = () => {
            try { previewVideo.currentTime = seg.start; } catch(e) {}
            previewVideo.play().catch(()=>{});
        };
        document.getElementById('videoLabel').textContent = seg.title;
      }
      game.sounds.error();
      haptic([10, 50, 10]);
      game.hintActive = false; // Clear hint on interaction
    }
  }
}

// as refillGrid handles dropping and spawning

    // It filters existing cells and drops them to the bottom.
}

function refillGrid() {
  for (let c = 0; c < GRID_SIZE; c++) {
    // Filter out nulls (cleared cells) and keep existing cells
    const existingCells = [];
    for (let r = GRID_SIZE - 1; r >= 0; r--) {
        if (game.grid[r][c]) {
            existingCells.push(game.grid[r][c]);
        }
    }
    // Fill the column from bottom up with existing cells
    for (let r = 0; r < GRID_SIZE; r++) {
        if (r < existingCells.length) {
            game.grid[GRID_SIZE - 1 - r][c] = existingCells[r];
        } else {
            // Fill any remaining top cells with new random types
            let newCell = createCell(randomCandyType());
            // Ensure newly spawned cells don't immediately create a match
            let attempts = 0;
            while (attempts < 10 && checkForNewMatch(GRID_SIZE - 1 - r, c, newCell.type)) {
                newCell.type = randomCandyType();
                attempts++;
            }
            game.grid[GRID_SIZE - 1 - r][c] = newCell;
        }
    }
  }
}

// Helper to check if a newly placed cell creates an immediate match (used by refillGrid)
function checkForNewMatch(r, c, type) {
    // Temporarily set the cell type to check (create a dummy cell for the position)
    const originalCell = game.grid[r][c]; // Store original cell, in case it's not null
    game.grid[r][c] = { type: type, state: CELL_STATES.QUIET, timer: 0, tension: 0, drift: {dx:0, dy:0} }; // Minimal cell object
    
    let hasMatch = false;
    // Check horizontal
    let hCount = 1;
    for (let i = c - 1; i >= 0 && game.grid[r][i] && game.grid[r][i].type === type; i--) hCount++;
    for (let i = c + 1; i < GRID_SIZE && game.grid[r][i] && game.grid[r][i].type === type; i++) hCount++;
    if (hCount >= AUTOMATA_CONFIG.MATCH_LENGTH) hasMatch = true;

    // Check vertical
    let vCount = 1;
    for (let i = r - 1; i >= 0 && game.grid[i][c] && game.grid[i][c].type === type; i--) vCount++;
    for (let i = r + 1; i < GRID_SIZE && game.grid[i][c] && game.grid[i][c].type === type; i++) vCount++;
    if (vCount >= AUTOMATA_CONFIG.MATCH_LENGTH) hasMatch = true;

    game.grid[r][c] = originalCell; // Restore original cell
    return hasMatch;
}

function updateTimeline() {
  const panel = document.getElementById('timelinePanel');
  const clipList = document.getElementById('clipList');
  const wrap = document.getElementById('sequencePlayerWrap');
  
  clipList.innerHTML = '';
  
  game.sequence.forEach((video, i) => {
    const clip = document.createElement('div');
    clip.className = 'clip-item';
    if (video.mute) {
      clip.classList.add('muted'); // Use class for muted
    }
    if (video.locked) { 
        clip.classList.add('locked');
    }

    const vid = document.createElement('video');
    vid.src = video.file;
    vid.muted = true;
    vid.playsinline = true;
    vid.currentTime = video.start || 0; 
    
    const label = document.createElement('div');
    label.className = 'clip-label';
    label.textContent = `${i + 1}. ${video.title}`;
    
    clip.appendChild(vid);
    clip.appendChild(label);
    // Click to unlock or play
    clip.onclick = () => {
        if (video.locked) {
            video.locked = false;
            updateTimeline(); // Re-render to show unlock
            console.log(`🔓 Unlocked clip: ${video.title}`);
            maybeAutoPlaySequence(); // Try to play if auto-play is on
        } else {
            playSingleInPlayer(video);
        }
    };
    clipList.appendChild(clip);
  });
  
  if (game.sequence.length > 0) {
    panel.classList.add('active');
    wrap.style.display = 'block';
  }
}

function startSequencePlayback() {
  if (game.sequence.length === 0) return;
  const player = document.getElementById('sequencePlayer');
  const label = document.getElementById('sequencePlayerLabel');
  document.getElementById('timelinePanel').classList.remove('collapsed'); 
  document.getElementById('sequencePlayerWrap').style.display = 'block';
  
  let idx = 0;

  const getNextPlayableClip = (startIndex) => {
      for (let i = 0; i < game.sequence.length; i++) {
          const currentIdx = (startIndex + i) % game.sequence.length;
          if (!game.sequence[currentIdx].locked) { // Only play unlocked clips
              return currentIdx;
          }
      }
      return -1; // No unlocked clips to play
  };

  const playIdx = (i) => {
    const playableIdx = getNextPlayableClip(i);
    if (playableIdx === -1) {
        label.textContent = "No Unlocked Clips";
        player.pause();
        return;
    }
    idx = playableIdx; 
    const v = game.sequence[idx];
    
    player.src = v.file;
    label.textContent = `${idx+1}. ${v.title}`;
    const start = v.start ?? 0;
    const end = v.end ?? null;
    player.onloadedmetadata = () => {
      try { player.currentTime = start; } catch(e) {}
      player.muted = !!v.mute || !game.soundEnabled; // Mute if clip is muted or global sound is off
      player.play().catch(()=>{});
    };
    if (end != null) {
      player.ontimeupdate = () => {
        if (player.currentTime >= end) {
          player.ontimeupdate = null; 
          playIdx((idx + 1) % game.sequence.length); 
        }
      };
    } else {
      player.ontimeupdate = null; 
    }
  };
  player.onended = () => { playIdx((idx + 1) % game.sequence.length); };
  playIdx(idx); 
}

function playSingleInPlayer(v) {
  const player = document.getElementById('sequencePlayer');
  const label = document.getElementById('sequencePlayerLabel');
  if (v.locked) {
      label.textContent = "Clip Locked! 🔒";
      player.pause();
      return;
  }
  document.getElementById('timelinePanel').classList.remove('collapsed'); 
  document.getElementById('sequencePlayerWrap').style.display = 'block';
  
  player.src = v.file;
  label.textContent = v.title;
  const start = v.start ?? 0;
  const end = v.end ?? null;
  player.onloadedmetadata = () => {
    try { player.currentTime = start; } catch(e) {}
    player.muted = !!v.mute || !game.soundEnabled; 
    player.play().catch(()=>{});
  };
  if (end != null) {
    player.ontimeupdate = () => {
      if (player.currentTime >= end) {
        try { player.currentTime = start; } catch(e) {} // Loop single clip
      }
    };
  } else {
    player.ontimeupdate = null;
  }
}

function checkGameOver() {
  if (game.moves <= 0) {
    if (!canMakeAnyMove()) {
        showModal();
    } else {
        // If moves are 0 but moves are possible, the game could continue or prompt for shuffle.
        // For now, if moves reach 0, it's considered game over with a prompt.
        showModal();
    }
  }
}

function canMakeAnyMove() {
    // This is a complex check for match-3, iterate all possible 1-step swaps and check for matches.
    for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
            // Check right swap
            if (c + 1 < GRID_SIZE) {
                // Temporarily swap
                [game.grid[r][c], game.grid[r][c+1]] = [game.grid[r][c+1], game.grid[r][c]];
                if (findMatches().length > 0) {
                    // Swap back
                    [game.grid[r][c], game.grid[r][c+1]] = [game.grid[r][c+1], game.grid[r][c]]; 
                    return true;
                }
                // Swap back
                [game.grid[r][c], game.grid[r][c+1]] = [game.grid[r][c+1], game.grid[r][c]]; 
            }
            // Check down swap
            if (r + 1 < GRID_SIZE) {
                // Temporarily swap
                [game.grid[r][c], game.grid[r+1][c]] = [game.grid[r+1][c], game.grid[r][c]];
                if (findMatches().length > 0) {
                    // Swap back
                    [game.grid[r][c], game.grid[r+1][c]] = [game.grid[r+1][c], game.grid[r][c]]; 
                    return true;
                }
                // Swap back
                [game.grid[r][c], game.grid[r+1][c]] = [game.grid[r+1][c], game.grid[r][c]]; 
            }
        }
    }
    return false;
}

function showHint() {
  if (game.busy || game.hintActive) return;

  const hint = findHint();
  if (hint) {
    game.hintActive = true;
    game.hintCoords = hint;
    console.log('💡 Hint: Try swapping', hint.r1, hint.c1, 'with', hint.r2, hint.c2);
    game.sounds.swap();
    haptic(10);
    // The draw loop will now render the hint highlight
    setTimeout(() => {
        game.hintActive = false; // Hint disappears after a short time
        game.hintCoords = null;
    }, 2000); // Hint duration
  } else {
    console.log('💡 No obvious hint found. Try shuffling!');
    game.sounds.error();
    haptic([10, 50, 10]);
  }
}

function findHint() {
    for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
            // Check right swap
            if (c + 1 < GRID_SIZE) {
                [game.grid[r][c], game.grid[r][c+1]] = [game.grid[r][c+1], game.grid[r][c]];
                if (findMatches().length > 0) {
                    [game.grid[r][c], game.grid[r][c+1]] = [game.grid[r][c+1], game.grid[r][c]]; // Swap back
                    return { r1: r, c1: c, r2: r, c2: c + 1 };
                }
                [game.grid[r][c], game.grid[r][c+1]] = [game.grid[r][c+1], game.grid[r][c]]; // Swap back
            }
            // Check down swap
            if (r + 1 < GRID_SIZE) {
                [game.grid[r][c], game.grid[r+1][c]] = [game.grid[r+1][c], game.grid[r][c]];
                if (findMatches().length > 0) {
                    [game.grid[r][c], game.grid[r+1][c]] = [game.grid[r+1][c], game.grid[r][c]]; // Swap back
                    return { r1: r, c1: c, r2: r + 1, c2: c };
                }
                [game.grid[r][c], game.grid[r+1][c]] = [game.grid[r+1][c], game.grid[r][c]]; // Swap back
            }
        }
    }
    return null; // No hint found
}

function shuffle() {
  console.log('🔀 Shuffling...');
  game.busy = true; // Prevent input during shuffle
  game.selected = null;
  game.hintActive = false;

  setTimeout(() => { // Small delay for visual effect
    createGrid(); // This recreates grid and ensures no immediate matches
    game.moves = Math.max(5, game.moves); // Give some moves back or reset
    document.getElementById('moves').textContent = game.moves;
    game.sounds.match(); 
    haptic(20);
    game.busy = false; // Allow input again
  }, 300); // Shuffle delay
}

function toggleTimeline() {
  const panel = document.getElementById('timelinePanel');
  panel.classList.toggle('collapsed'); 
  console.log('📋 Timeline toggled');
  game.sounds.swap();
  haptic(10);
}

function toggleExportMenu() {
  document.getElementById('exportMenu').classList.toggle('show');
  game.sounds.swap();
  haptic(10);
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  game.sounds.swap();
  haptic(10);
}

// Global sound button
function toggleSound() {
  game.soundEnabled = !game.soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.textContent = game.soundEnabled ? 'MUTE' : 'UNMUTE';
  
  // Mute/unmute sequence player and all segment videos based on global setting
  const seqPlayer = document.getElementById('sequencePlayer');
  if (seqPlayer) seqPlayer.muted = !game.soundEnabled;
  Object.values(game.typeSegmentVideos).forEach(v => {
      v.muted = !game.soundEnabled;
  });

  console.log('🔊 Sound:', game.soundEnabled);
  haptic(10);
}

function updateAutoPlayButton() {
  const btn = document.getElementById('autoPlayBtn');
  if (!btn) return;
  btn.textContent = game.autoPlay ? 'AUTO ON' : 'AUTO OFF';
}

function toggleAutoPlay() {
  game.autoPlay = !game.autoPlay;
  updateAutoPlayButton();
  if (game.autoPlay) {
    maybeAutoPlaySequence();
  } else {
    const player = document.getElementById('sequencePlayer');
    if(player) player.pause();
  }
}

function maybeAutoPlaySequence() {
  if (!game.autoPlay) return;
  if (game.sequence.length === 0) return;
  
  const hasUnlockedClips = game.sequence.some(clip => !clip.locked);
  if (!hasUnlockedClips) {
      document.getElementById('sequencePlayerLabel').textContent = "No Unlocked Clips";
      const player = document.getElementById('sequencePlayer');
      if(player) player.pause();
      return;
  }
  
  const player = document.getElementById('sequencePlayer');
  const hasSrc = !!player.src && player.src.length > 0;
  if (!hasSrc || player.paused) {
    startSequencePlayback();
  }
}

// EXPORT FUNCTIONS

function exportJSON() {
  if (game.sequence.length === 0) {
    alert('No clips in sequence!');
    return;
  }
  
  const data = {
    title: 'Garden Sequence',
    timestamp: new Date().toISOString(),
    score: game.score,
    clips: game.sequence.length,
    acts: game.actCounter, 
    sequence: game.sequence.map((v, i) => ({
      order: i + 1,
      title: v.title,
      file: v.file,
      start: v.start,
      end: v.end,
      muted: !!v.mute, 
      locked: !!v.locked, 
      sourceCell: v.sourceCell || 'N/A' 
    }))
  };
  
  downloadFile('garden_sequence.json', JSON.stringify(data, null, 2));
  console.log('✓ JSON exported');
  game.sounds.match();
  haptic(30);
  document.getElementById('exportMenu').classList.remove('show');
}

function exportEDL() {
  if (game.sequence.length === 0) {
    alert('No clips in sequence!');
    return;
  }
  
  let edl = 'TITLE: Garden Sequence\n\n';
  let recordIn = 0;
  
  game.sequence.forEach((v, i) => {
    if (v.locked) {
        edl += `* CLIP ${i + 1}: ${v.title} [LOCKED/SKIPPED IN EDL]\n\n`;
        return;
    }
    const duration = (v.end - v.start) || 10; 
    const recordOut = recordIn + duration;
    
    edl += `${String(i + 1).padStart(3, '0')}  001      V     C        `;
    edl += `${formatTimecode(v.start)} ${formatTimecode(v.end)} `; 
    edl += `${formatTimecode(recordIn)} ${formatTimecode(recordOut)}\n`; 
    edl += `* FROM CLIP: ${v.title} (Cell ${v.sourceCell.r},${v.sourceCell.c})${v.mute ? ' [MUTED]' : ''}\n`;
    edl += `* SOURCE FILE: ${v.file}\n\n`;
    
    recordIn = recordOut;
  });
  
  downloadFile('garden_sequence.edl', edl);
  console.log('✓ EDL exported');
  game.sounds.match();
  haptic(30);
  document.getElementById('exportMenu').classList.remove('show');
}

function formatTimecode(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  const f = 0; 
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}:${String(f).padStart(2, '0')}`;
}

function exportMosaic() {
  alert('Mosaic HTML export is disabled in this build. Use JSON or EDL.');
  document.getElementById('exportMenu').classList.remove('show');
}

function exportTimeline() {
  alert('Timeline HTML export is disabled in this build. Use JSON or EDL.');
  document.getElementById('exportMenu').classList.remove('show');
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

init();
